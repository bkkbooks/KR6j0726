body:
  text: 大佛頂如來密因脩證了義諸菩薩萬行首楞嚴經卷第十阿難彼善男子修三摩提想陰盡者是人平常夢想銷滅寤寐恆一覺明虗靜猶如晴空無復麤重前塵影事觀諸世間大地山河如鏡鑒明來無所黏過無蹤跡虗受照應了罔陳習唯一精真生滅根元從此披露見諸十方十二眾生畢殫其類雖未通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為澄水名行陰盡是人則能超眾生濁觀其所由幽隱妄想以為其本阿難當知是得正知奢摩他中諸善男子凝明正心十類天魔不得其便方得精研窮生類本於類本中生元露者觀彼幽清圓擾動元於圓元中起計度者是人墜入二無因論一者是人見本無因何以故是人既得生機全破乘於眼根八百功德見八萬劫所有眾生業流灣環死此生彼祗見眾生輪迴其處八萬劫外冥無所觀便作是解此等世間十方眾生八萬劫來無因自有由此計度亡正徧知墮落外道惑菩提性二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本竪畜生本橫白非洗成黑非染造從八萬劫無復改移今盡此形亦復如是而我本來不見菩提云何更有成菩提事當知今日一切物象皆本無因由此計度亡正徧知墮落外道惑菩提性是則名為第一外道立無因論通曰想陰未盡寤則取像寐則成夢故逐前塵麤重影事想陰既盡內守幽閒寤寐恒一覺明虗靜如鏡鑒明雖無去來蹤跡却有光明影子猶為法塵邊事向來前塵昏擾但隨生滅流轉不覩根元今虗受照應惟一精真生滅既停而其根元從此披露見同生基綿綿密密微細遷流是為無風匝匝之波野馬者游埃也熠熠者螢光也行陰微細如日光所照隙塵熠熠然了無住相乍生乍滅無復麤影故曰清擾清擾四大為浮根四塵根元其體本空究竟樞穴實在於此黏湛發起故有六根自人天以至螻蟻莫不各有四大六根故為十二眾生同生之基是名行陰區宇若通別相能見眾生各命由緒慧福不齊由於多生積習種子發現屬識陰邊事故非行陰所測然此行陰清擾之性本自無擾故曰元性其不能不擾者多生習氣也故曰元習習不能澄習唯性歸元則能澄靜以一澄靜之性澄其元習則遷流相盡無風帀帀之波滅則化為澄水矣化為澄水至湛不搖處名行陰盡是人則能超眾生濁眾生濁者生滅不停業運常遷今於不停者停矣常遷者不遷矣幾入滅盡故能超也然行陰密移曾無覺悟以幽隱妄想為本於其幽閒隱密而破除之非徹悟性體者不能也彼寤寐恒一是得正知與前動靜不移憶忘如一當住此處入三摩地同一脉路以此為發悟階級則可便執以為實證則不可故想陰盡者凝明正心邪慮無自而生即十類天魔亦無緣而入天魔未離邪想而現神變今想陰盡觀見幽清動元蓋已入乎無想之天矣六欲天魔所不得而窺也幽清本無所動也圓擾則動而未嘗動也故謂之動元動元雖圓不離生滅於此生計度者總於生滅中計無因也一者見本無因不悟善惡業緣唯識所造祗憑生相暫無行流不息於其定中發宿命通見八萬劫來眾生輪迴如環無端便以眾生無因自然而有自八萬劫外冥無所觀固不知菩提為正因也二者見末無因不悟善惡業果唯心所召祗憑通力能見八萬劫後長時業果未轉移相便以人畜黑白橫竪從來如此非因修得固不知菩提為極果也惑菩提性不名正知止知前後八萬劫不名徧知外道末伽黎謂眾生苦樂不因行得皆自然爾正坐此見此二無因僅見七識無根傳送暫息而生此計度以七識內但依於八識生之無本遂謂本無因以七識外但依於六識推之無用遂謂末無因唯見其流注不息乃謂自然如此鏡清問靈雲混沌未分時如何雲曰露柱懷胎清云分後如何雲曰如片雲點太清裏清云祗如太清還受點也無雲不對清云恁麼則含生不來也雲亦不對清云直得純清絕點時如何雲曰猶是真常流注清云如何是真常流注雲曰似鏡常明清曰向上更有事否雲曰有清曰如何是向上事雲曰打破鏡來與子相見天童拈云分與未分玉機夜動點與不點金捘暗拋直是一色純清未得十成安隱且道打破鏡來向什麼處相見還會麼清秋老兔吞光後湛水蒼龍蛻骨時此真常流注恰與行陰相符而似鏡常明亦與如鏡鑒明無異若能破鏡相見如湛水蒼龍蛻骨而出則幾轉成智矣寧但破行陰而已哉阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中起計度者是人墜入四徧常論一者是人窮心境性二處無因修習能知二萬劫中十方眾生所有生滅咸皆循環不曾散失計以為常二者是人窮四大元四性常住修習能知四萬劫中十方眾生所有生滅咸皆體恒不曾散失計以為常三者是人窮盡六根末那執受心意識中本元由處性常恒故修習能知八萬劫中一切眾生循環不失本來常住窮不失性計以為常四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計以為常由此計常亡正徧知墮落外道惑菩提性是則名為第二外道立圓常論通曰立無因論者見其斷立圓常論者見其常推之亦斷亦常非斷非常總不出斷常邪見也窮生類本至圓擾動元見其虗而愈出動而不窮便計為常從廣至狹從粗入精略有次第一者通五陰四大心境二處皆無因自有循環不失二者但指地水火風清淨四大之性能成眾生色陰體恒不變三者但指心識六根所依末那七識執受之心執受之意執受之識本元由處即行陰也眾生雖有循環而行陰不失即此七識為常住性如見細流謂之止水無始以來生死本癡人喚作本來人此之謂也四者妄認行陰為自然理謂生滅想心既已滅盡其永滅處自然成不生滅於此生滅中計不生滅如見虗空謂之常住不知虗空亦可滅也且又因心計度為常非真見其常者比此四尚未覩八識真常流注何況轉識而見菩提性乎瑞巖問巖頭如何是本常理頭曰動也巖曰動時如何頭曰不見本常理巖佇思頭曰肯即未脫根塵不肯即永沉生死巖乃禮拜天童頌云圓珠不穴大璞不琢道人所貴無稜角拈却肯路根塵空脫體無依活卓卓此於本來常住見之極真肯之一字尚須拈却而況計度執受神我墜入圓常窟中終從淪墮豈能常也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於自他中起計度者是人墜入四顛倒見一分無常一分常論一者是人觀妙明心徧十方界湛然以為究竟神我從是則計我徧十方凝明不動一切眾生於我心中自生自死則我心性名之為常彼生滅者真無常性二者是人不觀其心徧觀十方恒沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常三者是人別觀我心精細微密猶如微塵流轉十方性無改移能令此身即生即滅其不壞性名我性常一切死生從是流出名無常性四者是人知想陰盡見行陰流行陰常流計為常性色受想等今已滅盡名為無常由此計度一分無常一分常故墮落外道惑菩提性是則名為第三外道一分常論通曰此亦常亦無常見也本妙明心徧十方界未嘗不是但執為神我則非也唯執是我正是末那執受意識雖云凝明不動其中微細遷流即生滅種子特不自覺耳既以暫時不動心性名之為常又以一切眾生生滅為無常性則所謂徧十方者有二我也豈不顛倒無論心性只論國土則三禪以下三災所及名之無常四禪以上災不能及名究竟常無論國土但論心性性無改移名我性常死此生彼名無常性始合自他總計常無常既分自他各計常無常又復以行陰為自色受想為他行陰常流名為常性想等滅盡名無常性於一心中分常無常是以心有二也豈不顛倒此視前圓常之論稍無拘執然源頭不清總屬謬計忠國師問僧何方來曰南方來師曰南方知識如何示人曰彼方知識直下示學人即心即佛佛是覺義汝今悉具見聞覺知之性此性善能揚眉瞬目去來運用徧於身中挃頭頭知挃脚脚知故名正徧知離此之外更無別佛此身即有生滅心性無始以來未曾生滅身生滅者如龍換骨蛇蛻皮人出故宅即身是無常其性常也南方所說大約如此師曰若然者與彼先尼外道無有差別彼云我此身中有一神性此性能知痛癢身壞之時神則出去如舍被燒舍主出去舍即無常舍主常矣審如此者邪正莫辨孰為是乎吾比遊方多見此色近尤盛矣聚却三五百眾目視雲漢云是南方宗旨把他壇經改換添糅雜譚削除聖意惑亂後徒豈成言教苦哉吾宗喪矣若以見聞覺知是佛性者淨名不應云法離見聞覺知若行見聞覺知是則見聞覺知非求法也僧又問法華了義經開佛知見此復若為師曰他云開佛知見不言菩薩二乘豈以眾生癡倒便同佛之知見耶行昌問於六祖曰弟子常覽涅槃經未曉常無常義乞為解說祖曰無常者即佛性也有常者即一切善惡諸法分別心也曰和尚所說大違經文祖曰吾傳佛心印安敢違於佛經曰經說佛性是常和尚却言無常善惡諸法乃至菩提心皆是無常和尚却言常此即相違令學人轉加疑惑祖曰涅槃經吾聽尼無盡藏讀誦一徧便為講說無一字一義不合經文乃至為汝終無二說曰學人識量淺昧願和尚委曲開示祖曰汝知否佛性若常更說什麼善惡諸法乃至窮劫無有一人發菩提心者故吾說無常正是佛說真常之道也又一切諸法若無常者即物物皆有自性容受生死而真常性有不徧之處故吾說常者正是佛說真無常義佛比為凡夫外道執於邪常諸二乘人於常計無常共成八倒故於涅槃了義教中破彼偏見而顯說真常真樂真我真淨汝今背義以斷滅無常及確定死常而錯解佛之圓妙最後微言縱覽千徧有何所益行昌忽然大悟乃說偈曰因守無常心佛說有常性不知方便者猶春池拾礫我今不施功佛性而現前非師相授與我亦無所得祖曰汝今徹也宜名志徹禮謝而退若此甚深常無常義彼諸外道未夢見在又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中生計度者是人墜入四有邊論一者是人心計生元流用不息計過未者名為有邊計相續心名為無邊二者是人觀八萬劫則見眾生八萬劫前寂無聞見無聞見處名為無邊有眾生處名為有邊三者是人計我徧知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性四者是人窮行陰空以其所見心路籌度一切眾生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊由是計度有邊無邊墮落外道惑菩提性是則名為第四外道立有邊論通曰此就常無常例起邊無邊論常無常以性言屬見分邊無邊以分位言屬相分一三際分位二見聞分位三彼我分位四生滅分位總局於行陰之分位而妄生計度也一者因行陰流用不息以其流用也成過未現三際故名有邊以其不息也相續無際故名無邊二者但計眾生八萬劫內見聞所及故名有邊八萬劫外無聞見處故名無邊三者計我徧知一切眾生名無邊性彼之知性徧與不徧但彼自知我曾不知彼則局於自知不能通之於我但有邊性四者窮行陰空昔有今無因計正報眾生半生半滅依報世界亦半生半滅半生為有邊半滅為無邊此四有邊總不出前眾生生滅循環及劫壞不壞等見特以邊量論耳僧問忠國師曰有知識示學人但自識性了無常時拋却殻漏子一邊著靈臺智性迥然而去名為解脫此復若為師曰前已說了猶是二乘外道之量二乘厭離生死欣樂涅槃外道亦言吾有大患為吾有身乃趣乎冥諦須陀洹入八萬劫餘三果入六四二萬劫辟支佛一萬劫住空定中外道八萬劫住非非想中二乘劫滿猶能迴心向大外道還即輪迴曰佛性一種為別師曰不得一種曰何也師曰或有全不生滅或半生半滅半不生滅曰孰為此解師曰我此間佛性全無生滅汝南方佛性半生半滅半不生滅曰如何區別師曰此則身心一如身外無餘所以全不生滅汝南方身是無常神性是常所心半生半滅半不生滅曰和尚色身豈得便同法身不生滅耶師曰汝那得入於邪道曰學人早晚入邪道猶言學人那曾入邪道也師曰汝不見金剛經色見聲求皆行邪道今汝所見不其然乎曰某甲曾讀大小乘教亦見有說不生不滅中道正性之處亦見有說此陰滅彼陰生身有代謝而神性不滅之文那得盡撥同外道斷常二見師曰汝學出世無上正真之道為學世間生死斷常二見耶汝不見肇公云談真則違俗順俗則違真違真故迷性而莫返逆俗故言淡而無味中流之人如存如亡下士拊掌而笑之今汝欲學下士笑於大道乎曰師亦言即心是佛南方知識亦爾那有異同師不應自是而非他師曰或名異體同或名同體異因茲濫矣只如菩提涅槃真如佛性名異體同真心妄心佛智世智名同體異緣南方錯將妄心言是真心認賊為子有取世智稱為佛智猶如魚目而亂明珠不可雷同事須甄別曰若為得離此過師曰汝但子細返觀陰入界處一一推窮有纖毫可得否曰子細觀之不見一物可得師曰汝壞身心相耶曰身心性離有何可壞師曰身外更有物否曰身心無外寧更有物耶師曰汝壞世間相耶曰世間相即無相那用更壞師曰若然者即離過矣華嚴經曰一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力此所謂自他不隔於毫端始終不離於當念不知有邊無邊之見從何建立又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者是人墜入四種顛倒不死矯亂徧計虗論一者是人觀變化元見遷流處名之為變見相續處名之為恒見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處名之為減各各生處名之為有互互亡處名之為無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減於一切時皆亂其語令彼前人遺失章句二者是人諦觀其心互互無處因無得證有人來問唯答一字但言其無除無之餘無所言說三者是人諦觀其心各各有處因有得證有人來問唯答一字但言其是除是之餘無所言說四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰由此計度矯亂虗無墮落外道惑菩提性是則名為第五外道四顛倒性不死矯亂徧計虗論通曰此猶然亦有亦無見也上言常無常邊無邊尚有區別未至溷淆此則即常即無常即邊即無邊一切矯亂無容窮詰實為虗無荒唐之論顛倒之甚者就上遷流有邊處名之為變相續無邊處名之為常八萬劫內所見處名之為生八萬劫外不見處名之為滅又於相續中不斷處計為增如白黑月漸生中所離處計為減如晦夕白黑俱盡又於各各生處總謂之有互互亡處總謂之無於一行陰生滅分為八義以理都觀兩可俱是不能定其端的於一切時皆亂其語沉溺於行陰之中不能超越於行陰之外故為生滅所轉耳又從有無而分之於念念滅相而得證者但言其無於念念生相而得證者但言其是又從有無而合之言亦有即是亦無亦無即是亦有亦有之中不是亦無亦無之中不是亦有語雖互見與前微有別前兩端並陳不能決了此但舉一端兩端具在言亦有即是亦無不專言無亦無之中不是亦有不專言是知見紛錯莫有定衡儱侗慌惚歸於虗謬外道計天為常住名為不死計不亂答得生彼天若實不知而輒答者恐成矯亂佛訶云此真矯亂議論故名為不死矯亂徧計虗論曰徧計者計有又計無生滅增減恒變一切徧計其實無益於得總為戲論雖然通方作家道有也得道無也得在在有出身之路僧問趙州狗子還有佛性也無州云有僧云既有為甚麼却撞入這箇皮袋州云為他知而故犯又有僧問狗子還有佛性也無州云無僧云一切眾生皆有佛性狗子為甚麼却無州云為伊有業識在天童頌云狗子佛性有狗子佛性無直釣元求負命魚逐氣尋香雲水客嘈嘈雜雜作分踈平展演大鋪舒莫怪儂家不慎初指點瑕疵還奪璧奉王不識藺相如天童別有頌云趙州道有趙州道無狗子佛性天下分疎面赤不如語直心真必定言麤七百甲子老禪伯驢糞逢人換眼珠又京兆惟寬禪師僧問狗子還有佛性否師曰有曰和尚還有否師曰我無曰一切眾生皆有佛性和尚因何獨無師曰我非一切眾生曰既非眾生莫是佛否師曰不是佛曰究竟是何物師曰亦不是物曰可見可思否師曰思之不及議之不得故曰不可思議外道欲於可思可議者徧計立論豈不顛倒又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於無盡流生計度者是人墜入死後有相發心顛倒或自固身云色是我或見我圓含徧國土云我有色或彼前緣隨我迴復云色屬我或復我依行中相續云我在色皆計度言死後有相如是循環有十六相從此或計畢竟煩惱畢竟菩提兩性並驅各不相觸由此計度死後有故墮落外道惑菩提性是則名為第六外道立五陰中死後有相心顛倒論通曰前五所計或有或無或亦有亦無不出三句未見雙非尚滯在行陰中故今計及死後有相無相及有無俱非又於後後有無起斷滅涅槃二見蓋行陰幾空而窺見識陰矣且來先去後唯識主之故此以五陰並言龍勝曰五道中眾生身見力因緣故見四種我色眾是我色是我我中色色中我合云唯色是我唯離色是我我在色中色在我中如是推求了不可得受想行識亦復如是而外道返執為有相或自固身即色是我也含徧國土色在我中也前緣迴復離色是我也依行相續我在色中也依此四計受想行識皆然乃至即行是我離行是我我在行中行在我中所計之我即識陰也皆計死後復有成十六相煩惱由陰而生菩提由我而證兩性並驅入未來際皆畢竟有故云立五陰中死後有相心顛倒論此從各各有處因有得證而創為此論也本菴道瓊首座嘗舉隻履西歸語謂眾曰坐脫立亡倒化即不無要且未有逝而後出遺履者為復後代兒孫不及祖師為復祖師剩有這一著子仍大笑曰老野狐紹興庚申冬信守迎主超化不赴貽偈得法弟子慧山曰口觜不中祥老子愛向叢林鼓是非分付雪峯山首座為吾痛罵莫饒伊顧專使曰為我傳語侍郎行計迫甚不及修答聲絕而化有僧問洞山亡僧遷化後向甚麼處去也山云火後一莖茅投子頌云野火燒時越轉新至今煙𦦨雨難霖旱地紅蓮遮日月無根樹長翠成陰若識此有相雖言有相也不妨又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中生計度者是人墜入死後無相發心顛倒見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性銷散縱有生理而無受想與草木同此質現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相從此或計涅槃因果一切皆空徒有名字究竟斷滅由此計度死後無故墮落外道惑菩提性是則名為第七外道立五陰中死後無相心顛倒論通曰此斷見也第於色受想滅而勘校之即此行陰生理將來究竟斷滅行陰滅則歸藏識海彼之所計未為無見然藏識非可滅者彼但見其滅遂計涅槃因果一切皆空究竟斷滅不知此特無相非無其理也故約四陰現在因亡將來果滅合之成八無相乃立五陰中死後無相心顛倒論此亦從互互無處因無得證而創為此論也長沙岑因僧亡以手摩之曰大眾此僧却真實為諸人提綱商量會麼乃有偈曰目前無一法當處亦無人蕩蕩金剛體非妄亦非真又曰不識金剛體却喚作緣生十方真寂滅誰在復誰行洞山將圓寂謂眾曰吾有閑名在世誰人為吾除得眾皆無對時沙彌出曰請和尚法號山曰吾閑名已謝石霜云無人得他肯雲居云若有閑名非吾先師曹山云從古至今無人辨得疎山云龍有出水之機無人辨得大陽明安問梁山如何是無相道場山指觀音云此是吳處士畫陽擬進語山急索曰這箇是有相底如何是無相底陽於言下有省禮拜乃歸本位立山云何不道取一句陽云道則不辭恐上紙墨山呵呵笑云此語上石去在後果上投子拈云道曠古今行人難度山危絕險登者無因倘不發明先蹤履踐無期得入所以悟由自己印乃憑師遞代證明續佛慧命此者窮崖問路力盡指蹤巖壁無門力窮進退既金龍失水妙翅急提別透波瀾復歸本位諸仁者正當恁麼時還知古人退位處麼若知得可謂萬仞峰摧千波竭沸龍宮與天界分簷鳳闕並星辰合彩巖松籠瑞川霧草薰不犯化門千山迥出若不知落處巖闊無人問龍愁滄海深頌曰路窮崖仞問山翁別指巖西嶺近東擬進霧垂嵐氣重迴頭頃見太陽紅若於此無相得箇消息雖言無相也不妨又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相又計諸行性遷訛故心發通悟有無俱非虗實失措由此計度死後俱非後際昏瞢無可道故墮落外道惑菩提性是則名為第八外道立五陰中死後俱非心顛倒論通曰此非有非無見也起於雙計有無自體相破不但色受想滅有即非有行陰遷變無即不無於此循環返復觀之向之滅者曾有雖無不無今之存者終滅雖有非有以是四陰雙計故成八非隨舉一緣皆具有相無相此但於緣觀其相之有無未為精也又於行性生滅流變之中見生中即有滅故非有也見滅中即有生故非無也此有無俱非於行性上觀非心發通悟者不能有而不有是謂妙有無而不無是謂真無乃道中第一義諦妙真如性也彼但於行性見其俱非後際識陰尚昏瞢無睹故虗實失措莫知所歸既無歸宿即無可道雖欲發揮藏識非生非滅境界亦不可得況真如第一義諦不生不滅之至理乎彼所謂通悟僅同緣覺之悟而不可語於正悟也此有無俱非亦從前矯亂言亦有即是亦無亦無之中不是亦有推極死後創為此論均名顛倒外道問佛不問有言不問無言世尊良久外道讚嘆曰世尊大慈大悲開我迷雲令我得入外道去後阿難問佛外道有何所證而言得入佛云如世良馬見鞭影而行世尊以良馬許此外道亦其心發通悟者雪竇頌云機輪曾未轉轉必兩頭走明鏡忽臨臺當下分妍醜奸醜分兮迷雲開慈門何處生塵埃因思良馬窺鞭影千里追風喚得迴喚得回鳴指三下有僧問法眼如何是亡僧面前觸目菩提眼云是汝面前又問亡僧遷化向甚麼處去眼曰亡僧幾曾遷化僧云爭奈即今何眼云汝不識亡僧法眼盡力呼喚尚不迴頭若於此省去可謂四句俱離靈根獨露又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無生計度者是人墜入七斷滅論或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅如是循環窮盡七際現前銷滅滅已無復由此計度死後斷滅墮落外道惑菩提性是則名為第九外道立五陰中死後斷滅心顛倒論通曰前見有行陰而無受想此行陰亦無故曰後後無前死後無相但屬身滅一際耳此窮盡七際滅不復生身屬欲界兼人與天欲盡屬初禪苦盡屬二禪極樂屬三禪極捨兼四禪無色二種雖言五事滅實該七際此入無想天外道大約與無聞比丘同一斷見謂已證果不受後有故立死後斷滅論開先照禪師上堂叢林規矩古佛家風一參一請一粥一飯且道明箇甚麼祗如諸人心心不停念念不住若能不停處停念處無念自合無生之理與麼說話笑破他人口參僧問雲門不起一念還有過也無門云須彌山白雲端頌云須彌山兮塞宇宙千眼大悲看不透除非自解倒騎牛一生不著隨人後天童頌云不起一念須彌山韶陽法施意非慳肯來兩手相分付擬去千尋不可攀滄海闊白雲閑莫將毫髮著其間假雞聲韻難謾我未肯模糊放過關此二頌大有甄別若靠著不起一念不解倒騎牛消息即是假雞聲韻不免隨人後矣惡能透向上關捩子耶又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者是人墜入五涅槃論或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪性無苦故或以三禪極悅隨故或以四禪苦樂二亡不受輪迴生滅性故迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟由此計度五現涅槃墮落外道惑菩提性是則名為第十外道立五陰中五現涅槃心顛倒論阿難如是十種禪那狂解皆是行陰用心交互故現斯悟眾生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末法徧令眾生覺了斯義無令心魔自起深孽保持覆護銷息邪見教其身心開覺真義於無上道不遭枝歧勿令心祈得少為足作大覺王清淨標指通曰既云後後無已何以復後後有也蓋此幽清常擾動元是滅不得者非得真寂滅場地妄於滅處見有可證故言後後有蓋行陰剎那暫停圓明略現便謂此無生滅即是涅槃乃於五處計涅槃果使涅槃而有五也可謂之真涅槃乎即前七際滅盡立五涅槃愛慕圓明人天所共苦藥二亡不受生滅四禪與無色天同也此五處安穩不出三界欲漏有漏無明漏依然潛伏且本於有為功用純熟成就彼唯證無想定便謂得無為果迷於有漏之中而不自覺劫滿還入輪轉豈得為真涅槃耶僧志道請益六祖曰學人自出家覽涅槃經十載有餘未明大意願和尚垂誨祖曰汝何處未明曰諸行無常是生滅法生滅滅已寂滅為樂於此疑惑祖曰汝作麼生疑曰一切眾生皆有二身謂色身法身也色身無常有生有滅法身有常無知無覺經云生滅滅已寂滅為樂者不審何身寂滅何身受樂若色身者色身滅時四大分散全然是苦苦不可言樂若法身寂滅即同草木瓦石誰當受樂又法性是生滅之體五陰是生滅之用一體五用生滅是常生則從體起用滅則攝用歸體若聽更生即有情之類不斷不滅若不聽更生則永歸寂滅同於無情之物如是則一切諸法被涅槃之所禁伏尚不得生何樂之有祖曰汝是釋子何習外道斷常邪見而議最上乘法據汝所說即色身外別有法身離生滅求於寂滅又推涅槃常樂言有身受用斯乃執吝生死躭著世樂汝今當知佛為一切迷人認五蘊和合為自體相分別一切法為外塵相好生惡死念念遷流不知夢幻虗假枉受輪迴以常樂涅槃翻為苦相終日馳求佛愍此故乃示涅槃真樂剎那無有生相剎那無有滅相更無生滅可滅是則寂滅現前當現前時亦無現前之量可得乃謂常樂此樂無有受者亦無不受者豈有一體五用之名何況更言涅槃禁伏之法令永不生斯乃謗佛毀法聽吾偈曰無上大涅槃圓明常寂照凡愚謂之死外道執為斷諸求二乘人目以為無作盡屬情所計六十二見本妄立虗假名何為真實義唯有過量人通達無取捨以知五蘊法及以蘊中我外現眾色相一一音聲相平等如夢幻不起凡聖見不作涅槃解二邊三際斷常應諸根用而不起用想分別一切法不起分別想劫火燒海底風吹山相擊真常寂滅樂涅槃相如是吾今強言說令汝捨邪見汝勿隨言解許汝知少分志道聞偈大悟作禮而退若六祖所論直指真義作大覺王清淨標指誠有契乎其言枝見不生心魔自息庶幾行陰可破而超眾生濁矣阿難彼善男子修三摩提行陰盡者諸世間性幽清擾動同分生機倐然隳裂沉細綱紐補特伽羅酬業深脉感應懸絕於涅槃天將大明悟如雞後鳴瞻顧東方已有精色六根虗淨無復馳逸內外一作內內湛明入無所入深達十方十二種類受命元由觀由執元諸類不召於十方界已獲其同精色不沉發現幽祕此則名為識陰區宇若於羣召已獲同中銷磨六門合開成就見聞通隣互用清淨十方世界及與身心如吠瑠璃此青寶石內外明徹名識陰盡是人則能超越命濁觀其所由岡象虗無顛倒妄想以為其本通曰諸世間性不出十二類生滅之性其行陰幽清擾動雖無生滅麤相然常擾動元新新不住此即同分發生之機行陰盡者此機隳裂謂之曰機深沉而不可見微細而不可指如綱之綱如衣之紐有此綱紐即生滅根元補特伽羅中陰取趣之身酬因答果脉脉感應毫髮無爽今者生機隳裂則業因既亡孰為引果報身既無孰是酬因因果俱亡感應懸絕為絕其傳送沉細之深脉也脉之動也甚微脉不斷則命根不斷脉斷而機泯乃可入乎無生之境也前三陰盡如雞初鳴精色未分尚在昏瞢此行陰盡如雞後鳴瞻顧東方已有精色入此識陰六根虗靜無復馳逸動擾之相湛明澄徹內而又內深之又深以至入無所入直達本源之地故前未通其各命由緒僅見同生之機今達十二種類受命元由蓋已見其同而不見其生也觀其由執其元不令遷流不令馳逸此既無端彼自不召盡十方界唯心唯識而已又惡有不同哉既獲其同天地與我同根萬物與我一體渾然一藏識海也瞻顧精色不至昏沉則不覩不聞名至幽者無聲無臭名至祕者漸漸於此發現呈露雖能發現而未至於精瑩尚為識陰所覆故名識陰區宇若於十二類生受命元由已獲同中能以定慧之力銷磨六門使其分者可合壅者可開開合自由明不循根其見其聞與圓通隣則六根清淨可以互用即前所云返流全一六用不行於是十方國土皎然清淨譬如瑠璃內懸明月此亦云十方世界及與身心如吠瑠璃蓋金翅鳥卵也精瑩朗徹如金剛然不可破壞既內而身心外而世界朗然明徹不但精色發現而已一切如來密圓淨妙皆現其中是人即獲無生法忍即所謂乾慧地也非識陰盡者不及此識陰細微難斷即是命根受命元由皆始於此今識陰盡則根元俱盡諸類不召並其不召者而妄之矣十方皆同並其同者而泯之矣故能超越命濁也古師以息煖識三和合成命受生之際識陰為先若本識既離則息煖隨滅此識謝命終凡夫皆然而可謂之超命濁乎所云識陰盡者已無來先去後之識所云超命濁者業已證阿羅漢道不受後有詎可輕談且前數取趣身各從其類行陰盡者已絕此脉若此識陰命脉更為微細故謂之罔象虗無罔者若無象者若有若有若無又畢竟虗無虗無者不生不滅真如體也罔象者八識中生滅影子也故依真如即名正覺依八識即係妄覺背覺合塵故名顛倒妄想識陰盡者則是轉識成智轉生滅而依不生滅也除此罔象虗無細微顛倒妄想豈易為力哉僧問香巖如何是道巖云枯木裏龍吟僧云如何是道中人巖云髑髏裏眼睛僧舉問石霜如何是枯木裏龍吟霜云猶帶喜在僧云如何是髑髏裡眼睛霜云猶帶識在又問曹山如何是枯木裡龍吟山曰血脉不斷僧曰如何是髑髏裡眼睛山曰乾不盡僧曰未審還有得聞者否山曰盡大地未有一箇不聞者僧曰未審龍吟是何章句山曰不知是何章句聞者皆喪山以偈示之曰枯木龍吟真見道髑髏無識眼初明喜識盡時消息盡當人那辨濁中清天童拈云王居門裏臣不出門故喜識俱盡則子歸就父名乾得盡即所云識陰盡也不有如是章句惡能明是章句阿難當知是善男子窮諸行空於識還元已滅生滅而於寂滅精妙未圓能令己身根隔合開亦與十方諸類通覺覺知通㳷能入圓元若於所歸立真常因生勝解者是人則墮因所因執娑毗迦羅黃髮外道所歸冥諦成其伴侶迷佛菩提亡失知見是名第一立所得心成所歸果違遠圓通背涅槃城生外道種通曰識陰湛明因行而流行陰既空已滅生滅流注之相然尚依識元湛不流處故於寂滅精妙未圓寂滅云者生滅滅已不復更用滅其生滅也今滅生滅尚屬功用故未為妙有識元在故未得圓然已還識元銷磨六門歸在一處能令己身六根間隔者至是互用合開無礙寄根明發操縱自如不但自覺內瑩亦與十方諸類通覺諸類之覺即我之覺我之覺即諸類之覺覺知相通脗合無二能入覺元圓融無滯是元極圓即諸類受命之元亦即諸類發覺之元命由此立覺由此起既為覺所自出不見有知覺之相是覺者非常而無覺者為常故覺歸無常即是真常於識還元即是真常之因此特於八識未形之前冥然罔覺認為歸宿之地乃外道所謂冥諦也既有所歸又有所因能因所因皆即是妄立所得心成所得果即因即果皆墮所安有所即非圓有所即非真故曰違遠圓通與無上涅槃相背而馳也雲蓋山志元禪師因潭州道正表聞馬王乞師論義王請師上殿相見茶罷師就王乞劍師握劍問道正曰你教中道恍恍惚惚其中有物是何物杳杳冥冥其中有精是何精道得不斬道不得即斬道正茫然便禮拜懺悔師謂王曰還識此人否王曰識師曰是誰王曰道正師曰不是其道若正合對得山僧祗是箇無主孤魂因茲道士更不紛紜直饒對得分明也不出冥諦與無上正等正覺大相遠在阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸覽為自體盡虗空界十二類內所有眾生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅色頂魔王現無邊身成其伴侶迷佛菩提亡失知見是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我徧圓種通曰前常無常論觀妙明心徧十方界湛然以為究竟神我從是則計我徧十方凝明不動一切眾生於我心中自生自死即此所云皆我身中一類流出之見但彼見其行故計生滅此見其元故計能為雖執我能生彼而實不能故曰能非能執十二類生受命元由握之在我即謂命自我出無不可者何以曰非能蓋三界唯心萬法唯識無我相可得故能為萬象生也今於識元覽為自體便謂宇宙在乎手萬化生其身是猶窺見海能生漚而自身未離乎漚也漚豈能生漚哉一有能執雖現廣大神通總歸於慢為其強不能而謂能也摩醯首羅三目八臂騎白牛執白拂能現起無邊眾生身遂謂眾生自我流出彼所居色頂天未能超三界也不出三界而曰能生三界豈不自慢立我能生彼之心計我能成彼之事存一能見便不自圓故曰違遠圓通背涅槃城雪峰示眾云盡大地撮來粟米粒大拋向面前漆桶不會打鼓普請看雪竇頌云牛頭沒馬頭回曹溪鏡裏絕塵埃打鼓看來君不見百華春至為誰開他日又云盡大地是沙門一隻眼汝等諸人向什麼處屙趙州聞舉云闍黎若迴寄箇鍬子去海印信頌云沙門隻眼不容物萬象森羅從彼出鍬子何人識趙州放行底事須綿密別峰印頌云雪峰何處屙趙州寄鍬子沙門一隻眼狼藉乃如此呵呵呵大唐國裏鼓聲起新羅國裏舞婆娑看雪峰這般舉唱只要識取本來一類流出實際理地了無影響蹤跡若說能解能悟能為萬法之源即係脫空謾語漢須用趙州鍬子始得又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸有所歸依自疑身心從彼流出十方虗空咸其生起即於都起所宣流地作真常身無生滅解在生滅中早計常住既惑不生亦迷生滅安住沉迷生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見是名第三立因依心成妄計果違遠圓通背涅槃城生倒圓種通曰前云若依所歸立真常因歸既有所是我有所歸也我所歸者實能生我於是自疑身心從彼識元流出十方虗空咸其生起不自我起故曰都起不自我流故曰宣流未有我時先有此識不但生我能生一切於是稍稍窺見神我為常識元是常神我猶屬七識識元純是八識未動之初也即以此為無生無滅作真常身於此湛不搖處微細生滅中早計常住不但不見真不生滅性亦且迷現在生滅法矣安住沉迷以為勝解是以非常為常也故墮常非常執如計自在天能生我者而以為常不知自在天亦非常住天也道書曰太乙者元一之氣始生於太虗之上有玉京之天四方各有八天三十二帝居之玉京之上有玉清上清太清三清之天三清之上有虗皇十天元老元尊與天皇九皇居之是色頂及空居天外道所不能詳便以為生天生地之本也至謂天皇降九氣為混沌而西域亦以大梵天為世界主皆出此見此則立因依心因依識元能生我故成妄計果妄計常住非由我故前計我圓生物此計彼圓生我故名倒圓蓋欲忘我忘能而不能盡泯其生相也故曰違遠圓通背涅槃城大寧寬示眾拈拄杖云前佛性命後佛紀綱總在這裏如今用去也為雲為雨為瑞為祥利人利天出生入死他方世界出沒卷舒若也通身是口說不能盡通身是眼照不能窮一念相應剎那萬劫又慈明示眾云道吾打鼓四大部州同參拄杖橫也挑括乾坤大地鉢盂轉也覆却恒沙世界且問汝等諸人向甚麼處安身立命若也知安身立命處北俱盧洲喫粥喫飯若也不知長連床上喫粥喫飯此諸尊宿指出真不生滅為真常身且道有歸宿無歸宿不妨疑著又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所知知徧圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇徧知生勝解者是人則墮知無知執婆吒霰尼二外道名執一切覺成其伴侶迷佛菩提亡失知見是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種通曰前所歸冥諦冥然無知而知畢竟不可滅故又因知立解謂識元有知而一切法由知變起因計知體徧圓諸法至謂無情徧皆有知無所簡擇是以無知為知故名倒知譚子化書曰老楓化為羽人朽麥化為蝴蝶自無情而之有情也賢女化為貞石山蚯化為百合自有情而之無情也孰為彼孰為我孰為有識孰為無識萬物一物也萬神一神也即此草木為人人為草木之見僧問忠國師古德云青青翠竹盡是法身黃華無非般若有人不許云是邪說亦有信者云不思議不知若為師曰此蓋普賢文殊境界非諸凡小而能信受皆與大乘了義經意合故華嚴經云佛身充滿於法界普現一切羣生前隨緣赴感靡不周而常處此菩提座翠竹既不出於法界豈非法身乎又般若經云色無邊故般若亦無邊黃華既不越於色豈非般若乎深遠之言不省者難為措意於是禪客作禮而去又華嚴座主問大珠和尚曰禪客何故不許青青翠竹盡是法身黃華無非般若珠曰法身無像應翠竹以成形般若無知對黃華而顯相非彼黃華翠竹而有般若法身故經云佛真法身猶若虗空應物現形如水中月黃華若是般若般若即同無情翠竹若是法身法身還能應用座主會麼云不了此意珠曰若見性人道是亦得道不是亦得隨用而說不滯是非若不見性人說翠竹著翠竹說黃華著黃華說法身滯法身說般若不識般若所以皆成諍論座主禮謝而去妙喜曰眾中商量道二尊宿恁麼切磋一人得其體一人得其用得其用者事上建立得其體者理上掃除所謂實際理地不受一塵佛事門中不捨一法我為法王於法自在或抑或揚無得無失恁麼見解喚作矮子看戲妙喜見處也要諸人共知不見道破驢脊上足蒼蠅又僧問雲門如何是清淨法身門云華藥欄僧云便恁麼去時如何門曰金毛獅子雪竇頌云華藥欄莫顢頇星在秤兮不在盤便恁麼大無端金毛獅子大家看天童拈云賊來須打客來須待雲門雪竇二俱作家這裏莫有便恁麼去者麼切忌撞頭磕額據二三老宿見處何等圓妙便恁麼去且不可況於其中計圓知心成虗謬果又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融根互用中已得隨順便於圓化一切發生求火光明樂水清淨愛風周流觀塵成就各各崇事以此羣塵發作本因立常住解是人則墮生無生執諸迦葉波三大龜氏并婆羅門勤心役事事火崇水求出生死成其伴侶迷佛菩提亡失知見是名第五計著崇事迷心從物立妄求因求妄冀果違遠圓通背涅槃城生顛化種通曰行陰既空六根互用根根圓融資發變化隨順無礙便以圓融變化一切皆能發生謂此六根由清淨四大而有清淨四大之性常住世間曾無滅息既能化起六根一切羣塵皆由發起是清淨四大其本因也現前地水火風雖遷滅無常而本因之地常住不毀故求火光明光明之性常住故也樂水清淨清淨之性常住故也愛風周流周流之性常住故也觀塵成就成就之性常住故也於此各各崇事求出生死非徒崇事其相欲因相而得其性也如月光童子初習水觀至累劫乃能與水為一外道崇奉之意彷彿類此欲與四大之性合而為一常住世間名不生滅此其非所求而求謂之妄求非所冀而冀謂之妄冀四大能生有為之生者四大能化有為之化者四大為所生而實不能生四大為所化而實不能化執此不生而以為生顛倒化理故名顛化且心為萬化之原一切萬物皆由心出今迷心從物捨本事末欲出生死返入生死亡失知見而至愚癡若此豈不違遠圓通背涅槃城以是為忘知泯見冀不生滅難矣昔魯祖凡見僧來便面壁南泉聞云我尋常向他道空劫以前承當佛未出世時會取尚不得一箇半箇他恁麼驢年去保福問長慶只如魯祖節文在什麼處被南泉恁麼道慶云退己讓人萬中無一天童頌云淡中有味妙超情謂綿綿若存兮象先兀兀如愚兮道貴玉雕文以喪淳珠在淵而自媚十分爽氣兮清磨暑秋一片閑雲兮遠分天水此豈壁觀婆羅門可共語哉又雪峰問僧甚麼處來曰神光來峰曰晝喚作日光夜喚作火光作麼生是神光僧無對峰自代云日光火光且道日光火光便當却神光也無須是見諸相非相方契無生之旨又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓明計明中虗非滅羣化以永滅依為所歸依生勝解者是人則墮歸無歸執無想天中諸舜若多成其伴侶迷佛菩提亡失知見是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種通曰前妄計四大為不生滅是墮常見此破滅羣化而依永滅是墮斷見明中虗虗中明似現圓明唯執定明中虗無以無歸為歸坐住空性便落無想天果舜若多無身覺觸如來光中映令暫見由於以空為因故以空成果此乃斷滅如來種性所謂蕉芽敗種者也外道以是為涅槃去真涅槃千里萬里僧問雲門樹凋葉落時如何門云體露金風雪竇頌云門既有宗答亦攸同三句可辨一簇遼空大野兮凉颷颯颯長天兮疎雨濛濛君不見少林久坐未歸客靜依熊耳一叢叢此豈無歸為歸者所能窺其萬一玄沙上堂云佛道閑曠無有程途無門解脫之門無意道人之意不在三際故不可昇沉建立乖真非屬造作動則起生死之本靜則醉昏沉之鄉動靜雙泯俱落空亡動靜雙收顢頇佛性必須對塵對鏡如枯木寒灰臨時應用不失其宜如鏡照諸像不亂光輝鳥飛空中不雜空色所以十方無影像三界絕行蹤不墮往來機不住中間意鐘中無鼓響鼓中無鐘聲鐘鼓不相交句句無前後如壯士展臂不藉他力師子遊行豈求伴侶九霄絕翳何在穿通一段光明未曾昏暗若到這裏體寂寂常的的日赫𦦨無邊表圓覺空中不動搖吞爍乾坤迥然照玄沙雲門洞見涅槃真體本無生滅發揮精妙若此足令外道寒毛卓竪又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓常固身常住同於精圓長不傾逝生勝解者是人則墮貪非貪執諸阿斯陀此云無比求長命者成其伴侶迷佛菩提亡失知見是名第七執著命元立因妄因趣長勞果違遠圓通背涅槃城生妄延種通曰窺見圓明便計明中虗相窺見圓常便計常不毀相此智者不免然圓明未甞不虗而虗不可執執虗則落於空精圓未甞不常而常不可執執常則趣於勞莊子云大塊勞我以生又態經鳥伸吐故納新亦勤勞之事故曰長勞別本有作長牢者即常住果也且此四大色身定業所拘分段不可為變易猶變易不可為分段也身本無常實不可貪今乃貪著欲其長久是謂貪非貪執雖諸長壽仙有得其術而證此者不過堅固其妄身而已於真常不毀之性大相遙遠故謂之違遠圓通背涅槃城也著執著命元凝定識精湛不搖處乃能超無想天而生非非想天此又西域外道第一種視固身常住者最勝八萬劫滿還入輪迴惡在其能常住乎玄沙因誤服藥徧身紅爛僧問如何是堅固法身沙云膿滴滴地懷和尚頌云滴滴通身是爛膿釣魚船上顯家風時人只看絲綸上不見蘆華對蓼紅端和尚云曾有人問法華如何是清淨法身只答他道屎臭熏天又云蓮華葉上化生兒且道與古人是同是別法華亦有頌云屎臭熏天亦偶然法華爭敢為君宣鼻中若有通天竅一任橫行不著穿此諸尊宿於堅固法身尚且談之欲嘔況敝陋色身而欲妄延乎哉然亦有乘願力而來者非假修得如千歲寶掌中印度人周威烈十二年生左手握拳七歲祝髮乃展因名寶掌魏晉間遊此土入蜀禮普賢常不食日誦般若等經千餘卷有詠之者曰勞勞玉齒寒似迸巖泉急有時中夜坐堦前神鬼泣一日謂眾曰吾有願住世千歲今年六百二十有六故以千歲稱之次遊五臺徙居祝融峰之華嚴黃梅之雙峰廬山之東林尋抵建業會達磨大師入梁因就扣其旨開悟武帝高其道臘延入內廷未幾入吳有偈曰梁城遇導師參禪了心地飄零二浙遊更盡佳山水順流東下至天竺住鄮峰登太白穿雁蕩盤於翠峰七十二菴回赤城憩雲門法華等處返飛來棲之石竇有行盡支那四百州此中偏稱道人遊之句時貞觀十五年也後居浦江之寶嚴與朗禪師友善每通問以白犬馳往朗亦以青猿為使令故題朗壁曰白犬銜書至青猿洗鉢回顯慶二年正旦手塑一像至九日像成問其徒慧雲此肖誰對曰與和尚無異即澡浴易衣趺坐謂雲曰吾住世一千七十二年今將謝世聽吾偈曰本來無生死今亦示生滅我得去住心他年復來此頃時囑曰吾滅後六十年有僧來取吾骨勿拒言訖而逝越五十四年有刺浮長老自雲門至塔所禮曰冀塔洞開少選塔戶果啟其骨連環若黃金色浮即持往秦望建塔奉藏以周威烈丁卯至唐高宗顯慶丁巳實一千七十二年抵此土歷四百餘外道家求長壽能如寶掌者幾何人哉又善男子窮諸行空已滅生滅而於寂滅精妙未圓觀命互通却留塵勞恐其銷盡便於此際坐蓮華宮廣化七珍多增寶煖恣縱其心生勝解者是人則墮真無真執吒枳迦羅他化天名成其伴侶迷佛菩提亡失知見是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種通曰識陰為十二類眾生之命元我命通彼彼命通我故曰互通識陰若盡十方眾生命即皆盡我命亦盡誰證真常理誰為所化眾生徒有真常無證真常者恐其銷盡欲留塵勞度脫眾生始而坐蓮華宮廣化七珍意非不美既而多增寶媛恣縱其心則邪思入之矣依此邪思欲證真常起用化物而不知其非故名真無真執吒枳迦羅即欲頂他化自在天能化欲境以自娛樂者他化天未必皆魔然魔王神變與之相類故與同居唯欲塵如火故曰熾塵前十種天魔一一以潛行貪欲為事是邪思所發不可禁制無著則謂之天有著則謂之魔也法華經曰汝等莫得樂住三界火宅無貪麤弊色聲香味觸也若貪著生愛則為所燒昔頭藍弗以世俗智伏下地惑獲非想定具五神通時君尊敬迎以入宮宮中女子接足而禮頭藍弗觸女子手遂生貪欲便失神通飯食訖徐步歸山故偈曰纔生一念欲便失五神通此樂變化天魔以識陰伏而得之未甞不以邪思發而失之通報既盡便入淪墮是樂亦何可常故謂之真無真也若維摩大士所現神力即時須彌燈王佛遣三萬二千師子座高廣嚴淨來入維摩詰室諸菩薩大弟子釋梵四天王等昔所未見其室廣博悉包容三萬二千師子座無所妨礙寶覺禪師曰以師子座之高廣毗耶室之狹小佇思其間即成妨礙此真神通力故不可思議又善男子窮諸行空已滅生滅而於寂滅精妙未圓於命明中分別精麤疏決真偽因果相酬唯求感應背清淨道所謂見苦斷集證滅修道居滅已休更不前進生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種通曰識陰露現故曰命明識既含藏有漏無漏種子今於此中分別決擇苦集有漏名麤名偽道滅無漏名精名真擇去麤偽苦集而留精真道滅修道為感證滅為應意但取此不復更進此四諦法輪本脩圓觀法界平等離二邊垢名清淨道今發小乘欣厭之解不離因果居滅便休是清邊垢也故謂之背趣寂纏空證於偏真與前斷滅稍異前一向歸無屬無想天此有滅可證屬四空天纏空云者精圓感應為寂所縛不能回向趣大乘也定性聲聞已證入定未證漏盡執滯四諦言教故命之曰聲聞不能發悟求進無上菩提聞舉頓教法門便乃退座此所謂增上慢者未得為得卒歸於無聞也古人云莫守寒巖異草青坐著白雲宗不妙所以蓮華菴主拈拄杖示眾云古人到這裏為甚麼不肯住眾無語自代云為他途路不得力復云畢竟如何又自代云楖𣗖橫擔不顧人直入千峰萬峰去雪竇頌云眼裏塵沙耳裏土千峰萬峰不肯住落華流水共茫茫剔起眉毛何處去又僧問雲居簡禪師孤峰獨宿時如何居云九間僧堂裏不臥誰教你孤峰獨宿丹霞頌云法爾非脩本十分平常酬答最分明雖然指出長安道無奈遊人不肯行聲聞趣寂尚屬巧勳法爾非脩是真寂滅彼鈍根者故不了此又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融清淨覺明發研深妙即立涅槃而不前進生勝解者是人則墮定性辟支諸緣獨倫不迴心者成其伴侶迷佛菩提亡失知見是名第十圓覺㳷心成湛明果違遠圓通背涅槃城生覺圓明不化圓種通曰圓融清淨則非背清淨道者可及於常樂我淨四德庶幾近之但執而未化耳彼蓋以覺為明見其圓則滯於圓見其明則滯於明明故不惑於因果感應圓故不泥於居滅即休於此發研深妙深而又深不墮於有妙而又妙不墮於無即此非有非無立為不生不滅之涅槃而不復前進是乃定性辟支果也辟支有二種出有佛世曰緣覺出無佛世曰獨覺皆以觀緣悟道至湛不搖處脗合圓覺但覺字不能除得滯在圓明一路堅執不化故曰不迴心者宗門所謂夜明簾外轉身難也僧問金峰志禪師四海晏清時如何峰云猶是堦下漢丹霞頌云四海烟塵已晏然當軒明月照人寒大功不賜將軍賞寶馬金鎗頓懶觀僧問曹山朗月當空時如何山曰猶是堦下漢曰請師接上階山曰月落後來相見正與此同投子示眾云若論此事如鸞鳳冲霄不留其跡羚羊挂角那覓其蹤金龍不守於寒潭玉兔豈棲於蟾影其或賓主若立須威音路外搖頭問答言陳乃玄路傍提為唱若能如是猶在半途更乃凝眸不勞相見頌曰水澄月滿道人愁妙盡無依類莫收劫外正偏兼帶路不萌枝上辨春秋若於此等公案有透徹路便可與諸緣獨倫為師此緣獨本一種前分者非是阿難如是十種禪那中塗成狂因依迷惑於未足中生滿足證皆是識陰用心交互故生斯位眾生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終墮無間獄聲聞緣覺不成增進汝等存心秉如來道將此法門於我滅後傳示末世普令眾生覺了斯義無令見魔自作沉孽保綏哀救銷息邪緣令其身心入佛知見從始成就不遭歧路通曰前行陰十種禪那至五現涅槃而極已有悟機尚未證果今識陰十種禪那至辟支涅槃而極已入果位故曰生斯位前八種外道違真中二理起界內邪見業終仍入輪迴後二種二乘違中道諦起界外邪見迴心即入大乘故能增進迴智向悲即菩薩道前云心魔此云見魔心尚流動兼六識見唯執持兼七識總不出無始習氣見愛二惑因依迷惑不能究竟於未足中生滿足證已至八識湛不搖處不能轉識成智故曰惑菩提性亡失知見此知見即佛知見非果亡也迷在識陰不得瑩徹為識所覆故違遠圓通八識即如來藏性悟之即能轉識而成正果迷之則為識轉而入輪迴故能開示悟入佛之知見則從始入門即得成就不復為歧見所惑矣雲峰悅上堂有情之本依智海以為源含識之流總法身而為體祗為情生智隔想變體殊達本情亡知心體合諸禪德會麼古佛與露柱相交佛殿與籠燈鬬額若也不會單重交拆僧問芭焦徹和尚有一人不捨生死不證涅槃師還提𢹂也無徹曰不提𢹂僧云為甚麼不提𢹂徹云老僧粗識好惡投子頌云百歲童兒出戶來滿身紅爛惹塵埃火中閑步清涼地識者無因敢近擡若識此人即入佛知見不遭歧路如是法門先過去世恒沙劫中微塵如來乘此心開得無上道識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨瑠璃內含寶月如是乃超十信十住十行十迴向四加行心菩薩所行金剛十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得此是過去先佛世尊奢摩他中此云止毗婆舍那此云觀覺明分析微細魔事魔境現前汝能諳識心垢洗除不落邪見陰魔銷滅天魔摧碎大力鬼神褫魄逃逝魑魅魍魎無復出生直至菩提無諸少乏下劣增進於大涅槃心不迷悶若諸末世愚鈍眾生未識禪那不知說法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪若未能誦寫於禪堂或帶身上一切諸魔所不能動汝當恭欽十方如來究竟修進最後垂範通曰此段經文與前阿難殷勤啟請十方如來得成菩提妙奢摩他三摩禪那最初方便首尾呼應此先佛世尊於禪那中覺明分析細微魔事魔不得入乘此心開得無上道要於識陰都盡而已陀那微細識習氣成暴流真非真恐迷我常不開演故迷之則中途成狂而諸魔熾盛悟之則轉識成智而菩提現前若各以所愛先習迷心而自休息未得謂得未證謂證有得有證此即魔屬識陰若盡神我都忘返流全一諸根互用從互用中透入金剛乾慧於中發起真智如淨琉璃內含寶月一切如來密圓淨妙皆現其中於是即獲無生法忍乃能超十信十住十行十回向四加行心及菩薩所行金剛十地證於等覺等覺圓明入於如來妙莊嚴海即妙覺位也前云有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路即此謂也圓滿菩提歸無所得若有一法可得然燈佛即不與我授記故得無所得證無所證即是見性能見性即成佛也有由乾慧地即證菩提者謂之曰超超固頓也有由乾慧地安立聖位而至圓滿菩提者頓而圓也此圓頓法門當下轉識成智諸魔事根柢於識者從何出生故曰不取無非幻非幻尚不生幻法云何立幻且無有何有於魔哉故凡夫而知此也直至菩提更無欠少二乘而知此也回心增進得大涅槃此妙奢摩他三摩禪那固是最初方便亦是最後垂範但可忽然自悟非由人得亦非可尋常觀行修證而得是不可思議境界如修三昧而持呪者一切諸魔所不能動不可思議故此以持呪終之與前大佛頂相應所以表至尊至貴第一法門也青原思禪師問六祖曰當何所務即不落堦級祖云汝曾作什麼來思云聖諦亦不為祖曰落何堦級思云聖諦尚不為何堦級之有祖深器之令思首眾既乃命分化一方偈曰心地含諸種普雨悉皆萌頓悟華情已菩提果自成投子頌云無見頂露雲攢急劫外靈枝不帶春那邊不坐空王殿爭肯耘田向日輪丹霞頌云卓爾難將正眼窺迥超今古類何齊苔封古殿無人侍月鎻蒼梧鳳不棲僧問瑞巖作麼生商量即得不落堦級巖云排不出曰為甚麼排不出巖曰他從來無堦級曰未審居何位次巖云不坐普光殿曰還理化也無巖曰名聞三界重何處不歸朝夫妙莊嚴海福慧俱足萬行具備大不可思議聖諦且不足言而況其凡乎阿難即從座起聞佛示誨頂禮欽奉憶持無失於大眾中重復白佛如佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示又此五陰為併銷除為次第盡如是五重詣何為界唯願如來發宣大慈為此大眾清明心目以為末世一切眾生作將來眼佛告阿難精真妙明本覺圓淨非留死生及諸塵垢乃至虗空皆因妄想之所生起斯元本覺妙明真精妄以發生諸器世間如演若多迷頭認影妄元無因於妄想中立因緣性迷因緣者稱為自然彼虗空性猶實幻生因緣自然皆是眾生妄心計度阿難知妄所起說妄因緣若妄元無說妄因緣元無所有何況不知推自然者通曰阿難所問為併銷除為次第盡決擇頓漸二門作將來人天眼目世尊先以最上一路乘悟併銷者示之唯在悟入精真妙明本覺圓淨此體非留死生妄業及諸塵垢妄緣乃至虗空非業非緣者如大海不宿死屍相似即有五陰死生塵垢虗空等相亦無處著如是見得妙明原自精真何有於妄本覺故自圓淨何有於染而世間死生遷流屬受想行者塵垢渾濁屬色者依虗空而立屬八識者皆由妄想生起既是本覺妙明真精何因起妄發生諸器世間見相二分等妄本無因如前所云演若達多迷頭認影人人皆知是妄此妄從何而起以為因緣非因緣也以為自然非自然也非因緣非自然無乃虗空性乎亦非虗空性也彼虗空性如海一漚發以大覺觀之猶然是幻何況生死塵垢依虗空而立者豈非幻中之幻乎故說因緣性說自然性皆妄心計度原非實有既非因緣自然則五陰之妄本無自性既無自性本自不生妄本不生何處覓妄故知妄起處乃可說妄因緣此妄如何而生應當如何而息斯有五陰銷滅次第可言若妄元無即妄即真起處尚且不知何從而名之曰因緣又何從而推之曰自然如眼無眚病但見一月本無第二月何處更索第二月而與之論因緣自然哉此乘悟併銷為最上圓頓法門固不論云何銷除而亦未甞不併銷除但唯悟入精真妙明本覺圓淨更無餘事僧問長沙岑本來人還成佛否沙曰你道大唐天子還割茅刈草麼投子頌云苔殿重重紫氣深星分辰位正乾坤金輪不御閻浮境豈並諸候寶印尊又僧問九峰滿禪師人人盡道請益未審師還拯濟也無滿曰汝道巨嶽還乏寸土麼曰四海參尋當為何事滿曰演若迷頭心自狂曰還有不狂者也無滿曰有曰如何是不狂者滿曰突曉途中眼不開此於覺明為咎已斷妄根故演若迷狂無自而起非真見本來面目者未易達此是故如來與汝發明五陰本因同是妄想汝體先因父母想生汝心非想則不能來想中傳命如我先言心想酢味口中涎生心想登高足心酸起懸崖未有酢物未來汝體必非虗妄通倫口水如何因談酢出是故當知汝現色身名為堅固第一妄想通曰想胡為乎生哉生於識也識初動處是謂想元識是命根依想而傳識動則想生想生則命立命立則四大具所謂命煖識三和合而成人是也故己之想與父母之想合則福德優劣隨其所願而色身堅固於是乎現未生以前但有想耳未想以前但有識耳識神不死是謂命根命根欲其堅固長久故既現色身唯恐銷殞此即妄想堅固之明驗也若曰秉天地陰陽之氣實有此身非從妄立則談酢必無涎生談崖必無酸起決不從妄流轉今口中水出足下酸起未必實境但因想生則此身宛是妄想倫類故與妄感相應又何怪乎此身不從父母想生哉唯以想從想如水出酸起現有色身則此色身明是一堅固妄想也故謂色陰堅固妄想以為其本若識此想非因緣生非自然生全體是妄則當下寂滅本自無色孰與交織而為劫濁哉故能空劫濁也忠國師上堂青蘿夤緣直上寒松之頂白雲淡泞出沒太虗之中萬法本閑而人自鬧雲門上堂諸和尚子莫妄想天是天地是地山是山水是水僧是僧俗是俗良久曰與我拈案山來僧便問學人見山是山水是水時如何門曰三門為甚麼騎佛殿從這裏過曰恁麼則不妄想去也門曰還我話頭來夫學人明知萬法本閑色陰不有明知妄想是妄於我無與為甚麼不空色陰只未明雲門話頭在參即此所說臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想通曰想在心而形乃酸澀必有受之者而後動其色體也有想即有受有受即有現故樂受為順為益苦受為逆為損二現迭遷驅馳不息誰為之受唯虗則受唯明則領納是虗明妄想屬前五識即是見分見與相淆故名見濁若識此受非因緣生非自然生故屬虗妄雖有虗明原無自體既無自體本自不生既本不生誰為受者誰為見者故能破見濁也趙州上堂菩提涅槃真如佛性盡是貼體衣服亦名煩惱實際理地甚麼處著一心不生萬法無咎汝但究理坐看三二十年若不會截取老僧頭去夢幻空華徒勞把捉心若不異萬法一如既不從外得更拘執作麼如羊相似亂拾物安向口裏老僧見葯山和尚道有人問著但教合取狗口老僧亦教合取狗口取我是垢不取我是淨一似獵狗專欲得物喫佛法在甚麼處千人萬人盡是覓佛漢子於中覓一箇道人無若與空王為弟子莫教心病最難醫又僧問洞山時時勤拂拭為甚麼不得鉢袋子山曰直饒道本來無一物亦不得他鉢袋子曰未審甚麼人合得山曰不入門者曰祗如不入門者還得否山曰雖然如是不得不與他復曰直饒道本來無一物猶不合得他鉢袋子且道什麼人合得這裏合得下一轉語且道下得什麼語一上座下九十六轉語不契末後云設使將來他亦不受山深肯之雪竇云他既不受是眼將來必應是瞎天童拈云長蘆則不然直須將來若不將來爭知不受直須不受若不不受爭免將來將來的必應是眼不受的真箇是瞎還會麼照盡體無依通身合大道此從長爪比丘兩處負墮化將來直須不受亦不受方能超越見濁由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想通曰念慮無形色身有質念動身隨何因為其所使由想融之也心生虗想形取實物種種心酬與念相應由想通之也使心隨境使境隨心搖動妄情無間寤寐此屬妄想本際力能融通無礙蓋第六識作用也是為煩惱窠臼若識此想非因緣生非自然生當體虗妄即當體空寂想本無生又何煩惱之為祟哉昔仰山於僧堂三昧次夜半不見山河大地寺宇人物以至己身全同空界明晨舉似溈山溈曰我在百丈時得此境乃是融通妄想銷明之功汝向後說法有人過者無有是處天童舉圓覺經云居一切時不起妄念不於諸妄心亦不息滅不住妄想境不加了知不於無了知不辨真實不頌云巍巍堂堂磊磊落落鬧處刺頭穩處下脚脚下線斷我自由鼻端泥盡君休斵莫動著千年故紙中合藥瑯琊覺甞問講僧曰如何居一切時不起妄念對曰起即是病又問如何是於諸妄心亦不息滅對曰息即是病又問如何是住妄想境不加了知對曰知即是病又問如何是於無了知不辨真實對曰辨即是病覺公笑曰汝識藥矣然未識藥中之忌也寶覺為之偈曰黃華熳熳翠竹珊珊江南地暖塞北春寒遊人去後無消息留得雲山到老看此諸尊宿可謂脚下線斷縱橫自由足為破想陰者規則化理不住運運密移甲長髮生氣銷容皺日夜相代曾無覺悟阿難此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想通曰堅固妄想不離色塵虗明妄想猶與色對融通妄想即屬內塵有像可取有境可得至幽隱妄想無像可窺無境可執新新不住運運密移趣乎生則爪生髮長趣乎滅則氣銷容皺日夜相代乎前而我不覺以為非我乎而我體日遷以為即我乎而我又無覺蓋至幽至隱之妄想念念遷流莫可方物不知者第歸之於化理而已行陰屬第七識已離諸想故不可覺而生滅流注最為微細總不出於三界輪轉故命之曰眾生濁若於念念不停有箇停處即不受眾生輪轉僧問龍牙遁禪師二鼠侵藤時如何牙云須有隱身處始得僧云如何是隱身處牙云還見儂家麼丹霞頌云寒月依依上遠峯平湖萬頃練光封漁歌驚起汀洲鷺飛出蘆華不見蹤故知此隱身處神鬼也覰不著而行陰不能惑已蓋微細生滅即係明暗二境日夜相代而形體遷變如二鼠侵藤日就銷滅此屬幽隱妄想而藏身處無蹤跡者足以破之又汝精明湛不搖處名恒常者於身不出見聞覺知若實精真不容習妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前異記憶宛然曾無遺失則此精了湛不搖中念念受熏有何籌筭阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受妄習非汝六根互用開合此之妄想無時得滅故汝現在見聞覺知中串習幾則湛了內罔象虗無第五顛倒微細精想阿難是五受陰五妄想成通曰行陰生滅念念不停但幽隱不可見耳至湛不搖處已滅生滅何以名妄想耶為有識體精明在也即此精明體段善惡不萌意識俱泯湛然常凝似有類於本覺精真者而實非本覺精真也本覺精真不落見聞覺知故不受熏今湛不搖處識無所存落在無記無記之性通於現量不出前五識見聞覺知境界此見聞覺知雖無擬議卜度却能領納受熏故所見奇物憶忘俱無偶一覆覩記憶宛然真如夾氷之魚觸境即發而生滅未甞泯也當知此湛非真念念受熏中串習幾習氣幾微常習未已如串珠相似有此精明即有此見聞覺知有此見聞覺知不離根塵即能攪境受熏容習妄業故知非真湛也必須返流全一銷磨六門迥脫根塵六根互用但一精真寄根明發開合自由妄習無寄故口如鼻孔眼似眉毛以耳觀色色不能搖以目聽聲聲不能引如是乃為妙湛總持妄想無自而入也蓋前五識未入思惟與八識貼體而近故六七因上轉五八果上圓非有後得智不能轉前五識也至轉識成智得其真湛然後信八識種子微細生滅流急不見非是無流雖似恬靜不名真湛彼湛了內罔象虗無微細精想似有若無未甞無想故亦謂之妄想也蓋第八識依不生不滅與生滅和合而成識若背塵合覺依不生滅即名正知若背覺合塵依於生滅即名顛倒想元乃識初動處五種妄想皆由此起由一念迷妄受此取此以自蔽覆故名五受陰亦名五取蘊悉妄想為之本也永嘉曰明識一念之中五陰者謂歷歷分明即是識陰領納在心即是受陰心緣此理即是想陰行用此理即是行陰穢污真性即是色陰此五陰者舉體即是一念一念者舉體全是五陰歷歷見在一念之中無有主宰即是人空慧見如幻化即是法空慧必如永嘉所言人法俱空識陰乃盡而後能超越命濁也趙州問投子大死底人却活時如何子曰不許夜行投明須到雪竇頌云活中有眼還同死藥忌何須鑒作家古佛尚言曾未到不知誰解撒塵沙天童頌云芥城劫石妙窮初活眼空中照廓虗不許夜行投曉到家音未肯付鴻魚此妙絕想元不容習妄實際理地不動步而到分明畫轉識成智底格則也汝今欲知因界淺深唯色與空是色邊際唯觸及離是受邊際唯記與忘是想邊際唯滅與生是行邊際湛入合湛歸識邊際通曰前阿難問如是五重詣何為界此詳答有因有界自淺及深色不自色因空顯色是色空邊際乃色界也受不自受因觸有受是觸離邊際乃受界也想不自想因記名想是記忘邊際乃想界也行不自行因生滅不停名行是生滅邊際乃行界也識稱湛了已滅生滅性入元澄而合乎湛有入有合即有邊際乃識界也蓋湛入為識陰真湛為性識明知明知即智智之與識有邊際存焉真性不名湛入者周徧法界無出入故湛出為行湛入為識內內湛明入無所入即至不生滅地此以漸入微由五塵五識六識七識而至八識又五陰淺深之界也既合乎湛得無生法忍又何邊際而可窺測哉既無邊際即空五陰五陰皆空即超五濁所云分汝湛圓妙覺明心為視為聽為覺為察從始入終五疊渾濁至是同歸於湛矣還原觀曰由於塵相念念遷變即是生死由觀塵相生滅相盡空無有實即是涅槃智證傳曰於色聲等法念念分別名為變遷觀此色聲等法起滅無從當處解脫先觀己眼曰是眼即不能自見其己體自體尚不見云何見餘物次觀前境曰若見是樹復云何樹若見非樹云何見樹次觀三際曰若見在是有耶則過去未來亦應是有若過去未來是無耶則見在亦應是無此還原之要旨也溈山上堂夫道人之心質直無偽無背無面無詐妄心一切時中視聽尋常更無委曲亦不閉眼塞耳但情不附物即是從上諸聖祗說濁邊過患若無許多惡覺情見想習之事譬如秋水澄渟清淨無為澹泞無礙喚他作道人亦名無事人溈山數語直示湛入合湛消息但令識陰都消更有何事此五陰元重疊生起生因識有識從色除理則頓悟乘悟併銷事非頓除因次第盡我已示汝劫波巾結何所不明再此詢問汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界通曰前阿難問為併銷除為次第盡初答直示向上一著唯在悟入精真妙明本覺圓淨更無妄想可除更無次第可指所謂乘悟併銷者也此答事非頓除因次第盡慈悲之故稍涉廉纖所謂頓而不遺乎圓者也此五陰根元重疊生起其生也有因所因八識想元生起見相二分由內造外由細至麤今欲滅此五陰其滅也有漸先從色陰銷除由外及內從麤入細不無次第若論真如之理一悟便至佛地有何堦級了陰無體當體全空故乘悟併銷當下無事乃若無始習氣熏染日久現行無明纏縛五重豈能一旦而拔故須漸漸淘汰因次第盡如劫波巾結巾本無異結必漸除先得人空次得法空次得空空乃得無生法忍寂滅現前故不識虗妄根元心逐識轉不得開通今明知是妄妄本無因當下心開證涅槃樂既證涅槃至不生滅視彼五陰虗妄無因自生原無自性深為可厭若五陰不滅流轉三界生死循環更有何樂而戀戀不捨哉此覺妄根元遠離五十種魔事尤先佛世尊妙奢摩他三摩禪那最初方便所當次第而修者皆足為末法明訓也故囑令流通云圭峯禪師答史山人十問一問如何是道何以修之必須修成為復不假功用答無礙是道覺妄是修道雖本圓妄起為累妄念都盡即是修成二問道若因修而成即是造作便同世間法虗偽不實成而復壞何名出世答造作是結業名虗偽世間無作是修行即真實出世三問其所修者為頓為漸漸則忘前失後何以集合而成頓則萬行多方豈得一時圓滿答真理即悟而頓圓妄情息之而漸盡頓圓如初生孩子一日而肢體已全漸修如長養成人多年而志氣方立此三答可為此段經文注疏又圭峰答溫慥尚書問曰真理雖然頓達此情難以卒除如風暫止波浪暫停豈可一生所修便同佛用但可以空寂為自體勿認色身以真如為自心勿認妄念妄念若起都不隨之即臨命終時自然業不能繫黃龍晦堂答韓宗古侍郎問曰然心外無剩法者不知煩惱習氣是何而欲盡之若起此心翻成認賊為子也從上以來但有言說乃是隨病設藥縱有煩惱習氣但以如來知見治之皆是善權方便誘引之說若是定有習氣可治却是心外有法而可盡之譬如靈龜曳尾於途拂迹迹生可謂將心用心轉見病深苟能明達心外無法法外無心心法既無更欲教誰頓盡耶據晦堂見處即本來無一物何處惹塵埃也據圭峰答處即時時勤拂拭休使惹塵埃也晦堂主於頓喻如人夢被枷鎻覺來更須脫枷鎖乎斷無此事圭峰主於漸喻如水結成氷失灌溉之用須火日漸隣始是流通宗鏡錄云入吾宗者先須知有然後保任又頭尾須得相稱不可理行有闕心口相違若入宗鏡理行俱圓據宗鏡斷大鑑祗具一隻眼大通雙眼圓明何者大鑑具理而無行謂本來常淨不假拂塵大通已悟須修拂塵鑑朗所以道正雖正却偏偏雖偏却圓非久參洞上之宗未可容易談也阿難若復有人徧滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度於意云何是人以此施佛因緣得福多不阿難答言虗空無盡珍寶無邊昔有眾生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充徧皆是珍寶窮劫思議尚不能及是福云何更有邊際佛告阿難諸佛如來語無虗妄若復有人身具四重十波羅夷此云棄瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門於末劫中開示末學是人罪障應念銷滅變其所受地獄苦因成安樂國得福超越前之施人百倍千倍千萬億倍如是乃至算數譬喻所不能及通曰徧滿虗空盈滿七寶世間豈有是事以佛眼觀攪長河為酥酪變大地作黃金亦尋常事耳況妙真如性清淨本然周徧法界是為家寶能證清淨法身即至寶所此寶豈不徧滿虗空乎故以世間金銀珠貝珊瑚瑪瑙車磲七珍之寶奉佛尚且得福無量將此深心奉塵剎是則名為報佛恩能使人人皆至寶所此出世之寶能分別世間寶者故非世間之寶可及其得福報尤不可勝計也不但得福且能銷罪福有福報罪有罪報福罪兩不相準故雖得天福不能免地獄苦罪莫重於五逆殺父害母出佛身血破和合僧焚燒經像此但舉四重父母一體耳三寶不可易也前云四棄指殺盜婬妄又云八棄此云十棄總不出十惡業即前十習因六交報也罪業重者此方無間獄壞復移他方至十方無間獄一一經嘗何其苦也但一念迴心將此法寶開示末學轉迷為悟轉煩惱為菩提雖在生死海中自有涅槃之樂此自罪自懺自業自解雖佛亦不能與力焉無罪即是得福無苦即是受樂故以法寶開示人者不但自免罪且令人人免其罪不但自得福且令人人得其福不但自獲寶且令人人皆獲至寶也寶盈世間寧有方所何但以七寶奉佛所得之福較量多寡哉佛雖實語免罪得福有如是無量功德分明讚嘆此經清淨本然周徧法界無窮無盡尊貴無比僧問大嶺禪師如何是一切處清淨嶺云截瓊枝寸寸是寶折旃檀片片皆香丹霞頌云乾坤盡是黃金骨萬有全彰淨妙身玉女背風無巧拙靈苗華秀不知春若是則更無地獄等相乎何以調達生陷地獄也調達謗佛生身陷入地獄佛令阿難傳旨汝在地獄中安否達云我雖在獄中如三禪天樂佛又令阿難問汝還求出否達云我待世尊來便出阿難云世尊是三界大師豈有入地獄分達云我豈有出地獄分翠巖真云親言出親口調達為佛堂弟即阿難親兄已得神通推山壓佛時有金剛護持然亦傷其足指出血既欲害佛盡收其眾行至中途生身陷入地獄然達自為鹿王時已與佛同修行今情均天倫乃有此變亦其迷心太重未易迴頭須於地獄業火燒乾乃能發悟佛記調達於多劫後亦當作佛即在地獄中無出入見安知其不能變地獄為安樂國哉阿難若有眾生能誦此經能持此呪如我廣說窮劫不盡依我教言如教行道直成菩提無復魔業通曰一念轉移便消罪業得福無量若能常誦此經常持此呪其獲福也窮劫不盡若能依教行道必成正覺無復魔業此經此呪所以發揮妙覺者至為詳備所以防範陰魔者至為周悉魔不能惑而覺道成矣若持呪誦經而不明自性却又被魔所縛僧問百丈依經解義三世佛冤離經一字如同魔說時如何丈云因守動靜三世佛冤此外別求如同魔說後僧問同安依經解義三世佛冤離經一字即同魔說此理如何安云孤峯迥秀不挂烟霞片月橫空白雲自異丹霞頌云雲自高飛水自流海天空闊漾虗舟夜深不向蘆灣宿迥出中間與兩頭此於經義不即不離自有出頭處若能悟此魔不能惑壽州道樹禪師於神秀言下知微乃卜壽州三峰山結茅而居常有野人服色素樸言談詭異於言笑外化作佛形及菩薩羅漢天仙等形或放神光或呈聲響學徒覩之皆不能測如此涉十年後寂無形影師告眾曰野人作多色伎倆眩惑於人只消老僧不見不聞伊伎倆有窮吾不見不聞無盡若會不見不聞無盡之旨直至菩提曾無欠乏陰魔銷盡何天魔之足虞佛說此經已比丘比丘尼優婆塞優婆夷一切世間天人阿修羅及諸他方菩薩二乘聖仙童子并初發心大力鬼神皆大歡喜作禮而去通曰佛說此經乃最上圓頓法門佛以一音演法隨類各解故隨所證量皆得法喜踊躍而去何以故本有之性各各具足故趙州示眾曰看經也在生死裏不看經也在生死裏諸人且作麼生出得去僧便問只如俱不留時如何州曰實即得若不實爭能出得生死天童頌曰看經也在生死裏飯蘿裏坐無喫底不看經也在生死裏錦衣堆裏無著底忽然烏鵲呌一聲反身踴躍渾家喜休擬議如今拋向眾人前千手大悲提不起西川座主至華嚴問祖意教意是同是別嚴曰如車二輪如鳥兩翼主曰將謂禪門別有奇特元來不出教意後聞夾山盛化遣小師馳問前語山曰雕沙無鏤玉之談結草乖道人之意小師迴舉似主主乃讚歎遙禮曰將謂禪門與教意不殊元來有奇特事不見僧問睦州祖意教意是同是別州云青山自青山白雲自白雲天童拈云若向這裏識得睦州釋迦出世達磨西來總是不守分底漢還識得麼臂長衫袖短脚瘦草鞋寬僧問洛浦祖意教意是同是別浦云日月並輪輝誰言別有路僧云恁麼則顯晦殊途是非一揆浦云但自不亡羊何須泣歧路丹霞頌曰月篩松影高低樹日照池心上下天赫赫炎空非卓午團團秋夜不知圓會此則日月不到處別有一乾坤豈沾沾宗教為活計者可擬哉書楞嚴宗通後曾金簡名鳳儀字舜徵楚之來陽人性耽內典宿根猛利先以文業受知於王鳳州先生未幾遂成道誼繼復師事羅近溪先生而學益進愈研精覃思力究向上事萬歷癸未以進士為祠部郎因臥病少林忽聞鐘聲發悟洞見法源由是左宜右有超方逸俗當代大老如王龍溪羅念菴李卓吾及所交遊如瞿元立管東溟袁了凡王肯堂諸名賢咸相推獎時論韙焉生平以宏護聖教為己任徑山募刻方冊大藏其倡導之力居多嘗與元立諸人作發願文刻於藏中所著述甚夥率皆心得了義之言無世論文字之習此宗通十卷詮釋諦理融洽分明更博採從上宗師公案言句與經文逐段互發為向來未有之剏格而實宗說兼通之要典自序中所謂天地間合有此種議論者是也惜原板久湮傳本寥寥乃與二三有志此宗者重刻於淛中共結一究竟堅固因緣不匱其法施之意并桾摭舊聞稍為序次用識其行履之少分云盤水後學陳熈願復齋父謹䟦時道光庚寅仲夏七日
