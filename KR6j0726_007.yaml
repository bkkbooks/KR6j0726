證了義也以此呪心含有多義十方如來皆由此出故為十方佛母陀羅尼呪未明此事諸見蜂起則為魔外作業不休自受羣苦此微塵國土之所同也能明此事則為法王子蒙佛授記付佛法事轉大法輪不唯自度兼能度人此即成佛之次第也持此呪者期於見性成佛豈尋常祕密章句可倫哉百丈云祗如今於一切有無等法有纖毫愛染心縱然腳踏蓮華亦同魔作若執本清淨本解脫自是佛自是禪道解者即屬自然外道若執因緣修成證得者即屬因緣外道執有即屬常見外道執無即屬斷見外道執亦有亦無即屬邊見外道執非有非無即屬空見外道亦云愚癡外道秪如今但莫作佛見涅槃等見都無一切有無等見亦無無見名正見無一切聞亦無無聞名正聞是名摧伏外道無凡夫魔來是大神呪無二乘魔來是大明呪無菩薩魔來是無上呪乃至亦無佛魔來是無等等呪一變衆生諂曲修羅二變二乘諂曲修羅三變菩薩諂曲修羅是三變淨土但是一切有無凡聖等法喻如金礦自已如理喻如於金金與礦各相去離真金露現忽有人覓錢覓寶變金為錢與他亦如麵體真正無諸沙鹵有人乞䭔變為䭔與他亦如智臣善解王意王若行時索先陀婆即便奉馬食時索先陀婆即便奉鹽此等喻學玄旨人善能通達應機不失亦云六絶獅子志公云隨人造作百般十地菩薩不飢不飽入水不溺入火不燒倘要燒且不可得燒他被數量管定佛則不與麼入火不燒倘要燒便燒入水不溺倘要溺便溺他使得四大風水自由夫至佛地位使得風水自由即性即呪即呪即性安所不可成就不可思議中原有是事唯呪乃能降魔今百丈云無諸魔來即是呪亦大有意味阿難若諸世界隨所國土所有衆生隨國所生樺皮貝葉紙素白氎書寫此呪貯於香囊是人心昏未能誦憶或帶身上或書宅中當知是人盡其生平一切諸毒所不能害阿難我今為汝更説此呪救護世間得大無畏成就衆生出世間智若我滅後末世衆生有能自誦若教他誦當知如是持誦衆生火不能燒水不能溺大毒小毒所不能害如是乃至天龍鬼神精祇魔魅所有惡呪皆不能著心得正受一切呪詛厭蠱毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味一切惡星并諸鬼神慘心毒人於如是人不能起惡頻那夜迦豬頭象鼻諸惡鬼王并其眷屬皆領深恩常加守護阿難當知是呪常有八萬四千那由他恆沙河俱胝此云百億金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍設有衆生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子何況決定菩提心者此諸金剛菩薩藏王精心陰速發彼神識是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑從第一劫乃至後身生生不生藥叉伺察羅剎噉人鬼及富單那熟病鬼迦吒富單那奇臭鬼鳩槃茶魘魅鬼毗舍遮噉精氣鬼等并諸餓鬼有形無形有想無想如是惡處是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處此諸衆生縱其自身不作福業十方如來所有功德悉與此人由是得於恆河沙阿僧祇不可説不可説劫常與諸佛同生一處無量功德如惡叉聚果名一蒂三實同處熏修永無分散是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令得精進無智慧者令得智慧不清淨者速得清淨不持齋戒自成齋戒阿難是善男子持此呪時設犯禁戒於未受時持呪之後衆破戒罪無問輕重一時銷滅縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過設著不淨破弊衣服一行一住悉同清淨縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆滅除更無毫髮阿難若有衆生從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯銷雪不久皆得悟無生忍通曰此以成就衆生出世間智而言要歸於悟無生忍而已人不能悟無生者由積業為之障也積業無逾殺盜淫妄名曰四棄尼加觸期覆隨名曰八棄律凡五等配五刑一波羅夷配死二僧殘配流三波逸提配徒四提舍尼配杖五突吉羅配笞與宿冤值則水火蟲蛇皆足為害雖在天龍惡星無心毒人然一觸其氣未有不傷者亦宿業所招也業有輕重報亦有輕重若淪於惡趣及生不可樂處佛名尚不聞而況得無生忍乎唯持此呪能消宿業能免種種毒患若決定菩提心者如風吹沙如湯消雪何求而不遂耶未得正受則得正受未能六度則得六度未能宿命則得宿命而常與諸佛同生一處同處熏修以此悟無生忍特易易耳甚哉持呪功德不可思議也尼無著妙總禪師聞大慧舉藥山初參石頭後見馬祖因緣豁然省悟慧下座居士馮公楫隨至方丈曰某理會得和尚適來所舉公案慧曰如何曰恁麼也不得蘇嚧娑婆訶不恁麼也不得悉哩娑婆訶恁麼不恁麼總不得蘇嚧悉哩娑婆訶慧舉似尼尼曰曾見郭象注莊子識者曰却是莊子注郭象慧見其語異復舉岩頭婆子話問之尼答偈曰一葉扁舟泛渺茫呈橈舞棹別宮商雲山海月都拋却贏得莊周蝶夢長慧休去馮公疑其所悟不根後過無錫招至舟中問曰婆生七子六箇不遇知音祗這一箇也不消得便棄水中大慧老師言道人理會得且如何會尼曰已上供通並是詣實馮公大驚若無著所悟無生忍其呪也耶其非呪也耶胡為出詞吐氣未易測識乃爾復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或能身上帶此悉怛多般怛囉者便生福德智慧男女求長命者即得長命欲求果報速圓滿者速得圓滿身命色力亦復如是命終之後隨願往生十方國土必定不生邊地下賤何況雜形阿難若諸國土州縣聚落飢荒疫癘或復刀兵賊難鬬諍兼餘一切厄難之地寫此神呪安城四門并諸支提可供養處或脫闍上此云幢令其國土所有衆生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆銷滅阿難在在處處國土衆生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生衆生種種災異有此呪地悉皆銷滅十二由旬方四十里成結界地諸惡災祥永不能入是故如來宣示此呪於未來世保護初學諸修行者入三摩地身心泰然得大安隱更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害汝及衆中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧於此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語通曰此以救護世間得大無畏而言大約同觀世音四不思議妙德求男得男求女得女求長壽得長壽求圓滿得圓滿而要歸於心通心通不出三義一者證果即端坐百日得須陀洹也二者發解即決定自知成佛不謬也三者宿命通即周遍了知得無疑惑也此心通亦自不思議中得之況捍災禦患種種靈應其可思議乎哉隋大業十三載四祖信大師領徒衆抵吉州值羣盜圍城七旬不解萬衆惶怖祖愍之教令念摩訶般若波羅蜜時賊衆望雉堞間若有神兵乃相謂曰城內必有異人不可攻矣稍稍引去又陳尊宿居睦州開元寺日織蒲鞋以養母故有陳浦鞋之號巢寇入境尊宿標大草履於城門巢欲棄之竭力不能舉歎曰睦州有大聖人舍城而去遂免擾害此其彰明較著者也他如高僧傳所載不可枚舉至一切惡星隨方變怪如前同業妄見各以業感非無故生惡星有八萬四千應衆生煩惱業也人事作於下天變應於上天象大者二十八宿及五行經星餘氣皆稟五行精爽運旋於空中有違其性者則災應之如彗孛飛流太白尤旗之類此呪慈力廣大純然至善一切戾氣所不能近故能銷其災異於數百里外南嶽讓禪師於唐儀鳳二年四月八日降誕感白氣應於玄象在安康之分太史瞻見奏聞高宗宗問是何祥瑞對曰國之法器不染世榮乃敕金州太守韓偕親往存慰其家夫善惡所感災祥頓殊孰謂此呪不足以消弭災患也哉説是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所説我當誠心保護如是修菩提者爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏復有無量山神海神一切土地水陸空行萬物精祗并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事爾時八萬四千那由他恆河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩提正修行者世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒衆常當隨從侍衛此人縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恆令此人所作如願通曰持是呪者諸神保護持是呪者速得菩提持是呪者永無魔事而金剛藏菩薩願力尤深不取涅槃常隨此呪救護末世正修行者故諸魔不得其便耳障蔽魔王領眷屬一千年隨金剛齊菩薩覓起處不得忽因一日得見乃問曰汝當依何住我一千年覓汝起處不得菩薩云我不依有住而住不依無住而住如是而住法眼云障蔽魔王不見金剛齊即從只如金剛齊還見障蔽魔王麼妙喜曰既覓起處不得一千年隨從底是甚麼金剛齊云我不依有住而住不依無住而住如是而住互相熱謾法眼道障蔽魔王不見金剛齊即且從只如金剛齊還見障蔽魔王麼恁麼批判也是看孔著楔即今莫有知得妙喜起處麼隨後咄云寐語作麼看妙喜恁麼批判真是魔覷不著然魔王苦苦欲覓起處至隨從一千年彼亦發心樂修禪者故於金剛齊不甚遠去而金剛齊亦樂與之説法是皆不可尋常測也從第四卷請入華屋以來通名修道分下文別起名證果分阿難即從座起頂禮佛足而白佛言我輩愚鈍好為多聞於諸漏心未求出離蒙佛慈誨得正熏修身心快然得大饒益世尊如是修證佛三摩提未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩作是語已五體投地大衆一心佇佛慈音瞪瞢瞻仰爾時世尊讚阿難言善哉善哉汝等乃能普為大衆及諸末世一切衆生修三摩提求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝説阿難大衆合掌刳心默然受教通曰初佛語阿難心言直故如是乃至終始地位中間永無諸委曲相涅槃為終乾慧為始中間四十四心信住行向及四加行不無漸次乃修行之名目也進入十地至十一地名等覺菩薩到大涅槃方名妙覺此所詣方所不假於修矣云何得無委曲之相無委曲者一超直入始終不異最上妙菩提路也故佛謂從於凡夫終大涅槃懸示無上正修行路即從凡夫而證妙覺更不假於漸次懸示云者衆生未證預為言其大略如此爾黃檗云此心即無心之心離一切相衆生諸佛更無差別但能無心便是究竟學道人若不真下無心纍劫修行終不成道被三乘功行拘繫不得解脫然證此心有遲疾有聞法一念便得無心者有至十信十住十行十回向乃得無心者有至十地乃得無心者長短得無心乃住更無可修可證實無所得真實不虗一念而得與十地而得者功用恰齊更無深淺只是歷劫枉受辛勤耳黃檗此語亦同如來懸示無上正修行路於此參透方信中間果無諸委曲相佛言阿難當知妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號通曰性而曰妙非滯於寂明而曰圓不落於所離相離名不可思議證此妙性即世界非世界即衆生非衆生即妄即真即生滅非生滅也馬鳴云以不如實知真如法一故不覺心動而有於念念即生相生即滅相生滅名相皆謂之妄若能如實了知真如法一則妄本無有如人依方故迷迷無自相謂東為西方實不轉若其開悟西無所有迷故謂心為動而實不動若知動心即不生滅即得入於真如之門至哉言也此可為滅妄名真正訓矣故轉不覺而依覺名無上菩提轉生死而依無生名大涅槃非離不覺而別有所謂覺非離生死而別有所謂無生也但妄見滅真性現即此不覺便是真覺即此生滅便是無生即此世界衆生本無世界衆生故謂之無上故謂之大然轉依有六第一損力益能轉謂損染種勢力益淨種功能漸伏現行亦名轉依第二通達轉由見道達真力斷二障粗證一分真實轉依第三修習轉謂地地漸斷俱生證真轉依第四果滿轉謂究竟位以金剛定永斷一切粗重頓證佛果圓滿轉依第五下劣轉謂二乘厭苦欣寂證真擇滅無勝堪能故第六廣大轉謂大乘位俱無欣厭通達二空雙斷二障頓證無上菩提有勝堪能故此無上菩提與大涅槃即第六廣大轉與第四果滿轉也皆取頓證與二乘下劣漸次修習者不可同日語矣安民禪師初講楞嚴於成都為義學所歸時圜悟居昭覺民與勝禪師友善因造焉聞悟小參舉三喚侍者因緣趙州拈云如人暗中書字字雖不成文彩已彰那裏是文彩已彰處民心疑之告香入室悟問座主講何經對曰楞嚴悟曰楞嚴有七處徵心八還辨見畢竟心在甚麼處民多呈藝解悟皆不肯乃令一切處作文彩已彰會偶僧請益十玄談方舉問君心印作何顏悟厲聲曰文彩已彰民聞而有省遂求印證悟示以本色鉗鎚則罔措一日白悟曰和尚休舉話待某説看悟諾民曰尋常拈槌竪拂豈不是經中道一切世界諸所有相皆即菩提妙明真心悟笑曰你元來在這裏作活計民又曰下喝敲床時豈不是返聞聞自性性成無上道悟曰你豈不見經中道妙性圓明離諸名相民於言下釋然悟出蜀居夾山民罷講侍行悟為衆夜參舉古帆未挂因緣民不契求決悟曰你問我方舉前話悟曰庭前柏樹子遂洞徹謂悟曰古人道如一滴投於巨壑殊不知大海投於一滴悟笑曰奈這漢何未幾令分座悟説偈曰休誇四分罷楞嚴按下雲頭徹底參莫學亮公親馬祖還如德嶠訪龍潭七年往返遊昭覺三載翱翔上碧巖今日煩充第一座百華叢裡現優曇古人實參實證經歷多少轉依然後得穩坐地固知滅妄名真不易證得阿難汝今欲修真三摩地直詣如來大涅槃者先當識此衆生世界二顛倒因顛倒不生斯則如來真三摩地通曰真三摩地非由修得凡可修者不可言真第於妄緣先識其因所因既無顛倒不生既無顛倒不謂之真而何所緣之塵分段妄生即界義界無自性遷流不住即世義世亦無自性既無自性當體空寂是之謂真三摩地古靈神贊禪師遇百丈開悟却回受業本師謂曰汝離吾在外得何事業對曰並無事業遂遣執役一日因澡身命師去垢師乃拊背曰好所佛堂而佛不聖本師回首視之師曰佛雖不聖且能放光本師一日在窗下看經蜂子投窗紙求出師覩之曰世界如許廣濶不肯出鑽他故紙驢年去遂有偈曰空門不肯出投窗也太癡百年鑽故紙何日出頭時本師置經問曰汝行腳遇何人吾前後見汝發語異常師曰某甲蒙百丈和尚指箇歇處今欲報慈德耳本師於是告衆致齋請師説法師乃登座舉唱百丈門風曰靈光獨耀迥根根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛本師言下感悟曰何期垂老得聞極則事斯亦謂直詣如來大涅槃者不然鮮不隨衆生顛倒有何已時阿難云何名為衆生顛倒阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸衆生迷本圓明是生虗妄妄性無體非有所依將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發明熏以成業同業相感因有感業相滅相生由是故有衆生顛倒通曰前云衆生相續覺明為咎此云衆生顛倒即攝業果亦以因明發性性妄見生夫性明何以生妄也因明即有分別有分別即落識情識情無根故謂之妄若無分別即是智用能分別而無染著是之謂白淨識是之謂大圓鏡智不落方所故謂明圓其所一立明即不圓便為妄見如前舉二月燈影皆為眚病從畢竟無成究竟有此能有及所有非有因為之能為之所也既無其因將安所住此能住所住之相即是妄相了無根本可得住本無根住即無住若了此無住當體無生不道是無只是無住本此無住立一切法不妨世界衆生色色建立於吾本性圓明原無障礙一即一切一切即一覓真且無況有妄耶唯迷此圓明分別妄生將謂依真而生乎真非妄之媒也將謂依境而生乎境非心之崇也了無所依即是無體妄本無體即妄即真直下便是真心更不須除妄以求真也若妄分別將欲復真即此復真一念便即是妄何者真真如性本自無心真豈可得而欲乎所欲之真已非真矣非真而求復之是復乎非真而非復乎真也不宛然成非真之相乎有妄有真真與妄對是真即妄也可求可復屬於造作是造作非真也故曰宛成非相夫所謂相者曰生相曰住相曰心相曰法相無生而有生生者非矣無住而有住住者非矣無心而有心心者非矣無法而有法法者非矣是四非相展轉相生依法生心即境界為緣生智相相續相也由心住法即由上二相復起執取相計名字相也心法相生即是生力發明此四皆惑熏以成業即起業相也因有同業相感生滅相續即業繫苦相也以有惑業苦三故成衆生顛倒若不迷本圓明即生非生即住非住即心非心即法非法即妄非妄無往而非真也何顛倒之有昔文殊問維摩身孰為本曰貪欲為本問貪欲孰為本曰虗妄分別為本問虗妄分別孰為本曰顛倒想為本問顛倒想孰為本曰無住為本又問無住孰為本曰無住則無本文殊師利從無住本立一切法僧問法眼承教有言從無住本立一切法如何是無住本眼云形興未質名起未名天童頌云沒蹤迹斷消息白雲無根清風何色散乾蓋而非心持坤輿而有力洞千古之淵源造萬物之模則剎塵道會也處處普賢樓閣門開也頭頭彌勒雪竇拈起拄杖云大衆拄杖是形名雙舉形即無形名即無名諸老宿煞有一段圓明作用更不落於知解塵塵剎剎覓衆生名相不可得況於顛倒阿難云何名為世界顛倒是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成三世四方和合相涉變化衆生成十二類是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復乘此輪轉顛倒相故是有世界卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想通曰前四卷中方世相涉加流變三疊彼對依報顯於正報故言六根功德各千二百此中相涉以依從正故言變化衆生成十二類所以明世界之顛倒也前云功德此云顛倒皆由六根成就淪溺則為顛倒超越則為功德在反掌間耳六根六塵為十二區分見相交織為十二變聲香味觸即四大所造六亂妄想熏成業性種子是十二類見分之所由成也以四大乘十二區分輪轉窮十二變是十二類相分之所由成也根身為親相分器界為疏相分總不外於六塵六塵所起本無先後此獨以聲先之何也天地之氣初動雷震有聲震驚百里其聞最遠故六根所觸唯聲最先若他五塵漸近而後知至味以口知法以心知尤為最近然謂因聲而想見其色因色而密辨其香觸香而因知觸體觸體而因知別味別味而因知擇法此相緣而起不無先後二十五圓通音聲始之而返聞終之聞根最圓於此亦可互見然根塵相織各有分段即是界義遷流不住輪轉三界即是世義世界和合根塵充塞是有所有非因所因本無其因妄生分別故為世界顛倒若六亂妄想一時頓息內不見根外不見塵即此世界無住所住本自無生又何顛倒之有楚南禪師初參芙蓉蓉曰吾非汝師汝師黃檗是也南遂參檗檗問子未現三界影像時如何南曰即今豈是有耶檗曰有無且置即今如何南曰非今古檗曰吾之法眼已在汝躬後僧問南如何是易南曰著衣吃飯不用讀經看教不用行道禮拜燒身煉頂豈不易耶曰如何是難南曰微有念生便具五陰三果輪回生死皆從汝一念生所以佛教諸菩薩云佛所護念夫南禪師前後際斷而猶惕然於一念之動是真知世界顛倒之因者阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沉亂想如是故有卵羯邏藍此云凝滑流轉國土魚鳥龜蛇其類充塞由因世界雜染輪回欲顛倒故和合滋成八萬四千橫豎亂想如是故有胎遏蒲曇此云皰流轉國土人畜龍仙其類充塞由因世界執著輪回趣顛倒故和合暖成八萬四千翻覆亂想如是故有濕相蔽尸此云軟肉流轉國土含蠢蠕動其類充塞由因世界變易輪回假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南此云硬肉流轉國土轉蛻飛行其類充塞通曰三界所有法一切由心造捴不外見分相分和合而成一念之動始於虗妄分別既生愛取則為雜染漸染日深便乃執著世未有常執而不捨者終從變易此情念輪轉自然之勢也念之動也想輕而情重故卵惟想生胎因情有卵但氣交故圓故動而想多升沉故其感果有魚鳥之別胎必精交故滋故染而情有偏正故其感果有人畜之異情之執者趨附不離亦各耽其趣之意故濕以合感待日暖而後生情迷氣滯不藉交合故蠢動之類應之執情既變離此託彼與變易生死相類而此非真故名為假化以假名觸類而成趣新轉故轉故如蛻形之易脫趣新如飛行之輕舉情遷氣移各應其候故謂之變易輪回也凝滑入胎初位胎卵未分之相皰即胎卵漸分之相也軟肉是濕生初相既不入胎故無前二位硬肉蛻即成體無軟相也亦自有淺深不同如此皆以六亂妄想為顛倒因其究充塞結為世界是知真性無量無明亦無量慶善能禪師上堂事不獲已與諸人葛藤一切衆生祗為心塵未脫情量不除見色聞聲隨波逐浪流轉三界汩沒四生致使正見不明觸途成滯若也是非齊泯善惡都忘坐斷報化佛頭截却聖凡途路到這裏方有少許相應直饒如是衲僧分上未有奇特何故如此才有是非紛然失心咄僧問報慈嶼禪師情生智隔想變體殊祗如情未生時如何師曰隔僧曰情未生時隔箇甚麼師曰這箇稍郎子未遇人在若論衲僧分上情想不生猶待鉗鎚何況隨波逐浪有不汩沒四生者由因世界留礙輪回障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞由因世界銷散輪回惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沉其類充塞由因世界罔象輪回影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞由因世界愚鈍輪回癡顛倒故和合頑成八萬四千枯稿亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞通曰色屬相分想屬見分總不出四句曰有曰無曰亦有亦無曰非有非無便窮盡世界變態有色者著於色也如事日月水火諸外道其想已結成精耀故但有色而已精耀生於明明生於覺覺無住相而精耀有麗故名留礙涅槃云八十神皆因留礙想元成此精耀故一切精明神物皆能預知休咎未嘗離於覺體特障礙而不流通耳故謂之障顛倒無色者著於空也如厭有歸無諸外道迷漏無聞故名曰惑晦昧陰隱入無色界此有想無色不成業體然生無色界故亦有銷散羯南神鬼精靈無實狀也似有若無故名罔象如禱祀祈求依附影像志慕靈通但有憶想耳潛結狀貌非有實色故唯有想相羯南土木金石有色無想空頑為因故名曰癡外道計無情有命金石堅牢或習定灰凝愚鈍枯稿遇物成形如黃頭化石之類是為無想羯南此由外道邪見所化有色無想不頑而為木石則著而為精耀是相分勝化而為物也有想無色不幽而為鬼物則散而為空體是見分勝化而為神也舜若多神無身覺觸歸無色界是皆六亂妄想所致道眼不明遂至於此僧問金峯志禪師是身無知如土木瓦石此意如何師下禪牀扭僧耳朵僧負痛作聲師曰今日始捉著箇無知漢僧作禮出去師召闍黎僧回首師曰若到堂中不可舉著曰何故師曰大有人笑金峯老婆心又有一行者坐靜室中炯炯有光某禪師恐其惑衆逐之此皆錯亂修習不明乎平常至理也劉經臣簽判嘗著明道諭儒篇以警世詞曰明道在乎見性余之所悟者見性而已孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也揚子曰視聽言貌思性所有也有見於此則能明乎道矣當知道不遠人人之於道猶魚之於水未嘗須臾離也唯其迷己逐物故終身由之而不知佛曰大覺儒曰先覺蓋覺此耳昔人有言曰今古應無墜分明在目前又曰大道祗在目前要且目前難覩欲識大道真體不離聲色言説又曰夜夜抱佛眠朝朝還共起起倒鎮相隨語默同居止欲識佛去處秪這語聲是此佛者之語道為最親者立則見其參於前也在輿則見其倚於衡也瞻之在前也忽焉在後也取之左右逢其原也此儒者之語道最邇者奈何此道唯可心傳不立文字故世尊拈華而妙心傳於迦葉達磨面壁而宗旨付於神光六葉既敷千華競秀分宗列派各有門庭故或瞬目揚眉擎拳舉指或行棒行喝竪拂拈捶或持義張弓輥毬舞笏或拽石搬土打鼓吹毛或一默一言一吁一笑乃至種種方便皆是親切為人然祗為太親故人多罔措瞥然見者不隔絲毫其或沉吟迢迢萬里欲明道者宜無忽焉祖祖相傳至今不絶真得吾儒所謂無所不悅聞而弗違者矣余之有得實在此門反思吾儒自有其道良哉孔子之言默而識之一以貫之故目擊而道存指掌而意諭凡若此者皆合宗門之妙旨得教外之真機然而孔子之道傳之子思子思傳之孟子孟子既沒不得其傳而所以傳於世者特文字耳故余之學必求自得而後已幸余一夕開悟凡目之所見耳之所聞心之所思口之所談手足之所運動無非妙者得之既久日益現前每以與人人不能受然後知其妙道果不可以文字傳也嗚呼是道也有其人則傳無其人則絶豫既得之矣誰其似之乎終余之身而有其人耶無其人耶所不可得而知也故為記誦歌語以流播其事而又著此篇以諭吾徒耳由因世界相待輪回偽顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想由是故有非無色相無色羯南流轉國土呪詛厭生其類充塞由因世界合妄輪回罔顛倒故和合異成八萬四千回互亂想如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞由因世界怨害輪回殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞是名衆生十二種類通曰色想有無如陰陽義足該萬變矣然陰中有陽陽中有陰似陰而實陽似陽而實陰其變叵測亂想無涯衆生無盡非佛大圓鏡智其熟能窮之相待輪回假物者也故名為偽水母以蝦為眼本非有色待物成色彼此異質猶曰染緣合也至邪業相引但憑呪術呼召非此有性彼亦能引故曰性顛倒此呪詛魘魅亦能變現非無色相也然藉聲誕質不由生理故本無色此其呪力自人為之無足異者若蒲盧等本為桑蟲非有蜂想而成蜂想以異質故非如胎卵想中傳命其卒相成呪彼類我以妄化妄誣罔取他納為己有回他作己故名回互此異類相附雖云合妄猶未至於怪也如土梟破鏡以他物為子子成而反遭其食棄絶倫義非常理也故名為怪皆由多生怨害相生相食反怨為愛反愛為怨子子相酬自成一類梟食母破鏡食父非無想也然塊與毒果豈有想乎至於戒闍黎人面瘡者乃袁盎朝錯多生怨害一身而自相毒又非梟類隔體者比盎錯非無想而瘡非有想也此其煩惱所結各各有八萬四千輪回逐業生生未已充寒一時則無界不有充寒多劫則無世不然非衆生正報無以感依報非世界依報無以成正報是世界之顛倒即衆生之顛倒皆由背覺合塵始非有二因也此於衆生略示其顛倒之原於世界詳示其顛倒之實顛倒即是業果而前所云三相續者咸統是矣僧問百丈如今受戒身口清淨已具萬善得解脫否丈曰少分解脫未得心解脫亦未得一切處解脫曰如何是心解脫及一切處解脫丈曰不求佛法僧乃至不求福智知解等垢淨情盡亦不守此無求為是亦不住盡處亦不欣天堂畏地獄縛脫無礙即身心及一切處皆名解脫汝莫言有少分戒身口意清淨便以為了不知河沙戒定慧門無漏解脫都未涉一毫在努力向前須猛究取莫待耳聾眼暗面皺髮白老苦及身悲愛纏綿眼中流淚心裏慞惶一無所據不知去處到恁麼時節整理手腳不得也縱有福智名聞利養都不相救為心眼未開唯念諸境不知返照復不見佛道一生所有善惡業緣悉現於前或欣或怖六道五蘊俱時現前盡敷嚴好宅舍舟船車輿光明顯赫皆從身心貪愛所現一切惡境皆變成殊勝之境但隨貪愛重處業識所引隨著受生都無自由分龍畜良賤亦總未定問如何得自由分丈曰如今得即得或對五欲八風情無取捨慳嫉貪愛我所情盡垢淨俱亡如日月在空不緣而照心心如木石念念如救頭然亦如香象渡河截流而過更無疑滯此人天堂地獄所不能攝也嗟乎百丈叮嚀教誡不靳慈悲須於諄切處猛省提撕方知顛倒之因不由乎他而真三摩地原自具足至於垢淨俱亡天堂地獄所不能攝又何十二種類之所能轉哉
