body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第七阿難汝問攝心我今先説入三摩地修學妙門求菩提道要先持此四種律儀皎如氷霜自不能生一切枝葉心三口四生必無因阿難如是四事若不遺失心尚不緣色香味觸一切魔事云何發生若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶薩怛多般怛囉無上神呪斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所説心呪且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢彼尚淫女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚於順風有何艱險若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀必不成就戒成已後著新淨衣然香間居誦此心佛所説神呪一百八遍然後結戒建立道場求於十方現在國土無上如來放大悲光來灌其頂阿難如是末世清淨比丘若比丘尼白衣檀越心滅貪淫持佛淨戒於道場中發菩提願出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令其開悟通曰現業易制自行可違宿業難除必假神力故説神呪能破宿習宿習如塵神呪如風順風揚塵散之則易良由神力冥資不可思議故也以不可思議之佛慧消不可思議之無明如是而求最上乘決定有所成就此呪若超出戒定慧而另為一枝然非戒定慧精嚴則不能得其靈應故曰若其不遇真清淨僧汝戒律儀必不成就又曰如是不寐經三七日我自現身令其開悟所謂思之思之又重思之思之不得鬼神將通之也佛本是無心淨故有水清月現理有固然定慧之極與佛氣分相接豈不至現形安慰者乎若見此相但觀空寂是佛顯然是魔即滅此修習禪定者所當知也永明壽禪師於國清行法華懺夜見神人持戟而入師訶之曰何得擅人對曰久積善業方到此中夜半繞像見普賢前蓮華在其手又於金華大住峯誦經三載禪觀中見觀音以甘露灌其口遂獲辨才所著有宗鏡録及萬善同歸行於世明教嵩禪師夜頂觀音像而誦其號必滿十萬乃寢亦見觀音以甘露灌之自是世間經書章句不學而能所著禪門定祖圖傳法正宗記及原教論宋仁宗嘉歎詔編入藏此皆摩頂安慰令其開悟之明驗也阿難白佛言世尊我蒙如來無上悲誨心自開悟自知修證無學道成末法修行建立道場云何結界合佛世尊清淨軌則佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺以下取其黃土和上栴檀沉水蘇合薰陸金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地方圓丈六為八角壇壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉取八圓鏡各安其方圍繞華鉢鏡外建立十六蓮華十六香爐間華鋪設莊嚴香爐純燒沉水無令見火取白牛乳置十六器乳為煎餅并諸沙糖油餅乳糜蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩每以食時若在中夜取蜜半升用酥三合壇前別安一小火罏以兜樓婆香赤色沉水者煎取香水沐浴其炭然令猛熾投是酥蜜於炎爐內燒令煙盡享佛菩薩令其四外遍懸幡華於壇室中四壁敷設十方如來及諸菩薩所有形像應於當陽張盧舍那此云光明遍照報身佛也釋迦現在佛彌勒未來佛阿閦東方佛彌陀西方佛諸大變化觀音形像兼金剛藏安其左右帝釋梵王烏芻瑟摩并藍地迦青面金剛諸軍茶利金剛異號與毗俱胝手垂數珠鬘三目持鬘髻四天王等頻那夜迦即豬頭象鼻二使者張於門側左右安置又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八遍第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教第三七中於十二時一向持佛般怛囉呪至第七日十方如來一時出現鏡交光處承佛摩頂即於道場修三摩地能令如是末世修學身心明淨猶如琉璃阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就從三七後端坐安居經一百日有利根者不起於座得須陀洹縱其身心聖果未成決定自知成佛不謬汝問道場建立如是通曰建立道場取其香潔外盡其制內盡其誠自是表裏如一心境不二諸家解説一一牽合比擬或信或智或德或行若是但自取寂滅場地足矣何必建立為哉唯十香各有取義白膠香能除惡氣去蒼疹而戒香除身不善似之青木香能寤魔寐而精進香離睡似之薰陸能止痛而定香能持似之蘇合殺鬼除邪而忍香禦魔似之零陵能止精明目而慧香蓄精起明似之旃檀能遠到布施香似之甘松能合衆香而解脫能和合諸功德似之金能除毒去邪而法香滅暗破執似之雞舌令人身香而解脫知見能以一切方便遍入諸境似之沉水則如菩提香窮法淵底也華嚴云佛子塗香時願十波羅蜜香普薰蓋本於此諸佛菩薩未必享此供養為令修行者福慧俱足如佛受純陀後供云爾佛以日中受食故以中夜例日中或謂夜半亥子中間一陽初動不離本際如三摩地兩無所著是為中道故宜享佛至三七日鏡交光處承佛摩頂理事無礙境界也修行者至灌頂位佛以光攝受之覺際入交光光相映而鏡交光處形喻最為精切故得果者內瑩發光身心明淨猶如琉璃性智明徹與佛慧通此呪力之明效大驗也縱未得果決定自知成佛不謬蓋端坐安居銷除塵垢亦微窺見圓明之體與佛無二但為宿習所牽未易透脫需之歲月未有不成者靈芝律師重造明州五臺戒壇成有一老人神氣超邁眉鬚皓白進而啓曰弟子有三珠奉獻以為壇成之賀言訖忽然不見因置其珠於壇心屢現光相其後有壇主會十師大開戒法越三日夜分有一僧登壇忽覩珠光外徹內現善財童子僧乃驚呼衆起觀之悉皆環禮每夜僧衆益伸虔懇而珠之所現或金色佛或六臂觀音或紫竹或碧柳或奇木怪石或迦陵頻伽飛舞左右或月蓋或龍神獻珠神變非一見者聞者皆謂希有雖然清淨之極心如佛心其放光現瑞亦尋常事耳阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為遭彼梵天邪術所禁心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥獲其力尚未親聞唯願大慈重為宣説悲救此會諸修行輩末及當來在輪回者承佛密音身意解脫於時會中一切大衆普皆作禮佇聞如來祕密章句爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆遍示現十恆河沙金剛密迹擎山持杵遍虗空界大衆仰觀畏愛兼抱求佛哀祐一心聽佛無見頂相放光如來宣説神呪呪凡四百二十七句通曰神呪何以能令阿難即時解脫蓋無見頂相放光如來即妙湛總持首楞嚴王之所示現彼以湛持故分湛者化彼以堅固故不堅者破如火銷氷自有默奪之理後為金剛菩薩精心陰速發彼神識是人應時心能記憶得宿命通而況如來神力遍周沙界在在光明在在解脫即有邪術如紅爐點雪應時銷融耳皓月供養問長沙岑如何是陀羅尼沙指禪床右邊曰這箇師僧却誦得曰還別有人誦得否沙又指禪床左邊曰這箇師僧亦誦得曰某甲為甚麼不聞沙曰大德豈不知道真誦無響真聽無聞曰恁麼則聲音不入法界性也沙曰離色求觀非正見離聲求聽是邪聞曰如何是不離色是正見不離聲是真聞沙示偈曰滿眼本非色滿耳本非聲文殊常觸目觀音塞耳根會三元一體達四本同真堂堂法界性無佛亦無人故知長沙所云法界性隨處宣誦陀羅尼呪彼且無佛亦無人何處更有魔事來南無薩怛他蘇伽多耶阿羅訶帝三藐三菩陀寫薩怛他佛陀俱胝瑟尼釤南無薩婆勃陀勃地薩跢弊南無薩多南三藐三菩陀俱知南娑舍囉婆迦僧伽喃南無盧雞阿羅漢跢喃南無蘇盧多波那喃南無娑羯唎陀伽彌喃南無盧雞三藐伽跢喃三藐伽波囉底波多那喃南無提婆離瑟赧南無悉陀耶毗地耶陀囉離瑟赧舍波奴揭囉訶娑訶娑囉摩他喃南無跋囉訶摩泥南無因陀囉耶南無婆伽婆帝嚧陀囉耶烏摩般帝娑醯夜耶南無婆伽婆帝那囉野拏耶槃遮摩訶三慕陀囉南無悉羯唎多耶南無婆伽婆帝摩訶迦囉耶地唎般剌那伽囉毗陀囉波拏迦囉耶阿地目帝尸摩舍那泥婆悉泥摩怛唎伽拏南無悉羯唎多耶南無婆伽婆帝多他伽多俱囉耶南無般頭摩俱囉耶南無跋闍囉俱囉耶南無摩尼俱囉耶南無伽闍俱囉耶南無婆伽婆帝帝唎茶輸囉西那波囉訶囉拏囉闍耶跢他伽多耶南無婆伽婆帝南無阿彌多婆耶哆他伽多耶阿囉訶帝三藐三菩陀耶南無婆伽婆帝阿芻耶哆他伽多耶阿囉訶帝三藐三菩陀耶南無婆伽婆帝沙闍耶俱盧吠柱唎耶般囉婆囉闍耶跢他伽多耶南無婆伽婆帝三補師毖多薩憐捺囉剌闍耶跢他伽多耶阿囉訶帝三藐三菩陀耶南無婆伽婆帝舍雞耶母那曳跢他伽多耶阿囉訶帝三藐三菩陀耶南無婆伽婆帝剌怛那雞都囉闍耶跢他伽多耶阿囉訶帝三藐三菩陀耶帝瓢南無薩羯唎多翳曇婆伽婆多薩怛多伽都瑟尼釤薩怛多般怛㘕南無阿婆囉視耽般囉帝揚岐囉薩囉婆部多揭囉訶尼揭囉訶揭迦囉訶尼跋囉毖地耶叱陀你阿迦囉密唎柱般唎怛囉耶寧揭唎薩囉婆槃陀那目叉尼薩囉婆突瑟吒突悉乏般那你伐囉尼赭都囉失帝南羯囉訶娑訶薩囉若闍毗多崩娑那羯唎阿瑟吒冰舍帝南那叉剎怛囉若闍波囉薩陀那羯唎阿瑟吒南摩訶揭囉訶若闍毗唎崩薩那羯唎薩婆舍都嚧你婆囉若闍呼藍突悉乏難遮那舍尼毖沙舍悉怛囉阿吉尼烏陀迦囉若闍阿般囉視多具囉摩訶般囉戰持摩訶疊多摩訶帝闍摩訶稅多闍婆囉摩訶跋囉槃陀囉婆悉你阿唎耶多囉毗唎俱知誓婆毗闍耶跋闍囉摩禮底毗舍嚧多勃騰罔迦跋闍囉制喝那阿遮摩囉制婆般囉質多跋闍囉擅持毗舍囉遮扇多舍提婆補視多蘇摩嚧波摩訶稅多阿唎耶多囉摩訶婆囉阿般囉跋闍囉商羯囉制婆跋闍囉俱摩唎俱藍陀唎跋闍囉喝薩多遮毗地耶乾遮那摩唎迦啒蘇母婆羯囉跢那嚧遮那俱唎耶夜囉菟瑟尼釤毗折藍婆摩尼遮跋闍囉迦那迦波囉婆嚧闍那跋闍囉頓稚遮稅多遮迦摩囉剎奢尸波囉婆翳帝夷帝母陀囉羯拏娑囉懺掘梵都印兔那麼麼寫烏𤙖唎瑟揭拏般剌舍悉多薩怛他伽都瑟尼釤虎𤙖都嚧雍瞻婆那虎𤙖都嚧雍悉耽婆那虎𤙖都盧雍波囉瑟地耶三般叉拏羯囉虎𤙖都嚧雍薩婆藥叉喝囉剎娑揭囉訶若闍毗騰崩薩那羯囉虎𤙖都嚧雍者都囉尸底南揭囉訶娑訶薩囉南毗騰崩薩那囉虎𤙖都嚧雍囉叉婆伽梵薩怛他伽都瑟尼釤波囉點闍吉唎摩訶娑訶薩囉勃樹娑訶薩囉室唎沙俱知娑訶薩泥帝阿弊提視婆唎哆吒吒罌迦摩訶跋闍嚧陀囉帝唎菩婆那曼茶囉烏𤙖莎悉帝薄婆都麼麼印兔那麼麼寫囉闍婆夜主囉跋夜阿祇尼婆夜烏陀迦婆夜毗沙婆夜舍薩多囉婆夜婆囉斫羯囉婆夜突瑟叉婆夜阿舍你婆夜阿迦囉密唎柱婆夜陀囉尼部彌劍波伽波陀婆夜烏囉迦婆多婆夜剌闍壇茶婆夜那伽婆夜毗條怛婆夜蘇波囉拏婆夜藥叉揭囉訶囉叉私揭囉訶畢唎多揭囉訶毗舍遮揭囉訶部多揭囉訶鳩槃茶揭囉訶補丹那揭囉訶迦吒補丹那揭囉訶悉乾度揭囉訶阿播悉摩囉揭囉訶烏檀摩陀揭囉訶車夜揭囉訶醯唎婆帝揭囉訶社多訶唎南揭婆訶唎南嚧地囉