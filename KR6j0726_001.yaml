body:
  text: 楞嚴宗通緣起昔天台智者師我南嶽思大禪師獲證法華三昧覩靈山一會儼然未散自是閲諸經典渙然冰釋及解法華六根清淨義沉吟久之有西域僧謂曰唯首楞嚴經著明六根功德足與相證智者於是渴慕每昕夕望西遙拜如是者積十六歲南嶽天台寺左畔有拜經臺遺址云距智者後百餘年楞嚴始入中國經屬房相筆受文字爾雅宇內學士大夫多誦之余凡三至拜經臺輒徘徊不忍去竊歎古人繫懷聖典積十餘載不及見今楞嚴盈書肆乃棄置不復觀何也余因發心書楞嚴於石命工鐫刻以次砌成石室俾造拜經臺者周環讀之咸曰經來也庶為智者補一缺缺事方操筆端書間忽作是念余所書者字也非義也智者欲此經之來無非欲人人知有此經義爾如玄沙備頭陀因閲楞嚴發明心要是深於義者乃至靈巖安長水璿竹菴圭黃龍南及紹隆安民等靡不因楞嚴而有悟此諸宗師不孤此經之來也已若因文解義句釋字訓漸疏漸徹纍至數十家而經義愈遠則不求諸心之過也故能得諸心此經雖未至而智者依教立義往往與楞嚴合不得諸心雖日對楞嚴而此經猶然在西域也即充塞棟宇奚益宗師家務掃除文字見解為不足尚有以哉然諸宗師出詞吐氣接引初機語意多似楞嚴至發明向上證入菩提則與二十五圓通機緣無異即不誦楞嚴而楞嚴具在即楞嚴不至此土而此土未始無楞嚴也余不自揆遍採宗語配合經文之後或與暗符或與互見或推衍其意或發所未發念之所到隨取隨足余亦不自知其凑泊一至於此豈天地間合有此種議論而余多生夙願固欲藉是宣楞嚴之義耶是借諸老宿以明經而非以我明經也抑即宗以明經而非以文字見解明經也遂名之曰宗通宗通及說通當有自得於心者與諸老宿披襟相見不但楞嚴一會儼然未散而智者亦至今在南嶽山長金簡曾鳳儀舜徵父題大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第一唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋伽譯語唐菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受明菩薩戒弟子前奉訓大夫禮部祠祭清吏司員外郎南嶽曾鳳儀宗通通曰此經胡以名大佛頂如來密因修證了義諸菩薩萬行首楞嚴也爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言當何名是經我及衆生云何奉持佛告文殊師利是經名大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼亦名救獲親因度脫阿難及此會中性比丘尼得菩提心入遍知海亦名如來密因修證了義亦名大方廣妙蓮華王十方佛母陀羅尼呪亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持據本文含有多義此但以大佛頂該之以佛頂神呪即十方佛母陀羅尼呪即灌頂章句即度脫阿難及性比丘尼者故不重出呪曰摩訶悉怛多般怛囉此云大白傘蓋純潔白淨含覆一切故謂之大此大佛頂神呪不可思議乃如來之密因修證之了義諸菩薩萬行即此具足而一切究竟堅固也夫法能漸而不能頓者不可謂大能頓而不能圓者不可謂大今曰密曰了已該頓義曰修證曰萬行已該圓義唯此圓頓法門與大方廣佛華嚴經及妙法蓮華經無異蓋信住行向地等妙覺已包裹華嚴而耳根圓通都與普門品互見兼備二經旨趣其大何如未悟者轉不生滅而為生滅即非了義其悟者轉生滅而為不生滅即一切究竟堅固故向上一路非悟不可然則呪何關於悟悟何關於呪均以大佛頂名何也呪不可思議悟亦不可思議呪即悟境悟即呪境言語道斷心行處絶見猶離見見不能及故取於佛頂離自見相故又諸佛頂族一超直人至尊至貴法門也合論名曰尊頂以此僧問黃檗無邊身菩薩為什麼不見如來頂相檗云實無可見何以故無邊身菩薩便是如來不應更見祗教汝不作佛見不落佛邊不作衆生見不落衆生邊不作有見不落有邊不作無見不落無邊不作凡見不落凡邊不作聖見不落聖邊但無諸見即是無邊身若有見處即名外道外道者樂於諸見菩薩於諸見而不動如來者即諸法如義所以云彌勒亦如也如即無生如即無滅如即無見如即無聞頂即圓亦無圓見故不落圓邊所以佛身無為不墮諸數權以虗空為喻圓同太虗無缺無餘等間無事莫強辨他境辨著便成識又僧問百丈無邊身菩薩不見如來頂相如何丈云為作有邊見無邊見所以不見如來頂相祗如今都無一切有無等見亦無無見是名頂相見觀二尊宿說佛頂義如珠走盤若知他落處許頂門上具隻眼既曰如來密因則不藉修證矣又曰修證了義胡以別於不了義哉蓋如來者果號也金剛經云若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來夫來無所從去無所至果何物哉可謂密矣佛頂神呪為如來密語其密無二以此密為因即以此密得果如蓮之蔤因果一時具足故以此為修修而無修以此為證證而無證經云何藉劬勞肯綮修證此即了義之旨如其不然猶為未了昔惠明趁及六祖祖曰汝既為法而來可屏息諸緣勿生一念吾為汝說明良久祖曰不思善不思惡正與麼時那箇是明上座本來面目明言下大悟復問云上來密言密意外還更有密意否祖曰與汝說者即非密也汝若返照密在汝邊明曰某甲雖在黃梅實未省自己面目今蒙指示如人飲水冷暖自知今行者即某甲師也祖曰汝若如是吾與汝同師黃梅善自護持又懷讓初謁嵩山安禪師問如何是祖師西來意安曰何不問自己意讓便問如何是自己意山曰要觀密作用問如何是密作用山以眼開合示之讓不領山指見六祖祖曰從何來讓曰嵩山祖曰什麼物恁麼來讓不能對經八載始白祖曰某甲有箇會處祖曰如何對曰說似一物即不中祖曰還可修證否對曰修證即不無污染即不得祖曰善哉秪此不污染諸佛之所護念汝既如是吾亦如是若二尊宿者深契密意得修證了義矣後僧問百丈從上祖宗皆有密語遞相傳受如何丈曰無有密語如來無有祕密藏秪如今鑑覺語言分明覓形相了不可得是密語從須陀洹向上直至十地但有語句盡屬法之塵垢但有語句盡屬煩惱邊收但有語句盡屬不了義教但有語句即不許也了義教俱非也更討什麼密語據百丈見處密之一字亦須吐却了義教亦不立可謂向千佛頂上行諸菩薩萬行未離修證何謂一切究竟堅固蓋諸菩薩未至灌頂位即有修有證已至灌頂位即超入等妙覺何修證之有諸行雖無常但自妙覺中流出一切事法當處寂滅故謂之究竟堅固經云有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路此三摩提即首楞嚴大定也乃具足萬行妙莊嚴路非離萬行而別有所謂定也一切皆定故曰一切事究竟堅固傅大士日常營作夜則行道見釋迦金粟定光三如來放光襲其體大士乃曰我得首楞嚴定此經未至此名已標異哉四祖語牛頭融禪師曰夫百千法門同歸方寸河沙妙德總在心源一切戒門定門慧門神通變化悉自具足不離汝心一切煩惱業障本來空寂一切因果皆如夢幻無三界可出無菩提可求人與非人性相平等大道虗曠絶思絶慮如是之法汝今已得更無闕少與佛何殊更無別法汝但任心自在莫作觀行亦莫澄心莫起貪嗔莫懷愁慮蕩蕩無礙任意縱橫不作諸善不作諸惡行住坐臥觸目遇緣總是佛之妙用快樂無憂故名為佛融禪師聞此橫出一枝佛法即灌頂章句何以加焉法眼云修行三生六十劫四生一百劫如是直到三祇果滿古人猶道不如一念緣起無生超彼三乘權學故曰彈指圓成八萬門剎那滅却三祇劫宗門中原有此奇特事豈謂萬行具足而後可得首楞嚴定哉經者常道也說文曰織有經有緯經常而緯變此經係龍勝於龍宮默誦而出五天世主祕重不傳豈知此經人人具有箇箇不無乃為常道何必祕也有僧問首山一切諸佛皆從此經出如何是此經山曰低聲低聲僧云如何受持山曰不染污投子頌曰水出崑崙山起雲釣人樵父昧來因只知洪浪巖巒闊不肯拋絲弃斧斤藥山尋常不許人看經有時自看次僧云和尚尋常不許人看經何故自看山曰我只要遮眼僧曰某學和尚得否山曰汝若看牛皮也須穿透故知遮眼分齊斯得受持之妙若透牛皮幾何不至於染污哉如是我聞一時佛在室羅筏城此云豐德祇桓精舍即祇樹給孤獨園與大比丘衆千二百五十人俱皆是無漏大阿羅漢通曰如是我聞一時諸經皆以此冠阿難稟佛遺旨結集諸經唱此六字羣疑頓釋如是如是云者但可自信無容言說若了如是之法佛祖密付則以下葛藤皆其注腳矣有僧參南陽忠國師師問習何事業曰講金剛經師曰最初兩字是甚麼曰如是師曰是甚麼僧無對咄哉是甚麼講經又雪峯存禪師問座主如是兩字盡是科文作麼生是本文主無對五雲代云更分三段著且道五雲出語是科文是本文比丘具三義曰乞士曰破惡曰怖魔阿羅漢亦具三義曰應供曰殺賊曰無生始因終果相為呼應皆云大者揀非小品謂其所從事者即大佛頂之大故均以大名也漏亦有三種曰無明曰欲曰有經云汝常聞我毗奈耶中宣說修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學戒則無欲漏定則無有漏慧則無無明漏此三無漏名決定義似以慧為極則而洞山語曹山曰末法時代人多乾慧若要辨驗真僞有三種滲漏一曰見滲漏機不離位墮在毒海二曰情滲漏滯在向背見處偏枯三曰語滲漏究妙失宗機昧終始濁智流轉於此三種子宜知之此於乾慧中又分此三種非具擇法眼莫能照破故回向大乘阿羅漢必合洞山之語觀之而無漏之義始備佛子住持善超諸有能於國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼此云戒律弘範三界應身無量度脫衆生拔濟未來越越塵纍通曰住持云者覺性常住能持萬法者也數語總敘實該一經之大旨曰善超諸有則七徵八還五陰六入十二處十八界以至七大所不能障也破妄之義已具曰成就威儀則建立道場及三漸次五十五位菩提之路也顯真之義已具曰妙堪遺囑則二十五圓通各證自性俱堪授記作佛者也見性宗趣自存曰弘範三界此經扶律諄諄於四禁十善及九次第定弘彰三界之軌則也阿難啓教以斷淫為首務即此而在曰應身無量即敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉是也為末法衆生防範魔事超諸塵纍證於圓通實如來最後垂範至意風穴沼禪師垂語云若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老謳歌雪竇拈柱杖云還有同生同死的衲僧麼意在立塵處頌云野老從教不展眉且圖家國立雄基謀臣猛將今何在萬里清風只自知雪竇於佛事門中不捨一法天童兼實際理地不受一塵兩法齊行一併拈出頌云皤然渭水起垂綸何似首陽清餓人只在一塵分變態高名勳業兩難泯又長慶云總似今日老胡有望保福云總似今日老胡絶望天童拈云富嫌千口少貧恨一身多觀諸老宿傳持大教總為得人與佛祖拔濟未來之心等無差別故録之為住持者法其名曰大智舍利弗此云鶖子摩訶目犍連此云大采菽氏摩訶拘絺羅此云太膝富樓那彌多羅尼子此滿慈子須菩提此云空生優婆尼沙陀此塵性空等而為上首復有無量辟支無學併其初心同來佛所屬諸比丘休夏自恣十方菩薩此覺有情咨決心疑欽奉慈嚴將求密義即時如來敷座宴安為諸會中宣示深奧法筵清衆得未曾有通曰此敘經之始謂諸菩薩將求密義而不云何者為密謂世尊宣示深奧而不云何者為奧胡為法筵清衆得未曾有昔世尊一日升座文殊白椎云諦觀法王法法王法如是世尊便下座天童頌云一段真風見也麼綿綿化母理機梭織成古錦含春象無奈東君漏泄何雪竇頌云列聖叢中作者知法王法令不如斯會中若有仙陀客何必文殊下一椎若於世尊敷座宴安處得箇消息是真妙契奧密而不假詞說之繁者矣辟支有初發心者蓋辟支之徒也休夏自恣律開三日七月十四十五十六迦陵仙音遍十方界恆沙菩薩來聚道場文殊師利而為上首通曰迦陵仙鳥在㲉已具美音衆鳥莫及喻頓教入如來種不假修習非三乘所及如來此音以應頓機故也昔目犍連欲窮佛音盡其神力歷恆沙界至一佛國報身甚巨鉢飯邊圍可當道路目連振錫而遊其上彼諸弟子問其佛曰安所有蟲而人其貌者彼佛云是娑婆界釋迦文佛弟子目犍連未可以其小而易之也因問連何為至此連以窮佛音聲對彼佛語連佛音無盡非汝可窮連乃返所謂遍十方界者良有徵已恆沙菩薩各有住處如華嚴所載補陀支提五臺峨嵋那羅延窟列剎相望踵接肩摩宇宙無窮何地非菩薩住處聞佛音聲來集佛所即恆沙未足方其多也文殊此云妙德以表實智宣示頓教則文殊為當機故為上首昔無著文喜禪師嘗至五臺金剛窟禮謁文殊遇一老翁牽牛而行邀師入寺翁呼均提有童子應聲出迎翁縱牛引師升堂堂宇皆耀金色翁據床指繡墩命坐翁曰近自何來喜曰南方翁曰南方佛法如何住持喜曰末法比丘少奉戒律翁曰多少衆喜曰或三百或五百喜却問此間佛法如何住持翁曰龍蛇混雜凡聖同居喜曰多少衆翁曰前三三後三三翁呼童子致茶并進酥酪喜納其味心意豁然翁拈起玻璃盞問曰南方還有這箇否喜曰無翁曰尋常將甚麼吃茶喜無對惜哉當時只合與撲碎玻璃盞喜覩日色稍晚遂問翁擬投一宿得否翁曰汝有執心在不得宿喜曰某甲無執心翁曰汝曾受戒否喜曰受戒久矣翁曰汝若無執心何用受戒喜辭退翁令童子相送喜問童子前三三後三三是多少童召大德喜應諾童曰是多少喜復問曰此為何處童曰此金剛窟般若寺也喜悽然悟彼翁者即文殊也不可再見乃稽首童子願乞一言為別童說偈曰面上無嗔供養具口裡無嗔吐妙香心裏無嗔是珍寶無垢無染是真常言訖均提與寺俱隱喜後參仰山頓了心契令充典座文殊常現於粥鑊上喜以攪粥篦便打曰文殊自文殊文喜自文喜殊乃說偈曰苦瓠連根苦甜瓜徹蒂甜修行三大劫却被老僧嫌到這裏還道有執心麼雪竇頌云千蜂盤屈色如藍誰謂文殊是對談堪笑清涼多少衆前三三與後三三於此透脫許覿面文殊時波斯匿王此名勝軍為其父王諱日營齊請佛宮掖自迎如來廣設珍羞無上妙味兼復親延諸大菩薩城中復有長者居士同時飯僧佇佛來應佛敕文殊分領菩薩及阿羅漢應諸齊主唯有阿難此云慶喜先受別請遠遊未還不遑僧次既無上座及阿闍黎此軌範師途中獨歸其日無供即時阿難執持應器於所遊城次第循乞心中初求最後檀越此云施者以為齊主無問淨穢剎利此云王種尊姓及旃陀羅此云屠膾方行等慈不擇微賤發意圓成一切衆生無量功德阿難已知如來世尊訶須菩提及大迦葉此云飲光為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗經彼城隍徐步郭門嚴整威儀肅恭齊法通曰波斯匿王及長者居士同時飯僧何若是殷也以飯僧功德最利益故佛嘗為須達說布施果報謂多施少報少施多報供養百千諸佛不如供養一淨行乃至供養百千諸佛不如供養一無心道人又四十二章經云佛言飯惡人百不如飯一善人飯善人千不如飯一持五戒者飯持五戒者萬不如飯一須陀洹飯百萬須陀洹不如飯一斯陀含飯千萬斯陀含不如飯一阿那含飯一億阿那含不如飯一阿羅漢飯十億阿羅漢不如飯一辟支佛飯百億辟支佛不如飯一三世諸佛飯千億三世諸佛不如飯一無念無住無修無證之者大略相同有僧問洛浦供養百千諸佛不如供養一無心道人百千諸佛有何過無心道人有何德浦云一片白雲橫谷口幾多歸鳥盡迷巢丹霞頌云拾得疏慵非覺曉寒山懶惰不知歸聲前一句圓音美物外三山片月輝此單頌無心道人爾甘贄行者一日入南泉設齊黃檗為首座行者請施財檗曰財法二施等無差別甘曰恁麼道爭消得某甲䞋便將出去須臾復入曰請施財檗曰財法二施等無差別甘乃行䞋又一日入寺設粥仍請南泉念誦泉乃白槌曰請大衆為貍奴白牯念摩訶般若波羅蜜甘拂袖便出泉粥後問典座行者在甚處坐曰當時便去也泉便打破鍋子疏山如頌云特來設粥誇英俊那知王老更風流打破粥鍋呈醜拙貍奴白牯一齊收若贄者可謂能供養無心道人矣行乞有五種義一由內證平等理外不見貧富相故二離貪慢心偏利故三有大定力不懼惡象淫女家故四離凡夫猜嫌故五破二乘分別故淨名曰於食等者於法亦等無論貴賤淨穢俱證菩提是為圓成一切衆生無量功德須菩提捨貧從富大迦葉舍富從貧則慈不均平不為等慈阿難心中作如是念即落意識分別即屬鬼家活計所以魔得其便何似契此之行乞乎常以杖荷一布囊并破席凡供身之具盡貯囊中入鄽肆聚落見物則乞或醯醢魚𦵔才接入口分少許投囊中時號長汀子一日有僧在師前行乃拊其背僧回首師曰乞我一文錢僧曰道得即與汝一文錢師放下布袋叉手而立又一日在市立僧問和尚在這裏作甚麼師曰等箇人僧曰來也來也師曰汝不是這箇人僧曰如何是這箇人師曰乞我一文錢嘗有偈曰一鉢千家飯孤身萬里遊青目覩人少問路白雲頭若契此者可謂得諸佛儀式矣世尊一日敕阿難食時將至汝當入城持鉢阿難應諾世尊曰汝既持鉢須依過去七佛儀式阿難便問如何是過去七佛儀式世尊召阿難阿難應諾世尊曰持鉢去噫阿難若早了此何至有摩登之事爾時阿難因乞食次經歷淫室遭大幻術摩登伽女此云本性以娑毗迦羅此云黃髮外道先梵天呪攝入淫席淫躬撫摩將毀戒體如來知彼淫術所加齊畢旋歸王及大臣長者居士俱來隨佛願聞法要於時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結跏趺坐宣說神呪敕文殊師利將呪往護惡呪銷滅提獎阿難及摩登伽歸來佛所合論曰世尊愍衆生流轉三界皆由著欲於諸欲中惟淫為重故經首敘摩登伽女特言其故謂溺之為大患絶之為大利譬如牧羊鞭其後者故於機會處必痛致其意焉寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報即於女根生大猛火然後節節猛火燒然墮無間獄而烏芻瑟摩以聞佛說多淫之人成猛火聚以火光三昧成阿羅漢曰諸漏既消生大寶𦦨登無上覺夫無上覺佛地也而觀淫性則便能登之無間獄惡道也而從淫事則便生陷之又論十種習因則首敘淫習曰一者淫習交接發於相摩研摩不休如是故有大猛火光於中發動是故如來色目行淫同名欲火然後乃敘貪慢等又毗奈耶宣說修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學今斷殺盜淫妄而此經序淫於先又觀世音菩薩自敘三十二應身說法而梵天王以欲心明悟便與佛菩薩緣覺聲聞同名解脫自餘二十八種止名成就而已又以五種辛發淫增恚令立三漸次以斷之名第一增進又觀淫欲過猶毒蛇禁戒成就父母肉眼能觀十方是皆機會處痛致其意者也此論櫽括一經脈絡反覆叮嚀深明此經啓教必以斷淫為首務令人惕然毛骨為悚雖然證實智者視一切聲色如幻如夢又惡足以滑其中哉四十二章經云佛言愛欲之人猶如執火逆風而行必燒手也天神獻玉女於佛欲以試佛觀佛道意而定遐邇佛言革囊衆穢爾來何為去吾不用汝天神逾敬因問道意佛為解說即得須陀洹果又維摩經云舍利弗問天女汝何以不轉女身天曰我從十二年來求女人相了不可得當何所轉譬如幻師化作幻女若有人問何以不轉女身是人為正問否舍利弗言不也幻無定相當何所轉天曰一切諸佛亦復如是無有定相云何乃問不轉女身即時天女以神通力變舍利弗令如天女天自化身如舍利弗而問言何以不轉女身舍利弗以天女像而答言我今不知何轉而變為女身天曰舍利弗若能轉此女身則一切女人亦當能轉如舍利弗非女而現女身一切女人亦復如是雖現女身而非女也是故佛說一切諸法非男非女即時天女還攝神力舍利弗身還復如故天問舍利弗女身色相今何所在舍利弗言女身色相無在無不在天曰一切諸法亦復如是無在無不在夫天女神力能轉舍利弗先梵天呪不能毀阿難戒體是兩段經義可謂兩彩一賽阿難見佛頂禮悲泣恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨通曰此阿難發問乃一經之領袖自始至終世尊酬答無遺所云奢摩他此云至靜當空觀三摩鉢提此云變化力用當假觀禪那此云寂滅不取幻化及諸靜相當中觀圓覺經云寂靜奢摩他如鏡臨諸像如幻三摩提如苗漸增長禪那唯寂滅如彼器中鍠三種妙法門皆是覺隨順十方諸如來及諸大菩薩因此得成道三事圓證故名究竟涅槃阿難一向多聞於此素所修習焉者何待於問然今日為幻術所加則平昔所習觀行所修禪定俱不得力竊計十方如來必有妙於此者玩一妙字似倣佛窺見何藉劬勞肯綮修證之旨但不知最初方便何由悟入耳圓覺亦云唯除頓覺人并法不隨順原有一種頓門但以見性為宗故能見性則無心於止觀而止觀自具不能見性雖日從事於止觀而難敵魔境唯見性則得妙矣向後所云妙明真心妙莊嚴海妙明明妙不一而足皆以酬彼妙字之意而終之以偈曰是名妙蓮華金剛王寶覺如幻三摩提彈指超無學此阿毗達磨十方薄伽梵一路涅槃門此頓門也故非尋常止觀禪定所及昔雪峰三上投子九上洞山亦既多聞矣已嗣德山與巖頭至澧州鰲山鎮阻雪頭每日秪是打睡峰一向坐禪一日喚曰師兄師兄且起來頭曰作甚麼峰曰今生不著便共文邃箇漢行腳到處被他帶纍今日到此又秪管打睡頭喝曰噇眠去每日床上坐恰似七村裏土地他時後日魔魅人家男女去在峰自點胸曰我這裏未穩在不敢自謾頭曰我將謂你他日向孤峰頂上盤結草庵播揚大教猶作這箇語話峰曰我實未穩在頭曰你若實如此據你見處一一通來是處與你證明不是處與你剗却峰曰我初到鹽官見上堂舉色空義得箇入處頭曰此去三十年切忌舉著又見洞山偈曰切忌從他覓迢迢與我疏渠今正是我我今不是渠頭曰若與麼自救也未徹在峰又曰後問德山從上宗乘中事學人還有分也無德山打一棒曰道甚麼我當時如桶底脫相似頭喝曰你不聞道從門入者不是家珍峰曰他後如何即是頭曰他後若欲播揚大教一一從自己胸襟流出將來與我蓋天蓋地去峰於言下大悟便作禮起連聲呌曰師兄今日始是鰲山成道妙哉妙哉豈是一向坐禪得這般話頭來佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛阿難白佛我見如來三十二相勝妙殊絶形體映徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣粗濁腥臊交遘膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落通曰阿難賴有此思惟為初發心張本故遭幻術不甚眩惑雖入淫室不毀戒體但以三十二相觀如來不免色見聲求猶存邪解於佛真法身尚遙遠在隨州法為禪師上堂法身無相不可以音聲求妙道亡言豈可以文字會縱使超佛越祖猶落階梯直饒說妙談玄終挂脣齒須是功熏不犯影迹不留枯木寒巖更無津潤幻人木馬情識皆空方能垂手入鄽轉身異類不見道無漏國中留不住却來煙塢臥寒沙於此了了豈必勝淨妙明紫金光聚而後乃稱如來哉佛言善哉阿難汝等當知一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉通曰阿難殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便正欲識知常住真心性淨明體不入輪轉一段大事又云此相非是欲愛所生亦已備知欲愛腥臊雜亂妄想是無始以來生死根本故佛嘆曰善哉真心常住原無生滅瞥起妄想故入輪回無論欲愛粗濁惡業非真即緣覺聲聞執情未化亦皆是妄妄想淨盡性體瑩徹本自無生又何輪轉之有此一部經無非發明此意故知常住真心即謂見性見性則無事矣靈雲上堂云諸仁者所有長短盡在不常且觀四時草木葉落華開何況塵劫來天人七越地水火風成壞輪轉因果將盡三惡道苦毛髮不曾添減唯根蒂神識常存上根者遇善友伸明當處解脫便是道場中下癡愚不能覺照沉迷三界流轉生死釋尊為伊天上人間設教證明顯發至道汝等還會麼僧問如何得出離生老病死雲曰青山原不動浮雲任去來即此數語可為此段經文注腳添減一字不得汝今欲研無上菩提真發明性應當直心酬我所問十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無諸委曲相合論曰於此特言真發明性則亦有妄發明性乎曰有之曰何以辨之曰任運遍知本妙而常寂者真發明性所謂十方如來同一道故出離生死皆以直心是也違時失候妄覺而強知者妄發明性所謂用諸妄想此想不真故有輪轉是也本一體也以無性無時故隨所用之有異耳任運寂常而知則合本妙違時失候而覺則合妄塵馬鳴曰本性清淨無明不覺染心相現雖有染心性常明潔染心之相即現行無明明潔之性即不動智體有僧問雲菴雜華論稱現行無明即是如來不動智此實難信如何得解時有童子方掃地雲菴呼之童子回首雲菴曰非不動智乎又問如何是汝佛性童子左右視罔然而去雲菴曰非現行無明乎真發明性譬如明珠之光常自照珠孔子曰思無邪近之矣妄發明性譬如東方將旦澄滓之間已有精色易曰蒙雜而著近之矣阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂通曰此世尊循循第一誘也世尊豈不知見者屬眼愛者屬心然有見者有為之見者有愛者有為之愛者故問誰為見誰為愛要阿難當下識取本來人耳若能回光返照覓見了不可得一切愛樂原無根株頓入首楞嚴定豈不快哉後來衲僧家多用此機有僧問百丈如何是佛丈曰汝是阿誰曰某甲丈曰汝識某甲否曰分明箇丈乃舉起拂子曰汝還見否曰見丈乃不語僧所問者佛丈竟不語之佛只就他見處提撕即此一則渾然托得楞嚴樣子阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死佛告阿難如汝所說真所愛樂因於心目若不識知心目所在則不能得降伏塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎吾今問汝唯心與目今何所在通曰世尊問處單明向上一路曰將何所見曰誰為愛樂分明用標指月阿難答處未離常情只知合塵不知合覺背覺合塵伊誰之咎六賊為媒自劫家寶故阿難所謂心與目者唯根與識牽引塵勞流轉生死常住真心猶如國王日為所侵淨者日濁明者日暗是心與目乃性之賊也必窮其巢穴而蕩除之返流全一六用不行然後發本明耀六根互用父母所生肉眼洞見十方則又何流轉之為咎哉子湖樅禪師嘗夜大呌云有賊有賊其徒競起逐之樅把住一人曰拿住一箇了也其徒曰不是是某甲樅拓開曰是則是只是不肯承當故承當得去賊即是子不能承當子反成賊恁般說話却與國君討賊另是一番播弄具眼者別之阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面我今觀此浮根四塵秪在我面如是識心實居身內佛告阿難汝今現坐如來講堂觀祇陀林今何所在世尊此大重閣清淨講堂在給孤園今祇陀林實在堂外阿難汝今堂中先何所見世尊我在堂中先見如來次觀大衆如是外望方矚林園阿難汝矚林園因何有見世尊此大講堂戶牖開豁故我在堂得遠瞻見通曰十種異生如後列十二類生胎卵濕化有色無色有想無想若非有色若非無色若非有想若非無想除空散消沉土木金石二類非心眼倫故曰十種張無盡以六凡四聖當之非也浮根四塵六根皆然此但指眼根耳地水火風性本清淨而地水火風之相各皆搖動如塵六根成就藉此四塵六根沉於內四大浮於外故曰浮根四塵十種識心居內眼在於面不言可知如來眼在於面而不敢確指識心居內者如來已離識故法身圓滿無內外故阿難言固斟酌而譯語者亦自不苟世尊欲破心不在內必先以講堂林園戶牖為喻講堂喻身內林園喻外物戶牖喻六根而阿難其明了之人也若見阿難端的原不屬講堂不屬林園不屬戶牖而阿難去來自在無內外可指若執定此心惑為色身之內以臟腑為堂奧以六門為戶牖攬外境為林園非此無安身處一旦堂圮牖壞境謝見亡而所謂明了者將安在乎世尊雖就彼常情辨晣內外次第亦灼然示以色身如幻非所宜執如講堂戶牖與我了無干涉云爾智暉禪師臨別偈曰我有一間舍父母為修蓋往來八十年近來覺損壞早擬移別處事涉有憎愛待他摧毀時彼此無妨礙乃跏趺而逝此憎愛俱忘去來無礙將并其能見者而忘之矣又何內外之可言哉爾時世尊在大衆中舒金色臂摩阿難頂告示阿難及諸大衆有三摩提此資發變化定名大佛頂首嚴楞王具足萬行十方如來一門超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨通曰此一門超出分明指出頓悟路頭惟在轉識成智純以金剛乾慧乃可語真菩提路末云如是妙法先過去世恆沙劫中微塵如來乘此心開得無上道識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨琉璃內含寶月如是乃超十信十住十行十回向四加行心菩薩所行金剛十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得首尾呼應必以超出識陰為極則事世尊洞徹世間生死相續惟是妄想種種迷而不返識陰若盡則常住真心乃得現前性淨明體與佛無異故能破識陰即入頓門阿難雖聰慧多聞總不出識情分別識情未除者惟在有得而證菩提者惟在無得故下文七處徵心在阿難往往以有得自縛世尊一一以無得而蕩除之楞伽云得相是識不得相是智此真速證菩提之頓門也二祖神光斷臂於初祖達磨前乞與安心法門祖曰將心來與汝安光曰覓心了不可得祖曰與汝安心竟使阿難能信七處徵心俱不可得則金襴袈裟豈獨先付之迦葉哉佛告阿難如汝所言身在講堂戶牖開豁遠矚林園亦有衆生在此堂中不見如來見堂外者阿難答言世尊在堂不見如來能見林泉無有是處阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內身頗有衆生先見身中後觀外物縱不能見心肝脾胃爪生髮長筋轉脈搖誠合明了如何不知必不內知云何知外是故應知汝言覺了能知之心住在身內無有是處通曰目見心知不離根塵由內達外自是常見世尊乃即常見破之既不知內云何在內雖有智者不得不屈於其辨其實心肝脾胃莫非知也爪髮筋脈莫非覺也使非知覺豈不塊然一物而已哉傅大士偈曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處秪這語聲是由此言之謂覺了能知之心住在身內亦無有不是處雲門拈寶藏論云乾坤之內宇宙之間中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上作麼生自代云逐物意移又曰雲興雷動雪竇頌云看看古岸何人把釣竿雲冉冉水漫漫明月蘆華君自看此段公案謂覺了能知與本覺圓明容易誵訛如明月蘆華相似務須甄別若甄別得出不但燈籠露柱頓徹雲門心宗而身內之寶亦與僧肇契合非尋常弄精魂者所可藉口矣阿難稽首而白佛言我聞如來如是法音悟知我心實居身外所以者何譬如燈光燃於室中是燈必能先照室內從其室門後及庭際一切衆生不見身中獨見身外亦如燈光居在室外不能照室是義必明將無所惑同佛了義得無妄耶佛告阿難及諸比丘適來從我室羅筏城循乞摶食歸祇陀林我已宿齊汝觀比丘一人食時諸人飽不阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令衆飽佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知我今示汝兜羅綿手此云細香綿色如霜汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外是故應知汝言覺了能知之心住在身外無有是處通曰阿難見處未真不免隨語生解隨語生解正是識情所在世尊要與拔除識根故一一剗却令阿難無屯札處此真如國王討賊知賊之所在而討除之也阿難謂心居身外同佛了義不為無見夫心者潛天而天潛地而地或神遊八極或夢歷數世何嘗拘拘一軀殼中故云悟知我心實居身外又云是義必明將無所惑世尊設喻他食必非我飽以例外心何關我身軀命形也故食不能以相通知覺神也何內外之所能隔只為阿難執定在外如一物然者但能照外不能照內則身外是心身內非心心在身外身不能知如他人食我不能飽然眼之所見心能分別此心又何嘗不在內也故謂在外者非也昔曹山聞鐘聲乃曰阿㖿阿㖿僧問和尚作甚麼山曰打著我心僧無對五祖戒代云作賊人心虗又傅大士偈曰諸佛鄉村在世界四海山田遍滿生佛共衆生同一體衆生是佛之假名若要見佛看三郡田宅園林處處停或飛空虗中擾擾或擲山水口轟轟或結羣朋來往去或復孤單而獨行或使白日東西走或使暗夜巡五更或烏或赤而或白或紫或黑而黃青或大或小而新養或老或少舊時生或身腰上有燈火或羽翼上有琴箏或遊虗空亂上下或生草木亂縱橫或無言行自出宅或入土坑暫寄生或鑽木孔為鄉貫或編草木作窠城或轉羅網為村巷或臥土石作階廳諸佛菩薩盡如是這箇名為舍衛城於此契證謂覺了能知之心住在身外亦無有不是處阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟知在一處佛言處今何在阿難言此了知心既不知內而能見外如我思忖潛伏根裏猶如有人取琉璃碗合其兩眼雖有物合而不留礙彼根隨見隨即分別然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃佛告阿難汝心若同琉璃合者當見山河何不見眼若見眼者眼即同境不得成隨若不能見云何說言此了知心潛在根內如琉璃合是故應知汝言覺了能知之心潛伏根裏如琉璃合無有是處通曰八識規矩云愚者難分識與根蓋根識之難辨久矣若謂根非識則根自根識自識識應見根若謂根即識則彼死者眼根現存何以不見故知五根但白淨色照境而已識必明了分別二家種現熏習不同五根乃色法即第八識親相分具執受二義是白淨無記性五識乃心法即第八識見分三性皆具但能明了名性境屬現量故曰性境現量通三性至第六識方有分別屬比量非量此根與識之辨也阿難謂彼根隨見隨即分別者是也謂潛伏根裏如琉璃合者非也果如琉璃合者眼見山河亦見琉璃則心見山河亦應見眼今不見眼則非潛伏根內明矣此喻比度不真正屬非量據阿難所指覺了能知之心但六識分別耳此識從何而起以有七識為之傳送也以有八識為之含藏也縱令分別易泯而行陰難除縱令行陰易銷而種子難化今阿難於分別六識尚且不知落處況復知所謂七識八識哉落處且不知況能發兵而討除之哉此經始破六識窠白故有七處徵心終搗八識樞穴期於識陰都盡此轉識成智之大略也後文云雖得六銷猶未亡一及至一六俱銷了無所寄回視此段潛伏根裏如琉璃合不發一大噱哉雖然善喻者無所不可昔中邑洪禪師仰山往謝戒畢問如何是佛性義邑云我與你說箇譬喻如室有六窗中安一獼猴外有獼猴喚云猩猩獼猴即應如是六窗俱喚俱應仰山禮謝起曰適蒙和尚譬喻無不了知更有一事祗如內獼猴睡著外獼猴欲與相見又且如何邑下繩床執仰山手作舞曰猩猩與汝相見了譬如蟭螟蟲在蚊子眼睫上作窠向十字街頭呌云地曠人稀相逢者少雲居錫云中邑當時若不得仰山這一語何處有中邑也崇壽稠云還有人定得此道理麼若定不得只是箇弄精魂腳手佛性義在甚麼處玄覺云若不是仰山爭得見中邑且道甚麼處是仰山得見中邑處天童頌云凍眠雪屋歲摧頽窈窕蘿門夜不開寒稿園林看變態春風吹起律筒灰此頌分明讚嘆仰山睡處不墮於枯槁正是中邑與他相見處恰恰一六俱銷境界然園林變態如律筒灰自與精魂腳手敻異阿難白佛言世尊我今又作如是思惟是衆生身腑藏在中竅穴居外有藏則暗有竅則明今我對佛開眼見明名為見外閉眼見暗名為見內是義云何佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼若與眼對暗在眼前云何成內若成內者居暗室中無日月燈此暗室中皆汝焦腑若不對者云何成見若離外見內對所成合眼見暗名為身中開眼見明何不見面若不見面內對不成見面若成此了知心及與眼根乃在虗空何成在內若在虗空自非汝體即應如來今見汝面亦是汝身汝眼已知身合非覺必汝執言身眼兩覺應有二知即汝一身應成兩佛是故應知汝言見暗名見內者無有是處通曰阿難只疑滯不能見內一語生出許多轉計潛根既非毋乃見暗即是乎此見暗轉計更多阿難雖未明言世尊一一拈出破之始以所見之暗為對不對若對則成境矣不對則非見矣是暗固不可謂之內也既以能見之見但由返觀非假目視若開目返觀可以見暗則開眼返觀亦可見面面不可見暗豈能知是見必不能見內也若復以心識默對此為腑藏此為面目即可名見則此心眼不在虗空乎既以心眼本在虗空如魘寤者能見自己面目則如來之身亦即汝身乎既又以如來之見即我之見如來之身即我之身則阿難一身不成兩佛乎此從內對中翻出許多轉計內對必不可成則見暗必不可謂之見內也雖然能見者本自暗也而誰其見之雲門垂語云人人盡有光明在看時不見暗昏昏作麼生是諸人光明自代云廚庫三門又曰好事不如無雪竇頌云自照列孤明為君通一線華謝樹無影看時誰不見見不見倒騎牛兮入佛殿若解得倒騎牛入佛殿底道理即謂見暗名見內者亦無有不是處阿難言我常聞佛開示四衆由心生故種種法生由法生故種種心生我今思惟即思惟體實我心性隨所合處心則隨有亦非內外中間三處佛告阿難汝今既言由法生故種種心生隨所合處心隨有者是心無體則無所合若無有體而能合者則十九界因七塵合是義不然若有體者如汝以手自挃其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面阿難言見是其眼心知非眼為見非義佛言若眼能見汝在室中門能見不則諸已死尚有眼存應皆見物若見物者云何名死阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復遍體為不遍體若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在若挃有所則汝一體自不能成若多體者則成多人何體為汝若遍體者同前所挃若不遍者當汝觸頭亦觸其足頭有所覺足應無知今汝不然是故應知隨所合處心則隨有無有是處通曰觸頭頭知觸足足知豈不是隨所合處心則隨有然隨所合處心則隨有隨所不合處心則總無豈不是斷常邪見世尊姑無暇責此但就彼合之一字詳辨其非合必有體若無體者合義不成如無七塵即無十九界若有體者此體既非外來又非內出以心體論為一體乎為多體乎其在人身為遍體乎為不遍體乎借以手挃一支而覺隨挃有是覺為一體應咸在矣是覺為多體應多人矣是覺為遍體則挃無在矣是覺為不遍體則挃有所不知矣此四俱非即無定體何由與之合哉隨所合者合其一體乎合其多體乎合其遍體乎合其不遍體乎合彼則遺此合此則遺彼且非一非多非遍非不遍而卒不可合也既不能合何以見其隨有哉世尊雖以此辨其隨所合之非然亦明示以真心無體之妙無體則無合心境不相到當處解脫本自無生而何謂法生則種種心生乎心生種種法生與三界唯心之旨不殊故不必辨法生種種心生以心本無生因境有觀之亦自無病而阿難引以證隨所合處心則隨有是隨波逐浪之心而非對境數起之心也故悟心無體即數起不為礙緣起無生故也有僧問夾山撥塵見佛時如何山曰直須揮劍若不揮劍漁父棲巢僧舉問石霜撥塵見佛時如何霜云渠無國土何處逢渠僧回舉似夾山山上堂云門庭施設不如老僧入理深談猶較石霜百步天童頌云拂牛劍氣洗兵威定亂歸功更是誰一旦氛塵清四海垂衣皇化自無為丹霞頌云當機一句玉珊珊內外玲瓏溢目寒無漏國中留不住月華影裏見應難即此一則撥塵見佛尚自不逢況合塵而覓覺抑亦顛倒甚矣雖然一月普現一切水一切水月一月攝隨所合處何患無有阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不在內亦不在外如我思惟內無所見外不相知內無知故在內不成身心相知在外非義今相知故復內無見當在中間佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身若在身者在邊非中在中同內若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂阿難言我所說中非此二種如世尊言眼色為緣生於眼識眼有分別色塵無知識生其中則為心在佛言汝心若在根塵之中此之心體為復兼二為不兼二若兼二者物體雜亂物非體知成敵兩立云何為中兼二不成非知不知即無體性中何為相是故應知當在中間無有是處通曰阿難至此方明識生其中謂六識分別介乎根塵之間較前潛伏根裏之說尤為有據但指所謂中者既非在內又非在處唯以根境相交從中有分別之識乃指為心不知根塵識三相依而立如交蘆然原無自性今確定謂在中間若有定位然者為兼二乎為不兼二乎兼則一知一不知角立而不成中不兼則非知非不知無體而不成中然則中將安在故謂當在中間者非也若論真心亦兼二亦不兼二何謂兼二如來藏中原具見相二分如後舉性色真空性空真色何雜亂之有何謂不兼二靈光獨耀逈脫根塵如後舉塵既不緣根無所偶何嘗無體性哉若信得此心非知非不知原無自性亦無在中之相乃深明乎中者也東印土國王請二十七祖般若多羅齊次王乃問諸人盡轉經唯師為甚不轉祖曰貧道入息不居陰界出息不涉衆緣常轉如是經百千萬億卷非但一卷兩卷王便禮拜天童頌云雲犀玩月燦含輝木馬遊春駿不羈眉底一雙寒碧眼看經那到透牛皮明白心超曠劫英雄力破重圍妙圓樞口轉靈機寒山忘却來時路拾得相將擕手歸此祖師門風二邊不立中道不安虗玄大道無著真宗最為第一故非六識根塵所及若寒山拾得去來自在絶無纖毫識情挂胸次間足與二十七祖相見阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心則我無著名為心不佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無無則同於龜毛兔角云何不著有不著者不可名無無相則無非無則相相有則在云何無著是故應知一切無著名覺知心無有是處通曰阿難所引無著未嘗不是但多了一切二字是對境而言無著境在則無著在且謂俱無所在幾於斷滅語便矛盾若一切物象俱無者何處更容不著既有不著則物象不可謂之無也若無不著之相可言無在非無不著不著即是相也有不著之相在即是心在心實在於不著而何以謂之俱無所在乎心既有在而又何以謂之無著乎先即能以明所不可名無次即所以明能相有則在故無著之義不成昔嚴陽尊者問趙州一物不將來時如何州曰放下著嚴云一物不將來放下箇甚麼州曰恁麼則擔取去尊者言下大悟黃龍頌云一物不將來兩肩擔不起言下忽知非心中無限喜毒惡既忘懷蛇虎為知己寥寥千百年清風猶未已天童頌云不妨細行輪先手自覺心粗愧撞頭局破腰間柯斧爛洗清凡骨共仙遊此頌無著也無故得自在大都從境上見無著者離境則無無著從性上見無著者無著即是自性但存一無著之意便不可爾時阿難在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐所以多聞未得無漏不能折伏娑毗羅呪為彼所轉溺於淫舍當由不知真際所詣唯願世尊大慈哀愍開示我等奢摩他路此云寂靜令諸闡提此云信不具隳彌戾車此云惡見作是語已五體投地及諸大衆傾渴翹佇欽聞示誨通曰據此時阿難見地猶未能按伏識情至湛不搖處所以未得無漏始以覺了能知為有物矣故曰在內在外在根既知非物矣而猶以為有識也故曰隨合而有識生其中及知識俱泯而後信其無著然有意無著是亦著也故一切無著僅斷七識尚未至恬靜之地即至恬靜猶坐在八識窠窟中外道所謂冥諦也若奢摩他路是轉識成智邊事雖聖解不容注念矧凡情可得而牽引之乎故凡聖情盡體露真常方名真際所詣既知真際不為淫術所轉非但自證寂靜且令一切凡夫信不具者破除惡見也端師子讀楞嚴有頌云七處徵心心不遂懵懂阿難不瞥地直饒徵得見無心也是泥裏洗土塊可謂具眼者爾時世尊從其面門放種種光其光晃曜如百千日普佛世界六種震動如是十方微塵國土一時開現佛之威神令諸世界合成一界其世界中所有一切諸大菩薩皆住本國合掌承聽通曰放光動地舊以為不思議境界然亦可以意會養生家精神完固昏夜中目光炯炯無物不覩況世尊多劫成就其光有不晃曜者乎祈求家運動元氣可以興雲致雨況世尊清淨法身未可涯量普佛世界有不震動者乎世尊建大法幢必先有所表所云令諸世界合成一界隱然有會妄歸真之意若是上根利智見如是光覩如是事即獲本心證無生忍圓照禪師上堂云看看爍爍瑞光照大千界百億微塵國土百億大海水百億須彌山百億日月百億四天下乃至微塵剎土皆於光中一時發現諸仁者還見麼若也見得許汝親在瑞光若也不見莫道瑞光不照好參人人皆有此光何為圓照便見衆人便不見悟與不悟耳法性本周妄塵不隔智境本圓情量不礙若悟自心便知此等皆屋裏事佛告阿難一切衆生從無始來種種顛倒業種自然如惡叉聚果名一蒂三實無孤生者諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮砂欲成嘉饌縱經塵劫終不能得云何二種阿難一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸衆生遺此本明雖終日行而不自覺枉入諸趣通曰七處徵心皆指其非為其用攀緣心為自性也阿難亦知此心未得無漏不能折伏娑毗羅呪為彼所轉當由不知真際所詣亦隱隱窺見菩提涅槃元清淨體願佛開示故世尊明白分析而語之前云用諸妄想此想不真故有輪轉即此用攀緣心為自性者乃無始來生死之根本也前云皆由不知常住真心性淨明體即此菩提涅槃元清淨體乃無始來不生不滅之根本也輪轉生死惑業苦三生必同聚故如惡叉聚不但天魔外道決入輪回即聲聞緣覺錯亂修習總名顛倒何以故以生滅為因故若識精元明能生諸緣緣所遺者本自不生不滅也如後云元明照生所所立照性亡與此同旨此即妄想生起之由既落妄想遂遺本性遺此本明故入諸趣而不能成無上菩提也有客來謁長沙沙召尚書其人應諾沙曰不是尚書本命曰不可離却即今秪對別有第二主人沙曰喚尚書作至尊得麼曰恁麼總不秪對時莫是弟子主人否沙曰非但秪對與不秪對時無始劫來是箇生死根本有偈曰學道之人不識真秪為從來認識神無始劫來生死本癡人喚作本來人然則本來人何由而識雜華出現品云佛子無一衆生而不具有如來智慧但以妄想顛倒執著而不證得若離妄想一切智自然智無礙智則得現前天童頌云天蓋地載成團作塊周法界而無邊析鄰虗而無內及盡玄微誰分向背佛祖來償口業債問取南泉王老師人人只喫一莖菜既是人人具有底道理何故不能俱證菩提乃至別成聲聞緣覺等圓覺經云一切衆生妄見流轉厭流轉者妄見涅槃由此不能入清淨覺非覺違拒諸能入者有諸能入非覺入故然則識取不生不滅根本非大悟徹不可阿難汝今欲知奢摩他路願出生死今復問汝即時如來舉金色臂屈五輪指語阿難言汝今見不阿難言見佛言汝何所見阿難言我見如來舉臂屈指為光明拳曜我心目佛言汝將誰見阿難言我與大衆同將眼見佛告阿難汝今答我如來屈指為光明拳曜汝心目汝目可見以何為心當我拳曜阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心佛言咄阿難此非汝心阿難矍然避座合掌起立白佛此非我心當名何等佛告阿難此是前塵虗妄相想惑汝真性由汝無始至於今生認賊為子失汝元常故受輪轉通曰此世尊循循第二誘也汝今見否阿難言見但於此猛省便見識精元明不容擬議不容安排菩提涅槃充然自足才涉分疏即入比量即係六識用事黏湛發知去真性遠矣故佛咄之云此非汝心若於咄時忙然自失忽爾回光本覺自在何謂離此覺知更無所有此覺知者對前塵而有分別塵去則無故名虗妄著相之想若本覺者不依塵而有生滅故名真性然覺一而已矣為此覺知遮蔽本覺面目是覺知者實本覺之賊也若認覺知為自心者是認賊為子棄不生滅而守生滅其輪轉也何疑雖然離此覺知更覓別有本覺則又不可天童略舉云若能推底是汝心則認賊為子修山主云若能推底不是汝心則認子為賊天童拈云如今推也是子是賊買帽相頭食魚去骨即如天童還有揀擇否六祖曰凡夫即佛煩惱即菩提前念迷即凡夫後念悟即佛前念著境即煩惱後念離境即菩提此猶翻掌覆掌之說永嘉曰無明實性即佛性幻化空身即法身則洞徹乎不二之門矣阿難白佛言世尊我佛寵弟心愛佛故令我出家我心何獨供養如來乃至遍歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心若此發明不是心者我乃無心同諸土木離此覺知更無所有云何如來說此非心我實驚怖兼此大衆無不疑惑惟垂大悲開示未悟通曰阿難情竭見枯乃謂無心同諸土木此處正好承當去却省得許多心力奈何認定一箇覺知不肯放下昔大朗初參馬祖祖問汝來何求曰求佛知見祖曰佛無知見知見乃魔耳汝自何來曰南嶽來祖曰汝從南嶽來未識曹溪心要汝速歸彼不宜他往朗歸石頭便問如何是佛頭曰汝無佛性朗曰蠢動含靈又作麼生頭曰蠢動含靈却有佛性曰慧朗為甚麼却無頭曰為汝不肯承當朗於言下信入住後凡學者至皆曰去去汝無佛性其接機大約如此此豈離覺知更無所有者哉爾時世尊開示阿難及諸大衆欲令心入無生法忍於師子座摩阿難頂而告之言如來常說諸法所生唯心所現一切因果世界微塵因心成體阿難若諸世界一切所有其中乃至草葉縷結詰其根元咸有體性縱令虗空亦有名貌何況清淨妙淨明心性一切心而無自體若汝執吝分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性如汝今者承聽我法此則因聲而有分別縱滅一切見聞覺知內守幽間猶為法塵分別影事我非叱汝執為非心但汝於心微細揣摩若離前塵有分別性即汝真心若分別性離塵無體斯則前塵分別影事塵非常住若變滅時此心則同龜毛兔角則汝法身同於斷滅其誰修證無生法忍通曰諸法所生唯心所現如影像重重唯鏡所現六塵如形分別如影影因形有心因塵有斯則前塵分別影事動屬前塵靜屬法塵故內守幽閒雖無前塵影子却有幽間影子猶為法塵分別影事為其所執者識而非本覺常住真心也常住真心遠離一切分別如大圓鏡遠離動靜二塵此心本自無染故曰清淨染而不染故曰妙淨一切因果世界微塵因之而立乃九界妄心之本性也故曰性一切心若見此心即離分別而有自性是自性不隨分別而為有無者也如塵離影而有鏡體是鏡體不隨塵影而為生滅者也若執分別覺知為自性者但執影為鏡耳對塵則有離塵則無如鏡中之影原無自體終歸斷滅若是而可以證無生乎故知心自有體本非斷滅前咄云此非汝心為所認者虗妄斷滅心非本來真實心也豈真無心哉玄沙上堂云更有一般說昭昭靈靈靈臺智性能見能聞向五蘊身田裏作主宰恁麼為善知識大賺人知麼我今問汝若認昭昭靈靈是汝真實為甚麼瞌睡時又不成昭昭靈靈若瞌睡時不是為甚麼有昭昭時還會麼這箇喚做認賊作子是生死根本妄想緣氣汝欲識根由麼我向汝道昭昭靈靈秪因前塵色聲香等法而有分別便道此是昭昭靈靈若無前塵汝此昭昭靈靈同於龜毛兔角仁者真實在甚麼處汝今欲得出他五蘊身田主宰但識取汝祕密金剛體古人向汝道圓成正遍遍周沙界我今少分為汝智者可以譬喻得解汝還見南閻浮提日麼世間人所作興營養身活命種種心行莫非皆承日光成立秪如日體還有許多般心行麼還有不周遍處麼欲識金剛體亦須如是看秪如今山河大地十方國土色空明暗及汝身心莫非盡承汝圓成威光所現直是天人羣生類所作業次受生果報有情無情莫非盡承汝威光乃至諸佛成道成果接物利生莫非盡承汝威光秪如金剛體還有凡夫諸佛麼有汝心行麼不可道無便得當去也知麼玄沙因閲楞嚴發明心地由是應機敏捷與修多羅冥契即此一段縱口所說一一與經旨不殊至謂盡承威光之力與諸法所生惟心所現更覺精采又佛眼之嗣竹菴圭和尚與伯父持一居士俱喜楞嚴經菴曰若離前塵有分別性正是生死根本士駭曰佛妄說耶菴曰佛固不妄且約只今居士對面徵詰之心果安在士嘆曰佛說解第一空名師子吼汝行矣無滯此菴後上堂云見見之時見非是見見猶離見見不能及落華有意隨流水流水無情送落華諸可還者自然非汝不汝還者非汝而誰常恨春歸無覓處不知轉入此中來喝一喝云三十年後莫道能仁教壞人家兒女據竹菴見處即離前塵亦無分別自性可得自善轉楞嚴者正是見猶離見見不能及一段真風可與玄沙同參即時阿難與諸大衆默然自失佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實是故汝今雖得多聞不成聖果通曰九次第定如後舉四禪四空等天但言其果未及其修此謂修學人九次第定從一禪入一禪次第而修當如大般若所云離欲惡不善法有尋有伺離生喜樂入初靜慮具足住尋伺寂靜住內等淨心一趣性無尋無伺定生喜樂入第二靜慮具足住離喜住捨具念正知身受聖樂能說能捨具念樂住入第三靜慮具足住斷樂斷苦先喜憂沒不苦不樂捨念清淨入第四靜慮具足住超一切色想滅有對想不思惟種種想入無邊空空無邊處具足住超一切空入無邊識識無邊處具足住超一切識無邊入無所有具足住超無所有入非想非非想具足住超一切非想非非想處入滅想受具足住是為九次第定皆有為功用欣取有為善果故曰迷有漏天作無為解為其所執者入識中微細生滅妄想而修未能見無生真性當下寂滅是真無為法故未得漏盡若大阿羅漢已證滅受想定是名無漏今九次第定亦證滅受想定何為有漏以有妄想而證涅槃縱得滅盡定未為真實黃檗云一切衆生輪回不息生死者意緣走作心於六道不停致使受種種苦淨名云難化之人心如猿猴故以若干種法制禦其心然後調伏所以心生種種法生心滅種種法滅故知一切諸法皆由心造乃至人天六道地獄修羅皆由心造如今但學無心頓息諸緣莫生妄想分別無人無我無貪嗔無憎愛無勝負但除却如許多種妄想性自本來清淨即是修行菩提法佛等若不會此意縱你廣學勤苦修行木食草衣不識自心皆名邪行盡作天魔外道水陸諸神如此修行當復何益志公云本體是自心作那得文字中求如今但識自心息却思惟妄想塵勞自然不生淨名云唯置一床寢疾而臥心不起也如人臥疾攀緣都息妄想歇滅即是菩提如今若心裏紛粉不定任你學到三乘四果十地諸位合殺秪向凡聖中坐諸行盡歸無常勢力皆有盡期猶如箭射於空力盡還墜却歸生死輪回如斯修行不解佛意虗受辛苦豈非大錯志公云未逢出世明師枉服大乘法藥吁大乘法藥尚不濟事況九次第定乎故知錯亂修習難成聖果阿難聞已重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代失我本心雖身出家心不入道譬如窮子捨父逃逝今日乃知雖有多聞若不修行與不聞等如人說食終不能飽世尊我等今者二障所纏良由不知寂常心性唯願如來哀愍窮露發妙明心開我道眼通曰捨父逃逝法華亦有是喻窮露他方冀指衣珠浸浸乎有還家之望矣二障謂煩惱障所知障煩惱障障心心不解脫結業受報所知障障慧慧不解脫不了法空故阿難明知二障所纏又知所謂寂常心性何故道眼不開甚矣透脫之難也僧問藥山學人擬歸鄉時如何山曰汝父母遍身紅爛臥在荊棘林中汝歸何所曰恁麼則不歸去也山曰汝却須歸去汝若歸去我示汝箇休糧方子曰便請山曰二時上堂不得咬破一粒米後僧問洛浦學人擬歸鄉時如何浦曰家破人亡子歸何處僧云恁麼則不歸去也浦曰庭前殘雪日輪消室內紅塵遣誰掃又偈云決志歸鄉去乘船渡五湖舉篙星月隱停棹日輪孤解纜離邪岸張帆出正途到來家蕩盡免作室中愚丹霞頌云太平鄉國路空賖歸興悠悠思莫涯撒手到家何所有琉璃寶殿瑣蟾華諸老宿一期指出歸家方便可謂道眼開明真知寂常心性者即時如來從胸卍字涌出寶光其光晃昱有百千色十方微塵普佛世界一時周遍遍灌十方所有寶剎諸如來頂旋至阿難及諸大衆告阿難言吾今為汝建大法幢亦令十方一切衆生獲妙微密性淨明心得清淨眼通曰前從面門放光十方國土一時開現令諸世界合成一界表真妄不二也開示二種根本必以斷妄為先妄想不息雖至九次第定不成聖果其面目可考而鏡也今從胸卍字放光灌諸如來頂旋至阿難大衆表聖凡不二也開示前塵自暗見何虧損乃至頭自動搖見無所動手自開合見無舒卷指出向上一路人人具足可以印心云爾昔仰山坐次有僧來作禮山不顧其僧乃問山識字否山曰隨分僧乃右旋一匝曰是甚麼字山於地上書十字酬之僧又左旋一匝曰是甚麼字山改十字作卍字僧畫此相以兩手拓如修羅掌日月勢曰是甚麼字山乃畫此相對之僧乃作婁至德勢山曰如是如是此是諸佛之所護念汝亦如是吾亦如是善自護持其僧禮謝騰空而去時有一道者見經五日後問山山曰汝還見否道者曰某甲見出門騰空而去山曰此是西天羅漢故來探吾道道者曰某雖覩種種三昧不辨其理山曰吾以義為汝解釋此是八種三昧是覺海變為義海體則同然此義合有因有果即時異時總別不離隱身三昧也若知仰山覺海變為義海三昧則佛胸卍字涌出寶光亦不思議中妙用耳必以護妙微密性淨明心為本溈山嘗問仰山妙淨明心汝作麼生會仰曰山河大地日月星辰溈曰汝祗得其事仰曰和尚適來問甚麼溈曰妙淨明心仰曰喚作事得麼溈曰如是如是只緣仰山會得妙淨明心得清淨眼故識字三昧逈出尋常阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見通曰此世尊循循第三誘也可謂老婆心切前云汝將誰見阿難答言同將眼見業已咄之認賊為子至此又問汝將誰見正欲阿難回光返照忽覩見精明元不藉於眼奈之何其終不省也有僧侍立玄沙次沙以杖指面前地上白點曰還見麼曰見如是三問僧亦如是三答沙曰你也見我也見為甚麼道不會他日又以杖拄地問長生曰僧見俗見男見女見汝作麼生見對曰和尚還見皎然見處麼沙曰相識滿天下賴有皎然此對遂與玄沙覿面向使阿難能自知見處非見所及又何勞世尊許多口吻阿難言由佛全體閻浮檀金樹名果汁入水砂石成金赩如寶山清淨所生故有光明我實眼觀五輪指端屈握示人故有拳相佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不阿難言唯然世尊既無我眼不成我見以我眼根例如來拳事義相類佛告阿難汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試於途詢問盲人汝何所見彼諸盲人必來答汝我今眼前唯見黑暗更無他矚以是義觀前塵自暗見何虧損通曰世尊何故以盲人為喻緣阿難執定以見為見不離根塵而識生其中盲人無眼云何亦睹黑暗是可知待眼根而見者乃前塵分別之見而非清淨本然之見也前塵分別屬第六識眼存則存眼亡則亡必待根而後顯者也清淨心光不待根而存不隨根而泯者故無生滅是無生滅清淨本然之見人人具足不以盲人故無阿難執定唯眼見者是生滅根而世尊所指見何虧損是不生不滅根也如此提醒可謂透露極矣昔相國崔公羣見如會禪師問曰師以何得會曰以見性得會方病眼崔譏曰既云見性其奈眼何會曰見性非眼眼病何害崔稽首謝之後法眼別云是相公眼豈以會所答猶涉教意乎哉阿難言諸盲眼前唯覩黑暗云何成見佛告阿難諸盲無眼唯覩黑暗與有眼人處於暗室二黑有別為無有別如是世尊此暗中人與彼羣盲二黑較量曾無有異阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見若燈見者燈能有見自不名燈又則燈觀何關汝事是故當知燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼通曰此世尊剖析分明所謂實言告汝者也燈之與眼俱是見緣體非能見其能見者心也前云門能見不已具此義而此復以燈喻眼以眼例心燈不可謂之見眼顧可謂之見乎眼其見者非見性也若六根互用耳亦能觀眼又何嘗決定是見阿難所云我實眼觀分明執妄為真若知燈但顯色能見屬眼既離所妄又知眼但顯色見性屬心并離能妄能所俱離唯此一心心超乎眼故無生滅以不生滅之見見如來手未嘗不見但不可謂之眼見也昔枯木祖元禪師依大慧於雲門菴夜坐次覩僧剔燈始徹證有偈曰剔起燈來是火歷劫無明照破歸堂撞見聖僧幾乎當面蹉過不蹉過是甚麼十五年前奇特依前秪是這箇慧以偈贈之曰萬仞崖頭解放身起來依舊却惺惺飢餐渴飲渾無事那論昔人非昔人夫剔燈何與本分事乃即悟去如世尊云如是見者是眼非燈如是見性是心非眼故祖元曰剔起燈來是火如隔牆見角知必是牛須如此徹證方名見性阿難雖復得聞是言與諸大衆口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大衆我初成道於鹿園中為阿若多此云解義五比丘等及汝四衆言一切衆生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟得成聖果通曰世尊實言指示傷於明白阿難大衆尚未開悟機緣未易凑泊故也世尊慈悲之故猶恐語涉微妙故未易解然諸比丘中亦有得解者以解引解其解易入故令諸比丘各述開悟之由使阿難易於凑泊云爾其後二十五圓通各述所證亦用此機但此唯明妄後乃證真不無淺深之異其為方便接引則一而已矣所謂不成菩提皆由客塵煩惱所誤正是二種根本消息悟亦不易僧問南陽忠國師阿那箇是佛師曰即心是佛曰心有煩惱否師曰煩惱性自離曰豈不斷耶師曰斷煩惱者即名二乘煩惱不生名大涅槃曰坐禪看靜此復若為師曰不垢不淨寧用起心而看靜相又上生經云不修禪定不斷煩惱佛記此人成佛無疑陳秀玉學士嘗問萬松云彌勒菩薩為甚麼不修禪定不斷煩惱松曰真心本靜故不修禪定妄想本空故不斷煩惱士復問香山大潤和尚山曰禪心已定不須更修斷盡煩惱不須更斷復問竹林海巨川川曰本無禪定煩惱士曰唯此為快耳於此信得及方知鹿園開示秪為初機時憍陳那此云火器起立白佛我今長老於大衆中獨得解名因悟客塵二字成果世尊譬如行客投寄旅亭或宿或食宿食事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義佛言如是通曰客喻所知之粗塵喻煩惱之細念念遷流生滅不停故譬行客投寄旅亭起惑造業捨舊趨新故譬食宿事畢俶裝前途真性常住初無是事故譬主人無攸往也粗障易遣細惑難明必由性天澄霽智日舒光乘五陰隙照本性空方覺於中妄自擾動故譬新霽暘光入隙以發明空中塵相也煩惱擾動真性寂然若悟本空常住不動即知寂常心性矣趙州云汝等一從見老僧後更不是別人秪是箇主人公這箇更向外覓作麼正恁麼時莫轉頭換腦若轉頭換腦即失却也又一日掃地次僧問和尚是大善知識為甚麼掃地州曰塵從外來僧曰既是清淨伽藍為甚麼有塵州曰又一點也趙州眼光爍破四天下辨客塵義析入秋毫若於此鑒別得出真是有主沙彌居塵不染豈但獨得解名即時如來於大衆中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌衆中開合佛告阿難汝見我手衆中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手衆中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住佛言如是通曰憍陳那因悟客塵二字但明得煩惱邊事世尊則直指菩提而示之先即外境以辨真性境有開合見無動靜此人所易知者世尊因其易知者而引之阿難果信手有開合見無開合而我見性尚無有靜誰為無住覓動靜之相了不可得庶幾哉見常住主人矣非世尊提醒之妙何以有此昔西堂問百丈你向後作麼生開示於人丈以手卷舒兩過堂云更作麼生丈以手指點頭三下且道百丈如此作用為合楞嚴機鋒為更別有道理又俱胝和尚初住菴時有一尼名實際到菴直入更不下笠持錫繞禪床三匝云道得即下笠如是三問俱胝無對尼便去俱胝曰天色將晚且留一宿尼云道得即宿胝又無對尼便行胝嘆曰我雖處丈夫之形而無丈夫之氣遂發憤要明此事擬棄菴往諸方參請其夜山神告曰不須離此來日有肉身菩薩至為和尚說法次日天龍到菴胝乃迎禮具陳前事天龍只豎一指而示之俱胝忽然大悟後來凡有所問只豎一指至遷化謂衆曰吾得天龍一指頭禪平生用不盡要會麼豎起指頭便脫去天童頌云俱胝老子指頭禪二十年來用不殘信有道人方外術了無俗物眼前看所得甚簡施設彌寬大千剎海飲毫端麟龍無限落誰手珍重任公把釣竿雪竇頌云對揚深愛老俱胝宇宙空來更有誰曾向滄溟下浮木夜濤相共接盲龜法華經云如一眼之龜直浮木孔無沒溺之患自世尊輪指以來無非開示佛之知見令人得箇安穩處何者不為盲龜計哉如來於是從輪掌中飛一寶光在阿難右即時阿難回首右盼又放一光在阿難左阿難又則回首左盼佛告阿難汝頭今日何因搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盼佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動佛言如是通曰此即內身以辨真性頭自搖動見無所動較前手自開合見無所動更為微密在一人之身見動則頭動何得謂頭自動而見不動彼隨頭而左右者情見也不隨頭而動靜者真見也情見屬識故有起滅真見屬性原無作止何以驗之頭有動靜可見見無動靜可指故知無動靜可指者是名真見阿難向者執識為心但知情見為見今蒙如來方便開示智光暫現乃信頭自搖動見無所動此不動見性動如是靜如是見時不為有不見不為無尚無有止誰為動搖是真離塵空寂體也阿難於是乎知性矣既云知性何為尚有種種多疑蓋阿難因佛始焉輪指既乃放光以手開合例頭動搖彼見無動此見亦然所謂推測之知而非獨悟之妙也從門入者不是家珍於茲益信無業禪師初見馬祖問曰三乘文學粗窮其旨嘗聞禪門即心是佛實未能了祖曰祗未了底心即是更無別物業曰如何是祖師西來密傳心印祖曰大德正閙在且去別時來業才出祖召曰大德業回首祖曰是甚麼業便領悟乃禮拜祖曰這鈍漢禮拜作麼又五泄靈默禪師遠謁石頭便問一言相契即住不契即去石頭據坐泄便行頭隨後召云闍黎泄回首頭曰從生至死秪是這箇回頭轉腦作麼泄於言下大悟乃抅折拄杖而棲止焉且道無業五泄回頭轉腦便爾悟去較阿難多少於是如來普告大衆若復衆生以搖動者名之為塵以不住者名之為客汝觀阿難頭自搖動見無所動又汝觀我手自開合見無舒卷云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪回是中自取流轉通曰佛手不住見性常住是真主人頭自搖動見性不動是真空體今不認主而認客不認空而認塵豈不顛倒行事良由念念生滅煩惱相續以致遺失真性不成菩提客塵所誤一至於此圓覺經曰妄認四大為自身相六塵緣影為自心相正所謂以動為身以動為境認物為己者也既認逐境妄動者以為自心而不動真心即迷在遷流之內故曰遺失非謂遺失而不存也如水已成氷水性遂失前云能生諸緣緣所遺者遺此本明雖終日行而不自覺抂入諸趣如是何由出離生死乎故曰輪回是中自取流轉向謂一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉正謂此也昔洞山問僧名甚麼對曰某甲山曰阿那箇是闍黎主人公對曰見祗對次山曰苦哉苦哉今時人例皆如此秪認得驢前馬後底將為自己佛法平沉因斯是也賓中主尚未分如何辨得主中主僧便問如何是主中主山曰闍黎自道取對曰某甲道得即是賓中主如何是主中主山曰恁麼道即易相續也大難遂示頌曰嗟見今時學道流千千萬萬認門頭恰似入京朝聖主秪到潼關便即休由是觀之識情分別較不動見精尚隔幾程而不動見精較寂常真性猶自有辨如下文云見猶離見見不能及則幾乎越潼關而見聖主矣
