body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第九阿難世間一切所修心人不假禪那無有智慧但能執身不行淫欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶如是一類名梵衆天欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德如是一類名梵輔天身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵衆為大梵王如是一類名大梵天阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天光光相然照耀無盡映十方界遍成琉璃如是一類名無量光天吸持圓光成就教體發化清淨應用無盡如是一類名光音天阿難此三勝流一切憂懸所不能逼雖非正修真三摩地清淨心中粗漏已伏名為二禪阿難如是天人圓光成音披音露妙發成精行通寂滅樂如是一類名少淨天淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名遍淨天阿難此三勝流具大隨順身心安隱得無量樂雖非正得真三摩地安隱心中歡喜畢具名為三禪阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨粗重相滅淨福性生如是一類名福生天捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天阿難從是天中有二歧路若於先心無量淨光福德圓明修證而住如是一類名廣果天若於先心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發明不生滅性初半劫滅後半劫生如是一類名無想天阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪通曰前六欲天形雖出動已離人仙二趣心迹尚交欲念未至全無不可語於梵也若修梵行者但知持戒修十善道不知禪那無有智慧故於諸禁戒唯淫難斷茲力能斷淫無留欲界是為梵衆心既離欲戒為真戒於諸律儀愛樂隨順是為梵輔清淨禁戒加以明悟謂悟欲即是性戒無所戒是名大梵戒定相應得定其戒已離欲界八苦苦惱粗相所不能逼名離生喜樂地總屬初禪自此以上無有言語但以定心發光光有勝劣分其高下少光其光尚劣迭發多光則光無量猶未至成音也至成就教體令人觀光知修梵德隨機受益應用無盡則圓光成音矣此定生時與喜俱發名喜俱禪微細憂懸所不能逼名定生喜樂地總屬二禪自此以上離前喜動而生淨樂是樂非境乃出乎淨性興寂滅為樂相似始而曰通其淨猶劣既而曰成則身心輕安協乎妙性猶未至於遍也唯世界身心一切圓淨此勝託現前託於勝境非真寂滅現前也但隨順淨性歸寂滅樂此定功德與遍身樂俱發名樂俱禪雖離前喜動而歡樂畢具名離喜妙樂地總屬三禪喜動乃逼苦之因離喜則苦因已盡而得無量樂是樂有為所致樂久必壞壞亦成苦故苦樂俱捨則粗重相滅捨念清淨則淨福性生淨德致福三災不及是名福生苦樂二忘捨無所捨但愛樂隨順無遮福性是名福愛均名捨俱禪從是有二歧路若於先無量光無量淨福德圓明不帶異執無生滅心則直趨廣果謂淨福廣大所感果也若先心雙厭苦樂專研捨心先捨粗心入於微心復捨微心入微微心從微微心相續無間以至心想一切皆捨心慮灰凝此妄想相也是名無想定乃從迂僻生無想天是人不了妄性體空即妄即真厭此生滅求不生滅以至身心俱滅非真不生滅性也如來氷魚耳初生此天未全無想經半劫始無及報將習後半劫有想而心相見故曰初半劫滅後半劫生中間四百九十九劫一向無想乃定力所持一切苦樂所不能動總為四禪在初禪二禪曰非正修真三摩地在三禪曰非正得真三摩地至四禪則曰非無為真不動地初禪修戒二禪修定從清淨梵行中修雖不至為鬼神邪定然非從真三摩地發心此有為無為所由辨也三禪有所得矣得之而樂矣有得有樂即非真三摩地此有得無得所由分也至四禪有所得心幾於捨盡可以謂之無為矣然由功用純熟所致非真不動地也若真不動地衆苦所不到到且不能而孰其動之今以世間諸苦樂境所不能動便以為三摩地是三摩地可修而至也可修而至者非真三摩地也故真三摩地非具般若智慧莫能知之今四禪修心不假禪那無有智慧於真三摩地有所不知也真淨和尚示衆云是日已過命亦隨滅如少水魚斯亦何樂唯二乘禪定寂滅為樂是為真樂學般若菩薩法喜禪悅為樂是為真樂三世諸佛慈悲喜捨四無量心為樂是為真樂石霜普會云休去歇去冷湫湫地去是為二乘寂滅之樂雲門云一切智通無障礙拈起扇子云釋迦老子來也是為法喜禪悅之樂德山棒臨濟喝是三世諸佛慈悲喜捨之樂除此三種樂外不為樂也且道歸宗一衆在三種內三種外良久云今日莊主設饡飯俵䞋錢參退僧堂內普請喫茶去喝一喝又鵝湖大義禪師憲宗詔入內殿論義有法師問欲界無禪禪居色界此土憑何而立義曰法師祗知欲界無禪不知禪界無欲曰如何是禪義以手點空法師無對帝曰法師講無窮經論祗這一點尚不奈何故真三摩地誠不易知知之而三界俱超何論四禪哉阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙亡下無卜居故於捨心衆同分中安立居處阿難苦樂兩滅鬬心不交如是一類名無煩天機括獨行研交無地如是一類名無熱天十方世界妙見圓澄更無塵象一切沉垢如是一類名善見天精見現前陶鑄無礙如是一類名善現天究竟羣幾窮色性性入無邊際如是一類名色究竟天阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見阿難是十八天獨行無交未盡形纍自此已還名為色界通曰五不還者不復於欲界受生即斯陀含名為不來而實無不來者也三果能斷九品習氣種子與現行俱滅於欲界無受生業故曰下無卜居此五天即四禪捨念清淨更入微細立名耳前於苦樂有捨有厭則心與境鬬不能無煩盛熱則謂之煩今苦樂兩滅無與鬬者故名無煩心雖不交交地猶在未為拔根也今心機無對能滅緣影併生煩之熱而無之矣故名無熱此無煩無熱但除外粗未顯淨妙今妙見圓澄外不依塵象生內不依沉垢生照十方世界如淨琉璃是名善見精見在我能陶鑄妙色而無礙十方世界從我發化是名善現幾者動之微也一微空故衆微空衆微空故一微空於此窮色性性色性空空性覺覺則所謂色性性也空生大覺中如海一漚發不獨究竟色性而且究竟性之所自來色於究竟盡矣楞伽云住色究竟天離諸過失處於彼成正覺有味哉其言之也所謂正覺者不住於色不住於空唯色究竟天前此之色既盡後此之空未來於此可證無上正等正覺也彌勒曰色界十八處初禪三天由䎡中上品熏修初靜慮故二禪三天由䎡中上品熏修第二靜慮故三禪三天由䎡中上品熏修第三靜慮故四禪四天由䎡中上品熏修第四靜慮故復有諸聖住心不共五淨居地由䎡中上上極品熏修第四靜慮故此不還天何為四禪以下不能知見下天修有漏凡定此天修無漏聖業聖凡之隔故不能見雲居膺結菴於三峰經旬不赴堂洞山問子近日何不赴齊膺曰每日自有天神送食山曰我將謂汝是箇人猶作這箇見解在汝晚間來膺晚至山召膺闍黎膺應諾山曰不思善不思惡是甚麼膺回菴寂然宴坐天神自此竟尋覓不見如是三日乃絶又神僧法本嘗至襄州禪院與一僧同過夏本嘗言曰貧道於相州西山中住持竹林寺寺前有一石柱他日有暇必請相訪其僧追念此言因往彼尋覓至山下村中寄宿問其村僧曰此去竹林寺近遠僧乃遙指孤峯之側曰彼處是也古老相傳昔聖賢所居之地今但名存耳僧疑之詰朝往至竹叢中果有石柱當法本臨別云但扣其柱即見其人乃以小枝擊柱數聲忽風雲四起咫尺莫窺俄然耳目豁開樓臺對聳身在三門之下逡巡法本自內而出見之甚喜問南中舊事乃引其僧度重門升祕殿參其尊宿尊宿問其故本曰早年襄州同過夏期此相訪尊宿曰可飯後請出在此無座位食畢本送至三門相別既而天地昏暗莫知所進此身宛在石柱之側然則聖道場地皆阿羅漢所住持故非世人所可窺測又何疑於五不還天哉雖不可見猶有色質故總名色界復次阿難從是有頂色邊際中其間復有二種歧路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為回心大阿羅漢若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處諸礙既銷無礙無滅其中唯留阿賴耶識全於末那半分微細如是一類名為識處空色既亡識心都滅十方寂然迥無攸往如是一類名無所有處識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名為非想非非想處此等窮空不盡空理從不還天聖道窮者如是一類名不回心鈍阿羅漢若從無想諸外道天窮空不歸迷漏無聞便入輪轉阿難是諸天上各各天人則是凡夫業果酬答答盡入輪彼之天王即是菩薩遊三摩提漸次增進回向聖倫所修行路阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沉溺補特伽羅此云數取趣各從其類通曰四無色天定性聲聞所居若回心者回智向悲濟生利物不住小果入菩薩乘名大阿羅漢其鈍根者不能發明智慧復由定心欣上厭下厭色依空入空無邊處身礙既銷不依於色矣無礙之無亦滅又空無所空矣身根六識俱已泯絶唯留八識全分七識半分耳末那七識原無定位外緣色空則依六識名粗內緣八識但內執無外緣名細此厭空依識名識無邊處進之識心全半都滅非真能滅也但以識心湛不搖處迥無攸往便以為本無所有真性本來無一物而此識心都滅亦略相似然此以生滅為因地心生滅之心未滅如急流水望如恬靜故不可語於真性無所有處也識心既滅識性不動又復窮研使不動者亦滅夫不動周圓本如來藏妙真如性本自不生本自無盡強於無盡中發宣盡性其所謂盡者亦依識滅之而見其盡耳而性何嘗盡也故於識性不動以為存則非無想而心慮灰凝又似不存則非想也以為盡則非想而細微流注不息又似非盡則非非想也此非想非非想半依不生不滅半依生滅正是識陰區宇為識所覆但於念想間揣摩非真能見性者也生此天者八萬劫無想劫滿則復有想此等窮空不盡真空妙理不悟空生於大覺故也雖從五不還天聖道而窮不明真性性覺真空性空真覺之旨不入菩薩乘終名不回心鈍阿羅漢此根雖鈍尚有回心之期豈若外道從無想天迷有為漏自謂無漏報盡便入輪轉哉即四空天不免輪轉而欲界色界俱是業果酬答答盡入輪又何疑也唯諸天王乃是諸地菩薩分身應化遊戲於三摩提之外權示漸次回向聖倫亦漸增漸進修行之路也是四空天身心滅盡定性現前雖無業果色猶有定果色存從此逮終並定果色而無之非了悟妙覺明心超出三界不足以語此不能了此不超三界妄隨七趣展轉沉溺皆由積妄所致欲界妄見欲色界妄見淨無色界妄見空妄有三界各耽其趣補特伽羅能取當來諸趣即中有也涅槃云中有五陰非肉眼所見天眼所見妄從其類故逐輪轉總之識神未化乃至於此若能轉識成智自無此纍昔地藏問修山主甚處來修云南方來藏云南方近日佛法如何修云商量浩浩地藏云爭如我這裡種田博飯喫修云爭奈三界何藏云你喚甚麼作三界天童頌云宗設般般盡強為流傳口耳便支離種田博飯家常事不是飽參人不知參飽明知無所求子房終不貴封侯忘機歸去同魚鳥濯足滄浪煙水秋又翠巖真示衆云不見一法是大過患山河大地日月星辰色空明暗不是一法拈起拄杖云凡夫見拄杖喚作拄杖聲聞人見拄杖認得頑空撥無拄杖菩薩人見拄杖幾曾挂著齒牙飢來喫飯困來打睡寒來向火熱則取涼不見道一切智智清淨恁麼說話笑破土地鼻孔此正與種田博飯喫一般清味是超出三界底樣子復次阿難是三界中復有四種阿修羅類若於鬼道以護法力乘通入空此阿修羅從卵而生鬼趣所攝若於天中降德貶墜其所卜居鄰於日月此阿修羅從胎而出人趣所攝有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝阿難別有一分下劣修羅生大海心沉水穴口旦遊虗空暮歸水宿此阿修羅因濕氣有畜生趣攝通曰阿修羅福力等天而無天行故云非天十地經曰阿修羅有五類一極弱者住人間山林西方山大深窟有非天之宮二妙高山北大海之下二萬一千由旬有羅睺之宮手能掩日月者也三又下二萬一千由旬有勇健之宮此嗔不飲酒者也四又下二萬一千由旬有華鬘之宮此女極美而男惡者也五又下二萬一千由旬有毗摩質多羅之宮此云淨心能波海出聲帝釋之姻家也長阿含云修羅一日一夜三次受苦苦具自來入其宮中是知此趣一分善報謂之人天若論受苦實在人趣之下故正法念經唯以鬼畜二種收之此經以胎卵濕化及天人鬼畜四種曲盡修羅之情狀大略與十地經符青林虔禪師上堂祖師門下鳥道玄微功窮皆轉不窮難明汝等諸人直須離心意識參出凡聖路學方可保任若不如是非吾子息僧問久負不逢時如何曰古皇尺一寸問請師答話曰修羅掌於日月又僧問佛海禪師即心即佛時如何曰頂分丫角曰非心非佛時如何曰耳墜金環曰不是心不是佛不是物又作麼生師曰禿頂修羅舞柘枝恁般說話非出凡聖路學離心意識參固莫測其涯涘阿難如是地獄餓鬼畜生人及神仙天洎修羅精研七趣皆是昏沉諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華元無所著但一虗妄更無根緒阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨順殺盜淫故反此三種又則出生無殺盜淫有名鬼倫無名天趣有無相傾起輪回性若得妙發三摩提者則妙常寂有無二無無二亦滅尚無不殺不偷不淫云何更隨殺盜淫事阿難不斷三業各各有私因各各私衆私同分非無定處自妄發生生妄無因無可尋究汝勗修行欲得菩提要除三惑不盡三惑縱得神通皆是世間有為功用習氣不滅落於魔道雖欲除妄倍加虗僞如來說為可哀憐者汝妄自造非菩提咎作是說者名為正說若他說者即魔王說通曰前阿難問妙心遍圓云何復有地獄餓鬼畜生修羅人天等道為有定處為復自然彼彼發業各各私受為復本來自有為是衆生妄習生起故此總答七趣昏沉皆有為相於妙圓明無作本心元無所有如空中華於太虗空有何干涉非本來自有也但由妄想受生妄想隨業所謂妄習生起者是也既有妄習即有妄果彼彼發業各各私受則非無定處也自妄發生惑為妄因妄為業因非為自然也生妄無因無可尋究本自常寂也由殺盜淫三為根本隨順殺盜淫業是妄見有有必淪墮四惡趣而鬼倫其最下者也不隨順三者而力反之是妄見無無必出生三善趣而天趣其最上者也善惡雖殊途而有無相傾故三界輪回無有休息皆人為所致非菩提咎若得妙發三摩提者識自本心得其真淨謂之曰妙不離三界頓超三界彼於寂常正定之中無有無二相可得已除俗諦之妄無二之無亦滅復除涅槃之真根本無明銷鎔淨盡惑從何起妄從何生尚無於善況隨於惡此猶眼本無翳而空華無自有也三惑諸經多指見思惑塵沙惑無明惑見思亦名通惑三乘共斷故也塵沙名別惑菩薩所斷無明乃業識之種子唯大乘菩薩方斷此惑不除揑目雖欲除華倍加虗僞縱得神通亦落魔道魔道不除殺盜淫而修邪定者也故欲得無上菩提者應除三惑蕩滌習氣三惑既無安有三界若不知此說者謂菩提本空安事除惑即魔說也有一俗士問西堂藏禪師云有天堂地獄否藏云有云有佛法僧寶否藏云有更有多問盡答言有士云和尚恁麼道莫錯否藏云汝曾見尊宿來耶云某甲曾參徑山和尚來藏云徑山向汝作麼生道云他道一切總無藏云汝有妻否云有藏云徑山和尚有妻否云無藏云徑山和尚道無即得此於尋常語中指出頓超三界消息妙矣又僧問洞山詮禪師清淨行者不上天堂破戒比丘不入地獄時如何詮曰度盡無遺影還他越涅槃丹霞頌云相好巍巍大丈夫一生無智恰如愚從來佛祖猶難望地獄天堂豈可拘此可為妙發三摩提者證明即時如來將罷法座於師子牀攬七寶几回紫金山再來憑倚普告大衆及阿難言汝等有學緣覺聲聞今日回心趣大菩提無上妙覺我今已說真修行法汝猶未識修奢摩他此云止毗婆舍那此云觀微細魔事魔境現前汝不能識洗心非正落於邪見或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄汝應諦聽吾今為汝子細分別阿難起立並其會中同有學者歡喜頂禮伏聽慈誨佛告阿難及諸大衆汝等當知有漏世界十二類生本覺妙明覺圓心體與十方佛無二無別由汝妄想迷理為咎癡愛發生生發遍迷故有空性化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶汝等一人發真歸元此十方空皆悉銷殞云何空中所有國土而不振裂汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通㳷當處湛然一切魔王及與鬼神諸凡夫天見其宮殿無故崩裂大地振坼水陸飛騰無不驚懾凡夫昏昧不覺遷訛彼等咸得五種神通唯除漏盡戀此塵勞如何令汝摧裂其處是故鬼神及諸天魔魍魎妖精於三昧時僉來惱汝然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅氷暖氣漸鄰不日銷殞徒恃神力但為其客成就破亂由汝心中五陰主人主人若迷客得其便當處禪那覺悟無惑則彼魔事無奈汝何陰銷入明則彼羣邪咸受幽氣明能破暗近自銷殞如何敢留擾亂禪定若不明悟被陰所迷則汝阿難必為魔子成就魔人如摩登伽殊為眇劣彼唯呪汝破佛律儀八萬行中祗毀一戒心清淨故尚未淪溺此乃隳汝寶覺全身如宰臣家忽逢籍沒宛轉零落無可哀救通曰魔即魔羅此云殺者亦云奪者能殺慧命奪善法故大約五種曰五陰魔煩惱魔生死魔天魔鬼魔合之唯陰魔天魔而已陰魔即生死煩惱依五陰而起者也天魔因修邪定好害正道者也又無聞比丘得少為足謗佛妄說阿羅漢不受後有是邪見魔即陰魔而天魔者也以謗法故即墮阿鼻獄一人發真歸元十方世界銷殞一切魔王諸凡夫天見其宮殿崩裂水陸驚懾便來惱亂禪定此天魔之為害也淺彼恃神力猶為客也其主在我故以妙覺而破塵勞如以湯銷氷而以明破幽也主人若迷客得其便毀我律儀隳我寶覺如宰臣籍沒而宛轉零落也此陰魔之為害也深成就破亂全歸主人故修禪定必須明悟不為五陰所迷乃第一義陰者識情蓋覆如浮雲然明者當陽顯露如太虗然陰銷入明即還本覺故本覺妙明與十方佛無二無別但由癡愛妄想隨迷轉變有世界生有世界即有色陰戀此塵勞即有受想行識陰吾欲破陰而出還吾覺圓心體期於漏盡彼有漏者戀著不捨恃其通力故來相惱若毀戒破律與之和同雖得五通必為魔子於此覺破是謂寶覺此覺即是成佛種子仗此寶覺入乎正定以證法身十方菩薩及諸無漏大阿羅漢心精吻合常處寂然寂照含虗空即虗空且無之矣又況依空而立諸有漏國土哉華嚴座主問長沙岑虗空為是定有為是定無沙曰言有亦得言無亦得虗空有時但有假有虗空無時但無假無曰如和尚所說有何教文沙曰大德豈不聞首楞嚴云十方虗空生汝心內猶如片雲點太清裏豈不是虗空生時但生假名又云汝等一人發真歸元十方虗空悉皆銷殞是不是虗空滅時但滅假名所以老僧道有是假有無是假無長沙洞徹本覺妙明故觀虗空起滅亦乃是幻何況其餘有朋彥上座博學強記來訪報恩明禪師敵論宗乘明曰言多去道轉遠今有事借問祗如從上諸聖及諸先德還有不悟者也無彥曰若是諸聖先德豈有不悟者哉明曰一人發真歸元十方虗空悉皆銷殞今天台山嶷然如何得銷殞去彥不知所措即此一大疑團不能銷殞奈何輕言破陰哉阿難當知汝坐道場銷落諸念其念若盡則諸離念一切精明動靜不移憶忘如一當住此處入三摩地如明目人處大幽暗精性妙淨心未發光此則名為色陰區宇若目明朗十方洞開無復幽黯名色陰盡是人則能超越劫濁觀其所由堅固妄想以為其本阿難當在此中精研妙明四大不織少選之間身能出礙此名精明流溢前境斯但功力暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪阿難復以此心精研妙明其身內徹是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心內外精研其時魂魄意志精神除執受身餘皆涉入互為賓主忽於空中聞說法聲或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心澄露皎徹內光發明十方遍作閻浮檀色一切種類化為如來於時忽見毗盧遮那身土相稱踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心精研妙明觀察不停抑按降伏制止超越於時忽然十方虗空成七寶色或百寶色同時遍滿不相留礙青黃赤白各各純現此名抑按功力逾分暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心研究澄徹精光不亂忽於夜半在暗室內見種種物不殊白晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心圓入虗融四體忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明遍滿又見恆沙諸佛如來遍滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受羣邪又以此心研究深遠忽於中夜遙見遠方市井街巷親族眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證不作聖心名善境界若作聖解即受羣邪又以此心研究精極見善知識形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腹無端說法通達妙義非為聖證不作聖心魔事銷歇若作聖解即受羣邪阿難如是十種禪那現境皆是色陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等當依如來滅後於末法中宣示斯義無令天魔得其方便保持覆護成無上道通曰禪那即止觀法門銷落諸念以湛旋其虗妄滅生止也其念已盡離念猶存一切精明觀也止觀不二必以動靜不移憶忘如一不昏不散者為正念從此而入乃得真三摩提若靜有而動無憶存而忘亡此屬凝想光景非為正定初入止觀色陰未破如明目人處大幽暗未能發光為色所局是名色陰區宇色陰既破如目明朗十方洞開觀力圓照不為前境所礙如是則能超越劫濁由色與見交織故成劫濁今見不為色法所迷故能超也是色陰胡為乎來哉由堅固妄想以為其本本於父母與己三者妄想交結而成成此堅固四大色身堅相為地潤濕為水暖觸為火動搖為風由此四纏而成六根六湛圓明蔽覆真性故謂之陰也今入禪那精研妙明離於前塵身境俱空四大不織性與色離始則精明流溢身能出礙外忘其境也既而其身內徹拾出蟯蛔內忘其身也既而精魄遞相離合內身外身互為賓主能於空中聞說法要則幾遺其形也既而內光發明見佛境界靈悟所染暫得如是而不可為常也若念佛三昧見淨土境心境相應名為正相不在此例既而抑按逾分見多寶色抑極則光生亦十想觀所成也既而密澄其見覩暗中物前所見者幻境此所見者實境非養盛心細者不能既而四體虗融同於草木火燒刀斫曾無所覺非純覺遺身者不能既而觀照之極成就清淨忽見十方佛土天堂地獄皆無障礙幾於得天眼通矣既而抑按之極不但見暗室中物而遠方市井亦莫不見不但聞空中法聲而親族眷屬之語亦莫不聞幾於得天耳通矣至研究精極內外涉入互為賓主精神魂慮忽忘所歸由是魔得其便入其心腹乃令形體變移種種遷改無端說法通達妙義彼豈不以為能破色陰不復為色法所拘攣乎而不知為魔之所著也此十者皆由精研妙明用禪那心與堅固妄想交戰色未能即空空未能即色互為勝負不得渾融此色陰之魔所得乘間而入也衆生頑迷不自忖量平日之見地與佛何似平日之功行與佛何似偶見此境便為聖證非聖謂聖非證謂證內迷於陰魔而外感於天魔大妄語成墮無間獄良可哀憫故世尊欲宣示末法中保護衆生成無上道也若功力既到能破色陰雖現如上事不作聖心解者宗門中亦多有之如鵝湖智孚禪師一日不赴堂侍者來請赴堂孚曰我今日在莊喫油糍飽者曰和尚不曾出入孚曰你但去問取莊主者方出門忽見莊主來謝和尚到莊喫油糍此非身能出礙者乎瑞巖禪師一日有媼來作禮巖曰汝速歸救取數千物命媼回舍見兒婦拾田螺歸遂放之又祖照禪師於定中所見數十里內之事而人未嘗有知之者後以莊僧聞過故出揚於外照慮惑衆即入圓寂此皆能之而不以為聖證者也阿難彼善男子修三摩提奢摩他中色陰盡者見諸佛心如明鏡中顯現其像若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而不能動此則名為受陰區宇若魘咎歇其心離身返觀其面去住自由無復留礙名受陰盡是人則能超越見濁觀其所由虗明妄想以為其本阿難彼善男子當在此中得大光耀其心發明內抑過分忽於其處發無窮悲如是乃至觀見蚊虻猶如赤子心生憐愍不覺流淚此名功用抑摧過越悟則無咎非為聖證覺了不迷久自銷歇若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜阿難又彼定中諸善男子見色陰銷受陰明白勝相現前感激過分忽於其中生無限勇其心猛利志齊諸佛謂三僧祇一念能越此名功用陵率過越悟則無咎非為聖證覺了不迷久自銷歇若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白前無新證歸失故居智力衰微入中隳地迥無所見心中忽然生大枯渴於一切時沉憶不散將此以為勤精進相此名修心無慧自失悟則無咎非為聖證若作聖解則有憶魔入其心腑旦夕撮心懸在一處失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白慧力過定失於猛利以諸勝性懷於心中自心已疑是盧舍那此云淨滿得少為足此名用心忘失恆審溺於知見悟則無咎非為聖證若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白新證未獲故心已亡歷覽二際自生艱險於心忽然生無盡憂如坐鐵牀如飲毒藥心不欲活常求於人令害其命早取解脫此名修行失於方便悟則無咎非為聖證若作聖解則有一分常憂愁魔入其心腑手執刀劍自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止此名輕安無慧自禁悟則無咎非為聖證若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路旁自歌自舞自謂已得無礙解脫失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白自謂已足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺此名見勝無慧自救悟則無咎非為聖證若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是㲲華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤衆生入無間獄失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白於精明中圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在此名因慧獲諸輕清悟則無咎非為聖證若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤衆生墮阿鼻獄失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解悟則無咎非為聖證若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒噉肉廣行淫穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等一種俱空破佛律儀誤入人罪失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白味其虗明深入心骨其心忽有無限愛生愛極發狂便為貪欲此名定境安順入心無慧自持誤入諸欲悟則無咎非為聖證若作聖解則有欲魔入其心腑一向說欲為菩提道化諸白衣平等行欲其行淫者名持法子神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬魔心生厭離其身體威德既無陷於王難疑誤衆生入無間獄失於正受當從淪墜阿難如是十種禪那現境皆是受陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等亦當將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道通曰色陰未銷則心著於色見諸異境魔猶未入於心也色陰滅而受陰存受陰蓋指前五識虗能受明能領納如明鏡中顯現其像虗明體段應是佛心而何以為妄想耶但生一執著欲證為實得便是受陰所覆而不得謂之正受矣故受陰未破則不離五根如心觸客邪為魘所縛雖有虗明而不得用受陰既破則明不依根如魘咎既歇其心去住自由而能返觀其面虗明得用即超見濁見大攬受諸境交織而成濁今者虗明無復留礙是先拔其見矣見根既拔孰有為見所受者而為之濁乎色陰未銷心未發光色陰既盡得大光耀即是虗明妄想有正悟者視此虗明亦屬境耳唯精研妙明內抑過分則忘我之極視物皆我故視蚊虻如赤子而悲心生虗明現前感激過分故謂諸佛可齊而勇心生定強智微則新故之間杳無所依故沉憶不散心懸一處而自以為精進慧力過定則自疑是佛易生止足故溺於知見自謂已得光明遍照不但諸佛可齊已也進退失據自生艱險謂吾有大患為有此身常求害命早取解脫不但沉憶不散已也處清淨中心安穩後無復艱險之憂則有無限喜生喜得無礙解脫而歌舞失度由無慧以自禁也喜極自足則大我慢生慢有七種所謂慢過慢慢過慢增上慢下劣慢我慢邪慢慢不敬也過慢謂已過彼而慢之慢過慢兼二慢既不敬又作意凌之也增上謂己增上故卑劣慢慢尊勝者故我慢計蘊有我以我慢故邪慢慢正故以於定中緣持正法故不言邪慢增上未得謂得卑劣以劣自矜所以慢尊勝也若有慧力圓悟精理色銷明圓得大輕安輕安在七覺支中其體屬定定若兼慧正道可通但以此自足更不求進坐在輕清窟中故為無聞比丘也若捨念清淨一向入空生斷滅解撥無因果乃謗持戒為小乘果菩薩悟空則無持犯因而破毀律儀雖彼自以為超脫而不知為魔所使也受陰虗明不貪其味則愛欲不生唯愛極發狂誤入諸欲則煩惱與欲二境俱發天台云生來欲色抑制可停今所發者其惑熾盛若見外境心狂眼暗如睡師子觸之哮吼若不識者則能牽人作大重罪一念之愛流毒至此由挾持定境其發最猛利而其害最大也如是十種皆由得虗明性用禪那心與虗明妄想交為勝負故各有所著若悲狂憶慢憂愁行淫明是著魔大般若經曰魔能入一切衆生心令歸依魔黨如膠如漆斷手截臂不以為難魔力所攝固如此至安穩輕安空心現前自信是佛何為失於正受蓋正受者未嘗不虗未嘗不明終不作虗明解法華經曰深著虗妄法堅受不可捨乃謗持戒等故但存佛見於胸中即是魔也降魔藏見北宗秀秀問汝名降魔此無山精木怪汝翻作魔耶曰有佛有魔秀曰汝若是魔必住不思議境界曰是佛亦空何境界之有又祇林和尚每叱文殊普賢為精魅手持木劍自謂降魔才見僧來參便說魔來也魔來也以劍亂揮歸方丈如是十年後置劍無言僧問十二年前為甚麼降魔曰賊不打貧兒家曰十二年後為甚麼不降魔曰賊不打貧兒家故始以降降魔既以不降降魔若二降魔者真不作聖心解者也唯不作聖心解故非魔作臨濟至初祖塔院主云先禮佛先禮祖濟云佛祖俱不禮院主云佛祖與你有甚冤家濟拂袖便出茲非不禮塔廟者乎丹霞於慧林寺遇天大寒取木佛燒火向院主訶云何得燒我木佛霞以杖子撥灰曰吾燒取舍利主云木佛何有舍利霞云既無舍利更取兩尊燒主自後鬚眉墮落投子拈曰不會為客煩勞主人頌曰古巖苔閉冷侵扉飛者驚危走者迷夜深寒爇汀州火失曉漁翁輒自疑茲非摧毀經像者乎正為兩院主有佛祖魔有經像魔橫於胸次臨濟丹霞用出格手段拔之竟不覺悟大人境界非庸衆所知信哉阿難彼善男子修三摩提受陰盡者雖未漏盡心離其形如鳥出籠已能成就從是凡身上歷菩薩六十聖位得意生身隨往無礙譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇若動念盡浮想銷除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明鋭其精思貪求善巧爾時天魔候得其便飛精附人口說經法其人不覺是其魔著自言謂得無上涅槃來彼求巧善男子處敷座說法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲口中好言災祥變異或言如來某處出世或言劫火或說刀兵恐怖於人令其家資無故耗散此名怪鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄阿難又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛遊蕩飛其精思貪求經歷爾時天魔候得其便飛精附人口說經法其人亦不覺知魔著亦言自得無上涅槃來彼求遊善男子處敷座說法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一衆聽人各各如是得未曾有是人愚迷惑為菩薩淫逸其心破佛律儀潛行貪欲口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間其人見故心生傾渴邪見密興種智銷滅此名魃鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛綿㳷澄其精思貪求契合爾時天魔候得其便飛精附人口說經法其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座說法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或得他心或見地獄或知人間好惡諸事或口說偈或自誦經各各歡娛得未曾有是人愚迷惑為菩薩綿愛其心破佛律儀潛行貪欲口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然其人見故洗滌本心易入邪悟此名魅鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄又善男子受陰虗妙不遭邪魔圓定發明三摩地中心愛根本窮覽物化性之終始精爽其心貪求辨析爾時天魔候得其便飛精附人口說經法其人先不覺知魔著亦言自得無上涅槃來彼求元善男子處敷座說法身有威神摧伏求者令其座下雖未聞法自然心伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絶都指現在即為佛國無別淨居及金色相其人信受亡失先心身命歸依得未曾有是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無知者信是穢言此名蠱毒魘勝惡鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感爾時天魔候得其便飛精附人口說經法其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷座說法能令聽衆暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛黏如膠漆得未曾有是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲口中好言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛於中住一切如來所休居地彼無知者信是虗誑遺失本心此名癘鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入尅己辛勤樂處陰寂貪求靜謐爾時天魔候得其便飛精附人口說經法其人本不覺知魔著亦言自得無上涅槃來彼求陰善男子處敷座說法令其聽人各知本業或於其處語一人言汝今未死已作畜生敕使一人於後踏尾頓令其人起不能得於是一衆傾心欽伏有人起心已知其肇佛律儀外重加精苦誹謗比丘罵詈徒衆訐露人事不避譏嫌口中好言未然禍福及至其時毫髮無失此大力鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研尋貪求宿命爾時天魔候得其便飛精附人口說經法其人殊不覺知魔著亦言自得無上涅槃來彼求知善男子處敷座說法是人無端於說法處得大寶珠其魔或時化為畜生口銜其珠及雜珍寶簡冊符牘諸奇異物先授彼人後著其體或誘聽人藏於地下有明月珠照耀其處是諸聽者得未曾有多食藥草不䬸嘉饌或時日䬸一麻一麥其形肥充魔力持故誹謗比丘罵詈徒衆不避譏嫌口中好言他方寶藏十方聖賢潛匿之處隨其後者往往見有奇異之人此名山林土地城隍川嶽鬼神年老成魔或有宣淫破佛戒律與承事者潛行五欲或有精進純食草木無定行事惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力爾時天魔候得其便飛精附人口說經法其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座說法是人或復手執火光手撮其光分於所聽四衆頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒或水上行如履平地或於空中安坐不動或入瓶內或處囊中越牖透垣曾無障礙唯於刀兵不得自在自言是佛身著白衣受比丘禮誹謗禪律罵詈徒衆訐露人事不避譏嫌口中常說神通自在或復令人傍見佛土鬼力惑人非有真實讚歎行淫不毀粗行將諸猥媟以為傳法此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空爾時天魔候得其便飛精附人口說經法其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座說法於大衆內其形忽空衆無所見還從虗空突然而出存沒自在或現其身洞如琉璃或垂手足作旃檀氣或大小便如厚石蜜誹毀戒律輕賤出家口中常說無因無果一死永滅無復後身及諸凡聖雖得空寂潛行貪欲受其欲者亦得空心撥無因果此名日月薄蝕精氣金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生頓希變易細相常住爾時天魔候得其便飛精附人口說經法其人竟不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座說法好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物或於一處在一宅中數步之間令其從東詣至西壁是人急行纍年不到因此心信疑佛現前口中常說十方衆生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得此名住世自在天魔使其眷屬如遮文茶噉精氣鬼及四天王毗舍童子即毗舍遮隸四天王未發心者利其虗明食彼精氣或不因師其修行人親自觀見稱執金剛與汝長命現美女身盛行貪欲未逾年歲肝腦枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先已乾死惱亂彼人以至殂殞汝當先覺不入輪回迷惑不知墮無間獄阿難當知是十種魔於末世時在我法中出家修道或附人體或自現形皆言已成正遍知覺讚歎淫欲破佛律儀先惡魔師與魔弟子淫淫相傳如是邪精魅其心腑近則九生多逾百世令真修行總為魔眷命終之後必為魔民失正遍知墮無間獄汝今未須先取寂滅縱得無學留願入彼末法之中起大慈悲救度正心深信衆生令不著魔得正知見我今度汝已出生死汝遵佛語名報佛恩阿難如是十種禪那現境皆是想陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道通曰受陰既盡想陰未除何得成就六十聖位謂五根既拔心已離形從是凡身上歷菩提始之以三增進繼之以五十五位真菩提路終之以等妙二覺共成六十聖位曰聖者所以別於凡也未脫根塵為根塵所礙如鳥在籠既根塵銷落寄根明發如鳥出籠得意生身自初地至十地有三種意生身一入三昧樂意生身謂心寂不動即相似初信至七信入空位也二覺法自性意生身謂普入佛剎以法為自性即相似八信出假位也三種類俱生無作意生身謂了佛所證法即九信十信修中位也此意生身乃初入三昧樂意生身耳然想陰未破即前如幽室見如人寱語已成音韻倫次謂由是上歷六十聖位決定成就令想盡不寐者咸悟其語是名想陰區宇若浮想銷除如夢既覺不復為想所覆於覺明本體毫無纖塵則一倫生死首尾圓照生死與涅槃無異相故曰一倫生死其生也為首其滅也為尾不見生相不見滅相故曰首尾圓照如明鏡垢除不亂光輝名想陰盡一切煩惱因想念有唯念盡想亡生滅心滅煩惱從何而起故能超煩惱濁也想所由生以融通妄想為之本想能融變使心隨境使境隨心若動念盡則心境俱亡故能破融通妄想也味著虗明之體則魔入其心今不耽著虗明似有融通之妙故曰受陰虗妙不遭邪慮然三摩地中融通之意未化則魔又乘其融通而惑之矣故心愛圓明貪求善巧則貪習怪鬼年老成魔者附人說自化善巧等法以惑之心愛遊蕩貪求經歷則淫習魃鬼年老成魔者附人說他化邪見等法以惑之心愛綿㳷貪求契合則詐習魅鬼年老成魔者附人說開悟他心宿命等法以惑之心愛根本貪求辨析則冤習蠱毒及誑習魘勝惡鬼年老成魔者附人說現前是佛等法以惑之心愛懸應貪求冥感則瞋習癘鬼年老成魔者附人說冥感度人等法以惑之心愛深入樂處陰寂則慢習大力鬼年老成魔者附人說未來因果等法以惑之心愛知見貪求宿命則見習山林土地城隍川嶽等鬼年老成魔者附人說珠寶奇異等法以惑之心愛神通研究化元則訟習依人之鬼一切山河草木積劫精魅及壽終仙為怪所附年老成魔者附人說撮光履水透垣入瓶神通等法以惑之心愛入滅貪求深空則枉習休徵之類日月精氣金玉芝草麟鳳龜鶴不死為靈年老成魔者附人說無因果出入虗空等法以惑之心愛長壽貪求永歲欲棄分段而求變易細相常住乃斷見思惑而生法性土者非世間之魔可得而惑也於是住世自在天魔居欲界第六天者使其眷屬毗舍遮等惱亂是人毗舍遮中已發心者則護持正法其未發心者則噉人精氣至現美女身令人肝腦枯竭亦太磣矣此所謂道愈高則魔愈盛防範不可不嚴也夫圓明善巧遊歷佛土綿密契證辨析根元冥感懸應深入寂靜知通宿命神通無礙入滅盡定永劫不毀皆真修行分內之事於此精研亦不為過但始之以愛繼之以貪則心有所著有著便是欲故魔得乘其愛遂其貪引之以淫欲至破律儀而不顧也魔亦究心涅槃唯不能斷淫故入鬼神邪定而以害正為事害正使歸其黨不欲使正道成也正道若成意想俱滅彼魔宮盡為摧裂安得不百計相撓哉阿難於選擇圓通之後願度末劫一切衆生深慮邪師說法如恆河沙請問安立道場遠諸魔事於菩提心得無退屈世尊至是盡數魔事而告之令其留願於彼末法之中起大慈悲救度衆生令不著魔得正知覺拳拳以淫淫相傳為戒誠懼淫機之難斷也如摩登伽殊為眇劣梵天神呪亦未為奇尚能破佛律儀為毀一戒何況飛精附人現種種神變有不為其所惑者乎大都魔具五通而止眩之以五通而要歸於讚淫伎倆止此矣若破想陰證漏盡通內無其應外無能為魔且不能正眼而覷敢為煩亂耶天衣懷示衆云二千年前大覺世尊欲將諸聖衆往第六天上說大集經敕他方此土人間天上一切獰惡鬼神悉皆集會受佛付囑擁護正法設有不赴者四天門王飛熱鐵輪追之令集既集會已無有不順佛敕者各發宏誓擁護正法唯有一魔王謂世尊曰瞿曇我待一切衆生成佛盡衆生界空無有衆生名字我乃發菩提心臨危不變真大丈夫諸仁者作麼生著得一轉語與黃面瞿曇出氣尋常神通妙用智慧辨才到此總使不著盡閻浮大地人無不愛佛到這裡何者是佛何者是魔還有人辨得麼良久云欲識魔麼開眼見明欲識佛麼合眼見暗魔之與佛以拄杖一時穿却鼻孔妙喜為代一轉語云幾乎錯喚你作魔王此語有兩負門若人指點得出許你具衲僧眼五臺山祕魔巖和尚常持一木叉每見僧來禮拜即叉却頸曰那箇魔魅教汝出家那箇魔魅教汝行腳道得也叉下死道不得也叉下死速道速道學徒鮮有對者法眼代云乞命法燈代云但引頸示之玄覺代云老兒家放下叉子得也霍山通和尚訪之才見不禮拜便攛入懷裡巖拊通背三下通起拍手曰師兄三千里外賺我來三千里外賺我來便回此諸尊宿播弄神通直使魔等覷不著溈山一日問仰山涅槃經四十卷多少是佛說多少是魔說仰曰總是魔說溈曰已後無人奈子何仰曰慧寂即一期之事行履在甚麼處溈曰祗貴子眼正不說子行履故能具仰山擇法眼則無虞魔事矣
