body:
  text: 大佛頂如來密因脩證了義諸菩薩萬行首楞嚴經卷第八阿難如是眾生一一類中亦各各具十二顛倒猶如揑目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想汝今脩證佛三摩提於是本因元所亂想立三漸次方得除滅如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露云何名為三種漸次一者脩習除其助因二者真脩刳其正性三者增進違其現業通曰十二顛倒皆從真淨明心變起始於愛取一念有愛則有憎有取則有捨故胎卵濕化皆由情想輕重各從其類有色無色有想無想只是有無二句第由想而化其想漸微其化漸潔若非有色若非無色若非有想若非無想內含雙亦雙非實由情而化其情漸滯其化漸苦情想愛憎紛然雜陳無類不有故一一類中各各互具十二顛倒也情想猶揑目顛倒猶亂華亂華在太虗之中不礙太虗顛倒在妙圓之內無妨妙圓唯具足如斯虗妄亂想卒於真淨明心不相妨礙然後見其妙圓也妙圓真心即三摩地廓微洞朗猶如晴空十二顛倒惟茲六亂妄想以為本因翳眼若除狂華自息然除亂想必立三漸次何也譬如淨器本貯甘露之器一為毒蜜所染驟投甘露而甘露反為毒藥矣必滌之以湯水助之以灰香需之以歲月然後毒氣漸消而甘露可入此三漸次正滌除亂想之湯水灰香也前四種明誨殺盜婬妄已具正戒今又除其婬怒癡之助因刳其殺盜婬之正性漸與現行無明遠矣由是增進反流全一六用不行竟與現業違而心不流逸情愛乾枯亂想無自而起顛倒又何因而生乎但一真心然後安立聖位四十四心以入妙覺真三摩提如毒蜜既消而甘露可貯也大隨禪師上堂此性本來清淨具足萬德但以染淨二緣有差別故諸聖悟之一向淨用而成覺道凡夫迷之一向染用沒溺輪迴其體不二故般若云無二無二分無別無斷故若信得大隨所云其體不二本一淨器也毒蜜貯之不加損甘露貯之不加益直趣無上菩提染淨俱無交涉然後掃除三漸次之說亦無不可者云何助因阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛說一切眾生皆依食住阿難一切眾生食甘故生食毒故死是諸眾生求三摩提當斷世間五種辛菜是五種辛熟食發婬生啖增恚如是世界食辛之人縱能宣說十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次䑛其唇吻常與鬼住福德日銷長無利益是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為說法非毀禁戒讚婬怒癡命終自為魔王眷屬受魔福盡墮無間獄阿難脩菩提者永斷五辛是則名為第一增進脩行漸次通曰段食亦云摶食謂手摶而食之然有不可摶者故翻為段段者如刀段食飯菜等有形段故人間食也觸食者根境識觸之而成但觸其氣而已鬼神食也禪天無段食但有思食故云思食得食識無邊處無思食但有識食識取法味充然而飽亦皆有以自養如段食故曰皆依食住合論云識食者即阿賴耶識依前三種食而住何以知之五識者賴耶之自證相分六識及意識者賴耶之自證見分五識之區依段食六識分別依觸食七意識依思食故識食依前三種食而住一切眾生食甘故生食毒故死豈有五辛臭穢之物而不能助婬生恚究竟天仙遠離常與鬼伍亦與食毒無異然而婬恚日益必且非毀禁戒墮無間獄是可不謹之於微乎金牛和尚每至齋時自將飯桶於僧堂前作舞呵呵大笑云菩薩子喫飯來雪竇云雖然如此金牛不是好心僧問長慶古人道菩薩子喫飯來意旨如何慶云大似因齋慶讚雪竇頌云白雲影裏笑呵呵兩手持來付與他若是金毛獅子子三千里外見誵訛又僧問趙州學人乍入叢林乞師指示州云喫粥了也未僧云喫了州云洗鉢盂去其僧有省雲門云且道有指示無指示若言有趙州向伊道箇甚麼若言無這僧為甚悟去天童頌云粥罷令教洗鉢盂豁然心地自相符而今參飽叢林客且道其間有悟無合諸老宿提唱而詳味之縱是百般異品珍羞亦須抉出何況五辛毒藥豈容入口云何正性阿難如是眾生入三摩地要先嚴持清淨成律永斷婬心不䬸酒肉以火淨食無啖生氣阿難是修行人若不斷婬及與殺生出三界者無有是處當觀婬欲猶如毒蛇如見怨賊先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起禁戒成就則於世間永無相生相殺之業偷劫不行無相負累亦於世間不還宿債是清淨人脩三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險是則名為第二增進脩行漸次通曰殺盜婬何以謂之正性圓覺云一切眾生皆以婬欲而正性命眾生正報從婬感生故以婬欲為正性即前所云性業遮業又對助因而言此為正性也刳之云者如刳木為舟漸漸空之乃能載物故性業遮業俱空乃合於刳之義婬根最難斷必觀如毒蛇為害法身故見如怨賊為戕慧命故先持聲聞戒使無身犯後持菩薩戒使無思犯禁戒成就戒無所戒婬斷則無相生業殺斷則無相殺業偷斷則無相酬業即此身心六根清淨不須天眼而證五通矣眼通故觀見十方耳通故聞佛說法神通故能遊十方界宿命通故無艱險而他心通自在其中唯漏盡不易證也此如法華現身所得六根清淨即相似位然則嚴持清淨戒律烏容自緩乎涌泉欣禪師上堂我四十九年在這裏尚自有時走作汝等諸人莫開大口見解人多行解人萬中無一箇見解語言總要知通若識不盡敢道輪迴去在為何如此蓋為識漏未盡汝但盡却今時始得成立亦喚作立中功轉功就他去亦喚作就中功親他去我所以道親人不得度渠不度親人恁麼譬喻尚不會薦取渾崙底但管取性亂動舌頭不見洞山道相續也大難汝須知有此事若不知有啼哭有日在可知兢兢戒行要在盡却今時轉功就位入三摩地不然以幻脩幻徒自勤苦耳於自性何與云何現業阿難如是清淨持禁戒人心無貪婬於外六塵不多流逸因不流逸旋元自歸塵既不緣根無所偶反流全一六用不行十方國土皎然清淨譬如瑠璃內懸明月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中是人即獲無生法忍從是漸脩隨所發行安立聖位是則名為第三增進脩行漸次通曰現業者現行無明所造之業即上婬殺盜諸業也持禁戒者於外六塵不多流逸能斷客塵煩惱能除見惑矣塵既不緣根無所偶能破微細無明能除思惑矣二惑未除猶與現業隨順未肯相違今旋元自歸反流全一則湛入合湛與現業違矣唯流逸則六用行故背覺合塵為六亂妄想起現前業唯返流則六用不行故背塵合覺為一湛性圓明一切如來寂圓淨妙皆現其中密理圓智淨行妙合無迹法身清淨猶如瑠璃真智皎潔猶如明月身心快然根境俱融妙圓平等獲大安隱即得無生法忍而入三摩地矣從是漸脩安立聖位至於等覺是覺始獲金剛心中初乾慧地即還佛證三摩地究盡本因窮盡妙覺也此其所入者下文其所脩者究竟其所證者皆佛三摩地所謂十方薄伽梵一路涅槃門也此取頓證何得復立漸次而加之以增進乎理須頓悟事以漸除先除助因次刳正性茲違現業皆就事上漸漸消融之境漸入真功漸增密雖主頓悟不廢漸脩此三根俱接所以為圓頓法門也徑山了一禪師上堂參玄之士觸境遇緣不能直下透脫者蓋為業識深重情妄膠固六門未息一處不通絕點純清含生難到直須入林不動草入水不動波始可順生死流入人間世諸人要會麼以拄杖畫曰祗向這裏薦取設使有箇漢於此薦得如淨瑠璃內含明月還喚作了事人也無不見南泉與趙州翫月次州云幾時得似這箇去泉云王老師二十年前也曾恁麼來州云即今作麼生泉便歸方丈天童拈云二十年前且置二十年後又作麼生還知王老師行履處麼屋裏無靈牀渾家不著孝夫淨如瑠璃內懸明月即下文所云乾慧地也一切如來密圓淨妙皆現其中見地何所不燭尚欠行履在故能知南泉行履處則二十年前得似這箇猶為未了阿難是善男子欲愛乾枯根境不偶現在殘質不復續生執心虗明純是智慧慧性明圓鎣十方界乾有其慧名乾慧地通曰欲愛潤業根境造業故生死相續迷而不返今欲枯境謝故人世殘質不復續生返流全一則執心虗明六用不行則純是智慧慧不用之於欲愛而唯不離乎自性如珠之光不用照物而但自照其體此其明不至立所而明圓矣十方國土皎然清淨譬如瑠璃內懸明月故謂之鎣此以欲乾發慧乃名乾慧又以乾有其慧未至妙圓故為初地大品十地初名乾慧天台於圓教十信前立五品位且曰義推如大品乾慧地也此經未至而所立名位懸契佛心非靈山親到曷克有此陸亘大夫謂南泉曰弟子亦薄會佛法泉便問十二時中作麼生曰寸絲不挂泉曰猶是堦下漢又曰不見道有道君王不納有智之臣後僧問金峯志禪師千山無雲萬里絕霞時如何志曰飛猿嶺那邊何不吐却此與南泉先後一轍故知乾慧地亦是小歇場處若窮盡妙覺意致當自別欲習初乾未與如來法流水接即以此心中中流入圓妙開敷從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住通曰中中流入不偏於空不偏於假乃中道妙觀也於方入觀三諦圓融如伊三點則曰圓妙此人力可為也於觀已成從真發妙契合圓理則曰妙圓此非人力所能與也中道依真妙猶非真從真發妙妙為真妙妙猶非真故不可常中道純真故妙常住妙既常住則一切妄想無佇足之地矣妙之云者有獨覺其妙之趣不可以言語示人此其信為最真故名信心住溈山謂仰山曰汝須獨自回光返照別人不知汝解處汝試將實解獻老僧看仰曰若教某甲自看到這裏無圓位亦無一物一解得獻和尚溈曰無圓位處是汝作解處未離心境在仰曰既無圓位何處有法把無物作境溈曰適來是汝作與麼解是否仰曰是溈曰若恁麼是具足心境法未脫我所心在元來有解獻我許汝信位顯人位隱在後仰山問雙峰師弟近日見處如何曰據某見處實無一法可當情仰曰汝解猶在境曰某祗如此師兄又如何仰曰汝豈不知無一法可當情者溈山聞曰寂子一句疑殺天下人如此勘驗如此縷析方知從真妙圓重發真妙其真信處與解路逈然懸隔真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住通曰此十信中宿命通也前禁戒成就六根清淨不須天眼觀見十方宿命清淨得無艱險亦有出礙之漸此兼過去未來無數劫中皆能憶念則明了圓通此真信中發起性無不圓故通無不徹此已證真非相似位可比不能證真則陰處界為之礙故不能通今執心虗明根境不偶久之則真妙獨露超出根境之上故過去捨身將來受身一切習氣思惑所結朗然在前故得無遺忘也念心原屬生滅今以真信持之而念亦住即念即真將融真妄而一之矣宿命通自阿羅漢以逮非非想諸外道前後通知八萬劫而無數劫即所謂阿僧祇劫也非佛種不證此土能知過去者往往有之能知未來者指不多屈也牛頭山慧忠禪師聞威禪師出世乃往謁之威纔見曰山主來也忠感悟遂給侍左右後辭詣諸方巡禮威於具戒院見凌霄藤遇夏萎悴人欲伐之因謂之勿翦慧忠還時此藤更生及忠迴果如其言遂以山門付之又靈樹二十年不請首座常云我首座生也我首座牧牛也我首座行脚也一日令擊鐘三門外接首座眾出迓雲門果至直請入首座寮解包後遺書劉主云堂中首座人天眼目劉遂請雲門開堂此二尊宿可謂得念心住者妙圓純真真精發化無始習氣通一精明唯以精明進趣真淨名精進心通曰從真信流入故能憶念從純真流入故得精明真能化妄真精發化不可思議故無始習氣化為精明前云習氣現前至此化為無上知覺矣淨與染對未為真淨不垢不淨始為真淨以此精明進趣真淨將欲併其通一精明之迹而俱化之也此化不可為其進不亦精乎僧問黃檗何者是精進檗云身心不起是名第一牢強精進纔起心向外求者名為歌利王愛遊獵去心不外遊即是忍辱仙人身心俱無即是佛道法句經云若起精進心是妄非精進若能心不妄是名真精進天台智者在南嶽誦法華至藥王品云是真精進是名真法供養如來於是悟法華三昧獲旋陀羅尼見靈山一會儼然未散可謂無始習氣通一精明矣是必進於身心俱無乃名真淨若離真淨而別求精進者妄也心精現前純以智慧名慧心住通曰前乾慧地何以不名慧心住也前云執心虗明尚有執在此云心精現前則其執化矣前云純是智慧猶帶是在此云純以智慧則在在慧用并忘其是矣此非精明瑩徹靈光顯現未易語此始而曰有其慧至是有而且住更進一步矣宗門中純以慧用唯臨濟一人罕遇其匹嘗云山僧此間作三種根器斷如中下根器來我便奪其境而不除其法或中上根器來我便境法俱奪如上上根器來我便境法人俱奪如有出格見解人來山僧此間便全體作用不歷根器大德到這裏學人著力處不通風石火電光即過了也學人若眼定動即沒交涉擬心即差動念即乖有人解者不離目前大德你擔鉢囊屎擔子傍家走求佛求法即今與麼馳求底你還識渠麼活潑潑地祗是勿根株擁不聚撥不散求著即轉遠不求還在目前靈音囑耳若人不信徒勞百年嗟嗟若信得活潑潑地去慧心住不遠矣執持智明周徧寂湛寂妙常凝名定心住通曰既純以智慧而慧心常住矣何更用執持也執持云者忘機泯智之意智慧常用用則應物便於湛寂之體不得總持今收斂光華持而不用如臨濟云吹毛用了急須磨則於妙湛得總持矣總持不動則常凝矣夫寂湛之性清淨本然周徧法界本無搖動寂而非寂與靜沉死水不同故曰寂妙此定心住即定之時慧在定與人力脩持先定後慧先慧後定之說了不相干也智隍初參五祖庵居長座積二十年玄策往訪之問云汝在此作什麼曰入定策曰汝云入定為有心入耶無心入耶若無心入者一切無情草木瓦石應合得定若有心入者一切有情含識之流亦應得定隍曰我正入定時不見有有無之心策曰不見有有無之心即是常定何有出入若有出入即非大定隍無對良久問曰師嗣誰策曰吾師六祖隍曰六祖以何為禪定策曰我師所說妙湛圓寂體用如如五陰本空六塵非有不出不入不定不亂禪性無住離住禪寂禪性無生離生禪想心如虗空亦無虗空之量隍聞是說徑走謁六祖具述前語六祖云誠如所言汝但心如虗空不著空見應用無礙動靜無心凡聖情忘能所俱泯性相如如無不定時也隍於是大悟二十年所得心都無影響其夜河北土庶聞空中有聲云隍禪師今日得道隍復歸河北開化四眾又僧問白鹿山顯端禪師凝然湛寂時如何端曰不是闍黎安身立命處曰如何是學人安身立命處端曰雲有出山勢水無投㵎聲於是會得常寂寂不離常惺惺足知定慧不二法門矣定光發明明性深入唯進無退名不退心通曰由慧入定其定也正由定發明其明也深明不由定力生者疎淺無根不能深入今定慧交資明性益徹何微不燭何奧不窮故能尋向上去進進不已有進無退正以見其明之深也若稍不明便有退意此不退位由無始無明淘汰幾盡無能搖惑故不生退屈耳乾峯上堂法身有三種病二種光須是一一透得始解歸家穩坐須知更有向上一竅在雲門出問菴內人為甚麼不知菴外事峯呵呵大笑門曰猶是學人疑處峯曰子是甚麼心行門曰也要和尚相委悉峯曰直須與麼始解穩坐地門應喏喏天童拈云坐著病在膏肓用著光不透脫直饒縱橫十字圓轉一機也未知有向上一竅在還得穩坐地麼到頭霜夜月任運落前溪雲門故是門內人不復辨門外事所以得穩坐地若未到雲門分劑須向乾峰話頭咬嚼一番方解不退心真脉路心進安然保持不失十方如來氣分交接名護法心通曰定慧雙融入不生滅心無其心進無所進一念相應非有造作故曰安然未至於安猶假矜持既至於安則保持不失矣所云不失者何物保持者何事此諸佛命脉洞貫十方吾今已得總持則諸佛之命脉在我精神可以相通氣分自然交接我之氣分交於佛是我護如來之法也佛之氣分交於我是佛護我之法也至此則三界思盡即六根清淨之正位也對大品當佛地故曰諸佛所護念昔六祖浣衣石上忽有一僧來禮拜云方辨是西蜀人昨於南天竺國見達麼大師囑方辨速往唐土吾傳大迦葉正法眼藏及僧伽梨見傳六代於韶州曹溪汝去瞻禮方辨遠來願見我師傳來衣鉢祖乃出示此氣分交接之一驗也風穴初到黃龍龍問石角穿雲路垂條意若何穴曰紅霞籠玉像擁障照州原龍云相隨來也穴曰和尚低聲投子頌曰無價明珠暗處懸夜深將把木人穿誰知却被泥牛見吞入紅霞碧浪淵作家相見未嘗不以珍重護持相勉旃此亦可見彼此護法之心矣覺明保持能以妙力迴佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入名迴向心通曰迴佛慈光迴果而向因也向佛安住迴因而向果也果因一契光相交入此其妙難以言宣也唯有妙力不涉功勳光因慈顯不須方便住與佛同更無階級本覺始覺兩覺互融譬如雙鏡光明相對有此妙力方有此妙影覺明保持無復妄覺則明為妙明矣妙明明妙一即一切一切即一妙影重重相為涉入非復前塵法塵之影故曰妙影此其影將渾融於光光亦將渾融於影依稀一大圓鏡智矣迴佛之智為我之智迴我之智向佛之智心心相照幾與佛同豈但氣分交接而已哉溈山一日索門人呈語乃曰聲色外與吾相見仰山凡三度呈語曰如兩面鏡相照於中無像溈曰此語正也我是你不是早立像了也仰山却問溈山某精神昏昧有拙祗對未審和尚於百丈師翁處作麼生呈語溈曰我於百丈先師處呈語如百千明鏡鑑像光影相照塵塵剎剎各不相借仰山於是禮謝二尊宿善說楞嚴一如雙鏡光明相對一如妙影重重相入合之而語意始足雪峯上堂要會此事猶如古鏡當臺胡來胡現漢來漢現玄沙出眾曰忽遇明鏡來時如何峰曰胡漢俱隱沙曰老和尚脚根尚未點地在知玄沙不肯雪峰則知仰山禮謝溈山處矣心光密照獲佛常凝無上妙淨安住無為得無遺失名戒心住通曰心光密迴向佛安住得佛寂妙常凝對鏡而不動得佛無上妙淨涉塵而不染此真無為自性天真佛也安住於此無作無為無證無得凡有得必有失無得則無失有失須用戒無失則焉用戒自性無為即此是戒戒無所戒是謂真戒此其戒在心光密迴之際謂之曰密不可以意識測豈尋常之戒可同語乎即戒即定即戒即慧特一體異名耳昔石頭初到青原參禮原曰子何方來頭曰曹溪原曰將得甚麼來曰未到曹溪亦不失原曰若恁麼用去曹溪作甚麼曰若不到曹溪爭知不失頭又曰曹溪大師還識和尚否原曰汝今識吾否曰識又爭能識得原曰眾角雖多一麟足矣後藥山一日在石上坐次石頭問云在這裏作甚麼山曰一物不為頭曰恁麼則閒坐也山曰若閒坐即為也頭云汝道不為不為箇甚麼山曰千聖亦不識頭因以偈贊曰從來共住不知名任運相將秪麼行自古上賢猶不識造次凡流豈可明丹霞頌云玄微及盡本翛然若謂渠閒萬八千月印澄江魚不見釣人何用更拋筌觀藥山所云無為石頭所云不失究竟莫可測識抑何密也能透此關斯能獲佛常凝無上妙淨可名戒心住矣住戒自在能遊十方所去隨願名願心住通曰住戒自在忘乎其為戒矣真淨常凝何適不可故能遊行十方所去隨願天台圓教未斷無明生同居土者名為願生正符此文又說十信出假利益眾生今遊十方亦合其義首山念禪師於淳化三年十二月四日午時上堂說偈曰今年六十七老病隨緣且遣日今年記却來年事來年記著今朝日至次年月日無爽上堂辭眾仍說偈曰白銀世界金色身情與無情共一真明暗盡時俱不照日輪午後示全身安坐而逝其徒汾陽昭與龍德府尹李侯有舊侯虗承天寺致之使者三反受罰必欲得師俱往師笑曰老僧業不出院三十年矣借往當先後之何必俱耶乃令設饌具裝畢告眾曰老僧去也誰人隨得一僧出云某甲隨得師曰汝日行幾里僧曰五十里師曰汝隨我不得又一僧出云某甲隨得師曰汝日行幾里僧云七十里師曰汝亦隨我不得侍者出云某甲隨得但和尚到處某甲即到師曰汝却隨得老僧言訖謂使者曰吾先行矣怡然坐逝侍者即立化此非所去隨願者乎非已證十信位者未易及此信者真實無妄之謂為與實際理地相應也故曰只此一事實餘二則非真始必欲愛乾枯執心虗明然後能入妙圓真性真性發化細習俱融又持之以定慧進之以護持迴佛慈光獲佛淨戒從此生如來家而所去隨願矣十信非十住也何以俱名住無著菩薩立十八位判金剛經始終地位故初住亦得名住為其依無住智永不退還故得住名阿難是善男子以真方便發此十心心精發暉十用涉入圓成一心名發心住通曰從真妙圓重發真妙此所謂真方便也以真方便發此十種信心信即是真真即是信不容別念雜於其間其心精矣心之精明自發光耀或定或慧或戒或願十用涉入即定而慧戒等具足即戒而定慧等具足總之發明本來向佛安住故曰圓成一心十用未圓心量未滿必十用圓成乃可名發心住也天台以瓔珞十心對十乘觀法約圓初住具明十德意亦相符昔六祖三鼓入室五祖以袈裟遮圍不令人見為說金剛經至應無所住而生其心六祖於言下大悟一切萬法不離自性遂啟五祖言何期自性本自清淨何期自性本不生滅何期自性本自具足何期自性本無動搖何期自性能生萬法五祖知悟本性謂曰不識本心學法無益若識自本心見自本性即名丈夫天人師佛故圓成一心若六祖所悟乃可語發心住心中發明如淨琉璃內現精金以前妙心履以成地名治地住通曰見地分明乃可踐履見處不明縱能踐履非是陶鎔自性祗事外馳如築室他人地上於己何與此心中發明無師智自然智從法界性中顯現如淨琉璃內現精金見之極真悟之極徹見處與佛無二行處尚未湊泊從此保任從此踐履以前十種妙心一一躬行實踐身心如一步步踏著如地相似彼築室者必先治地此特發足之初耳故名治地住雲居膺禪師上堂古人道欲保任此事須向高高山頂立深深海底行方有些子氣息汝若大事未辦且須踐履玄途僧問如何是向上人行履處居曰天下太平又僧問廣法院源禪師從上諸聖向甚麼處行履源曰十字街頭曰與麼則敗缺也源曰知你不到這田地曰到後如何源曰家常茶飯故以諸尊宿所稱踐履明治地住其為踐履者妙矣心地涉知俱得明了遊履十方得無留礙名脩行住通曰心何由而知乎地地何由而知乎心心者妙心也行者妙行也而知者妙知也理行智三德圓融乃可語心地涉知明明不昧了了常知心即是行行即是心遊履十方更有何礙既無留礙何更用脩而此以脩行住名者一則踐履實際無取住著故以遊履為脩一則執定明了便為留礙故以無留礙為脩其實行無所行脩無所脩也石霜禪師示眾云初機未搆大事先須識取頭其尾自至疎山出問如何是頭霜云直須知有疎曰如何是尾霜云盡却今時疎曰有頭無尾時如何霜云吐得黃金堪作甚麼疎曰有尾無頭時如何霜云猶有依倚在疎曰直得頭尾相稱時如何霜云渠不作箇會解亦未許渠在後僧問九峯虔禪師如何是頭峯云開眼不覺曉如何是尾峯云不坐萬年牀有頭無尾時如何峯云終是不貴有尾無頭時如何峯云雖飽無力直得頭尾相稱時如何峯云兒孫得力室內不知九峯會得石霜意如一印托出天童頌云規圓矩方用行舍藏鈍躓棲蘆之鳥進退觸藩之羊喫人家飯臥自己牀雲騰致雨露結為霜玉線相投透針鼻綿絲不斷吐梭腸石女機停兮夜色向午木人路轉兮月影移央此頌首尾相稱必如此脩如此行方可與圓頓法門相應行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住通曰行與佛同分真智與究竟智等受佛氣分分真理與究竟理等前云氣分交接猶二之也至此入如來種幾合而為一矣中陰身者此陰已謝彼陰未生二者中間倒懸虗空四十九日自求父母業緣相似即往託生此蓋陰信冥通非思慮所求權智如父實智如母任運相合不假功力果德密齊有莫知其然而然者故若陰若冥乃可入如來種生貴云者如王子處胎品異齊民故謂之貴貴其頓證無上第一法門也洞山有五位王子圖一曰誕生二曰朝生三曰末生四曰化生五曰內生皆以發明向上機緣石霜為頌出其一誕生曰天然貴胤本非功德合乾坤育勢隆始末一期無別種宮分六宅不他宗上和下睦陰陽順共氣連枝器量同欲識誕生王子父鶴騰霄漢出銀籠其二朝生曰苦學情論世莫羣出來凡事已超倫詩成五字三冬雪筆落分毫四海雲萬卷積功彰聖代一心忠老輔明君鹽梅不是生知得金榜何勞顯至勳其三末生曰久棲岩壑用工夫草榻柴扉守志孤十載見聞心自委一身冬夏衣縑無澄凝含笑三秋思清苦高名上哲圖業就高科酬夙志比來臣相不當途其四化生曰傍分帝命為傳持萬里山河布政威紅影日輪凝下界碧油風冷暑炎時高低豈廢尊卑奉五袴蘇途遠近知妙印手提邊塞靜當陽那肯露纖機其五內生曰九重深處復何宣挂弊由來顯妙傳祗奉一人天地貴從他諸道自分權紫羅帳合君臣隔黃閣簾垂禁制全為汝方隅宮屬戀遂將黃葉止啼錢僧問瑞岩如何是誕生王子岩云深宮外不出投子頌曰貴異天然應有時六宮春苑少相隨星攢半夜天輪迴燭曉東闈簾靜垂故生貴一路洞上宗風最為綿密不入其室難與共語既遊道胎親奉覺胤如胎已成人相不缺名方便具足住通曰聖胎已成則不止受其氣分而已親奉覺胤續佛命脉應機接物方便具足雖未至圓滿然亦具體而微如人處胎相貌不缺相貌顯而可見者屬應用方便故名方便具足住五祖忍大師者蘄州黃梅人也先為破頭山栽松道者嘗請於四祖曰法道可得聞乎祖曰汝已老脫有聞其能廣化耶倘若再來吾尚可遲汝乃云行水邊見一女子浣衣楫曰寄宿得否女曰我有父兄可往求之曰諾我即敢行女首肯之遂回策而去女周氏季女也歸輙孕父母大惡之逐之女無所歸日傭紡里中夕止於眾館之下已而生一子以為不祥因拋濁港中明日見之泝流而上氣體豔明大驚遂舉之成童隨母乞食里人呼為無姓兒逢一智者嘆曰此子缺七種相不逮如來後遇四祖問曰子何姓答曰姓即有不是常姓祖曰是何姓答曰是佛姓祖曰汝無姓耶答曰姓空故四祖識其法器俾侍者至其母所乞令出家母以夙緣故殊無難色遂捨為弟子卒紹祖位天童頌云黃梅果熟白藕華開問唯佛性體異凡胎衣傳南嶺人將去松老西山我再來兩借皮囊成底事一壺風月湛無埃又水菴一頌云約去栽松箇老人還來傳法喜童真有娘生面無爺姓劫外靈苗不犯春向非道者已詣方便具足住何能去來自由幾備妙相如如來耶容貌如佛心相亦同名正心住通曰容貌喻應用心相喻理智使外同而內稍異非正心也正心亦難言矣必凡聖兩忘情盡體露方可言正南塔光湧禪師北遊臨濟復歸侍仰山山曰汝來作甚麼曰禮覲和尚山曰還見和尚麼曰見山曰和尚何似驢曰某甲見和尚亦不似佛山曰若不似佛似箇甚麼曰若有所似與驢何別山大驚曰凡聖兩忘情盡體露吾以此騐人二十年無決了者子保任之山每指謂人曰此子肉身佛也觀此則容貌如佛心相亦同惟南塔湧近之身心合成日益增長名不退住通曰前不退心指明性深入有進無退但就心而言此不退住則身心合成日益增長蓋兼內外而並進矣即上容貌心相優游涵泳俟其自長非積功累行比也有僧舉臥輪偈云臥輪有伎倆能斷百思想對境心不起菩提日日長六祖聞之曰此偈未明心地若依而行之是加繫縛因示一偈曰慧能無伎倆不斷百思想對境心數起菩提作麼長天童拈云葵華向日柳絮隨風夫向上一竅不增不減第於識情消磨不盡故見有長有退耳若有見於不增不減而趨之者即同葵華之向日有見於不增不減而忘之者即同柳絮之隨風若兩俱無心隨時著衣喫飯長養聖胎方得名不退住十身靈相一時具足名童真住通曰十身謂菩提身願身化身力身莊嚴身威勢身意生身福身法身智身也靈相具足較前人相不缺已為圓滿雖均之具體此已成童矣故曰童真住汾陽昭禪師上堂夫說法者須具十智同真若不具十智同真邪正不辨緇素不分不能與人天為眼目決斷是非如鳥飛空而折翼如箭射的而斷弦弦斷故射的不中翼折故空不可飛弦壯翼牢空的俱徹作麼生是十智同真與諸上座點出一同一質二同大事三總同參四同真志五同徧普六同具足七同得失八同生殺九同音吼十同得入又曰與甚麼人同得入與阿誰同音吼作麼生是同生殺甚麼物同得失阿那箇同具足是甚麼同普徧何人同真志孰能總同參那箇同大事何物同一質有點得出底麼點得出者不恡慈悲點不出來未有參學眼在切須辨取要識是非面目現在不可久立珍重此十智同真但明智身邊事若十身具足當更入微雖然總一菩提隨處異名耳如別有奇特何得一時具足形成出胎親為佛子名法王子住通曰自受佛氣分入如來種漸次成胎進而容貌進而增長進而童真始得形成出胎為法王子已入佛知見者尚有如斯保任乃得益瑩益徹代佛宏化其成固不易哉舍利弗從佛口生從法化生為佛長子彼其智慧第一自多劫已來非一朝夕力也溈山睡次仰山問訊溈便回面向壁仰曰和尚何得如此溈起曰我適來得一夢你試為我原看仰取一盆水與師洗面少頃香嚴亦來問訊溈曰我適來得一夢寂子為我原了汝更為我原看嚴乃點一椀茶來溈曰二子見解過於鶖子夫智慧如舍利弗更復過之毋亦形成出胎而更出胎者乎表以成人如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌頂住通曰法王子者以方便心相皆與佛同堪紹佛位代佛行事故以國大王太子及剎利王世子陳列灌頂為喻天子子曰太子諸侯子曰世子表以成人將付國位如冠禮相似取大海水以灌其頂表為王者當用眾智如海納眾流用海水即用一切水也此但以國事分委使攝治之非正付國位而使即真也以此位眾德潛備足令分化十方而行佛事故謂之灌頂住至十地行滿幾於等覺乃堪正付授佛職位故法雲地名灌頂菩薩斯即真矣不住於住矣僧問曹山如何是師子山曰眾獸近不得曰如何是師子兒山曰能吞父母者曰既是眾獸近不得為甚麼却被兒吞山曰豈不見道子若哮吼祖父俱盡曰盡後如何山曰全身歸父曰未審祖盡時父歸何所山曰所亦盡曰前來為甚麼道至身歸父山曰譬如王子能成一國之事又曰闍黎此事不得孤滯直如枯木上更撒些子華此從體起用妙湛之謂也司馬頭陀自湖南來謂百丈曰頃在湖南尋得一山名大溈是一千五百人善知識所居之處丈曰老僧住得否頭曰非和尚所居丈曰何也陀曰和尚是骨人彼是肉山設居徒不盈千丈曰吾眾中莫有人住得否陀曰待歷觀之時華林覺為第一座丈令侍者請至問曰此人如何陀請謦欬一聲行數步陀曰不可丈又令喚溈山山時為典座陀一見乃曰此正是溈山主人也丈是夜召山入室囑曰吾化緣在此溈山勝境汝當居之嗣續吾宗廣度後學華林問之曰某甲忝居上首典座何得住持丈曰若能對眾下得一語出格當與住持即指淨瓶問曰不得喚作淨瓶汝喚作甚麼林曰不可喚作木揬也丈乃問山山踢倒淨瓶便出去丈笑曰第一座輸却山子也山遂往居焉化盛湖南稱為仰宗向非有出格之見安能廣化一方分委佛事如國太子哉十信尚須捨妄歸真十住則純真矣但其力未充故有如是堦級阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行通曰如來妙德者隨緣不變不變隨緣居塵不染故謂之妙已成佛子具足妙德竿木隨身逢場作戲故能十方隨順禪悅自娛此歡喜行隨順眾生方便接引正欲顯發如來妙德耳若一向住著豈德為妙趙州年八十餘尚在行脚一日到雲居居曰老老大大何不覓箇住處州曰甚麼處住得居曰山前有箇古寺基州曰和尚自住取後到茱萸萸曰老老大大何不覓箇住處州曰向甚麼處住萸曰老老大大住處也不知州曰三十年弄馬騎今日却被驢撲雲居錫云甚麼處是趙州被驢撲處後有僧辭趙州州問甚麼處去僧云學人擬向南方學佛法去州竪起拂子云有佛處不得住無佛處急走過三千里外逢人莫得錯舉僧云恁麼則不去也州曰摘楊華摘楊華天童拈云沉空滯迹犯手傷鋒俱未是納僧去就直須莫入人行市莫坐他牀榻正不立玄偏不附物方能把住放行有自由分唯趙州具足無量如來妙德有自由分故能行歡喜行雖老不倦善能利益一切眾生名饒益行通曰利益眾生從慈悲心流出有是心即有是能而又善能為之智既普照用亦圓融慈救眾生而我無其意無論法施財施要歸於饒益有情而已故名饒益行牛頭融禪師既蒙四祖授記自爾法席大盛唐永徽中徒眾乏糧融往丹陽緣化去山八十里躬負米一石八斗朝往暮還供僧三百二時不缺此真能行饒益行者自覺覺他得無違拒名無瞋恨行通曰自覺覺他有世間智有出世間智有出世間上上智舉以語人得無違拒如石投水所謂遇而後傳相悅以解也故無瞋恨此瞋恨非凡情可比恨一切眾生皆有如來智慧德相而不自覺而瞋吾度脫之未至也六祖偈云欲擬化他人自須有方便勿令彼有疑即是自性現佛法在世間不離世間覺離世覓菩提恰如求兔角正見名出世邪見名世間邪正盡打却菩提性宛然故以世間智覺人者是人天因以出世間智覺人者是菩提因唯無上菩提二俱打却方名上上智也以此覺他是等覺妙覺因種類出生窮未來際三世平等十方通達名無盡行通曰種類出生得意生身隨類闡化竪窮三際橫亘十方無非自覺覺他之所所謂虗空有盡我願無窮者也太平興國中建陽僧辯聰遊五臺山寺寺之上座老為眾輕易聰獨敬事之將還京師老僧附聰書使於城北尋勃賀投之聰辭去竊發而觀無他詞但曰度眾生畢蚤來蚤來若更強住却恐造業聰大驚復緘封之既至廣濟河側聞小兒呼勃賀聰問勃賀何在小兒指大豬豬項丳金環臥街西墻下聰問屠誰氏曰趙生家也問何名勃賀曰唯食薄荷故里中小兒以名之吾日烹千百豬豬奔佚難驅以此豬導之則纍纍就死畜之十五年矣聰以書投之薄荷急食忽然人立而化即此觀之應身分化何類可測何際可窮眾生無盡度脫亦無盡故名無盡行一切合同種種法門得無差誤名離癡亂行通曰既已具足無量如來妙德自覺覺他益物無盡何至有癡亂差誤哉蓋種種法門有種種三昧非具擇法眼莫之能辨也今一切和同而融會之得無差誤如孔子集清任和之大成而時出之本之以智勝也智譬則巧非力可齊故無癡亂繼於無盡行之後裴想國休為圭峯密禪師作禪源諸詮都序序曰諸宗門下皆有達人然各安所習通少局多故數十年來師法益壞以承稟為戶牖各自開張以經論為干戈互相攻擊情隨函失而遷變法逐人我以高低是非紛拏莫能辨析則向者世尊菩薩諸方教宗適足起諍後人增煩惱病何利益之有哉圭峯大師久而嘆曰吾丁此時不可以默矣於是以如來三種教義印禪宗三種法門鎔鉼盤釵釧為一金攪酥酪醍醐為一味振綱領而舉者皆順據會要而來者同趨尚恐學者之難明也又復直示宗源之本末真妄之和合空性之隱顯法義之差殊頓漸之同異遮表之回互權實之深淺通局之是非若吾師者捧佛日而委曲回照疑曀盡除順佛心而橫亘大悲窮劫蒙益則世尊為闡教之主吾師為會教之人本末相符遠近相照可謂畢一代時教之能事矣或曰自如來未嘗大都而通之今一旦違宗趣而不守廢關防而不據無乃乖秘藏密契之道乎答曰如來初雖別說三乘後乃通為一道故涅槃經迦葉菩薩曰諸佛有密語無密藏世尊讚之曰如來之言開發顯露清淨無翳愚人不解謂之秘藏智者了達則不名藏此其證也故王道興則外戶不閉而守在戎夷佛道備則諸法總持而防在魔外不當復執情攘臂於其間也若休者得法黃檗明向上事而復不廢圭峯葛藤一路真可謂一切和同得無差誤者矣其再來人哉則於同中顯現羣異一一異相各各見同名善現行通曰既離癡亂則理事無礙即理即事則同不礙異矣即事即理則異不礙同矣於和同之中不妨顯異於異相之內又各各見同現同現異兩不相礙是唯無癡亂之極明析秋毫乃能變現如是故名善現行溈山餧鵶生飯回頭見仰山曰今日為伊上堂一上仰曰某甲隨例得聞溈曰聞底事作麼生仰曰鵶作鵶鳴鵲作鵲噪溈曰爭奈聲色何仰曰和尚適來道甚麼溈曰我祗道為伊上堂一上仰曰為甚麼喚作聲色溈曰雖然如此騐過也無妨仰曰大事因緣又作麼生騐溈竪起拳仰曰終是指東畫西溈曰子適來問甚麼仰曰問和尚大事因緣溈曰為甚麼喚作指東畫西仰曰為著聲色故某甲所以問過溈曰並未曉了此事仰曰如何得曉了此事溈曰寂子聲色老僧東西仰曰一月千江體不分水溈曰應須與麼始得仰曰如金與金終無異色豈有異名溈曰作麼生是無異名底道理仰曰瓶盤釵釧券盂盆溈曰寂子說禪如師子吼驚散狐狼野干之屬觀溈仰父子絲來線去同中現異異中現同說同說異如珠走盤是真得善現行秘密藏非明眼者其孰能知之如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行通曰此由善現行而推廣之不但同異互顯抑且一多互融現塵現界交涉十方一微塵中現十方剎名曰現界即現剎處不壞塵相名曰現塵彷彿重重帝網事事無礙景象第初入此境僅無著耳未至純不思議解脫一切神化之妙也此無著行無著亦無與前七徵無著逈異使纖毫未盡有不著者不可名無既有對待安得不相留礙乎大慧杲禪師開堂日僧問人天普集選佛場開祖令當行如何舉唱杲曰鈍鳥逆風飛僧曰徧界且無尋覓處分明一點座中圓杲曰人間無水不朝東復有僧競出杲約住曰假使大地盡末為塵一一塵有一口一一口具無礙廣長舌相出無量差別音聲一一音聲發無量差別言詞一一言詞有無量差別妙義如上塵數衲僧各具如是口如是舌如是音聲如是言詞如是妙義同時致百千問難問問各別不消長老咳𠻳一聲一時答了乘時於其中間作無量無邊廣大佛事周徧法界所謂一毛現神變一切佛同說經於無量劫不得其邊際便恁麼去閙熱門庭即得正眼觀來正是業識茫茫無本可據祖師門下一點也用不著況復勾章棘句展弄詞鋒非唯埋沒從上宗乘亦乃笑破衲僧鼻孔所以道毫釐繫念三塗業因瞥爾情生萬年羈鎖聖名凡號盡是虗聲殊相劣形皆為幻色汝欲求之得無累乎及其厭之反為大患看他先聖恁麼告報如國家兵器豈得已而用之本分事上亦無這箇消息山僧今日如斯舉唱大似無夢說夢好肉剜瘡撿點將來合喫拄杖只今莫有下得毒手者麼若有堪報不報之恩共助無為之化如無倒行此令去也驀拈拄杖云橫按鏌鎁全正令太平寰宇斬癡頑卓一卓喝一喝便下座據大慧見處即現塵現界未為奇特可謂無著也無種種現前咸是第一波羅蜜多名尊重行通曰現塵現界現身現說不相留礙皆從般若心中流出六波羅蜜多名到彼岸唯般若最為第一般若是大智慧超過一切至尊至貴故為尊重行若祗認見聞覺知逐塵流轉以為妙用是驢前馬後奴兒婢子邊事非尊貴也雲居云如人頭頭上了物物上通只喚作了事人終不喚作尊貴將知尊貴一路自別便是世間極重極貴物不得將來向尊貴邊須知不可思議不當好心所以古人道猶如雙鏡光光相對光明相照更無虧盈豈不是一般猶喚作影像邊事如日出照於世間明朗是一半那一半喚作甚麼如今人未識得光影門頭戶底麤淺底事將作屋裏事又爭得僧問雲居如何是沙門所重居曰心識不到處僧問廣利容禪師千途路絕語思不通時如何範曰猶是堦下漢曰如何是堦上漢範曰龍樓不舉手乃曰作麼生是尊貴底人試道看莫祗向長連牀上坐地見他人不肯忽被明眼拶著便向鐵圍山裡藏身若到廣利門下須道得第一句即開一線道與兄弟商量時有僧出禮拜範曰將謂是異國舶主元來是此土商人此非深明第一波羅蜜多固難洞見尊重一路瞭若指掌如是圓融能成十方諸佛軌則名善法行通曰即上現塵現界種種妙用咸是第一波羅蜜多從不思議中流出故能圓融無礙成就十方諸佛利生軌則是軌則者法也圓融無迹斯為善法非善法不能化導眾生此行已圓滿而漸向悲願矣大慧杲禪師上堂欲識佛性義當觀時節因緣時節若至其理自彰舉起拂子云還見麼擊禪床曰還聞麼聞見分明是箇甚麼若向這裡提得出皇恩佛恩一時報足其或未然徑山打葛藤去也復舉拂子曰看看無量壽世尊在徑山佛子頭上放大光明照不可說不可說又不可說佛剎微塵數世界中轉大法輪作無量無邊廣大佛事其中若凡若聖若正若邪若草若木有情無情遇斯光者皆獲無上正等菩提所以諸佛於此得之具一切種智諸大菩薩於此得之成就諸波羅蜜辟支獨覺於此得之出無佛世現神通光明諸聲聞眾洎夜來迎請五百阿羅漢於此得之得八解脫具六神通天人於此得之增長十善脩羅於此得之除其憍慢地獄於此得之頓超十地餓鬼旁生及四生九類一切有情於此得之隨其根性各得受用無量壽世尊放大光明作諸佛事已竟然後以四大海水灌彌勒世尊頂與授阿耨多羅三藐三菩提記當於補處作大佛事無量壽世尊有如是神通有如是自在有如是威神到這裡還有知恩報恩者麼若有出來與徑山相見如無聽取一頌十方法界至人口法界所有即其舌祗憑此口與舌頭祝吾君壽無間歇億萬斯年注福源如海滉漾永不竭師子窟內產狻猊鸑鷟定出丹山穴為瑞為祥徧九垓草木昆虫盡懽悅稽首不可思議尊喻如眾星拱明月故令宣暢妙伽陀第一義中真實說大慧此段葛藤備顯十方諸佛軌則足為諸方善法之式惜當時無一相見者便與推倒禪牀看伊有何言說指示一一皆是清淨無漏一真無為性木然故名真實行通曰全性是脩故成軌則全脩是性故本無為明得性本無為即不趨菩提本自清淨不除煩惱本自無漏任運騰騰皆名實行若一涉有為盡非真也有為即屬造作非本然故馬祖示眾云道不用脩但莫污染何為污染但有生死心造作趨向皆是污染若欲直會其道平常心是道何為平常心無造作無是非無取捨無斷常無凡無聖經云非凡夫行非聖賢行是菩薩行只如今行住坐臥應機接物盡是道道即是法界乃至河沙妙用不出法界若不然者云何言心地法門云何言無盡燈一切法皆是心法一切名皆是心名萬法皆從心生心為萬法之根本經云識心達本源故號為沙門名等義等一切諸法皆等純一無雜若於教門中得隨時自在建立法界盡是法界若立真如盡是真如若立理一切法盡是理若立事一切法盡是事舉一千從理事無別盡是妙用更無別理皆由心之迴轉譬如月影有若干真月無若干諸源水有若干水性無若干森羅萬象有若干虗空無若干說道理有若干無礙慧無若干種種成立皆由一心也建立亦得掃蕩亦得盡是妙用盡是自家非離真而有立處立處即真盡是自家體若不然者更是何人一切法皆佛法諸法即是解脫解脫者即是真如諸法不出於真如行住坐臥悉是不思議用不待時節經云在在處處則為有佛佛是能仁有智慧善機權能破一切眾生疑網出離有無等縛凡聖情盡人法俱空轉無等倫超於數量所作無礙事理雙通如天起雲忽有還無不留礙迹猶如畫水成文不生不滅是大寂滅在纏名如來藏出纏名淨法身法身無窮體無增減能大能小能方能圓應物現形如水中月滔滔運用不立根栽不盡有為不住無為有為是無為家用無為是有為家依不住於依故云如空無所依心生滅義心真如義心真如者譬如明鏡照像鏡喻於心像喻諸法若心取法即涉外因緣即是生滅義不取諸法即是真如義聲聞聞見佛性菩薩眼見佛性了達無二名平等性性無有異用則不同在迷為識在悟為智順理為悟順事為迷迷即迷自家本心悟即悟自家本性一悟永悟不復更迷如日出時不合於暗智慧日出不與煩惱暗俱了心及境界妄想即不生妄想既不生即是無生法忍本有今有不假脩道坐禪不脩不坐即是如來清淨禪如今若見此理真正不造諸業隨分過一生一衣一衲坐起相隨戒行增熏積於淨業但能如是何慮不通久立諸人珍重馬大師說本來真實不假修為而又不廢戒行增熏積於淨業真得圓頓法要如是十行不離前十住法隨位增進無非開拓性覺成熟佛果而已住而繼之以行正欲不住於依行菩薩行詳如馬大師所示是乃一味真實行門也阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度眾生滅諸度相迴無為心向涅槃路名救護一切眾生離眾生相迴向通曰十行具足現塵現剎一為無量無量為一即是神通能成十方諸佛軌則即是佛事純潔精真唯一真實清淨無漏遠諸留礙之患可謂能自度矣使一向躭著無為則名為自了漢故當度脫眾生使度生時度相未滅則著我人眾生壽者故當滅諸度相迴我無為之心向彼眾生共趨涅槃之路自證涅槃性本無為茲引眾生趨於涅槃亦只無為故終日度脫眾生實無度相可得若見有可度即涉有為背涅槃路非復不生不滅之本旨也故滅諸度相即名離眾生相迴向度相且無又何眾生相之有僧問黃檗佛度眾生否檗云實無眾生如來度者我尚不可得非我何可得佛與眾生皆不可得僧云現有三十二相及度眾生何得言無檗云凡所有相皆是虗妄若見諸相非相即見如來史山人問圭峯禪師諸經皆說度脫眾生且眾生即非眾生何故更勞度脫峯答云眾生若是實度之則為勞既自云即非眾生何不例度而無度合之足為此段經文註疏又南嶽思大禪師因誌公令人傳語云何不下山教化眾生一向目視雲漢作麼師曰三世諸佛被我一口吞盡何處更有眾生可度本覺一頌曰目視烟霄臥白雲不知山下有乾坤從何更有眾生度三世如來一口吞尼閑林英頌曰佛與眾生一口吞纖毫不立道方存杖頭日月纔挑起鼓動三千海岳昏若大師者真得離眾生相迴向矣豈但證鐵輪位而已乎壞其可壞遠離諸離名不壞迴向通曰壞其可壞即離眾生相也遠離諸離即離相亦離也壞相則所空離離則能空能所俱空本覺不壞故名不壞迴向曰不壞者所以別於二乘頑空及外道斷見也雖壞諸相而有不壞者存此其所以為不壞迴向也真禪師問本淨禪師曰道既無心佛有心否佛之與道是一是二淨曰不一不二真曰佛度眾生為有心故道不度人為無心故一度一不度何得無二淨曰若言佛度眾生道無度者此是大德妄生二見如山僧即不然佛是虗名道亦妄立二俱不實總是假名一假之中如何分二真曰佛之與道縱是假名當立名時是誰為立若有立者何得言無淨曰佛之與道因心而立推窮立心心亦是無二俱不實知如夢幻即悟本空強立佛道二名此是二乘見解因說無脩無作偈曰見道方脩道不見復何脩道性如虗空虗空何所脩徧觀脩道者撥火覓浮漚但看弄傀儡線斷一時休傀儡可壞而弄傀儡者非可壞也故壞眾生相時不壞虗空非離壞相外而別有所謂不壞也即壞即不壞故名不壞迴向本覺湛然覺齊佛覺名等一切佛迴向通曰相可壞而知壞者不壞離可離而知離者不離此所謂本覺也湛入合湛即識即智亦可謂之湛然此云本覺湛然非識不搖處之湛然也唯此本覺非識故能齊於佛覺凡情聖解一切銷鎔但有一真實故能與一切諸佛等雖等一切佛覺要且不是等覺尚有回向在有進趨在故名等一切佛迴向黃檗云聲聞者因聲得悟故謂之聲聞但不了自心於聲教上起解或因神通或因瑞相言語運動聞有菩提涅槃三僧祗劫脩成佛道皆屬聲聞道謂之聲聞佛唯直下頓了自心本來是佛無一法可得無一行可修此是無上道此是真如佛學道人秪怕一念有即與道隔矣念念無相念念無為即是佛學道人若欲得成佛一切佛法總不用學唯學無求無著無求即心不生無著即心不滅不生不滅即是佛八萬四千法門對八萬四千煩惱祗是教化接引門本無一切法離即是法知離者是佛但離一切煩惱是無法可得味黃檗知離者是佛一語則經所云本覺湛然覺齊佛覺者意自躍如又慧超咨法眼如何是佛眼云汝是慧超僧問疎山如何是佛山曰何不問疎山老漢如此答者甚眾總之提醒本覺當下即與佛等精真發明地如佛地名至一切處迴向通曰本覺精真非獨靈明自固而已更能發明施設履以成地地如佛地與初治地住大不侔矣有是真如之體周徧法界即有是真如之用周徧法界故佛之覺徧一切處而佛之行亦徧一切處有不徧者非佛地也此但能如之非能與佛一故名至一切處迴向僧問臨濟如何是三眼國土濟云我共你入淨妙國土中著清淨衣說法身佛又入無差別國土中著無差別衣說報身佛又入解脫國土中著光明衣說化身佛此三眼國土皆是依變約經論家取法身為根本報化二身為用山僧見處法身即不解說法所以古人云身依義立土據體論法性身法性土明知是建立之法依通國土空拳黃葉用誑小兒蒺藜菱刺枯骨上覓什麼汁心外無法內亦不可得求什麼物天衣懷禪師上堂無邊剎境自他不隔於毫端且道妙喜世界不動如來說什麼法十世古今始終不離於當念祗如威音王佛最初一會度多少人若是通方作者試道看良久曰行路難行路難萬仞峰頭君自看故能悟法性身法性土要歸於無物是真佛地若有所得即為有所何能至一切處世界如來互相涉入得無罣礙名無盡功德藏迴向通曰世界即真如法界屬相分如來即真如本體屬見分見相二分始同一源故雖根塵歷然彼此可以涉入舉見而相在其中舉相而見在其中即見莫非相即相莫非見也故世界如來互相涉入本無罣礙而不免有罣礙者見未融也夫精真發明至一切處尚於一切處作二見在今互相涉入精真即一切處一切處即是精真心境俱融兩無妨礙理不礙事事不礙理充滿一切處故曰無盡功德藏也前十行中無量功德但備德於身此無盡功德藏用之不窮取之不竭蓋指如來藏識海也殆與虗空藏菩薩身界涉入而能廣行佛事隨順眾生者等矣五祖演上堂千峯列翠岸柳垂金樵父謳歌漁人鼓舞笙簧聒地鳥語呢喃紅粉佳人風流公子一一為汝諸人發上上機開正法眼若向這裏薦得金色頭陀無容身處若也不會喫粥喫飯許你七穿八穴又法燈偈曰誰信天真佛興悲幾萬般蓼華開古岸白鷺立沙灘露滴庭莎長雲收溪月寒頭頭垂示處子細好生觀此世界如來渾成一片從此悟入名真解脫以此功德接引眾生世界無盡功德亦無盡於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根迴向通曰佛地同清淨同涅槃同何故依因發揮各各不同良由夙昔所種善根各得其性之所近善雖平等而因根發苗依因證果萬有不齊不妨自修自悟取證涅槃正不必拘拘一門共遵一轍也隨順云者相機接引不強其所不能此乃普度眾生之大權也雪峰在洞山作飯頭淘米次山問淘沙去米淘米去沙峰曰沙米一時去山曰大眾喫箇甚麼峰遂覆却米盆山曰據子因緣合在德山後果嗣德山投子拈云大眾洞山恁麼道是甚麼道理雖然一色乾坤爭奈山高水闊所以野人云功夫不到不方圓言語不通非眷屬乃代云淘沙去米淘米去沙無影長生桂經霜結子頻大眾喫箇甚麼金鳳採華銜不盡玉雛食蘂葉長新頌曰滿鉢盛來一物無豈同香積變珍蘇日月並輪長不照木人舞袖向紅爐投子最善洞上之旨其揀辨最晣僧問五祖演如何是臨濟下事演曰五逆聞雷曰如何是雲門下事演曰紅旗閃爍曰如何是溈仰下事演曰斷橫古路曰如何是曹洞下事演曰馳書不到家僧禮拜演曰何不問法眼下事曰留與和尚演曰巡人犯夜此五宗善根各有所契非但洞山指雪峰見德山而已自嵩山慧安指南嶽讓見六祖石頭指藥山見馬祖馬祖指丹霞見石頭皆所以隨順平等善根令其依因發揮取涅槃道何甞執著一法而證極果哉真根既成十方眾生皆我本性性圓成就不失眾生名隨順等觀一切眾生迴向通曰善根者各具之善根依此善根取涅槃道則善根化而為真根矣無善可指但唯一真性真圓融周徧法界故十方眾生皆我本性本性既圓已自成就謂之曰圓不妨會眾生為一體亦不失眾生之相眾生未必一一成就而吾性圓滿無一眾生不是佛性故性圓成就不至遺失一眾生也此隨順等觀一切眾生則無論人畜善惡下至蠢動含靈皆有佛性不但隨順平等善根而已如常不輕菩薩逢人便拜曰我不敢輕於汝等汝等皆當成佛正合此旨育王裕禪師上堂盡大地是沙門眼徧十方是自己光為甚麼東弗于逮打鼓西瞿耶尼不聞南贍部洲點燈北單越暗坐直饒向這裏道得十全猶是光影裏活計撼拂子曰百雜碎了也作麼生是出身一路擲下拂子曰參此事非實參實證豈能窺見真根消息雪峰垂語云望洲亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也時有僧便出問僧堂前即且置如何是望洲亭烏石嶺相見處峰驟步歸方丈於此見得方信十方眾生皆我本性即一切法離一切相唯即與離二無所著名真如相迴向通曰前云離一切相即一切法於相而離相猶有法相在此云即一切法離一切相於法而離法並其法相而忘之矣有即有離雖無法相不無無法相者是亦有遣法相也於此俱無絲毫淨盡但一真體如如不動此謂真如相不得以相相法相及遣法相而並語也所云離一切相視離眾生相者為密所云二無所著視遠離諸離者為密至此則所知障淨真性現前來無所從去無所至本自如如故曰真如育王裕禪師上堂行時絕行迹說時無說蹤行說若到則垛生招箭行說未明則神鋒劃斷就使說無滲漏行不迷方猶滯殻漏在若是大鵬金翅奮迅百千由旬十影神駒馳驟四方八極不取次啗啄不隨處理身且總不依倚還有踐履分也無剎剎塵塵是要津此語可謂得真如髓於此得超脫去便契如如真得所如十方無礙名無縛解脫迴向通曰遠離諸相但一真如即名無縛矣有真如相在猶為無縛所縛未能無礙即未為真解脫也真得所如者所在如如更無滯礙即真如相且忘之矣始焉遣法執名有縛解脫今者遣無法執名無縛解脫無縛且脫更有何縛既無所縛安往弗如此十方無礙非得真如中之最真者不足以語此昔洛浦初為臨濟侍者濟常對眾美之曰臨濟門下一隻箭誰敢當鋒浦自謂已足辭往南遊濟曰臨濟門下有箇赤稍鯉魚搖頭擺尾向南方去不知向誰家虀瓮裡淹殺浦遊歷罷直往夾山卓菴經年不訪夾山山乃修書令僧持往浦接得便坐却再展手索僧無對浦便打曰歸去舉似和尚僧回舉似夾山山曰這僧若開書三日內必來若不開書斯人救不得也浦果三日後至見夾山不禮拜當面而立山曰雞栖鳳巢非其同類出去浦云自遠趨風乞師一接山曰目前無闍黎此間無老僧浦便喝無之一字亦不許立山曰且莫草草匆匆須知雲月是同溪山各異截斷天下人舌頭即不無爭教無舌頭人解語浦無語山便打浦遂伏膺果然向夾山虀瓮裡淹殺投子拈曰到這裏作麼生道得一句得同身共命一氣連枝遂代云無目繡雙鳳冲虗透碧霄頌曰無伴石人夜入山雲籠紅頂綠衣寒喝開劫兆三峯頂捧出金襴對日看前二句頌坐斷天下人舌頭藏身處沒蹤跡之旨也後二句頌無舌人解語沒蹤跡處莫藏身之旨也大小洛浦止得一橛早被臨濟勘破使不遇夾山幾為無縛所縛斷送一生矣性德圓成法界量滅名法界無量迴向通曰從真如性發起德用理智行三德俱圓理事無礙空有俱非一性渾成更無蹤跡前云至一切處猶存量見則法界性未離有量今法界量滅故名無量佛果勤謁張無盡劇談華嚴旨要曰華嚴現量境界理事全真初無假法所以即一而萬了萬為一一復一萬復萬浩然莫窮心佛眾生三無差別卷舒自在無礙圓融此雖極則終是無風帀帀之波公於是不覺促榻勤遂問曰到此與祖師西來意為同為別公曰同矣勤曰且得沒交涉公色為之慍勤曰不見雲門道山河大地無絲毫過患猶是轉句不見一色始是半提更須知有向上全提時節彼德山臨濟豈非全提乎公乃首肯翌日復舉事法界理法界至事理無礙法界勤又問此可說禪乎公曰正好說禪也勤笑曰不然正是法界量裡在蓋法界量未滅若到事事無礙法界法界量滅始好說禪如何是佛乾屎橛如何是佛麻三斤是故真淨偈曰事事無礙如意自在手把豬頭口誦淨戒趂出婬房未還酒債十字街頭解開布袋公曰美哉之論豈易得聞乎如此妙義非如此深談亦不能曲盡其旨以上十回向回真向俗回志向悲使真俗圓融智悲不二至此限量情見俱已渾化乃可登地證菩薩果矣阿難是善男子盡是清淨四十一心次成四種妙圓加行即以佛覺用為己心若出未出猶如鑽火欲然其木名為煖地通曰以上四十一心自乾慧至十迴向漸次脩治漸次充拓淘汰凡情已極清淨第聖位難躋聖果難熟到此田地神不可致思化不可助長優而游之俟其自至而已世尊累劫脩行洞晣奧密於此復立四種妙圓加行將成未成之間實有此四種地位非佛眼其孰辨之前云覺齊佛覺中心了了猶未能用也至是用為己心拈弄不出如鑽木取火木未及然故名煖地火之出也無心鑽久則木自然覺之用也無意定久則慧自現非可人力與其間也翠岩真上堂舉龍牙頌曰學道如鑽火逢煙未可休直待金星現歸家始到頭神鼎頌曰學道如鑽火逢煙便可休莫待金星現燒脚又燒頭真曰若論頓也龍牙正在半途若論漸也神鼎猶少悟在於此復且如何諸仁者今年多落葉幾處掃歸家據翠岩見處燒不盡現柴用不盡現火胡以鑽為雖然須是出格人始得又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地通曰見處與佛無異猶貴行履相稱故能以佛之覺用為己心即能以己之心成佛所履蓋交互言之為有佛見己見在故若依非依見佛則若依於佛唯己則若無所依且佛履無迹今微有比擬轍迹未忘如登高山身已入空下有微礙以為依則身在空而非依也以為非依則足履頂而非不依也將入神化而毫末未融故若有礙大般若以執著虗空法身為頂墮正與此類僧問趙州如何是妙峯孤頂州云老僧不答你這話僧云為什麼不答這話州曰我若答你恐落在平地上有味哉分明答了也後保福長慶遊山次福以手指云只這裏便是妙峯頂慶云是則是可惜許有僧舉似鏡清清云若不是孫公便見髑髏遍野雪竇頌云妙峯孤頂草離離拈得分明付與誰不是孫公辨端的髑髏著地幾人知孫公可惜許正恐落在平地若落平地商量則髑髏前見鬼人無數又洞山問僧甚處來曰遊山來山曰還到頂麼曰到山曰頂上有人麼曰無人山曰恁麼則不到頂也曰若不到頂爭知無人山曰何不且住曰某甲不辭住西天有人不肯山曰我從來疑著這漢若此僧者到頂不住更有何礙即頂墮且無患何患平地哉心佛二同善得中道如忍事人非懷非出名為忍地通曰己心佛履二迹俱融渾同一體更無微礙既不即心即佛亦不非心非佛但向道不是物此即所謂中道也始焉中中流入其於中道純真第能信住行向至是乃能善得之矣謂之善得不費纖毫功力抑且得無所得既無所得則亦無所說如忍事底人既不懷疑亦不說出但有默藏而已故名忍地龍圖王蕭字觀復留昭覺日聞開靜板聲有省問南堂曰某有箇見處纔被人問却開口不得未審過在甚處堂曰過在有箇見處却問朝斾幾時到任公曰去年八月四日又問自按察幾時離衙公曰前月二十堂曰為甚麼道開口不得公乃契悟王龍圖似證忍地得南堂數語見處頓忘然亦有既超忍地未為透脫者如五祖演因浮山遠指見白雲端舉僧問南泉摩尼珠話請益端叱之演領悟獻投機偈曰山前一片閑田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風端特印可令掌磨事未幾端至語之曰有數禪客自廬山來皆有悟入處教伊說亦說得有來由舉因緣問伊亦明得教伊下語亦下得祗是未在演於是大疑私自計曰既悟了說亦說得明亦明得如何却未在遂參究累日忽然省悟從前寶惜一時放下走見白雲端端為手舞足蹈演亦一笑而已演後語人曰吾因茲出一身白汗便明得下載清風故知絲毫未化尚留理障如此妙圓加行寧但四端哉數量消滅迷覺中道二無所目名世第一地通曰心佛二同已忘彼此善得中道已離二邊然有二同消息在有善得悟機在即是數量即是名目故數量世人所可測也名目世人所可指也即不得超乎世佛身無為不墮諸數能消滅數量幾於不墮矣何謂消滅彼有同有異有迷有覺有得有失皆屬數量可以名目今惟善得中道固不可目之為迷將並其所得而忘之又不可目之為覺不可卜度不可形容正銷滅數量之實也世人情量所及者知有佛知有道而已今曰心不是佛智不是道安所容其慮乎世人色目所到者如此同如此得而已今曰同無所同得無所得安所窺其妙乎此內凡已盡將入聖位唯聖為能知聖非世人意見之所能窺蓋高出乎世人之上矣故名世第一地若進十地極乎妙覺又名出世第一地也僧問洞山三身中那身不墮諸數山云吾常於此切天童頌云不入世未循緣劫壺空處有家傳白蘋風細秋江暮古岸船歸一帶烟此頌於不墮諸數更切同安志禪師嗣先同安丕丕將示滅上堂曰多子塔前宗子秀五老峰前事若何三舉未有對者末後志出曰夜明簾外排班立萬里謳歌道太平丕曰須是這驢漢始得住後僧問二機不到處如何舉唱志云徧處不逢玄中不失丹霞頌曰這邊那畔總難逢一句無私不處中紅日暮沉西嶂外空留孤影照溪東此迷覺中道二無所目正是二機不到處然同安二邊不立中道不安將中道亦不處此所以為無者真宗也於宗門最為第一矧但世第一地而已乎阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地通曰大菩提云者是向上一路諸佛命脉所關於此通達得大徹悟見諸相非相即見如來既見如來故能盡佛境界佛境界者惟佛與佛乃能究盡是不可思議境界以三諦圓融當之未為盡也中道純真似於菩提無異然知中道不安者是大菩提也前歡喜行具足無量妙德十方隨順以功德言故屬行此則通達無上菩提超凡入聖已履佛境已登果位故名曰地初得法喜喜惟通達得無障礙其實得無所得喜無所喜非世情歡喜所可論量也簽判劉經臣少以逸才登仕於佛法未之信會照覺總禪師與語啟廸因醉心祖道既抵京師謁慧林冲禪師於僧問雪竇如何是諸佛本源答曰千峯寒色語下有省歲餘官雒幕參韶山杲禪師將去任辭韶山山囑曰公如此用心何愁不悟爾後或有非常境界無量歡喜宜急收拾若收拾得去便成法器若收拾不得則有不寧之疾成失心之患矣未幾復至京師依正覺逸禪師請問因緣逸曰古人道平常心是道你十二時中放光動地不自覺知向外馳求轉疎轉遠公益疑不解一夕入室逸舉傳燈所載香至國王問波羅提尊者何者是佛提曰見性是佛之語問之公不能對疑益甚遂歸就寢熟睡至五鼓覺來方追念間見種種異相表裏通徹六根震動天地同旋如雲開月現喜不自勝忽憶韶山臨別所囑之言姑抑之逮明悉以所得告逸為證據且曰更須用得始得公曰莫要踐履否逸曰這箇是甚麼事却說踐履公乃默契後作發明心地頌八首及著明道諭儒篇以警世若劉公所證不知于初地何如然非常歡喜不辜韶山授記其亦現宰官身而來者耶異性入同同性亦滅名離垢地通曰前心佛二同及數量銷滅但就一己善性而論今異性入同槩舉眾生國土同此一性龍蛇混雜凡聖交參是菩薩境界非覺通如來不垢不淨之旨未易達此若見眾生性異即見眾生垢今既入同已離濁邊垢矣若見眾生性同同性未泯即為法垢今同性亦滅則離清邊垢矣此離垢地乃菩薩位中所重惟離清邊垢還於如來無垢本體是當非離濁邊垢者可槩論也僧問瑞岩如何是佛曰石牛如何是法曰石牛兒曰恁麼即不同也曰合不得曰為甚麼合不得曰無同可同合甚麼又僧問曹山雪覆千山為甚麼孤峯不白山曰須知有異中異曰如何是異中異山曰不墮諸山色瑞岩善說同曹山善說異合二則觀之則知異性入同者無同可同離垢成異者更異中異此豈可以淺近窺乎淨極明生名發光地通曰如大圓鏡塵垢既離已稱淨矣而非極淨也為有法垢在也法垢既離所知障淨然後本覺明生從定發慧自有一段光輝非尋常覺照可比前偈云淨極光通達寂照含虗空此等光景豈頭頭上明物物上通所能彷彿者乎洞山問密師伯作什麼密云把針山曰把針事作麼生密云針針相似山曰二十年同行作這箇語話密云長老又作麼生山曰大地火發天童拈云大地火發間不容髮南海崑崙天寒不韈祖祖相傳一頭搕𢶍蓋指真悟既發即與佛祖心心相印此發光地固不易談隱山和尚偈曰三間茅屋從來住一道神光萬境閒莫把是非來辨我浮生穿鑿不相關彼所謂淨極發光者非耶明極覺滿名𦦨慧地通曰明已極覺已滿如大火聚觸著便燒一切緣影悉皆爍絕不徒曰慧而曰𦦨慧慧之至也此不可近即般若智太末虫處處能泊唯不能泊於火𦦨之上識慮處處能緣唯不能緣於般若之上故名𦦨慧地盤山上堂夫心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物洞山別語云光境未忘復是何物保福舉問長慶曰據二老總未勦絕在作麼生得剿絕去慶良久福云情知你向鬼窟裏作活計慶云汝又作麼生福云兩手扶犁水過膝天童拈云俱亡未亡奪人奪境為甚麼保福不肯長慶太平本是將軍致不許將軍見太平據保福見處𦦨慧地亦不許坐著玄之又玄矣一切同異所不能至名難勝地通曰地前智名異登地智名同即如同中又有同異離垢為淨而淨極則明生發光為明而明極則覺滿未至十分則有同異可言已至十分則無同異可指如金已足色更無加減何從而指其為同何從而指其為異既無異可指則凡情所不能至既無同可指則聖解所不能至凡情可至則凡得而勝之聖解可至則聖得而勝之今一切同異聖凡智慮皆不能至至且不能孰為勝哉故名難勝地佛言設有一法勝過涅槃吾說亦如夢幻是涅槃者最難勝之法也臨濟到鳳林林問有事相借問得麼濟云何為剜肉作瘡林云海月澄無影遊魚獨自迷濟云海月既無影遊魚何得迷林云觀風看浪起翫月野帆飄濟云孤輪獨照江山靜長嘯一聲天地秋林云任將三寸輝天地一句臨機試道看濟云路逢劍客須呈劍不是詩人莫獻詩林便休濟乃有頌大道絕同任向西東石火莫及電光罔通溈山問仰山石火莫及電光罔通從上諸聖將甚麼為人仰云和尚意作麼生溈云但有言說都無實義仰云不然溈云子又作麼生仰云官不容針私通車馬大抵臨濟與鳳林相見雖電光石火莫能喻之而仰山且以為私通車馬正所謂悟則迦葉不覆藏不悟則如來有密語也此一切同異所不能至非有真實契悟孰知其難勝哉無為真如性淨明露名現前地通曰同異不至非可作為既無造作即是真如此真如性在迷不加損在悟不加益但為情見汙染不得明露唯淨極明極則圓陀陀光爍爍淨躶躶沒可把寂滅之體乃得現前故名現前地大安將往洪井路出上元逢一老父謂曰汝往南昌當有所得安即造百丈禮而問曰學人欲求識佛何者即是丈曰大似騎牛覓牛安於言下有省曰識得後如何丈曰大似騎牛到家安曰未審始終如何保任丈曰如牧牛人執杖視之不令犯人苗稼安自茲領旨更不馳求後繼溈山住持上堂汝諸人總來就安求覓甚麼若欲作佛汝自是佛擔佛傍家走如渴鹿趂陽𦦨相似何時得相應去汝欲作佛但無許多顛倒攀緣妄想惡覺垢淨眾生之心便是初心正覺佛更向何處別討所以安在溈山三十年喫溈山飯屙溈山屎不學溈山禪祗看一頭水牯午若落路入草便把鼻孔拽轉來纔犯人苗稼即鞭撻調伏既久可憐生受人言語如今變作箇露地白牛常在面前終日露迥迥地趂亦不去汝諸人各自有無價大寶從眼門放光照見山河大地耳門放光領采一切善惡音響如是六門晝夜常放光明亦名放光三昧汝自不識取隱在四大身中內外扶持不教傾側如人負重擔從獨木橋上過亦不教失脚且道是恁麼物任持便得如是且無絲髮可見豈不見誌公和尚云內外追尋覓總無境上施為渾大有珍重有僧造大寧寬問如何是露地白牛寬以火筯插火爐中曰會麼僧云不會曰頭不欠尾不剩此二尊宿快說性淨明露可與並登現前地矣盡真如際名遠行地通曰淨未極明未極同異可至不可謂真如際同異既泯生滅既滅無為真如業已明露但未能盡其邊際耳明露既久表裡洞徹盡十方界皆真如際徧虗空滿法界全體呈露則不但現前已也理本無際無際之際乃真如際真如無際而行真如行者豈有遠近哉謂之遠行明其非人力可到也大凡行之可到者雖積累歲月不謂之遠唯行之不可到者始謂真遠如莊生喻適建德之國望之而不見其崖逾往而不知其所窮送君者皆自崖而返君自此遠矣亦足為此地喻僧問上藍和尚善財見文殊後為甚麼却往南方藍云學憑入室知乃通方僧云到蘇摩城為甚麼彌勒却遣見文殊藍云道曠無涯逢人不盡投子拈云道無迷悟法證由師不住聖凡莊嚴妙行是以文殊遣去須彌登山海岸逢師市廛禮友或刀山婬舍罪杻王宮或童女童男瞿夷聖后彌勒彈指普賢親瞻再見文殊復有何事信知通方知有道曠無涯不昧光蹤力窮盡妙諸仁者還知更有一人為甚麼善財不參且道是甚麼人良久曰滿頭白髮離崖谷半夜穿雲入市廛頌曰日出昇空高下周崑崙流派入川流春山雲逗風無盡雁去回南天地秋此可為遠行地矩度為達一切法盡真如際故一真如心名不動地通曰盡真如際放之則彌乎六合一真如心卷之則不盈一握心本不動雖行無迹行乎無迹斯謂遠行既盡其際即完其體施設萬端真如不動此不動地於遠行而見其不動也際即是心心即是際前際中際後際三際不可得過去未來現在三心亦不可得總一真如孰為行孰為止孰為動孰為不動哉無動無靜斯可語真不動也已東京俊禪師初謁投子子問昨夜宿何處俊曰不動道場子曰既云不動曷由到此俊曰至此豈有動耶子曰元來宿不著處蓋默許之淨慈佛行上堂鴈過長空影沉寒水鴈無遺蹤之意水無留影之心若能如是正好買草鞋行脚所以道動則影現覺則氷生不動不覺正在死水裏薦福老人出頭不得即且置育王今日又作麼生向道莫行山下路果然猿呌斷膓聲此不動地須親到一回始得不然幾何不坐在死水裡作活計發真如用名善慧地阿難是諸菩薩從此已往脩習畢功功德圓滿亦目此地名脩習位通曰從真如心發真如用所謂無師智自然智一切智四無礙智演說無量阿僧祇句義無有窮盡作大法師普度羣品智悲雙運應時合節故曰善慧前𦦨慧但謂自己光明今善慧謂以善法及人顯其慧用故不同自遠行地後不動地前已證寂滅無功用道猶目此地為修習位者何也但自十地功德圓滿之後律之略欠分數故目此地為脩習位謂初發慧用未忘乎慧視法雲徧覆無欠無餘似有間耳又此修而無修習而無習如舟將到岸篙槳不施尚在運行故也仰山一日臥次夢入彌勒內院眾堂中諸位皆足唯第二位空仰遂就座有一尊者白槌云今當第二座說法仰起白搥云摩訶衍法離四句絕百非諦聽諦聽眾皆散去及覺舉似溈山溈曰子已入聖位仰便禮拜天童頌云夢中擁衲參耆舊列聖森森坐其右當仁不讓楗搥鳴說法無畏師子吼心安如海量大如斗鮫目淚流蚌腸珠剖譫語誰知洩我機龐眉應笑楊家醜離四句絕百非馬師父子病休醫此仰山於夢中發真如用何假修習溈山親為證據固知人位已顯信位不足言矣慈陰妙雲覆涅槃海名法雲地通曰智慧功圓無復自利純是利他故大慈之陰充滿法界無心無緣而應彼心緣施作利潤而本寂無作如雲出無心徧覆一切謂之妙雲即性覺妙明之妙慈本自妙非藉修為而謂之覆涅槃海者涅槃自性本無生滅覺海慈雲稱性而起亦無生滅一切眾生在涅槃中還令眾生證涅槃果如是而蔭如是而覆無欠無餘乃可稱妙也已法而譬之於雲法本無心雲而係之於法即雲即法故不言慧用而但言雲蓋已渾同造物不作二見矣此法雲地鄰於佛地名灌頂菩薩位六祖示眾云善知識若欲入甚深法界及般若三昧者須修般若行持誦金剛般若經即得見性當知此經功德無量無邊經中分明讚嘆莫能具說此法門是最上乘為大智人說為上根人說小根小智人聞心生不信何以故譬如大龍下雨於閻浮提城邑聚落悉皆漂流如漂草葉若雨大海不增不減若大乘人若最上乘人聞說金剛經心開悟解故知本性自有般若之智自用智慧常觀照故不假文字譬如雨水不從天有元是龍能興致令一切眾生一切草木有情無情悉皆蒙潤百川眾流却入大海合為一體眾生本性般若之智亦復如是善知識小根之人聞此頓教猶如草木根性小者若被大雨悉皆自倒不能增長小根之人亦復如是元有般若之智與大智人更無差別因何聞法不自開悟緣邪見障重煩惱根深猶如大雲覆蓋於日不得風吹日光不現般若之智亦無大小為一切眾生自心迷悟不同迷心外見修行覓佛未悟自性即是小根若開悟頓教不執外脩但於自心常起正見煩惱塵勞常不能染即是見性善知識內外不住去來自由能除執心通達無礙能修此行與般若經本無差別六祖不識一字說法如雲如雨且能分別聞法者大小根器之殊亦足補十地所未備云如來逆流如是菩薩順行而至覺際入交名為等覺阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地通曰如來權智下隨機感故逆流而出菩薩實智上合覺心故順流而入瓔珞經曰等覺照寂妙覺寂照即其義也二覺之際故名入交入交云者即與如來法流水接也却於此處名等覺位謂覺與如來等無差別特未極於妙耳須于大寂滅海逆流而出妙同萬物乃為妙覺也金剛心中初乾慧地即前乾慧心胡為至是始獲之哉未與法流水接空見其體既與法流水接始踐其實如月初生明微露圓相本非欠少既而弦既而望乃滿其量只是初見時圓相非有二也金剛云者以摧壞諸法得名諸法可壞而此金剛慧獨不可壞前者欲習初乾純是智慧智慧無二但乾不盡爾十地已前以一地壞一地至無一法可得故曰是覺始獲金剛心中初乾慧地涅槃云發心畢竟二不別也其斯之謂乎僧問黃檗心既本來是佛還修六度萬行否檗云悟在於心非關六度萬行六度萬行盡是化門接物度生邊事設使菩提真如實際解脫法身直至十地四果聖位盡是度門非關佛心心即是佛所以一切諸度門中佛心第一但無生死煩惱等心即不用菩提等法所以道佛說一切法度我一切心我無一切心何用一切法從佛至祖並不論別事唯論一心亦云一乘所以十方諦求更無餘乘此眾無枝葉唯有諸真實所以此意難信達磨來此土至梁魏二國唯有可大師一人密信自心言下便會即心是佛身心俱無是名大道大道本來平等所以深信含生同一真性心性不異即性即心心不異性名之為祖所以云認得心性時可說不思議即此心不異性名之為祖可想見覺際入交景象從前堦級了無干涉但只一心與佛無別如是重重單複十二方盡妙覺成無上道通曰單有七位謂乾慧煖頂忍世第一等覺妙覺也複有五位謂信住行向地也每位疊成十位故曰複如是重重漸脩漸證總有十二堦級方至妙覺成無上道而等覺尚居十一故於妙覺未盡惟至十二方為盡也是妙豈有加於乾慧哉特即乾慧磨礲瑩淨以顯其妙爾合論曰三世如來付授一切菩薩修證法式銓量深淺力用分別地位等差始自十信然以為信者尚屬生滅故當住心乃立十住又以為住者缺資發方便之用故成行心乃立十行又以為行者蓋自利未有以及眾生故施迴向乃立十迴向自十信而至住行迴向者三賢位也又自三賢即登初地以大慈大悲發生資養茂益成就之故有地名於初地方曰證無生法忍乃至十地之終磨鍊餘習之效與本覺真如相等故名等覺如易曰窮神知化者也至入妙覺則一而已無有等相如但曰神也此經特異於十信前加乾慧地於十地前加煖頂忍世第一地雜華於十住曰證無生法忍諸經於十地曰證無生法忍尚在五十五數之中世尊於此乃立三漸次證無生法忍三漸次乃方便安立者出於五十五數之外世尊之意蓋欲示從凡夫能實證之法故也黃檗謂休曰佛與眾生更無別異但是眾生著相外求求之轉失使佛覓佛將心捉心窮劫盡形終不能得不知息念忘慮佛自現前此心即是佛佛即是眾生為眾生時此心不減為諸佛時此心不添乃至六度萬行河沙功德本自具足不假修添遇緣即施緣息即寂若不決定信此是佛而欲著相脩行以求功用皆是妄想與道相乖此心即是佛更無別佛亦無別心此心明淨猶如虗空無一點相貌舉心動念即乖法體即為著相無始以來無著相佛脩六度萬行欲求成佛即是次第無始以來無次第佛但悟一心更無少法可得此即真佛佛與眾生一心無異猶如虗空無雜無壞如大日輪照四天下日昇之時明遍天下虗空不曾明日沒之時暗遍天下虗空不曾暗明暗之境自相凌奪虗空之性廓然不變佛及眾生心亦如是若觀佛作清淨光明解脫之相觀眾生作垢濁暗昧生死之相作此解者歷河沙劫終不得菩提為著相故惟此一心更無微塵許法可得即心是佛妙哉妙哉非檗實證妙覺不落堦級惡能洞朗若是得是說而存之庶於此經圓頓之旨兩不相妨是種種地皆以金剛觀察如幻十種深喻奢摩他中此云止用諸如來毗婆舍那此云觀清淨脩證漸次深入阿難如是皆以三增進故善能成就五十五位真菩提路作是觀者名為正觀若他觀者名為邪觀通曰十種深喻者應觀一切業如幻一切法如𦦨一切性如水中月妙色如空妙音如響諸佛國土如乾闥婆城佛事如夢佛身如影報身如像法身如化不可取捨一切空故深入此空乃名實相此非作法無滅壞故若異此觀即生滅法此不但觀有為法如夢幻泡影乃至觀佛法身亦如夢幻泡影故為深喻如是觀察非小乘觀法可擬乃諸如來妙觀察智具金剛慧由寂而照由止而觀如水至清微滓不染如鑑至淨纖垢不容以是而脩脩而無脩以是而證證而無證故由乾慧漸次深入以至妙覺皆不離此金剛觀察地地俱壞法法俱乾故能興妙覺合也如是深喻如是深入豈有外於三增進中返流全一以逮獲無生法忍從是漸修隨所發行安立聖位善能成就五十五位真菩提路信住行向地為五十乾慧及四加行為五不言等覺妙覺二位者二覺即是真菩提是覺也非路也五十五位乃所由入覺之路也十方如來得成菩提皆有妙奢摩他三摩禪那最初方便至金剛觀察如幻三昧唯觀世音最為第一故五十五位菩提之路亦由三增進中返流全一始是返聞其最初方便而如幻觀察亦盡聞不住覺所覺空空所空滅生滅既滅之次第也作是觀者即十方婆伽梵一路涅槃門若他觀者非有十種深喻金剛觀察即屬生滅即為邪觀也唐僧澄觀作地住脩證偈曰脩習空華萬行宴坐水月道場降伏鏡像天魔證得夢中佛果亦略有十種深喻之致夾山上堂有祖以來時人錯會相承至今以佛祖言句為人師範若或如此即成狂人無智人去他祗指示汝無法本是道道無一法無佛可成無道可得無法可取無法可捨所以老僧道目前無法意在目前他不是目前法若向佛祖邊學此人未具眼在何故皆屬所依不得自在本祗為生死茫茫識性無自由分千里萬里求善知識須具正眼求脫虗謬之見定取目前生死為復實有為復實無若有人定得許汝出頭上根之人言下明道中下根器波波浪走何不向生死中定當何處更擬佛擬祖替汝生死有智人笑汝汝若不會更聽一頌勞持生死法唯向佛邊求目前迷正理撥火覓浮漚此可為正觀邪觀之定衡矣爾時文殊師利法王子在大眾中即從座起頂禮佛足而白佛言當何名是經我及眾生云何奉持佛告文殊師利是經名大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼通曰自初決擇真妄宣勝義中真勝義性為見道分自天王華屋要因門入揀選二十五圓通以至奉持佛頂神呪為脩道分又從於凡夫終大涅槃懸示無上正脩行路為證果分一經之大旨備矣故文殊因是而有請也既請經名即當奉持為流通分何為種種發揮未盡而遽以請名為哉蓋五十五位真菩提路是正因正果唯不識真心錯亂修習故有輪轉地獄餓鬼畜生修羅人天等道二十五圓通三摩地中本無魔事唯不識真心錯亂修習故有五十種陰魔皆所謂若他觀者即名邪觀下文特詳數之耳是經雖因阿難啟教而以佛頂神呪表顯無上法門然此大白傘蓋體極含覆超情離見即如來藏之心印也照窮剎海淨絕纖塵即爍迦羅之法眼也印曰無上非最上一乘莫能印之眼曰清淨非纖翳悉除莫能鑒之印謂之寶則常住不壞眼謂之海則含蓄無涯是不可思議之呪即不可思議之性也性與呪均之不可思議寧有二乎哉風穴在郢州衙上堂祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是時有盧陂長老出云某甲有鐵牛之機請師不搭印穴曰慣釣鯨鯢澄巨浸却嗟蛙步展泥沙陂佇思穴喝云長老何不進語陂擬議穴打一拂子云還記得話頭麼試舉看陂擬開口穴又打一拂子牧主云佛法與王法一般穴云見箇甚麼牧云當斷不斷返招其亂穴便下座天童頌云鐵牛之機印住印破透出毗盧頂𩕳行却來化佛舌頭坐風穴當衡盧陂負墮棒頭喝下電光石火歷歷分明珠在盤眨起眉毛還蹉過又閩帥遣使送朱記到保福福上堂曰去即印住住則印破僧曰不去不住用印奚為福便打僧云恁麼則山鬼窟裡全因今日也福默然合二則觀之無上寶印電光石火即蹉過也矧可擬議卜度故非清淨海眼不足以矚之亦名救護親因度脫阿難及此會中性比丘尼得菩提心入徧知海通曰佛頂神呪大不可思議能使性比丘尼婬心頓歇救護阿難無毀戒體亦已奇矣然性比丘尼始得阿那含果既證阿羅漢道乃悟婬性本空已得出纏入正徧知菩提心者屬正知為明本分事也其中決擇真妄揀辦脩治一切因果皆無疑惑屬徧知阿難已獲法身得菩提心矣今於一切顛倒錯亂脩習皆無不究竟是為入徧知海也雖然明得一萬事畢但於真心無眩世間變態何所不通為一切由心造故也岩頭豁禪師在甘贄家過夏一日把針次贄自田中回於豁前拄鍬亞身立豁以針作劄勢贄急入家著衣欲拜謝行婆問有何事贄曰不得說婆曰且要大家知贄舉前話婆失聲曰此話三十年後須知一回飲水一回著噎女子聞舉乃曰還知盡大地人性命被上座一針頭上劄却麼奇哉奇哉何意岩頭一針鋒上具有大佛頂悉怛多般怛囉呪能令甘贄妻子一時便爾得菩提心入徧知海亦名如來密因脩證了義通曰呪語者不可解釋是如來密語也向上一路千聖不傳亦如來秘密也既云秘密豈修所能修證所能證凡有脩有證者皆屬不了唯無脩無證者乃為脩證了義也既不可以脩證得必須密悟一念熏脩無漏善業不以知知不以識識凡有知識即為漏也即非密也以此密為因如持呪等乃所謂不思議熏脩也以不思議為因必以不思議證果如來者則是不可思議既證如來安所不了哉趙州因尼問如何是密密意州以手掐之尼曰和尚猶有這箇在州曰却是你有這箇在慈受深頌曰密密深深意最長幾人冷地錯商量師姑若會趙州掐鐵打心肝此斷腸德山圓明和尚示眾云及盡去也直得三世諸佛口掛壁上猶有一人呵呵大笑若識此人參學事畢天童頌云收把斷襟喉風磨雲拭水冷天秋錦鱗莫謂無滋味釣盡滄浪月一鈎投子拈云雖然如是德山大似藏盡楚天月猶存漢地星頌曰雙眉入暗路崎嶇日落栖蘆暫得甦爭似石人眠半夜免教舜讓守林居須知華綻非干木無脚行時早觸途昨朝風起長安道元是崑崙進國圖如此等公案亦不可測識若了此密語即參學事畢亦名大方廣妙蓮華王十方佛母陀羅尼呪此云總持通曰圓教莫如大方廣佛華嚴經頓教莫如妙法蓮華經佛母神呪莫如大準提今楞嚴兼而有之可謂極圓極頓極不可思議法門也大者常徧當法身方者軌持當般若廣者包博當解脫理智用三德具備可不謂圓乎蓮華出污泥而不染妙蓮華王則所謂優曇鉢華異世間植者也一彈指頃入佛知見是謂希有非頓莫能當之此圓此頓當指何事此事不容擬議即所謂呪心也十方如來因此呪心得成無上正徧知覺乃至於滅度後付佛法事云云非十方如來之所自出乎雖謂之佛母神呪得大總持可也合是三者一大藏經教管是矣青原一日問石頭曰有人道嶺南有消息頭曰有人不道嶺南有消息原曰若恁麼大藏小藏從何而來頭曰盡從這裡去原然之雲門垂語云眼睫橫亘十方眉毛上透乾坤下透黃泉須彌塞却汝咽喉還有人會得麼若有人會得拽取占城共新羅鬬額妙喜曰是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗諸人要識雲門麼不見道三臺須是大家催雲門妙喜故是會中人重宣呪心指出不可思議境界若有妙契其旨者管取成佛無疑亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持通曰諸菩薩萬行具足至一切事究竟堅固是名灌頂菩薩此菩薩將成妙覺於色究竟天上現大寶蓮華王座量等百萬阿僧祇三千大千世界菩薩欲登此座先於身中出現十道百寶光明照燭有情最後從頂門放光入諸佛足於是諸佛從面門放百寶光明流灌此菩薩頂直至心源此但以流光交相涉入名為灌頂受佛職位前覺際入交即此景象若妙覺以上則不容說唯灌頂以下則有章句如交光相入章句亦無於無章句中而有章句第謂此妙湛總持首楞嚴王具足萬行十方如來一門超出妙莊嚴路云爾故謂萬行具足而後究竟堅固者是漸非頓謂自性堅固而無藉萬行者是頓非圓不知此妙莊嚴路莊嚴萬行本自具足不假修為一切堅固不但內外身心得大定力性周性界山河大地明暗色空一切事法當處寂滅入乎大定即此為常住真心即此為妙湛總持蓋圓頓具備者也故謂之首楞嚴經未至灌頂法王子位惡能知其妙哉故曰汝當奉持佛鑑和尚示眾舉僧問趙州如何是不遷義州以兩手作流水勢其僧有省又僧問法眼不取於相如如不動如何不取於相見於不動去法眼曰日出東方夜落西其僧亦有省若也於此見得方知道旋嵐偃岳本來常靜江河競注元自不流其或未然不免更為饒舌天左旋地右轉古往今來經幾徧金烏飛玉兔走纔方出海門又落青山後江河波渺渺淮濟浪悠悠直入滄溟晝夜流遂高聲云諸禪德還見如如不動麼又雲蓋智和尚示眾云唯有堅密身一切塵中現雲蓋今日千山茂烏獸嘶鳴百華競發萬木抽枝盡是諸佛箇箇真如汝等諸人遊山玩水直須急著眼睛莫被伊謾是二尊宿直於一切塵境中拈出如如不動堅密真身不離萬行而得究竟堅固是深於楞嚴之旨者於此咬嚼得破方得名為奉持如其空守章句未知入路縱能莊嚴萬行終屬生滅法爾於自性堅固妙湛總持何啻霄壤哉說是語已即時阿難及諸大眾得蒙如來開示密印般怛囉義兼聞此經了義名目頓悟禪那修進聖位增上妙理心慮虗凝斷除三界修心六品微細煩惱即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開眾生微細沉惑令我今日身心快然得大饒益世尊若此妙明真淨妙心本來徧圓如是乃至大地草木蝡勤含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生修羅人天等道世尊此道為復本來自有為是眾生妄習生起世尊如寶蓮香比丘尼持菩薩戒私行婬欲妄言行婬非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄說一切法空生身陷入阿鼻地獄此諸地獄為有定處為復自然彼彼發業各各私受惟垂大慈開發童蒙令諸一切持戒眾生聞決定義歡喜頂載謹潔無犯通曰阿難聞佛所云密印了義單明向上一路固無事修矣然曠劫無明豈能頓除故於修進聖位增上妙理得箇悟門循省身心心慮虗凝已得斷除三界修心六品微細煩惱三界分九地地各九品斷欲界九品前六品證二果斷後三品證三果斷上二界各九品證無學斷此六品微細煩惱蓋指身見邊見邪見在初果地斷見取戒取貪在二果地斷尚餘嗔慢癡至三果地方斷阿難僅證二果故但斷六品耳不斷無明則不證無生雖證無生而無明煩惱不盡猶未得為真悟也故欲如來精研七趣以解其惑令持戒者謹潔無犯云爾阿難疑處雖與前清淨本然云何忽生山河大地相似然三種相續因妄見生又十二類生皆由顛倒阿難豈不領略而復有此問正恐有妙悟者執此真淨妙心本來徧圓乃認大地草木本一真如成佛真體何至有地獄等事此執妙圓而撥諸趣單明向上而不斷煩惱者往往有此病也使果無地獄等趣則善星比丘及寶蓮香比丘尼應無顯報矣而感應灼然不爽則地獄等趣應是有毋亦錯亂脩習之所致乎唯本於錯亂修習不得定執為有不得定執為無修習不錯則有者成無修習既錯則無者成有此其機全係於修習也持戒律斷煩惱安可不競競耶百丈上堂常有一老人聽法隨眾散去一日不去丈乃問立者何人老人云某甲於迦葉佛時曾住此山有學人問大修行底人還落因果也無對他道不落因果墮野狐身五百生今請和尚代一轉語丈云不昧因果老人於言下大悟告辭丈云某甲已免野狐身住在山後乞依亡僧燒送師令維那白搥告眾齋後普請送亡僧大眾不能詳師領眾至山後岩下以杖挑出一死狐乃依法火葬至晚參師舉前因緣次黃檗便問古人錯對一轉語落在野狐身今日轉轉不錯是如何師云近前來向汝道黃檗近前打師一掌師拍手笑曰將謂胡鬚赤更有赤鬚胡天童頌云一尺水一丈波五百生前不奈何不落不昧商量也依前撞入葛藤窠呵呵呵會也麼若是你灑灑落落不妨我哆哆和和神歌社舞自成曲拍手其間唱哩囉圓禪師在南公會中聞二僧舉此話一僧曰只如不昧因果也未脫得野狐身一僧應聲曰便是不落因果亦何曾墮野狐身耶圓悚然異其語急上黃檗積翠菴頭過㵎忽大悟見南公敘其事未終涕交頤南公令就侍者榻熟寐忽起作偈曰不落不昧僧俗本無忌諱丈夫氣宇如王爭受囊藏被蓋一條楖栗任縱橫野狐跳入金毛隊南公大笑故此一野狐也從前云何有從後云何無諸家於此因緣覆蓋多少人出脫多少人是知所貴者真悟也若執妙圓而撥諸趣正是野狐精見解佛告阿難快哉此問令諸眾生不入邪見汝今諦聽當為汝說阿難一切眾生實本真淨因彼妄見有妄習生因此分開內分外分阿難內分即是眾生分內因諸愛染發起妄情情積不休能生愛水是故眾生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行婬男女二根自然流液阿難諸愛雖別流結是同潤濕不升自然從墜此名內分阿難外分即是眾生分外因諸渴仰發明虗想想積不休能生勝氣是故眾生心持禁戒舉身輕清心持呪印顧盼雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命阿難諸想雖別輕舉是同飛動不沉自然超越此名外分阿難一切世間生死相續生從順習死從變流臨命終時未捨煖觸一生善惡俱時頓現死逆生順二習相交純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下情想均等不飛不墮生於人間想明斯聰情幽斯鈍情多想少流入橫生重為毛羣輕為羽族七情三想沉下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害己無食無飲經百千劫九情一想下洞火輪身入風穴二交過地輕生有間重生無間二種地獄純情即沉入阿鼻獄若沉心中有謗大乘毀佛禁戒誑妄說法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄循造惡業雖則自招眾同分中兼有元地通曰此總答諸趣為復本來自有為是眾生妄習生起據七趣所惑或天堂或地獄或人間苦樂不同莫不各有同業相成是同分中本有元地不可掃歸於無本之由妄習生也眾生性本真淨不落聖凡自瞥起情見不知是妄妄而習之遂復不捨從軀殻起念者是見是習在身分以內從意想起念者是見是習在身分以外身分以內因愛著情口之於味目之於色心之於財能生愛水水性流下故從墜身分以外因思著想或存佛國或欲生天或持善法能生勝氣氣必飛揚故從升純想則生忉利以上有淨願者則生淨土九想則為飛仙八想則為大力鬼王七想則為飛行夜叉六想則為地行羅剎以想勝故所去無碍然情有邪正正者不離如來座下以平昔持戒持呪事善知識故終為護法神也情想均等則生人間六情則為毛羣羽族七情則為餓鬼八情生有間獄九情生無間獄純情即沉入阿鼻獄有毀佛謗法等罪此劫雖壞更生十方阿鼻獄無有出期是妄業自招清濁有間矣若能不著於情則地獄空不著於想則天堂空情想俱空雖在人間心遊佛國七趣有元地則淨土亦有元地審矣還我眾生真淨本來不生淨土而誰生哉僧問百丈對一切境如何得心如木石去丈曰一切諸法本不自言空不自言色亦不言是非垢淨亦無心繫縛人但人自虗妄計著作若干種解會起若干種知見生若干種愛畏但了諸法不自生皆從自己一念妄想顛倒取相而有知心與境本不相到當處解脫一一諸法當處寂滅當處道場又本有之性不可名目本來不是凡不是聖不是垢淨亦非空有亦非善惡與諸染法相應名人天二乘界若垢淨心盡不住繫縛不住解脫無一切有為無為縛脫心量處於生死其心自在畢竟不與諸妄虗幻塵勞蘊界生死諸入和合逈然無寄一切不拘去留無礙往來生死如門開相似百丈大慈縱口發揮暗合此段經旨能於此承當得去則情想頓超不入邪見如來當必更為稱快矣阿難此等皆是彼諸眾生自業所感造十習因受六交報云何十因阿難一者婬習交接發於相磨研磨不休如是故有大猛火光於中發動如人以手自相摩觸煖相現前二習相然故有鐵牀銅柱諸事是故十方一切如來色目行婬同名欲火菩薩見欲如避火炕二者貪習交計發於相吸吸攬不止如是故有積塞堅氷於中凍冽如人以口吸縮風氣有冷觸生二習相陵故有吒吒波波羅羅青赤白蓮寒氷等事是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海三者慢習交陵發於相恃馳流不息如是故有騰逸奔波積波為水如人口舌自相綿味因而水發二習相鼓故有血河灰河熱沙毒海融銅灌吞諸事是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨海四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵橛劍樹劍輪斧鉞鎗鋸如人銜冤殺氣飛動二習相擊故有宮割斬斫剉刺槌擊諸事是故十方一切如來色目瞋恚名利刀劍菩薩見瞋如避誅戮五者詐習交誘發於相調引起不住如是故有繩木絞校如水浸田草木生長二習相延故有扭械枷鎖鞭杖檛棒諸事是故十方一切如來色目姦偽同名讒賊菩薩見詐如畏豺𧳓六者誑習交欺發於相罔誣罔不止飛心造姦如是故有塵土屎尿穢污不淨如塵隨風各無所見二習相加故有沒溺騰擲飛墜漂淪諸事是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐蛇虺七者怨習交嫌發於銜恨如是故有飛石投礰匣貯車檻甕盛囊撲如陰毒人懷抱畜惡二習相吞故有投擲擒捉擊射拋撮諸事是故十方一切如來色目怨家名違害鬼菩薩見怨如飲鴆酒八者見習交明如薩迦耶此云身見戒禁取邪悟諸業發於違拒出生相反如是故有王使主吏證執文籍如行路人來往相見二習相交故有勘問權詐考訊推鞫察訪披究照明善惡童子手執文簿辭辯諸事是故十方一切如來色目惡見同名見坑菩薩見諸虗妄徧執如臨毒壑九者枉習交加發於誣謗如是故有合山合石碾磑耕磨如讒賊人逼枉良善二習相排故有押捺槌按蹙漉衡度諸事是故十方一切如來色目怨謗同名讒虎菩薩見枉如遭霹𮦷十者訟習交諠發於藏覆如是故有鑒見照燭如於日中不能藏影二習相陳故有惡友業鏡火珠披露宿業對驗諸事是故十方一切如來色目覆藏同名陰賊菩薩觀覆如戴高山履於巨海通曰世尊說十習因一一配合地獄中事毫髮無爽習必有因所因者但能生水火等相而無其用復以所習交加使成熱鉄寒氷等事然十方如來即於因生處洞見好惡固無事脩菩薩明知是害乃謹潔無犯而遠避之縱有地獄先無其因故唯佛與菩薩說無地獄可也未至如是心行安得一切而空之彌勒曰於欲界中有三十六處謂八大那落迦此云地獄何等為八一等活二黑繩三眾合四號叫五大號呌六燒熱七極熱八無間此諸大那落迦處廣十千踰繕那此云四十里此外復有八寒那落迦處何等為八一皰二皰裂三郝凡四郝郝凡五虎虎凡六青蓮七紅蓮八大紅蓮從此下三萬二千踰繕那至等活從此復隔四千踰繕那有餘那落迦如等活大那落迦處初寒那落迦處亦爾從此復隔二千踰繕那有餘那落迦又曰於等活大那落迦中多受如是極治罰苦謂彼有情多共趣集業增上生種種苦具次第而起更相殘害悶絕躃地次虗空中有大聲發唱如是言此諸有情可還等活次復有情歘然復起觀此則地獄非無定處明矣淨土三昧經曰昔毗沙國王與維陀始王共戰自惟陣敗立誓願為地下王時臣佐一十八人領百萬眾願頭生角助王法化治其罪人今所謂閻羅天子牛頭阿傍等是也觀此則地獄及身非十方來但由惡業纏縛生地獄身明矣是婬貪慢嗔詐誑怨見枉訟十法與五十一心所法忿恨惱覆誑諂憍害略同何為總括之以十也此但指十不善業故貪瞋慢及邪見屬意業而慢名飲癡水癡在其中矣怨瞋婬屬身業而怨瞋殺氣云云即殺偷在其中矣誑詐枉訟四者語意相類何為分四該四口業故誑者妄語詐者綺語枉者惡言訟者兩舌婬者身見之所自來尤造業之本始故首舉婬婬以磨生火貪以吸生水與陽盛夢火陰盛夢水相似鐵牀銅柱是其抱持寢臥堅覺妄想之餘習也波波吒吒羅羅忍寒聲即郝郝虎虎之異名青赤白蓮塞氷之色也癡水西方有此水飲之則癡如貪泉啞瘴之類驕逸亦有滋味故人共䛕之如浸溺惡水中而不自覺婬習以熱惱發火自耗其精瞋習以氣忤發火益銳其氣火克金則鑄氣氣雖剛徒自傷耳詐習依奸起惡始於調笑遂至滋蔓智如水故詐以智勝如豺狼甚小而力能食虎誑習矯現有德令他暗昧如風鼓塵使人無見故劫殺欺其不見而蛇虺亦以不見傷人即其類也怒形於外故殺氣飛動即屬殺怨藏於中故懷抱蓄惡如囊撲以囊貯人而撲殺之皆陰隱事即屬偷違害鬼鴆酒皆陰毒也見習有五一身見謂執身有我種種計著二邊見於一切法執斷執常三邪見邪悟錯解撥無因果四見取非果計果如以無想為涅槃之類五戒禁取非因計因如持牛狗等戒為生天因此五總名惡見彼此相反如行路人一往一來所見違反故須勘問逼枉良善不宜曲而曲之故蹙其體漉其血或衡度其體與血而稱量之如畜物然訟習惡友交唆彼此發覆適足自壓如戴山而履於海耳菩薩肯蹈之哉五見及貪嗔癡慢斷即證三果斷上地九品惑唯此惑不斷故造業不已有是因即有是報也昔李留後端愿問達觀禪師曰人死後當何所歸觀曰未知生焉知死李曰生則端愿已知觀曰生從何來李擬議觀揕其胷曰只在這裏思量箇甚麼李曰會也只知貪程不覺蹉路觀拓開曰百年一夢又問地獄畢竟是有是無答曰諸佛向無中說有眼見空華太尉就有中覔無手摣水月堪笑眼前見牢獄不避心外見天堂欲生殊不知欣怖在心善惡成就太尉但了自心自然無惑李曰心如何了答曰善惡都莫思量又問不思量後心歸何所觀曰且請太尉歸衙洞山問僧世間甚麼物最苦僧云地獄最苦山曰不然向此衣線下不明大事始是苦丹霞頌云鑊湯爐炭幾何般地獄三塗最苦酸須信新豐親切語袈裟之下莫顢頇能明大事即無地獄因故地獄未為苦而不了自心最為苦也云何六報阿難一切眾生六識造業所招惡報從六根出云何惡報從六根出一者見報招引惡果此見業交則臨終時先見猛火滿十方界亡者神識飛墜乘烟入無間獄發明二相一者明見則能徧見種種惡物生無量畏二者暗見寂然不見生無量恐如是見火燒聽能為鑊湯洋銅燒息能為黑烟紫焰燒味能為焦丸鐵麋燒觸能為熱灰爐炭燒心能生星火迸灑煽鼓空界二者聞報招引惡果此聞業交則臨終時先見波濤沒溺天地亡者神識降注乘流入無間獄發明二相一者開聽聽種種閙精神愗亂二者閉聽寂無所聞幽魄沉沒如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧灑諸毒蟲周滿身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄三者齅報招引惡果此齅業交則臨終時先見毒氣充塞遠近亡者神識從地涌出入無間獄發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絕於地如是齅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山者百千眼無量𠯗食衝思則能為灰為瘴為飛砂礰擊碎身體四者味報招引惡果此味業交則臨終時先見鐵網猛𦦨熾烈周覆世界亡者神識下透挂網倒懸其頭入無間獄發明二相一者吸氣結成寒氷凍裂身肉二者吐氣飛為猛火焦爛骨髓如是甞味歷嘗則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為飛熱鐵從空雨下五者觸報招引惡果此觸業交則臨終時先見大山四面來合無復出路亡者神識見大鐵城火蛇火狗虎狼師子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄發明二相一者合觸合山逼體骨肉血潰二者離觸刀劍觸身心肝屠裂如是合觸歷觸則能為道為觀為廳為案歷見則能為燒為爇歷聽則能為撞為擊為剚為射歷息則能為括為袋為考為縛歷嘗則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙六者思報招引惡果此思業交則臨終時先見惡風吹壞國土亡者神識被吹上空旋落乘風墮無間獄發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍如是邪思結思則能為方為所結見則能為鑒為證結聽則能為大合石為氷為霜為土為霧結息則能為大火車火船火檻結嘗則能為大叫喚為悔為泣結觸則能為大為小為一日中萬生萬死為偃為仰阿難是名地獄十因六果皆是眾生迷妄所造若諸眾生惡業同造入阿鼻獄受無量苦經無量劫六根各造及被所作兼境兼根是人則入八無間獄身口意三作殺盜婬是人則入十八地獄三業不兼中間或為一殺一盜是人則入三十六地獄見見一根單犯一業是人則入一百八地獄由是眾生別作別造於世界中入同分地妄想發生非本來有通曰十習所招現報從見分生有是因即有是報各以類屬此六交報則以根塵六識兼相分所致臨終現報及生地獄果報雖不離各根然造十習惡業之時六根俱用故一根受報而六根交相報也如貪味一業舌噉生命使彼承忍故舌受其報為此食故用火烹炮故見為然金石為此食故用刀割剖故聽為利兵刃為此食故炙熬香味故息為大鐵籠為此食故射取鳥獸故觸為弓弩箭為此食故懸想如渴故思為飛熱鉄此舌根之六交報也餘亦可以例推合論引易以證謂離為目坎為耳艮為鼻兌為口坤為身思又心位之離火也燒聽則離火變於坎水故為鑊湯洋銅燒息則離火變於艮土故為黑烟紫焰燒味則離火變於兌金故為焦丸鉄麋燒觸則離火變於坤土故為熱灰罏炭燒心則變於心位之離火故為星火迸灑與燒見義同故不重出非闕文也一一推之頗符似為新奇質與躓同踏也魚敗曰餒羮敗曰爽插刃於肉日剚六根同造十業具足其入阿鼻無間獄審矣業無間故苦亦無間若一根而兼三四根十業之內闕二三業及身口意三根不徧六作殺盜婬業不至十或具二闕一或犯一闕二其業漸輕其苦漸減業雖各作苦則同受輕重不齊各有元地皆由六根為之媒也前十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根唯汝六根更非他物汝復欲知無上菩提令汝速證安樂解脫寂淨妙常亦汝六根更非他物夫一根造業六根受報既如此一根清淨多根清淨復如彼迷悟之機在反掌間耳故知見旋復火不能燒觀聽旋復水不能溺但使一根返元六根解脫既無業因孰為業果妄想不生一切真淨又何地獄之有藥山示眾云祖師只教汝保護若貪嗔起來切須防禁莫教掁觸是你欲如枯木石頭却須擔荷實無枝葉可得雖然如此更宜自看不得絕却言語我今為汝說這箇語顯無語底他那箇本來無耳目等貌時有僧問云何有六趣山云我此要輪雖在其中元來不染問不了身中煩惱時如何山曰煩惱作何相狀我且要你考看更有一般底只看紙背上記持言語多被經論惑我不曾看經論冊子汝只為迷事走失自家不定所以便有生死心未曾學得一言半句一經一論便說與麼菩提涅槃世攝不攝若如此解即是生死若不被此得失繫縛便無生死汝見律師說甚麼尼薩耆突吉羅最是生死本雖然與麼窮生死且不可得上至諸佛下至螻蟻盡有此長短好惡大小不同若也不從外來何處有閑漢掘地獄待你你欲識地獄道只今鑊湯煑者是欲識餓鬼道只今多虗少實不令人信者是欲識畜生道見今不識仁義不辨親疏者是豈須披毛帶角斬割倒懸欲識人天只今清淨威儀持瓶挈鉢者是切須保任免墮諸趣第一不得棄這箇這箇不是易得須向高高山頂立深深海底行此處行不易方有少分相應如今出頭來盡是多事人覔箇癡鈍漢不可得莫只記冊子中言語以為自己見知見他不解者便生輕慢此輩盡是闡提外道此心直不中切須審悉與麼道猶是三界邊事莫在衲衣下空過到這裡更細微在莫作等閒須知珍重又睦州與講僧喫茶次州曰我救你不得也曰某甲不曉乞師垂示州指油餅曰這箇是甚麼曰色法州曰這入鑊湯漢無論在家出家但自造業兼根兼境不得解脫何怪乎藥山睦州之言復次阿難是諸眾生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形若於本因貪物為罪是人罪畢遇物成形名為怪鬼貪色為罪是人罪畢遇風成形名為魃鬼貪惑為罪是人罪畢遇畜成形名為魅鬼貪恨為罪是人罪畢遇蟲成形名蠱毒鬼貪憶為罪是人罪畢遇衰成形名為厲鬼貪慠為罪是人罪畢遇氣成形名為餓鬼貪罔為罪是人罪畢遇幽為形名為魘鬼貪明為罪是人罪畢遇精為形名魍魎鬼貪成為罪是人罪畢遇明為形名役使鬼貪黨為罪是人罪畢遇人為形名傳送鬼阿難是人皆以純情墜落業火燒乾上出為鬼此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有通曰純情業重必從墮落業火燒乾神識不昧故復帶業落於鬼趣愛染生情情始乎貪故十習因俱以貪言也貪物為怪為其非理而取晉有石言有物憑之是已貪色為魃婬風鼓蕩能散雲雨中州遇旱則徧索魃鬼於塚其頭大於斗貪惑為魅詐習未忘猶變現美態以眩惑人貪恨為蠱結怨在意甘為蛇虺毒蠱以肆其毒滇黔多有之唯主人意之所向貪憶為厲瞋恚不捨深入骨髓往往俟人之衰而報其忿如伯有為厲是已貪慠為餓鬼內無實德空腹高心夫先自慢也已貪罔為魘誑習欺人猶惑寐者貪明為罔兩各執所見為山澤之精耀如五行變怪是已貪成為役使枉習勞心以成人之過終役役不休貪黨為傳送訟習發覆傳言送語報在鬼類猶託於人而報禍福此皆自業之所招也若悟菩提如夢忽醒安有寱語故曰本無所有僧問靈隱佛海禪師昔有一秀才作無鬼論成有一鬼叱曰爭奈我何意作麼生師以手斫額曰何似僧曰祗如五祖以手作鵓鳩觜曰谷呱呱又且如何師曰自領出去雖然不得一向昔湛堂準禪師聞悟侍者見所擲㸑餘有省詣方丈通所悟於泐潭深禪師師喝出因喪志自經於延壽堂廁後出無時眾憚之準聞特往登溷方脫衣悟即提淨水至準曰待我脫衣脫罷悟復到未幾悟供籌子準滌淨已召接淨桶去悟纔接準執其手曰汝是悟侍者那曰諾準曰是當時在知客寮見掉火柴頭有箇悟處底麼參禪學道只要知箇本命元辰下落處汝剗地作此去就汝在藏殿移首座鞋豈不是汝當時悟得底汝每夜在此提水度籌豈不是汝當時悟得底因甚麼不知下落却在這裡惱亂大眾準猛推之索然如倒壘甓由是無復見者準所執臂如泉半月餘始復此未入地獄而為鬼者原無地獄因故地獄不收得此大甘露飲之當隨願往生若湛堂者不獨知鬼神之情狀且能為鬼眾說法也復次阿難鬼業既盡則情與想二俱成空方於世間與元負人怨對相值身為畜生酬其宿債物怪之鬼物銷報盡生於世間多為梟類風魃之鬼風銷報盡生於世間多為咎徵一切異類畜魅之鬼畜死報盡生於世間多為狐類蟲蠱之鬼蠱滅報盡生於世間多為毒類衰厲之鬼衰窮報盡生於世間多為蛔類受氣之鬼氣銷報盡生於世間多為食類綿幽之鬼幽銷報盡生於世間多為服類和精之鬼和銷報盡生於世間多為應類明靈之鬼明滅報盡生於世間多為休徵一切諸類依人之鬼人亡報盡生於世間多為循類阿難是等皆以業火乾枯酬其夙債旁為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有通曰情想既空應無所著超然物外而不免為畜類者酬夙負故所謂了即業障本來空未了應須還宿債也且以業火乾枯之故情想暫時不生如負重行遠氣力消竭萬慮俱空彼非真能空者梟類附塊為兒不離乎怪總之貪物所致也咎徵預報不祥如商羊水災鶴舞多旱之類魃煽婬風亦不祥之物故卒為咎徵魅多憑狐故卒為狐狐多詐餘習尚存蠱集諸毒虫為之故卒為毒怨毒深矣故屢遷不忘衰厲托災附禍入人身中轉受蛔形還托身內瞋恨之遺也鬼受饑虗畜充他飽慢習傲物故為人所切齒幽魘附人故生於牛馬蠶繭之族為人服用終示誑眩耳目明和於精則為魍魎明生於畜則為應類如社燕寒鴻應四時節序不爽彼各有所見也枉習役使之鬼何以多為休徵彼初顛倒是非是非之心非不明也故虗誣情盡真實心生今為禎祥以報休美所以終役使之勞也訟習依人之鬼何以多為循類彼昔依人故常循順於人今報在黠慧馴擾可畜亦其爭心息而甘聽處分也此等妄緣由妄見生若悟菩提如目無眚安得圓形故亦曰本無所有玄沙上堂汝既有如是奇特當陽出身處何不發明取因何却隨他向五蘊身田中鬼趣裏作活計直下自謾去忽然無常殺鬼到來眼目譸張身見命見恁麼時大難支荷如生脫龜殻相似大苦仁者莫把瞌睡見解便當却去未解蓋覆得毛頭許汝還知否三界無安猶如火宅且汝未是得安樂底人祗大作羣隊干他人世這邊那邊飛去野鹿相似但求衣食若恁麼爭行他王道知麼國王大臣不拘執汝父母放汝出家十方施主供汝衣食土地龍神呵護汝也須具慙愧知恩始得莫孤負人好長連牀上排行著地銷將去道是安樂未在皆是粥飯將養得汝爛冬瓜相似變將去土裡埋將去業識茫茫無本可據沙門因甚麼到恁麼地祗如大地上蠢蠢者我喚作地獄劫住如今若不了明朝後日入驢胎馬肚裏牽犁拽把銜鐵負鞍碓擣磨磨水火裏燒煑去大不容易受大須恐懼好是汝自累知麼若是了去直下永劫不教汝有這箇消息若不了此煩惱惡業因緣不是一劫兩劫得休直與汝金剛齊壽知麼玄沙大慈不惜苦口足為末法中救療良藥宜人寫一通置之座右密師伯與洞山行次見白兔子面前走過密云俊哉山云作麼生密云如白衣拜相山云老老大大作這箇語話密云你又作麼生山云積代簪纓暫時落魄天童頌云抗力霜雪平步雲霄下惠出國相如過橋蕭曹謀略能成漢巢許身心欲避堯寵辱若驚深自信真情參跡混漁樵大都密公見處要藉積累功勳洞山見處單明本來尊貴古人即物明心往往如此又雪峯與三聖行次見一隊猢猻峯云祗這猢猻各各背一面古鏡聖云歷劫無明何以彰為古鏡峯曰瑕生也聖云一千五百人善知識話頭也不識峯云老僧住持事繁天童拈云當時若見雪峯道瑕生也且近前云喏喏且道何故如此爭之不足讓之有餘觀此則知作家機用豈以強弱而論勝負者哉如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結復次阿難從是畜生酬還先債若彼酬者分越所酬此等眾生還復為人反徵其剩如彼有力兼有福德則於人中不捨人身酬還彼力若無福者還為畜生償彼餘直阿難當知若用錢物或役其力償足自停如於中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息除奢摩他及佛出世不可停寢通曰琉璃王犯殺世尊謂七日後當於火滅入無間獄乃逃之水上火從水中起竟滅此瞋火之報也寶蓮香比丘尼犯婬乃於女根生大猛火然後節節燒滅此欲火之報也善星比丘犯大妄語雖能說十二部經獲四禪果乃撥因果謂琉璃王誅戮瞿曇必無果報是與於不仁之甚者也便生身陷阿鼻獄是非天降地出人與乃自妄所招耳菩提心中本來無事但為妄想凝結凝結不化即受業之因也十分凝結即受十分之報漸減漸輕下至為畜酬償先債酬之有餘返徵其剩若相食未已終無出期除是自有奢摩他定力窺見菩提面目則凝結者化又遇佛出世發明大事積業自銷非此則三界輪轉未有休息金剛經云若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為銷滅雪竇頌云明珠在掌有功者賞胡漢不來全無伎倆伎倆既無波旬失途瞿曇瞿曇識我也不復云勘破了也天童頌云綴綴功過膠膠因果鏡外狂奔演若多杖頭擊著破竈墮竈墮破來相賀却道從前辜負我前頌為人輕賤知我者希後頌罪業銷滅要在頓悟功勳亦不貴也却從傅大士偈點化出來大士頌曰先身有報障今日受持經暫被人輕賤轉重復還輕若了依他起能除徧計情常依般若觀何處不圓成僧問雲居承教有言是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅此意如何居云動則應墜惡道靜則為人輕賤崇壽稠云心外有法應墮惡道守住自己為人輕賤諸尊宿皆善乎轉經者也意旨與此段異同故備錄之汝今應知彼梟倫者酬足復形生人道中參合頑類彼咎徵者酬足復形生人道中參合異類彼狐倫者酬足復形生人道中參於庸類彼毒倫者酬足復形生人道中參合很類彼蛔倫者酬足復形生人道中參合微類彼食倫者酬足復形生人道中參合柔類彼服倫者酬足復形生人道中參合勞類彼應倫者酬足復形生人道中參於文類彼休徵者酬足復形生人道中參合明類彼諸循倫酬足復形生人道中參於達類阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者通曰眾生不聞正法皆謂相食相誅分固宜爾獨不思曹瞞欺人狐寡視如几上肉其後司馬報之如執券索值毫釐不爽借人一牛還人一馬冥冥之中豈令悍者終得志竟不一酬也故怨對相值必當酬還酬足復形餘習未化故昏荒愚癡者多而聰明特達者少彼參合羣類梟必為頑以貪物故附塊相食終頑嚚不義也咎必為異以婬習妖蕩故其餘習復為妖異也狐必為庸詐媚無識未見超卓毒必為很冤恨有餘流毒不盡瞋何為微怒氣銷故慢何為柔高者必下故服何以勞誑役心神勞苦不息故見何以文應候精明文彩可觀故休徵而合於明者枉銷復直故靈知不昧循倫而合於達者訟別禍福故通達無滯參合云者參合於原從人道生者也彼原從人道生者情想雖均不無利鈍今從三塗中來合乎情幽者十之八參於想明者十之二也天竺僧耆域以晉惠時入洛陽諸比丘為作禮域危坐受之謂人曰此方僧萬數獨指支法淵曰此菩薩從羊中來又指竺法興曰此菩薩從天中來望見宮闕曰大略似忉利天彼是道力所及此特眾生淨業力成耳謂沙門耆闍密曰匠此宮闕者從忉利天來成已即還天上屋脊瓦下應有作具迹之果有千五百器即耆域知匠者為天中來則謂法興為天中來法淵為羊中來當不謬僧曇翼者脅有雉毛故名翼以聽法華經而得度脫又王氏雉女聽法華經僅半而得度脫皆從雉中來也雉文明之物生人道中便能證果阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙阿難彼諸眾生堅固服餌而不休息食道圓成名地行仙堅固草木而不休息藥道圓成名飛行仙堅固金石而不休息化道圓成名遊行仙堅固動止而不休息氣精圓成名空行仙堅固津液而不休息潤德圓成名天行仙堅固精色而不休息吸粹圓成名通行仙堅固呪禁而不休息術法圓成名道行仙堅固思念而不休息思憶圓成名照行仙堅固交遘而不休息感應圓成名精行仙堅固變化而不休息覺悟圓成名絕行仙阿難是等皆於人中煉心不修正覺別得生理壽千萬歲休止深山或大海島絕於人境斯亦輪迴妄想流轉不修三昧報盡還來散入諸趣通曰從三塗中來者餘業未盡但能脩人足矣復有從人道中來者彼其洞明惡業不敢復習亦知心性本來所當脩鍊但不依如來正覺入三摩地乃至別修妄念存想固形為外道種於是有十種仙仙者遷也能使形神變遷而不死為有神我在也神我即識神乃無始來生滅種子故雖壽千萬歲報盡還來散入諸趣若如來正覺依不生不滅為本因地五陰俱空頓超三界即非非想天亦不住也何況於仙乎十種仙者一服食藥餌如秋石紅元等但能駐壽而不能輕舉故為地行仙二飡松柏茯苓黃精蒼朮之類久之身輕故能飛行三鍊金石鉛汞九轉還丹可以點化拔宅飛身故為遊行仙四乘陰陽運止熊經鳥伸以調氣固精久之精化氣氣化神神還虗遺形涉空故名空行仙五𠻳嚥津液水升火降肌膚若氷雪綽約若處子不交世欲與天無異故曰天行仙六吞吸精色飡虹飲霧採日精月華之類粹氣潛通故能通行穿石略無妨礙彼蝦蟆吞月華眉有蟾酥故善遁得其氣者尚能通而況天地之粹氣乎七堅持呪術凝神不亂其呪必靈亦能飛升西域多傳此呪於井中持誦三年自能飛出歸於自然不可思議故名道行八堅固思念默朝上帝或存想頂門係心臍輪之類止而能照但以照心證果故名照行仙九坎離配合陰陽交遘其中有精非凡精也彼以采陰助陽而自喪家寶者謬矣此感應自然在彈指頃便可產藥成丹所謂難遇而易成者也故名精行仙十存想世間皆成變化唯宗寂不變遂一味清淨灰心槁形其行絕世有似二乘緣覺故以覺悟名之西域習此者多生非非想天總之不悟正覺同歸妄想而已呂岩字洞賓京川人也唐末三舉不第偶於長安酒肆遇鍾離權授以延命術嘗遊廬山歸宗書鐘樓壁曰一日清閒自在身六神和合報平安丹田有寶休尋道對境無心莫問禪未幾道經黃龍山覩紫氣成蓋疑有異人乃入謁值龍擊鼓陞堂龍見意必呂公也厲聲曰座旁有竊法者呂毅然出問一粒粟中藏世界半升鐺肉煑山川且道此意如何龍指曰這守屍鬼呂曰爭奈囊有長生不死藥龍曰饒經八萬劫終是落空亡呂薄訝飛劍脅之劍不能入遂再拜求指歸龍詰曰半升鐺內煑山川即不問如何是一粒粟中藏世界呂於言下頓契作偈曰棄却瓢囊摵碎琴如今不戀水中金自從一見黃龍後始覺從前錯用心龍囑令加護後謁潭州智度覺禪師有曰余遊韶郴東下湘江今見覺公覩其禪學精明性源淳潔促膝靜坐收光內照一衲之外無餘衣一鉢之外無餘食達生死岸破煩惱殻方今佛衣寂寂兮無傳禪理懸懸兮幾絕扶而興者其在吾師乎聊作一絕奉記云達者推心方濟物聖賢傳法不離真請師開說西來意七祖如今未有人若呂公者既蒙黃龍指示當依正覺修三摩地不至為十種仙客矣阿難諸世間人不求常住未能捨諸妻妾恩愛於邪婬中心不流逸澄鎣生明命終之後鄰於日月如是一類名四天王天於己妻房婬愛微薄於淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天此云三十三天逢欲暫交去無思憶於人間世動少靜多命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須燄摩天此善時分一切時靜有應觸來未能違戾命終之後上升精微不接下界諸人天境乃至劫壞三災不及如是一類名兜率陀天此云知足我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天無世間心同世行事於行事交了然超越命終之後徧能出超化無化境如是一類名他化自在天阿難如是六天形雖出動心迹尚交自此以還名為欲界通曰四天王天居須彌山半出海四萬由旬日月出其宮前旋繞以照四天下上至忉利尚四萬由旬乃須彌山頂其四隅各八天合之三十二皆帝釋主之此二名地居天上四名空居天不須日月而常明以蓮華開合而分晝夜故名時分以福感而生兜率曰知足又曰喜足曰妙足者譯不盡故生此天者七日後彌勒放光雨華引入外院小摩尼殿尋為說法俾發起精進力故然後引之令入內院二院之外又有總報天乃有漏業果所成修十善業者得生彼處三災可壞此云三災不及者蓋指彌勒所居乃諸聖者後得智所變之宮也以總報望外院尚若仙凡之隔況內院乎此外皆屬報境上至樂變化天有所受用隨念而至越於下天故名越化上至他化自在天諸欲樂境不勞自化皆由他化而自在受用此六雖超出人世未能離欲俱舍頌曰六受欲交抱執手笑視婬其欲漸輕其報彌上欲愛易墜故也但有所著即是欲故於應觸行事了然超越毫無繫念乃得自在非但婬也準天台六欲天業皆以十善為本若兼護法心是四天王天業若兼慈化人是忉利天業若兼不惱眾生善巧純熟是燄摩天業若兼修禪定麤住細住是兜率天業欲界定是變化天業未到定是他化天業此皆不求常住真心不離有為因果福報雖殊要不可語於大解脫也二十三祖鶴勒尊者行化至中印土彼國王名無畏海崇信佛道祖為說正法次忽見二人緋素服拜祖王問曰此何人也祖曰此是日月天子吾昔曾為說法故來禮拜良久不見唯聞異香王曰曰月國土總有多少祖曰千釋迦佛所化世界各有百億迷盧日月我若廣說即不能盡又天親菩薩自彌勒內宮而下無著菩薩問曰人間四百年彼天為一晝夜彌勒於一時中成就五百億天子證無生法忍未審說甚麼法天親曰祗是這箇法祗是梵音清雅令人樂聞若信得祗是這箇法天上人間本無淨穢而常住真心安所不解脫哉
