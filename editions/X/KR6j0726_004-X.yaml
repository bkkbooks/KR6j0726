body:
  text: 大佛頂如來密因脩證了義諸菩薩萬行首楞嚴經卷第四爾時富樓那彌多羅尼子在大眾中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為眾生敷演如來第一義諦世尊常推說法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地世尊如阿難輩雖則開悟習漏未除我等會中登無漏者雖盡諸漏今聞如來所說法音尚紆疑悔世尊若復世間一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始又如來說地水火風本性圓融周徧法界湛然常住世尊若地性徧云何容水水性周徧火則不生復云何明水火二性俱徧虗空不相凌滅世尊地性障礙空性虗通云何二俱周徧法界而我不知是義攸往惟願如來宣流大慈開我迷雲及諸大眾作是語已五體投地欽渴如來無上慈誨通曰如來藏妙真如性名第一義諦微妙圓融要在心悟能悟之者拈來無不是用處不生疑一超即入何假功勳如阿難輩習漏未除已破麤惑而細惑尚在會中登無漏者雖斷煩惱障而所知障尚在滯在功勳位中安能領悟最上第一義諦彼諸相虗妄本自不生而今疑其生矣四大清淨如摩尼珠隨方現色似有青黃赤白而本無有今疑其相凌奪矣滿慈子非執相以難性葢於本性圓融湛然常住處生疑彼業已登無漏於無漏中徒見其湛未見其妙湛也徒見其住未見其無住也趙州云諸方難見易識我這裏易見難識則所云猶如聾人逾百步外聆於蚊蚋豈虗語哉長水璿法師問瑯琊覺和尚清淨本然云何忽生山河大地覺云清淨本然云何忽生山河大地璿於此有省且道答他語不答他語若道答他作何道理會若道不答他何為遽省去天童頌云見有不有翻手覆手瑯琊山裏人不落瞿曇後又僧問韶國師一切山河大地從何而起韶云此問從何而來可謂劈腹剜心爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢如來今日普為此會宣勝義中真勝義性令汝會中定性聲聞及諸一切未得二空迴向上乘阿羅漢等皆獲一乘寂滅場地真阿練若此云無喧雜正修行處汝今諦聽當為汝說富樓那等欽佛法音默然承聽佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣說性覺妙明本覺明妙富樓那言唯然世尊我常聞佛宣說斯義通曰如來藏為勝諦第一義此云真勝義性則直指山河生起之源令人於源頭覰破當下便自見性定性聲聞雖無諠諍而寂滅非真以未證諸法本自寂滅故阿羅漢雖得人空未得法空躭於空寂未能回向上乘故至此皆獲一乘更無餘乘入佛知見乃為正脩行處也於性覺則曰妙明其體本自妙而常明不因他以有明者也於本覺則曰明妙由不思議熏脩之力明知我有是性覺之妙者也即妙而明非不明矣即明而妙又不滯於明矣正是當陽顯露處若覺明便落情識離覺無明豈得為妙故曰覺明為咎趙州上堂至道無難唯嫌揀擇纔有言語是揀擇是明白老僧不在明白裏是汝諸人還護惜也無時有僧問既不在明白裏護惜箇甚麼州曰我亦不知僧云和尚既不知為甚麼道不在明白裏州曰問事即得禮拜了退雪竇頌云至道無難言端語端一有多種二無兩般天際日上月下檻前山深水寒髑髏識盡喜何立枯木龍吟銷未乾難難揀擇明白君自看趙州道不在明白裏是他純是妙則境界却教人護惜略通箇明妙底消息這僧窺見趙州脈路要與重重發明乃問既不在明白裏護惜箇甚麼州曰我亦不知灼然明妙又問和尚既不知為甚麼却道不在明白裏灼然妙明趙州深許這僧有些見處問事儘得在却教禮拜了退連累這僧都不在明白裏更說甚揀擇雪竇欲與趙州翻案要揀擇要明白三祖信心銘云至道無難唯嫌揀擇趙州著語云纔有語言是揀擇是明白恐落言詮便屬二義若是見徹底人即言語也不妨所以道言端語端若離言語歸在一處正是枯木巖前差路多故有多種若見得頭頭是道雖言語支離却無兩般所以天際日月檻前山水總是這一箇刀斧也劈不開到此分劑喜識俱盡枯木龍吟渾然一妙明真際豈容易致得故曰難難若猶帶喜在猶帶識在名乾不盡猶是覺明用事所謂清光照眼似迷家明白轉身還墮位是也是可無揀擇無明白乎哉曰君自看正欲審定此揀擇此明白果與至道相當否也三祖曰但莫愛憎洞然明白趙州曰不在明白裏雪竇曰揀擇明白君自看言人人殊可謂同參佛言汝稱覺明為復性明稱名為覺為覺不明稱為明覺富樓那言若此不明名為覺者則無所明佛言若無所明則無明覺有所非覺無所非明無明又非覺湛明性性覺必明妄為明覺通曰妙之一字佛所自秘拈却妙字但論覺明直得十年分疏不下為性體本明即昭昭靈靈者而直名之為覺乎則墮在明邊為覺體闇然有不明處特加一明字稱為明覺乎則墮在不明邊兩邊俱是荊棘如何是出身之路富樓那縱善說法豈能以無所明而名為覺故謂若此不明之體亦名為覺既無能明則無所明斷斷乎性體本明方名為覺也明既有所便是背覺合塵於性覺離塵之妙相去遠矣若見其妙必且曰如來說性覺妙明即妙而明非不明也本覺明妙即明而妙則又非明也非明非不明離此二途方名性覺世尊因其不達此故告之曰若汝執言必有所明方稱明覺若無所明則無明覺是覺以明不明為存亡也豈知真覺獨立遠離能所者乎若明有所已離覺位而不得謂覺矣若執覺無所則照燭安施而不得謂明矣若一切不明則是無記性又非真覺妙湛明性覺湛明性無明而無乎不明非頑空可比是性覺任運徧知必然有明若執定必明妄生分別計著不忘即為明覺覺必因明非妙明也有所無所總未離所無明必明總未離能性覺之妙豈若是哉趙州問南泉如何是道泉云平常心是道州曰還可趨向也無泉曰擬向即乖州曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知是無記若直達不疑之道猶如太虗廓然蕩豁豈可強是非耶州於言下契理若南泉趙州却有如許妙解惜富樓那猶在理障不免向第二頭分疏覺非所明因明立所所既妄立生汝妄能無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異如是擾亂相待生勞勢久發塵自相渾濁由是引起塵勞煩惱起為世界靜成虗空虗空為同世界為異彼無同異真有為法通曰覺湛明性不動周徧豈有方所既不落方所即無同異此無同異真無為法也馬鳴曰若心有動非真了知動且不可況有所乎一念妄動認明立所所立而真覺隱矣所既妄立因分別之曰此是所然能為此者能也其分別者所而能分別者又能也能所既立同異即形能必異所所必異能本一真覺本無同異而熾然成異若此者則因明立所之故也豈但成異而已欲異異相又立同名以動則有異靜唯一同異者異此無同異之覺也同者同此無同異之覺也於中發明以為異又同以為同又異因此復立無同無異由不生不滅與生滅和合而成阿賴耶識非一非異以為同則五識攬境六識分別七識染污以為異則五識乃其相分六識非相分不立七識非分別無有此無同無異純是識興前無同異逈別前無同異非有立也乃不生不滅真性此無同異見所立也乃生滅種子唯有能所同異影子含藏其中便為世界眾生業果胚胎故有同相有異相有無同無異相如是擾亂能所相待同異相形不得清淨故有勞相勞相即無明勞久發塵自相渾濁混雜真性曰渾汩清淨體曰濁由是引起塵勞煩惱見思二惑由煩惱故變起依正二報動成世界靜成虗空虗空即上因異立同雖無能所却是頑空世界即上熾然成異動為世體異為界體有能有所純是動境此有同有異指依報也固是有為粗迹彼眾生正報以有心性故非如世界之異以有色相故非如虗空之同然所有生滅能無生滅究竟能有生滅而離能所者無生滅至無生滅無同無異亦皆有為法也識有分別故有為智無分別故無為有為故有業果諸有為相無為即無業果諸有為相山河大地本自不生只因明立所從妄見有爾僧問雪居膺禪師山河大地從何而有膺曰從妄想有僧曰與某甲想出一錠金得麼膺便休去僧不肯後雲門云已是葛藤不能折合得待伊道想出一錠金得麼拈拄杖便打此是何等作用故雲門以拄杖示眾云拄杖子化為龍吞却乾坤了也山河大地甚處得來雪竇頌云拄杖子吞乾坤徒說桃華浪奔燒尾者不在拏雲攫霧曝腮者何必喪膽驚魂拈了也聞不聞直須灑灑落落休更紛紛紜紜七十二棒且輕恕一百五十難放君師驀拈拄杖下座大眾一時走散於斯徹去豈但山河依舊抑且覺明無出頭處覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風出風金相摩故有火光為變化性寶明生潤火光上烝故有水輪含十方界火騰水降交發立堅濕為巨海乾為洲潬以是義故彼大海中火光常起彼洲潬中江河常注水勢劣火結為高山是故山石擊則成𦦨融則成水土勢劣水抽為草木是故林藪遇燒成土因絞成水交妄發生遞相為種以是因緣世界相續通曰清淨本然云何忽生山河大地前地水火風空五大皆如來藏清淨本然周徧法界循業發現寧有方所其發現者由眾生業力之故也眾生業力由無明始為無妙湛總持一念忽動覺既離空生明空亦離覺生昧覺明發識識精湛不搖處即水也空昧結色即土也相待成搖為風為水即土尅水而生木也因空昧之土生搖為木而覺明不搖便成堅礙即木尅土而生金也金與木合生火故曰風金相摩則有火光火與金合生水故曰火光上烝則有水輪水與火合生土火騰水降而洲潬生焉土與水合復生木土劣水強而草木滋焉巽為風為木風者其木之性也前相待成搖故有風輪但有木之性爾至抽為草木則居然有形之木矣五行以生尅為夫婦以相生為父子子由婦生必夫劣然後陰陽和而生子子生而父母之氣存焉故山石可以成𦦨可以成水由水尅火之所成也草木可以成土可以成水由土尅水之所成也推之萬物莫不皆然余甞以易配之若合符節信乎先聖後聖其揆一也覺明發識為最初湛元其天一生水義乎水生東方震巽之木木生南方離火火生西南坤土土生西方兌金而西北乾金復生北方坎水如環無端遞相為種故曰帝出乎震齊乎巽震動也巽為風非相待成搖之旨乎震為木兌為金東西相對而為夫婦火於是乎生焉非即風金相摩之旨乎離為火坎為水南北相對而為夫婦土於是乎生焉非即交發立堅之旨乎坤為地艮為山均屬土萬物之所成始而成終也故春夏萬物發生恒於地上而可見秋冬萬物收斂恒於地下而不可見此河圖所以成變化行鬼神不但妙契流行之用而亦脗合生起之源如此世界最下依風輪住大地最下依金輪住土與金同是堅性俱屬地大火不言輪而言變化性者在外界則諸大為所遷革在內界則諸大隨之生滅火能鎔散成熟萬物故曰為變化性俱舍論謂有情業增上力先於最下依止虗空有風輪生風輪之上次有水輪水輪之上方有金輪與此稍異彼約安立自下升上以成其次此約生起不妨錯綜言之仰山湧和尚示眾云一言說盡山河僧便問如何是一言山以火筯插向爐邊却收舊處投子頌曰一句稱提萬象分摩竭空自掩重門當初衲子微開眼插筯爐邊當火焚若是大徹悟人視三界起滅於大覺之中真同漚生漚滅爾而況本自無生覓三界相了不可得復次富樓那明妄非他覺明為咎所妄既立明理不踰以是因緣聽不出聲見不超色色香味觸六妄成就由是分開見覺聞知同業相纏合離成化見明色發明見想成異見成憎同想成愛流愛為種納想為胎交遘發生吸引同業故有因緣生羯羅藍此云凝滑遏蒲曇此云泡等胎卵濕化隨其所應卵唯想生胎因情有濕以合感化以離應情想合離更相變易所以受業逐其飛沉以是因緣眾生相續通曰世界以空昧為體想澄成國土是也眾生以覺明為性知覺乃眾生是也空昧因覺明而顯故世界由眾生業力而成二者相續皆覺明為咎是因明立所之妄非他四大等生只因認覺為明遂有所明所屬相分能屬見分四大在器界為疎相分四大在根身為親相分所妄既立遂使六根隔礙而見分中明理不相踰越本一圓融寶覺分為見覺聞知根塵識三引起妄業於是同業相纏因父母己三者業同而成胎卵有情之物合離成化不由父母但由己業而成合濕離化之物其所以吸引同業者皆見明為之崇也以妄心見妄境而色由見發無見則無色矣以妄見逐妄色而想由見成無見則無想矣見結為想識已成情故同業相引之際異見成憎父為所憎境也同想成愛母為所愛境也女人託胎者反是想流為愛愛則不離種於是乎生焉故愛為輪迴之本母既納想想結為氣胎於是乎成焉故想為傳命之媒交遘發生精血和合一七凝滑二七皰三七軟肉四七堅肉五七形位胎卵皆然濕化則不必有凝滑與皰也卵生何以居首想念初動情愛後起而卵又兼胎濕化故也人亦兼四種生如毗舍佉彌羅母三十二子皆卵生揜鵲羅婆利頂生輪轉聖王名濕生佛與四眾遊行比丘尼中有比丘尼名阿羅婆地中化生故知情變為想合變為離原無定業卵易為胎濕易為化亦無定質逐其飛沉隨其所應又無定趣但以想愛為因父母為緣而眾生相續於是乎無窮矣大同濟訪龐居士士曰憶在母胎時有一則語舉似阿師不得作道理主持濟曰猶是隔生也士曰向道不得作道理濟曰驚人之句爭得不怕士曰如師見解可謂驚人濟曰不作道理却作道理士曰不但隔一生兩生濟曰粥飯底僧一任檢責士鳴指三下又歸宗可宣禪師因郡守恚師不為禮窘甚遂作書寄郭功甫曰某世緣尚有六年奈州主抑逼當寄餘喘託生公家願無見阻功甫閱書驚喜且領之中夜其妻夢間見師入其寢失聲曰此不是和尚來處功甫撼而問之妻詳以告呼燈取書示之相笑不已遂孕及生乃名宣老期年記問如昔至三歲白雲端抵其家始見之曰吾姪來也端曰與和尚相年宣倒指曰四年矣端曰甚處相別曰白蓮莊上端曰何以為驗曰爹爹媽媽明日請和尚齋忽聞推車聲端問門外是甚麼聲宣以手作推車勢端曰過後如何曰平地兩條溝果六周無疾而逝葢由宣老平日不作道理主持故雖隔生尚自惺惺乃爾若有絲毫覺明情想挂於胸中幾被白雲端勘破富樓那想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本貪愛同滋貪不能止則諸世間卵胎濕化隨力強弱遞相吞食是等則以殺貪為本以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我憐汝色以是因緣經百千劫常在纏縛唯殺盜婬三為根本以是因緣業果相續富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始通曰世界屬依報依報無情故不結業眾生屬正報正報有情即有業也業莫大乎殺盜婬三者而根從婬始以同想成愛異見成憎只此愛憎便是作業根源想愛不結則猶可離既彼此同結則生生世世自不能離父母子孫相生不斷皆婬為之本貪愛同滋便覺有味而殺於是乎生焉貪味不止必求得之而盜於是乎生焉其實始於一愛愛不遂則強吞為殺陰取為盜皆所以成其愛也故婬中自具殺盜二業憎結則償債償命常在生死愛結則憐心憐色常在纏縛是憎愛即業因而生死纏縛即業果也通上世界眾生三種顛倒背真合妄皆覺明之所生覺明虗妄妄立能所故有山河大地世界相續眾生業果諸有為相生滅滅生相續不已若悟妄無自性當體即是無生誰為次第遷流誰為終而復始而根塵處界居然一清淨本然如來藏性矣永嘉曰了即業障本來空未了應須還宿債有味哉其言之也雲居膺在洞山作務誤剗殺蚯蚓山曰這箇聻膺曰他不死山曰二祖往鄴都又作麼生膺不對後有僧問和尚在洞山剗殺蚯蚓因緣和尚豈不是無語膺曰當時有語秪是無人證明看他雲居三界外人故非情想所及更說甚眾生業果相富樓那言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當復生佛告富樓那譬如迷人於一聚落惑南為北此迷為復因迷而有因悟而出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊富樓那十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡云何更名如是狂人為愚為慧佛言如汝所解云何問言諸佛如來妙覺明空何常更出山河大地又如金鑛雜於精金其金一純更不成雜如木成灰不重為木諸佛如來菩提涅槃亦復如是通曰圓覺經金剛藏菩薩問世尊曰若諸眾生本來成佛何故復有一切無明若諸無明眾生本有何因緣故如來復說本來成佛十方異生本成佛道後起無明一切如來何時復生一切煩惱世尊答曰善男子一切世界始終生滅前後有無聚散起止念念相續循環往復種種取捨皆是輪迴未出輪迴而辨圓覺彼圓覺性即同流轉若免輪迴無有是處今富樓那所疑與金剛藏無二世尊但就彼生滅之見破之連舉四喻一喻覺不復迷二喻滅不復生三金不重鑛再申覺不復迷之意四灰不重木再申滅不復生之意故其詞略覺不復迷即是菩提滅不復生即是涅槃此以既出輪迴而辨圓覺彼圓覺性即無輪迴故曰諸佛如來菩提涅槃亦復如是眾生在迷所貴一覺耳昔本無迷無始之迷似迷也當其迷時何曾忘失故曰似迷今亦無覺從迷而覺者似覺也當其覺時更有何得故曰似覺覺迷迷滅乃始覺也覺至始本不異唯一妙覺則不復生迷但自不迷覺亦無用忠國師問紫璘供奉佛是阿義璘曰是覺義師曰佛曾迷否璘曰不曾迷師曰用覺作麼璘無對又米胡和尚令僧問仰山今時人還假悟否山曰悟即不無爭奈落在第二頭何胡深肯之投子拈云仰山與麼道即得還免得自己落麼若免得更有一人大不肯在若免不得亦落第二頭米胡雖然肯他自己還有出身之路也無諸人試點檢看若點檢得出兩人瓦解冰消若點檢不得且莫造次頌曰碧岫峯頭借問人指山窮處未安身雖然免得重陽令爭似靈苗不犯春後天童頌曰第二頭分悟破迷快須撒手捨筌功兮未盡成駢拇智也難知覺噬臍兔老冰盤秋露泣鳥寒玉樹曉風淒持來大仰辨真假玷全無貴白圭總之不得春風華不開及至華開又吹落設有妙悟亦須吐却富樓那又汝問言地水火風本性圓融周徧法界疑水火性不相陵滅又徵虗空及諸大地俱徧法界不合相容富樓那譬如虗空體非羣相而不拒彼諸相發揮所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映於意云何如是殊方諸有為相為因彼生為復空有若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中霄雲霧之時不生光耀當知是明非日非空不異空日觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義觀性元真唯妙覺明妙覺明心先非水火云何復問不相容者真妙覺明亦復如是汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去一東一西先無準的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可憑據通曰前答清淨本然云何忽生山河大地以相論則有生從妄見生也以性論則無生覺不復迷也相元是妄孰為陵滅性本無生誰不相容故七大皆如來藏妙真如性如來藏本非七大而不拒彼七大發現譬如虗空體非羣相而不拒彼諸相發揮一虗空耳土積則地相現水澄則水相現日照則火相現風搖則風相現霽澄則空相現明暗故屬見氣濁故屬識此七喻喻七大也七大不自生故非彼生不他生故非空有非日非空故非共生不異空日非無因生由此言之本無生也既本無生雖循業發現猶如空華空華不能結為空果豈有陵滅而至不相容者乎相雖是妄性元是真其清淨周徧先非水火之形無形則不相為礙豈有不相容而至陵滅者乎七大之相既若彼七大之性復若此故如來藏妙覺明心亦猶是也如以空明則有空現以事言之如鑿井等以業言之如靜成虗空以心言之妄起空見唯見一空地水火風亦復如是各各發明則各各現若俱發明則有俱現無論南山起雲北山下雨總於虗空無礙即如水中之日東西各行則俱有日隨之不取信於天上但致疑於水中亦如雲駛月運舟行岸移從妄見生豈可於虗妄所見辨其是一非一毋乃大惑歟或曰地水火風現前實有何謂虗妄答曰無智人謂為實有慧眼觀之則不然譬如小兒見鏡中像歡喜欲取大人知之故不為所惑諸凡夫見微塵和合謂為實地有天眼者能散此地初不可得故知相元虗妄也法眼問寶資長老古人道山河無隔礙光明處處透且作麼生是處處透底光明資曰東畔打羅聲歸宗柔別云和尚擬隔礙如二尊宿問答不為滲漏尚被歸宗檢點西天大耳三藏到京云得他心通肅宗命忠國師試驗師曰汝道老僧即今在甚麼處藏曰和尚是一國之師何得却去西川看競渡良久再問汝道老僧即今在甚麼處藏曰和尚是一國之師何得却在天津橋上看弄猢猻良久復問汝道老僧只今在甚麼處藏罔測師叱曰這野狐精他心通在甚麼處藏無對僧問仰山大耳三藏第三度為甚麼不見國師山曰前兩度是涉境心後入自受用三昧所以不見僧舉問玄沙沙云汝道前兩度還見麼又僧問趙州三藏第三度不見國師未審國師在甚麼處州曰在藏鼻孔上僧後問玄沙既在鼻孔上為甚麼不見沙曰只為太近天童拈云三藏不見國師則且置你道國師自知下落處麼若謂自知則百鳥銜華諸天供養未有休日且道正當恁麼時落在什麼處可知國師兩度涉境心不妨各各發明則各各現若妙覺明心自受用三昧落處且不知云何詰其陵滅不相容義富樓那汝以色空相傾相奪於如來藏而如來藏隨為色空周徧法界是故於中風動空澄日明雲暗眾生迷悶背覺合塵故發塵勞有世間相我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場徧十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪滅塵合覺故發真如妙覺明性通曰未出輪迴而辨圓覺彼圓覺性即同流轉若免輪迴無有是處即此段以色空傾奪之相辨如來藏而如來藏性隨為色空流轉法界欲免世間塵勞無有是處眾生迷悶不達色空本吾一體為形所拘觸處成礙以背覺故雖明不妙故謂之迷塵屬生滅原非本有覺非生滅不假外來非本有故可滅非外來故可合真如妙覺圓照法界一即一切一切即一縱橫自在事事無礙是不思議用非脩所成但謂之曰發而已達磨大師安心法門曰迷時人逐法解時法逐人解則識攝色迷則色攝識但有心分別計較自心現量者悉皆是夢若識心寂滅無一動念處是名正覺神秀偈曰身是菩提樹心如明鏡臺時時勤拂拭勿使惹塵埃只此勤拂拭便是以生滅心合如來藏故在門外六祖偈曰菩提本無樹明鏡亦非臺本來無一物何處著塵埃只此無一物便是以不生不滅合如來藏合繼祖位趙州上堂如明珠在掌胡來胡現漢來漢現老僧把一枝草為丈六金身用把丈六金身為一枝草用佛是煩惱煩惱是佛僧問佛是誰家煩惱州曰與一切人為煩惱曰如何得免州曰用免作麼此趙州不用滅塵不用合覺却能小中現大大中現小足與六祖把手共行圓照上堂於一毛端現寶王剎坐微塵裏轉大法輪拈起拄杖曰這箇是塵作麼生說箇轉法輪底道理山僧今日不惜眉毛與汝諸人說破拈起也海水騰波須彌岌峇放下也四海晏清乾坤肅靜敢問諸人拈起即是放下即是當斷不斷兩重公案擊禪床下座又尼妙總上堂宗乘一唱三藏絕詮祖令當行十方坐斷二乘聞之怖走十地到此猶疑若是俊流未言而喻設使用移星換斗底手段施攙旗奪鼓底機關猶是空拳豈有實義向上一路千聖不傳學者勞形如猿捉影靈山付囑俯徇時機演唱三乘各隨根器始於鹿野苑轉四諦法輪度百千萬眾山僧今日與此界地方乃佛乃祖山河大地草木叢林現前四眾各轉大法輪交光相羅如寶絲網若一草一木不轉法輪則不得名為轉大法輪所以道於一毛端現寶王剎坐微塵裏轉大法輪乘時於其中間作無量無邊廣大佛事周徧法界一為無量無量為一小中現大大中現小不動步遊彌勒樓閣不返聞入觀音普門情與無情性相平等不是神通妙用亦非法爾如然於此倜儻分明皇恩佛恩一時報足且道如何是報恩一句天高羣象正海闊百川潮諸尊宿深契妙明境界極口宣揚津津有味而如來藏本妙圓心非心非空非地非水非風非火非眼非耳鼻舌身意非色非聲香味觸法非眼識界如是乃至非意識界非明無明明無明盡如是乃至非老非死非老死盡非苦非集非滅非道非智非得非檀那此云布施非尸羅此戒非毗梨耶此云精進非羼提此忍非禪那此定非般剌若此智非波羅蜜多此到彼岸如是乃至非怛闥阿竭此云如來非阿羅訶此云應供三耶三菩此正徧知非大涅槃非常非樂非我非淨以是俱非世出世故即如來藏元明心妙即心即空即地即水即風即火即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界即明無明明無明盡如是乃至即老即死即老死盡即若即集即滅即道即智即得即檀那即尸羅即毗梨耶即羼提即禪那即般剌若即波羅蜜多如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨以是俱即世出世故即如來藏妙明心元離即離非是即非即如何世間三有眾生乃出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見通曰此段經文唯長水略有次第其曰本妙圓心非心非空等約非相以明真諦也元明妙心即心即空等約即相以明俗諦也妙明心元離即離非是即非即者約遮照以明中道諦也雙遮真俗故曰離即離非雙照真俗故曰是即非即三諦一體故皆曰即如來藏初且以非遣相次乃以即遣非終帶名言未極一真之旨離即離非無非不非言語道斷心行處滅方顯一真法界如來藏心故維摩經三十一菩薩說不二法門皆以言遣相文殊以言遣言維摩以無言遣言方為究竟大都世間法不出五陰七大根塵處界出世間法不出聲聞緣覺二乘而菩薩與佛於世出世非專出世者也心屬識即攝五陰眼識界等即攝十二處此六凡界也緣覺觀十二緣有生起相有修斷相此緣覺界也知苦斷集證滅修道此聲聞界也有智有得及六度到彼岸菩薩界也如來應供正徧知三號涅槃四德總為佛界世出世間悉不外此若各有著即不圓故於非見其圓一向著非即不妙故於即見其妙妙而明明而妙不即不非亦即亦非能所俱離無影響可得此真無上菩提也馬鳴曰真實空者從本以來一切染法不相應故離一切法差別相故無有虗妄分別心故應知真如非有相非無相非有無相非非有無相非一相非異相非一異相非非一異相略說以一切眾生虗妄分別所不能觸故是故三有眾生見其假聲聞緣覺見其空彼於菩薩中道諦尚不能測況第一義諦唯佛與佛乃能究盡雖登地菩薩有所不窺豈世間語言可得而彷彿之乎無上菩提不可以心知知不可以語言入益當想見其妙矣僧問馬祖和尚為甚麼說即心即佛曰為止小兒啼曰啼止後如何曰非心非佛曰除此二種人來如何指示曰為伊道不是物曰忽遇其中人來時如何曰且教伊體會大道馬祖已得涅槃妙心出詞吐氣暗與此合又馬祖聞大梅住山乃令僧問和尚見馬大師得箇甚麼便住此山梅曰大師向我道即心即佛我便向這裏住僧曰大師近日佛法又別梅曰作麼生曰又道非心非佛梅曰這老漢惑亂人未有了日任地非心非佛我祗管即心即佛其僧回舉似馬祖祖曰梅子熟也東寺會禪師常患門徒以即心即佛之談誦憶不已且謂佛於何住而曰即心心如畫師而曰即佛遂示眾曰心不是佛智不是道劍去遠矣爾方刻舟南泉有時曰江西馬祖說即心即佛王老師不恁麼道不是心不是佛不是物恁麼道還有過麼趙州禮拜而出時有僧問趙州曰上座禮拜便出意作麼生州曰汝却問取和尚僧乃問泉適來諗上座意作麼生泉曰他却領得老僧意旨必於諸老宿用處無疑方可入佛知見譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發汝與眾生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起由不勤求無上覺道愛念小乘得少為足通曰妙明明妙即此妙音妙指之妙總之非思議所及如我按指妙音隨發如海印發光色色圓滿何造作之有大集經云閻浮所有色像大海皆有印文故曰海印汝暫舉心如器與手不相習不得其妙故塵勞先起為以生滅心合如來藏不能隨順定慧觀照而隨順煩惱無明故有塵勞塵勞覆蔽雖有寶覺真心各各圓滿其何能發東明遷禪師一日閱楞嚴次忠道者問如我按指海印發光佛意如何遷曰釋迦老子好與二十棒曰為甚麼如此遷曰用按指作麼曰汝暫舉心塵勞先起又作麼生遷曰亦是海印發光妙哉妙哉須如是見得乃可謂轉楞嚴也薦福悟本禪師上堂乾闥婆王曾奏樂山河大地皆作舞爭如跛脚老雲門解道臘月二十五博山今日有條攀條無條攀例也要應箇時節驀拈拄杖橫案膝上作撫琴勢云還有聞絃賞音者麼良久云直饒便作鳳凰鳴畢竟有誰知指法卓一卓下座嗟乎指法豈真不傳哉勤求無上覺道自當得之富樓那言我與如來寶覺圓明真妙淨心無二圓滿而我昔遭無始妄想久在輪迴今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常敢問如來一切眾生何因有妄自蔽妙明受此淪溺佛告富樓那汝雖除疑餘惑未盡吾以世間現前諸事今復問汝汝豈不聞室羅城中演若達多此云祠授忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返如是迷因因迷自有識迷無因妄無所依尚無有生欲何為滅得菩提者如寤時人說夢中事心縱精明欲何因緣取夢中物況復無因本無所有如彼城中演若達多豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失富樓那妄性如是因何為在汝但不隨分別世間業果眾生三種相續三緣斷故三因不生則汝心中演若達多狂性自歇歇即菩提勝淨明心本周法界不從人得何藉劬勞肯綮修證通曰富樓那已證漏盡已得聖果何猶餘惑未盡只為從前在滅妄上用工即此滅妄之心便是覺明分別怖頭狂走滅妄求真有真可得如鏡中之頭眉目可見真本不失難可卜度如頭本不失面目難見一生分別此世間此眾生此業果與吾真如不相似縱得真如由斷妄證得非本來自性天真佛也富樓那尚未達此故以妄既可滅生必有因須識其因乃可斷妄前因明立所固是妄生此等分別正是妄世尊直顯頓門不論滅妄但息分別菩提自足但息狂走頭元自在所以妄分別妄狂走者因積迷而有迷本無因不從迷生不從悟出迷既無恨妄將安附妄既無依妄本不生妄元不生無可滅者滅無可滅寂滅現前所以妙覺明圓本圓明妙原無生滅非有妄也得菩提者覓真且不可得而何從得妄乎故不隨順分別三種相續之所以生及緣斷之所以不生則一心不生萬法無咎勝淨菩提何假人力脩證而得哉三緣斷故三因不生即於其中證滅盡定富樓那等常作如是分別是以菩提由脩證得也但不如是分別即無妄可滅無真可得清淨本然周徧法界若謂如來獨妙真常必由一切圓滅而證者未見其妙者也骨間肉曰肯於骨可啟處有筋肉結礙曰綮疱丁解牛用功力處借此字面為不用功力之喻有僧問黃檗如今現有種種妄念何以言無檗云妄本無體即是汝心所起汝若識心是佛心本無妄那得起心更認於妄汝若不生心動念自然無妄所以云心生則種種法生心滅則種種法滅僧云今正妄念起時佛在何處檗云汝今覺妄起時覺正是佛可中若無妄念佛亦無何故如此為汝起心作佛見便謂有佛可成作眾生見便謂有眾生可度起心動念總是汝見處若無一切見佛有何處所如文殊纔起佛見便貶向二鐵圍山僧云今正悟時佛在何處檗云問從何來覺從何起語默動靜一切聲色盡是佛事何處覓佛不可更頭上安頭嘴上安嘴但莫生異見山是山水是水僧是僧俗是俗山河大地日月星辰總不出汝心三千世界都來是汝箇自己何處有多般心外無法滿目青山虗空世界皎皎地無絲髮許與汝作見解所以一切聲色是佛之慧目法不孤起仗境方生為物之故有其多智終日說何曾說終日聞何曾聞所以釋迦四十九年說未曾說著一字僧云若如此何處是菩提檗云菩提無是處佛亦不得菩提眾生亦不失菩提不可以身得不可以心求一切眾生即菩提相僧云如何發菩提心檗云菩提無所得汝今但發無所得心決定不得一法即菩提心菩提無生處是故無得者故云我於然燈佛所無有少法可得佛即與我授記明知一切眾生本是菩提不應更得你今問發菩提心謂將一箇心學取佛去唯擬作佛道任汝三祇劫脩亦祗得箇報化佛與汝本源真性佛有何交涉故云外求有相佛與汝不相似又臨濟云道流諸方說有道可脩有法可證你且說證何法脩何道你今用處欠少什麼物修補何處後生小阿師不會便即信這般野狐精魅許他說事繫縛他人言道理行相因護惜三業始得成佛如此說者如春細雨古人云路逢達道人第一莫向道所以言若人脩道道不行萬般邪境競頭生智劍出來無一物明頭未顯暗頭明所以古人云平常心是道大德覓什麼物現今目前聽法無依道人歷歷地分明未曾欠少你若欲與佛祖不別但如是見不用疑悞你心心不異名之活祖心若有異則性相別心不異故即心與相不別又僧問薦福思禪師曰古殿無佛時如何思曰梵音何來又問不假脩證如何得成思曰脩證即不成諸尊宿見地一一洞契何藉劬勞肯綮修證之旨此即涅槃妙心正法眼藏豈待靈山拈華迦葉微笑而後號稱別傳心印哉譬如有人於自衣中繫如意珠不自覺知窮路他方乞食馳走雖實貧窮珠不曾失忽有智者指示其珠所願從心致大饒富方悟神珠非從外得通曰法華楞嚴直指人心見性成佛皆以衣珠為喻如來藏性為五陰所覆如珠繫衣中故不易見向外馳求日見不足窮露他方狂走九界求人天樂取偏小益猶乞食馳走也既獲本心充然有餘珠名如意所願從心何期自性本自具足何期自性能生萬法故妙用不虧致大饒富此一神珠也迷未曾失悟未曾得但得智者指示便自受用無窮豈假脩證哉世尊一日示隨色摩尼珠問五方天王此珠作何色時五方天王互說異色世尊復藏珠入袖却擡手曰此珠作何色天王曰佛手中無珠何處有色世尊歎曰汝何迷倒之甚吾將世珠示之便各強說青黃赤白色吾將真珠示之便總不知時五方天王悉皆悟道大珠初參馬祖祖問曰從何處來曰越州大雲寺來祖曰來此擬須何事曰來求佛法祖曰自家寶藏不顧拋家散走作什麼我這裏一物也無求甚麼佛法珠遂禮拜問曰那箇是慧海自家寶藏祖曰即今問我者是汝寶藏一切現成更無欠少使用自在何假向外來覓珠於言下自識本心不由知覺踊躍禮謝師事六載後歸自撰頓悟入道要門論一卷祖見之告眾曰越州有大珠圓明光透自在無遮障處也仰山參東寺會禪師會問汝是甚處人仰曰廣南人會曰我聞廣南有鎮海明珠是否仰曰是會曰此珠如何仰曰黑月即隱白月即現會曰還將得來也無仰曰將得來會曰何不呈似老僧仰叉手近前曰昨到溈山亦被索此珠直得無言可對無理可伸會曰真師子兒善能哮吼千百載而下賴有諸尊宿各獲神珠非從外得益信佛言匪謬即時阿難在大眾中頂禮佛足起立白佛世尊現說殺盜婬業三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白云何如來頓棄因緣我從因緣心得開悟世尊此義何獨我等年少有學聲聞今此會中大目犍連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏今說菩提不從因緣則王舍城拘舍梨等所說自然成第一義唯垂大悲開發迷悶通曰世尊說三緣斷故三因不生正教富樓那等不隨分別三種相續因緣斷滅等法則狂性自歇菩提現前不欲其以生滅心合如來藏另開一頓悟法門即斷因緣而得不生不滅尚不許也況復有因緣乎阿難一向多聞習知因緣自然彼此互破錯會三緣斷故三因不生是小乘中殺盜婬三業不緣則貪嗔癡三因不生有因緣有對待皎然明白何得謂無因緣即如大目犍連與舍利弗逢馬勝比丘說諸法從緣生諸法從緣滅言下即證初果是從因緣開悟長老皆然今頓棄因緣毋乃末伽黎拘舍梨子說眾生雖有苦樂無有因緣自然而爾何以異乎殊不知聞佛因緣得成無漏所云從緣生從緣滅隱然悟見無生之旨彼生滅者皆緣耳故得無漏豈滯於因緣哉鳥窠侍者會通一日欲辭去窠曰汝今何往對曰會通為法出家和尚不垂慈誨今往諸方學佛法去窠曰若是佛法吾此間亦有少許曰如何是和尚佛法鳥於身上拈起布毛吹之通遂領悟汾陽頌曰侍者初心慕勝緣辭師擬去學參禪鳥窠知是機緣熟吹毛當下得心安如此機緣豈亦因緣之謂乎佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是阿難演若達多頭本自然本自其然無然非自何因緣故怖頭狂走若自然頭因緣故狂何不自然因緣故失本頭不失狂怖妄出曾無變易何藉因緣本狂自然本有狂怖未狂之際狂何所潛不狂自然頭本無妄何為狂走若悟本頭識知狂走因緣自然俱為戲論通曰若謂因緣斷滅而後菩提真性自然而出非正論也即演若達多怖頭一事窮之非因緣非自然斷可識矣始以頭論頭本自然必不為因緣所奪何故以照鏡因緣而狂既以因緣為是則自然不能作主何以不因緣故真失其頭然而頭本不失彼自狂走見狂本妄出非關因緣明矣既不從因緣生亦不從因緣滅而謂狂性因緣可得滅除者非也既以狂論狂本自然潛於何所不狂自然又何狂走或狂或不狂皆無自性非關自然明矣既非自然潛亦非自然出故謂不狂性自然而出者非也是知說因緣說自然何與於頭說本狂說本不狂何濟於狂俱屬戲論未為真實但悟本頭頭本不失識知狂走狂本妄出只此一悟字一識字乃自家真實受用非言論所及悟頭即悟本來面目元無變易識狂即識九界狂走妄生分別此悟此識如電光石火在剎那際豈因緣自然所可竚足之地乎故謂歇即菩提不從人得遠離因緣與彼自然良以此也牛頭山智巖禪師隋大業中為郎將頻立戰功唐武德中年四十遂乞出家從寶月禪師為弟子昔同從軍者二人聞師隱道乃共入山尋之既見因謂曰郎將狂耶何為住此巖曰我狂欲醒君狂正發夫嗜色淫聲貪榮冒寵流轉生死何由自出二人感悟歎息而去後謁融禪師發明大事融謂曰吾受信大師真訣所得都亡設有一法勝過涅槃吾說亦如夢幻夫一塵飛而翳天一芥墮而覆地汝今已過此見吾復何云故息狂若智巖者可語真悟也已是故我言三緣斷故即菩提心菩提心生生滅心滅此但生滅滅生俱盡無功用道若有自然如是則明自然心生生滅心滅此亦生滅無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性本然非然和合非合合然俱離離合俱非此句方名無戲論法菩提涅槃尚在遙遠非汝歷劫辛勤脩證雖復憶持十方如來十二部經清淨妙理如恒河沙秪益戲論通曰此段申明何藉劬勞肯綮脩證之意忽然狂歇非有斷緣劬勞故非因緣若謂三緣斷故三因不生藉此因緣得菩提心是菩提心生因於生滅心滅滅妄證真真亦成妄此但生滅法爾非菩提也是因緣之屬生滅也固易可知至於滅生俱盡不但生滅心盡而滅生滅者亦盡既無生可滅即無功可用其中若有不生不滅而名為自然者此自然心由於滅生俱盡而顯是自然心生因於生滅心滅亦謂之生滅法非菩提心亦字有味彼無生滅者名為自然何以亦謂之生滅彼對生滅而顯不生滅有對待故猶對和合而顯不和合有然有不然有合有不合對待宛然如對牛角有說兔角無故屬生滅彼但能空其生滅不能空其自然猶言彼舍無人但空其人未空其舍非真實見故名戲論直使合與非合然與非然諸對待法一切遠離亦無遠離之心而離合俱泯既離其所又離其能能所俱離唯一真實此句方名無戲論法若依此句取無上菩提涅槃尚在遙遠何以故坐在有為功勳故菩提正覺涅槃妙心但可剎那悟入非汝歷劫辛勤所可脩證故不由歷劫辛勤脩證得者是不假因緣自然而得也必藉歷劫辛勤脩證得者是必由因緣自然而得也雖復憶持十方如來清淨妙理皆即無戲論法亦祗益因緣自然之戲論而已何有於實得哉故我謂三緣斷故三因不生隨此分別得菩提心者非真得也謂其以生滅心合如來藏也但不隨此分別狂性自歇歇即菩提不徒人得者乃真得也為其以不生不滅合如來藏也此最上機緣豈拘舍梨自然之說可同日語乎六祖曰外道所說不生不滅者將滅止生以生顯滅滅猶不滅生說不生我說不生不滅者本自無生今亦無滅所以不同外道進山主問脩山主曰明知生不生性為甚麼為生之所留脩云筍畢竟成竹去如今作篾使還得麼進云汝向後自悟去在修云某甲只如此上座意旨如何進云這箇是監院房那箇是典座房脩便禮拜天童頌云豁落亡依高閉不羈家平帖到人稀些些力量分堦級蕩蕩身心絕是非是非絕介立大方無軌轍於是觀之證無上菩提者原不落堦級更何轍迹可見汝雖談說因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難何須待我佛頂神呪摩登伽心婬火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫是故阿難汝雖歷劫憶持如來秘密妙嚴不如一日脩無漏業遠離世間憎愛二苦如摩登伽宿為婬女由神呪力銷其愛欲法中今名性比丘尼與羅睺此云障日母耶輸陀羅此云華色同悟宿因知歷世因貪愛為苦一念熏脩無漏善故或得出纏成蒙受記如何自欺尚留觀聽通曰阿難積劫多聞不能免離摩登伽難是憶持如來清淨妙理不得證果明也佛頂神呪能使摩登伽婬心頓歇是不思議熏脩自得出纏明也憶持秘密妙嚴即為有漏捨妄趣真即名憎愛二苦苦且不免而況於得果乎熏習圓頓法門即為無漏悟知夙因貪愛不生且蒙授記何止於得果乎摩登伽證三果名出纏耶輸陀羅亦是世尊歷世因緣法華會上授記成佛此但女流一念回心尚成精進況汝聲聞如何自欺不能頓悟必藉斷妄因緣而以外道戲論留於觀聽間乎楚南禪師上堂諸子設使解得三世佛教如缾注水及得百千三昧不如一念脩無漏道免被人天因果繫絆時有僧問無漏道如何脩南曰未有闍黎時體取曰未有某甲時教誰體南曰體者亦無得此一二轉語而如來未竟之旨悉露阿難及諸大眾聞佛示誨疑惑銷除心悟實相身意輕安得未曾有重復悲淚頂禮佛足長跪合掌而白佛言無上大悲清淨寶王善開我心能以如是種種因緣方便提獎引諸沉冥出於苦海世尊我今雖承如是法音知如來藏妙覺明心徧十方界含育如來十方國土清淨寶嚴妙覺王剎如來復責多聞無功不逮脩習我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入唯願如來不捨大悲示我在會諸蒙暗者捐舍小乘畢獲如來無餘涅槃本發心路令有學者從何攝伏疇昔攀緣得陀羅尼入佛知見作是語已五體投地在會一心佇佛慈旨通曰自初決擇真妄發明覺性乃至宣勝義中真勝義性決通疑滯使其信解真性為因地心因心既真斯可圓成果地脩證故上文為見道分此下別起為脩道分阿難既獲法身矣而尚有微細之惑今既除惑悟實相矣而又有不逮熏脩之歎總之尚在門外雖知有天王華屋而未能入也所以不得其門而入者一由愛念小乘不明本發心路二由攀緣為苦不能入佛知見雖則多聞之習使然亦為會中諸有學者請也睦州謂眾曰汝等諸人還得箇入頭處也未若未得箇入頭處須覓箇入頭處已後不得辜負老僧堯峰暹禪師上堂冬去秋來樓閣門開若也入得不用徘徊諸上座還向這裏入得也未若也入得所以古人道是處是彌勒無門無善財若也入之未得自是諸上座狂走更不忉忉久立珍重有天使問睦州三門俱開從那門入州喚上書使應諾州曰從信門入使又見畫壁問曰二尊者對談何事州摑露柱曰三身中那箇不說法睦州門風高峻至此都明明說破若信得及更不歷於階級爾時世尊哀愍會中緣覺聲聞於菩提心未自在者及為當來佛滅度後末法眾生發菩提心開無上乘妙脩行路宣示阿難及諸大眾汝等決定發菩提心於佛如來妙三摩提不生疲倦應當先明發覺初心二決定義通曰阿難問有二義一者如來無餘涅槃本發心路二者攝伏攀緣入佛知見故佛以二決定義語之欲知本發心路須擇生死根本得無生滅性為因地心然後圓成不生不滅涅槃妙德此初心第一義也欲攝伏攀緣須詳審煩惱根本知六為賊媒自作自受但擇圓根一門深入彼六知根一時清淨此初心第二義也欲得無生須伏煩惱能斷煩惱即證無生二者未始不相成也此云妙三摩提又云妙脩行路時時提醒一妙字要於妙明明妙相應不至著相求菩提耳彼緣覺聲聞未免著相故於菩提未得自在唯悟此妙不藉劬勞肯綮脩證乃所謂無生乘也達磨大士至金陵梁武帝問曰朕即位以來造寺寫經度僧不可勝絕有何功德祖曰並無功德帝曰何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真實功德祖曰淨智妙圓體自空寂如是功德不以世求帝又問如何是聖諦第一義祖曰廓然無聖帝曰對朕者誰祖曰不識帝不領祖知機不契遂潛渡江北雪竇頌云聖諦廓然何當辨的對朕者誰還云不識因茲暗渡江豈免生荊棘闔國人追不再來千古萬古空相憶休相憶清風匝地有何極顧視左右云這裏還有祖師麼自云有喚來與老僧洗脚天童頌云廓然無聖來機徑庭得非犯鼻而揮斤失不回頭而墮甑寥寥冷坐少林默默全提正令秋清月轉霜輪河淡斗垂夜柄繩繩衣鉢付兒孫從此人天成藥病若論無上乘妙脩行路即聖諦第一義尚不許也況落二落三云何初心二義決定阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異阿難若於因地以生滅心為本脩因而求佛乘不生不滅無有是處通曰此開示見性第一義也若論見性不假功勳但觀因地發心與果地覺為同為異故聖人不思而得不勉而中赤子亦不慮而知不學而能不學不慮其因也不思不勉其果也故曰大人者不失其赤子之心者也果因一契更無增減非見性者不足語此馬祖居南嶽傳法院獨處一室唯習坐禪凡有來訪者都不顧讓大師往亦不顧師視其神宇有異遂憶六祖讖乃多方誘導之一日將甎於菴前磨祖亦不顧時既久乃問曰作甚麼師曰磨作鏡祖云磨甎豈得成鏡師云磨甎既不成鏡坐禪豈能成佛祖乃離坐云如何即是師曰譬如駕車車若不行打車即是打牛即是祖無對師又云汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非坐相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理祖禮拜問如何用心即合無相三昧師曰汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道祖曰道非色相云何能見師云心地法眼能見乎道無相三昧亦復然矣祖曰有成壞否師曰若以成壞聚散而見道者非見道也聽吾偈曰心地含諸種遇澤悉皆萌三昧華無相何壞復何成祖聞示誨豁然開悟侍奉十秋日益玄奧後闡化於江西師問眾曰道一為眾說法否眾曰已為眾說法師曰總未見人持箇消息來因遣一僧去囑曰待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨回謂師曰道一云自從胡亂後三十年不曾少鹽醬師然之雪峯寄巖頭語云一自鰲山成道後直至於今飽不饑與此相類皆因地發心與果地覺了無同異者也彼學坐禪有修有證即屬生滅法於無上乘何啻千里以是義故汝當照明諸器世間可作之法皆從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故則汝身中堅相為地潤濕為水煖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察從始入終五疊渾濁云何為濁阿難譬如清水清潔本然即彼塵土灰砂之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌泊然名之為濁汝濁五重亦復如是阿難汝見虗空徧十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁汝身現摶四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土相織妄成是第四重名眾生濁汝等見聞元無異性眾塵隔越無狀異生性中相知用中相背同異失準相織妄成是第五重名為命濁通曰第一義要明本發心路當審觀因地發心與果地覺為同為異謂之審觀必須詳審何者是生死根本與果地異何者是不生不滅根本與界地同本一湛圓妙覺明心本無不同何為有異只為黏湛發起四大結成六根根塵相染疊為五濁而妙覺明心離其本位分而為視聽覺察流轉生死是視聽覺察從始入終從色至識不離五陰區宇乃生滅之根本也以此為因而求佛乘無有是處何者世間可作之法皆從變滅而空非可作故無爛壞唯佛無為不墮諸數是為真空雖世間空亦須消殞況身中四大各有所歸視聽覺察離塵無體如此五濁生滅知見其可以為因乎何言乎五濁色屬相分識屬見分識水也色土也見空相織如水土合故名為濁見初動時唯見一空有空無體即是頑空有見無覺即是無明既有虗空徧十方界成住壞空皆由此始故謂之劫空見不分是見分與器界疎相分淆而為濁也故名劫濁屬色陰見聞覺知本無留礙因四大所壅而有留礙水火風土本無覺知因六根所旋而有覺知是見分與身中親相分淆而為濁也故名見濁屬受陰前攝六根為見大此亦總六根為見濁見境領納屬前五識憶識誦習屬第六識是知見由真性發起神發知矣不可謂之性矣是意想中容受六塵顯現其中是謂內塵亦可謂之相矣離六塵之外別無實相離知覺之外別無真性塵勞煩惱汩亂湛覺是知見與法塵淆而為濁也故名煩惱濁屬想陰意想知見每欲留於世間戀著三界猶可知也輪迴業運每常選於國土變化密移不可知也總不離眾生因亦不離眾生果是知見與眾生相流轉而為濁也故名眾生濁屬行陰行陰屬第七識其濁易辨識陰屬第八識其濁難晣故見聞覺知自湛元而分元無異性六塵不同牽生六識眼不別聲耳不別色不相互用故異生唯無異性故性中相知唯眾塵隔越故用中相背性本不生不滅故同用處與生滅和合故異未轉第八識即無後得智於前五識不得圓妙故性中了了相知及至用時與如來用中相背轉不盡故失準而名識轉盡即不失準而均謂之性矣如來藏一性無二如來準此滅生滅心二乘見自共相即於同失準如來藏隨為色空如來準此種類俱空二乘取真證滅即於異失準也絲毫未化命蒂猶存來先去後作主人公是性與識相織成妄而為濁也故名命濁屬識陰此五濁皆非實有故曰妄成如水清潔原非有土如土留礙原非有水二性本不相循心境不相到故若知湛無黏性知妄即離離妄即覺但一湛圓妙覺明心不落視聽覺察如水自瑩然何濁之有必須悟知本來無濁者然後可為不生不滅根因也僧問梁山如何是空劫已前事山云擊動乾坤鼓時人聽不聞丹霞頌云虗空為鼓彌須槌擊者雖多聽者稀半夜髑髏驚破夢滿頭明月不思歸四祖信大師年十四初禮三祖問曰願和尚慈悲乞與解脫法門三祖曰誰縛汝對曰無人縛祖曰何更求解脫乎信於言下大悟此所謂大根大器也司空山本淨禪師偈曰見聞覺知無障礙色香味觸常三昧如鳥空中只麼飛無取無捨無憎愛若會應處本非心始得名為觀自在若淨禪師者雖處五濁惡世何嘗不淨阿難汝今欲令見聞覺知遠契如來常樂我淨應當先擇死生根本依不生滅圓湛性成以湛旋其虗妄滅生伏還元覺得元明覺無生滅性為因地心然後圓成果地脩證如澄濁水貯於靜器靜深不動沙土自沉清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明明相精純一切變現不為煩惱皆合涅槃清淨妙德通曰大學知止而後有定數語為千聖秘訣此段經文恰與配合象山云此心此理同也固非虗語應當先擇死生根本依不生滅圓湛性成如澄濁水貯於靜器所謂知止而后有定也以湛旋其虗妄滅生伏還元覺如水靜深不動沙土自沉清水現前所謂定而后能靜也清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明所謂靜而后能安也明相精純一切變現不為煩惱所謂安而后能慮也皆合涅槃清淨妙德所謂慮而后能得也常樂我淨為涅槃妙德唯佛與佛乃能究竟今以見聞覺知契之故曰遠先擇死生根本雖通指五濁業用而識陰尤死生根本此識依不生滅與生滅和合而得名故當擇去生滅種子而依不生滅圓湛之性識陰湛不搖處似無生滅然湛而不圓望如恬靜實為生滅根本若圓湛之性本自圓成非由造作乃真如實際理地也依此圓湛本自無事即以此湛旋其虗妄滅生從前許多滅生工夫皆為虗妄雖至滅生俱盡由功勳得非元覺也必識陰旋伏然後元覺現前此元明覺原無生滅只緣分為見聞覺察馳入識陰區宇為識陰所覆不得出頭今識滅性現還我本來面目此元明覺即見聞覺察而非見聞覺察也見聞覺察有起滅而元明覺無起滅也故不以見聞覺察為因地心而以元明覺為因地心然後圓成不生不滅如來果位也涅槃四德即不生不滅果謂能斷客塵煩惱及根本無明故謂明性精純如金不重礦灰不重木更不為煩惱故有一念無生即證涅槃者即因即果一時具足有理雖頓悟事以漸除者因該十信果通分滿總之圓成一元明覺而已曹山見紙衣道者便問莫是紙衣道者否衣云不敢山曰如何是紙衣下事衣云一裘纔挂體萬法悉皆如山云如何是紙衣下用衣近前應諾便立脫去山曰汝既解恁麼去何不恁麼來衣忽開眼問曰一靈真性不假包胎時如何山曰未是妙衣云如何是妙山曰不借借衣便珍重下僧堂坐化山有頌曰覺性圓明無相身莫將知見妄疎親念異便於玄旨昧心差不與道相隣情分萬法沉前境識鑒多端喪本真如是句中能曉會了然無事昔時人又九峯虔在石霜作侍者霜遷化後眾欲請堂中首座接續住持峯不肯乃云待某甲問過若會先師意如先師侍奉遂問先師道休去歇去一念萬年去寒灰枯木去古廟香爐去一條白練去其餘則不問如何是一條白練去座曰這個秪是明一色邊事峯曰元來未會先師意在座云你不肯我那座乃焚香云我若不會先師意香煙起處脫去不得言訖便坐脫峯乃撫其背曰坐脫立亡則不無先師意未夢見在天童頌云石霜一宗親傳九峯香煙脫去正脈難通月巢鶴作千年夢雪屋人迷一色功坐斷十方猶點額密移一步看飛龍順默和尚頌云元座徒亡一炷煙九峯不是抑高賢若將一色為承紹辜負先師不借緣石霜示眾有云未嘗亡照猶為外紹為臣種亦曰借若誕生絲毫不隔如王子生下則能紹大位謂之內紹名王種名句不借也借則一色邊事彼原未得不生滅性為因地心而欲圓成果地皆合涅槃清淨妙德難矣第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相應當詳審煩惱根本此無始來發業潤生誰作誰受阿難汝脩菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位通曰審觀因地發心所以會其真審觀煩惱根本所以絕其妄妄復無妄即妄即真矣煩惱根本有二一潤業無明謂過去煩惱也二潤生無明謂託胎時於父母起愛憎識情也二種煩惱本無自性若知無自性更無作者更無受者當體空寂誰為煩惱彼小乘人不離有為功用謂實有煩惱務須破除是未知根塵之為虗妄也若菩薩乘則異於是直趨無上菩提但於根塵間審詳誰作誰受忽然撞破無始無明一時頓息羅山閑先問石霜起滅不停時如何霜云直須寒灰枯木去一念萬年去函葢相應去純清絕點去山不契往問巖頭頭咄云是誰起滅山於此有省天童頌云砍斷老葛藤打破狐窠窟豹被霧而變文龍乘雷而換骨咄起滅紛紛是何物於此省去更不向六根門首作分疏也龐居士偈曰一羣六箇賊生生欺殺人我今識汝也不與汝為隣汝若不伏我我即到處說教人盡識汝使汝行路絕你若肎伏我我即不分別共汝一處住同證無生滅此真知顛倒所在而能降伏之取如來位者阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂何以故空無形相無結解故則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始眾生世界生纏縛故於器世間不能超越通曰前喻虗空不壞非生滅故此喻虗空無結非煩惱故虗空且然而自性真空夫何生滅煩惱之有若棄生滅守於真常常光現前根塵識心應時銷落則眾生世界不生纏縛矣內瑩發光如是浮塵及器世間諸變化相如湯銷冰應念化成無上知覺則於器世間能超越矣家寶如是奈何不自護惜內六識外六塵皆由六根引發自生纏縛故曰賊媒僧問曹曰沙門豈不是具大慈悲底人山曰是曰忽遇六賊來時如何山曰亦須具大慈悲曰如何具大慈悲山曰一劍揮盡曰盡後如何山曰始得和同又僧問保福家貧遭劫時如何福曰不能盡底去曰為甚麼不能盡底去福曰賊是家親曰既是家親為甚麼翻成家賊福曰內既無應外不能為曰忽然捉敗功歸何所福曰賞亦不曾聞曰恁麼則勞而無功福曰功則不無成而不處曰既是成功為甚麼不處福曰不見道太平本是將軍致不許將軍見太平此可知借功明位宗門不廢何甞一向說無事禪也阿難云何名為眾生世界世為遷流界為方位汝今當知東西南北東南西南東北西北上下為界過去未來現在為世方位有十流數有三一切眾生織妄相成身中貿遷世界相涉而此界性設雖十方定位可明世間秪目東西南北上下無位中無定方四數必明與世相涉三四四三宛轉十二流變三疊一十百千總括始終六根之中各各功德有千二百阿難汝復於中克定優劣如眼觀見後暗前明前方全明後方全暗左右旁觀三分之二統論所作功德不全三分言功一分無德當知眼唯八百功德如耳周聽十方無遺動若邇遙靜無邊際當知耳根圓滿一千二百功德如鼻齅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻唯八百功德如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一當知身唯八百功德如意默容十方三世一切世間出世間法唯聖與凡無不包容盡其涯際當知意根圓滿一千二百功德通曰一切眾生織妄相成身中貿遷世界相涉謂眾生業力結成世界身為正報器世間為依報但憑業果裝載貿遷逆旅流轉無窮與世塵相涉皆由六根為之媒也六根之中各各功德有千二百此據了別之性是同下對六根分別之用有異故全闕不等前云使汝流轉心目為咎故七徵八還已明見妄茲復具明六為賊媒而詳辨六根優劣者令擇耳根圓通以為修證之本故眼鼻身三分闕一不能滿其性量舌意雖具足功德與耳無異然一落言詮一落思惟不如耳根無聲無臭最於性體相近故當遵也以方涉世名三疊者第一約四方各論三世共成十二第二於東方三世變一為十南西北方亦然是以一疊十成百二十第三於東方三十變十為百南西北方亦然是以十疊百成千二百流數有三故用三疊方位有十故一變為十此自然之數也易大衍之數五十用五乘十用十乘五亦同此法聖人作用先後一揆如此四方各二百四隅各一百總之一方三百也今眼所見前及左右三方已成六百並前二隅共成八百唯後一方及後二隅不見三分明故有功後方暗故無德功與德亦互文耳其實六根清淨互用無方如華嚴依經修行已發相似之解雖眼八百亦具餘五根功德若六為賊媒自劫家寶則織妄貿遷有何涯際故修之則功德本無窮不修則業果亦無窮也法眼上堂古者道如何是禪三界綿綿如何是道十方浩浩因甚麼道三界綿綿何處是十方浩浩底道理要會麼塞却眼塞却耳塞却舌身意無空闕處無轉動處上座作麼生會橫亦不得竪亦不得縱亦不得奪亦不得無用心處亦無施設處若如是會得始會法門絕揀擇一切言語絕滲漏曾有僧問作麼生是絕滲漏底語向伊道口似鼻孔甚好上座如此會自然不通風去如識得盡十方世界是金剛眼睛無事珍重又黃龍震禪師上堂曰舉箇古人因緣問闍黎闍黎不得作古會若作古會失却當面眼舉箇即今因緣問闍黎闍黎不得作今會若作今會障却闍黎本來眼假饒不失不障非古非今猶是藥病相治止啼之說祗如透脫一句闍黎還道得也無若道不得直待羅漢峯深談實相即向汝道這般說話雖單明向上却與此經相發直得口似鼻孔眼似眉毛六根無寄方證無生之妙至盡大地是沙門一隻眼更無吞吐處此之功德不以世求阿難汝今欲逆生死欲流返窮流根至不生滅當驗此等六受用根誰合誰離誰深誰淺誰為圓通誰不圓滿若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓根日劫相倍我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進十方如來於十八界一一脩行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨通曰流根即妙湛不動者也決之而出流逸奔境名生死流逆之而入返流全一名不生滅生滅即妄不生滅即無妄六受用根雖係妄明功德元是一精明所分同一湛圓明性也但於一門深入直達本源之地得循圓通不生纏縛攝伏疇昔攀緣入佛知見而六受用根皆成妙用矣六祖曰若起真正般若觀照一剎那間妄念俱滅若識自性一悟即至佛地善知識智慧觀照內外明徹識自本心若識本心即是解脫若得解脫即是般若三昧般若三昧即是無念何名無念若見一切法心不染著是為無念用即徧一切處亦不著一切處但淨本心使六識出六門於六塵中無染無雜來去自由通用無滯即是般若三昧自在解脫名無念行六祖此語從意根入直紹迦葉門風仰山在溈山前坡牧牛次見一僧上山不久便下來仰問上座何不且留山中僧曰秪為因緣不契仰曰有何因緣試舉看曰和尚問某名甚麼某答歸真和尚曰歸真何在某甲無對仰曰上座却回向和尚道某甲道得也和尚問作麼生道但曰眼裏耳裏鼻裏僧回一如所教溈曰脫空漫語漢此是五百人善知識語蹣菴成禪師上堂鼻裏音聲耳裏香眼中鹹淡舌玄黃意能覺觸身分別冰室如春九夏涼如斯見得方知男子身中入定時女子身中從定出葵華隨日轉犀紋玩月生香楓化老人螟蛉成果羸若也不知苦哉佛陀耶許汝具隻眼必如諸尊宿所見方得六根清淨消息阿難白佛言世尊云何逆流深入一門能令六根一時清淨佛告阿難汝今已得須陀洹果已滅三界眾生世間見所斷惑然猶未知根中積生無始虗習彼習要因修所斷得何況此中生住異滅分齊頭數通曰見諦所斷即八十八使也修道所斷即八十一思也初果雖斷分別麤惑尚餘俱生細惑未斷故不能證苦邊際能證苦邊際至無學地不但知一有情生住異滅限劑頭數復於三千大千界內有情無情念念遷變微細行相悉亦知之此瑩徹之極必由修所斷得也僧問溈山頓悟之人更有修否溈曰若真悟得本他自知時修與不修是兩頭話如今初心雖從緣得一念頓悟自理猶有無始曠劫習氣未能頓淨須教渠淨除現業流識即是修也不可別有法教渠修行趨向從聞入理聞理流妙心自圓明不居惑地縱有百千妙義抑揚當時此乃得坐披衣自解作活計始得以要言之則實際理地不受一塵萬行門中不捨一法若也單刀直入則凡聖情盡體露真常理事不二即如如佛夫理事不二非修不證溈山極口談最上一路何甞掃蕩漸修不復置齒牙間今汝且觀現前六根為一為六阿難若言一者耳何不見目何不聞頭奚不履足奚無語若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身起欽承是故應知非一終六非六終一終不汝根元一元六阿難當知是根非一非六由無始來顛倒淪替故於圓湛一六義生汝須陀洹雖得六銷猶未亡一如太虗空參合羣器由器形異名之異空除器觀空說空為一彼太虗空云何為汝成同不同何況更名是一非一則汝了知六受用根亦復如是通曰此正釋一門深入六根清淨之疑使六根元一者本自清淨不必更言六賊使六根元六者不相為用何能一時清淨今惟如太虗空本一參合羣器成六由器形異名之異空謂六非一也除器觀空說空為一謂六銷一在也此喻一六義生彼太虗空非能與形和合原非同異既無同異何處更立一六之名此喻本非一六見得本非一六圓湛常寂何所不清淨乎須陀洹名為入流而無所入不入色聲香味觸法即是六銷尚執有涅槃在故未亡一一從何來空從何起故知向上更有事在藥山問雲巖汝除在百丈更到甚麼處來曰曾到廣南來山曰見說廣州城東門外有一片石被州主移去是否巖曰非但州主闔國人移亦不動山又問聞汝解弄師子是否曰是曰弄得幾出曰弄得六出山曰我亦弄得曰和尚弄得幾出山曰我弄得一出巖曰一即六六即一後到溈山溈問承聞長老在藥山弄師子是否曰是曰長弄有時置巖曰要弄即弄要置即置曰置時師子在甚麼處巖曰置也置也要知雲巖弄師子不是弄精魂為伊有闔國人移不動一片石在由明暗等二種相形於妙圓中黏湛發見見精映色結色成根根元目為清淨四大因名眼體如蒲萄朵浮根四塵流逸奔色由動靜等二種相擊於妙圓中黏湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉浮根四塵流逸奔聲由通塞等二種相發於妙圓中黏湛發齅齅精映香納香成根根元目為清淨四大因名鼻體如雙垂爪浮根四塵流逸奔香由恬變等二種相參於妙圓中黏湛發甞甞精映味絞味成根根元目為清淨四大因名舌體如初偃月浮根四塵流逸奔味由離合等二種相摩於妙圓中黏湛發覺覺精映觸搏觸成根根元目為清淨四大因名身體如腰鼓顙浮根四塵流逸奔觸由生滅等二種相續於妙圓中黏湛發知知精映法攬法成根根元目為清淨四大因名意思如幽室見浮根四塵流逸奔法通曰元依一精明分成六和合詳見於此自六根結造之由以逮奔塵之態無不纖悉具備此即如大虗空參合羣器也精明之體色遇之而成見聲遇之而成聞何等妙圓然湛湛止水塵入之而成黏矣清淨四大明勝義根能照境發識是淨色根浮根四塵明浮塵根能流逸奔塵這種種業地水火風之性本皆空也故曰清淨四大地水火風之相本皆動搖故曰四塵如幽室見安得有浮根四塵晦昧為空空晦暗中結暗為色以此暗色與妄想雜聚緣內搖以其有暗可見故曰浮根以其動搖故亦曰塵如五種色中受所引色無形而受憶持者也根沉於內塵浮於外塵為所依何言流逸舉所依顯能依也普安禪師偈曰揑不成團撥不開何須南岳又天台六根門首無人用惹得胡僧特地來保福僧至羅漢羅漢琛禪師問彼中佛法如何示人僧曰保福有時示眾云塞却汝眼教汝覰不見塞却汝耳教汝聽不聞坐却汝意根教汝分別不得琛曰吾問汝不塞汝眼汝見箇甚麼不塞汝耳汝聞箇甚麼不坐汝意根汝作麼生分別僧於言下有省是於六根門首得箇入路便窺見妙圓一段真風又有僧聽西廂曲云爭禁當臨去秋波那一轉便大契悟豈必胡僧特地來也阿難如是六根由彼覺明有明明覺失彼精了黏妄發光是以汝今離暗離明無有見體離動離靜元無聽質無通無塞齅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相隨拔一根脫黏內伏伏歸元真發本明耀耀性發明諸餘五黏應拔圓脫不由前塵所起知見明不循根寄根明發由是六根互相為用通曰前云明妄非他覺明為咎所妄既立明理不踰局於根也此云由彼覺明有明明覺失彼精了黏妄發光逐於塵也總明六妄成就分彼湛圓精光映發內不離根外不離塵而本真明耀遂為根塵所覆無由發見當知六塵虗妄本無自性六根虗妄離塵無體唯塵無性故可黏也亦可脫也唯根無體故對境即有離境即無八識規矩云眼耳身三二地居謂色界初禪是第二地無段食故舌識不起無雜穢故鼻識不生唯眼耳身三識居之至第三地以定生故即三識亦不起也此即除器觀空空更何有是知可一可六者妄也非一非六者真也妄伏則真現矣真現則妄不黏矣既脫於黏則明耀所發不由塵起既不由塵則本真元明不循根出湛圓明性雖不循根特寄根明發而已根而曰寄原無定位故聽不必耳見不必目而六根可以互用非若向者聽不出聲見不踰色自生纏縛不能超越也毗舍浮佛偈曰假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅此段經文乃其註脚僧問韶國師承教有言眼不見色塵意不知諸法如何是眼不見色塵師曰却是耳見曰如何是意不知諸法師曰眼知曰恁麼則見聞路絕聲色喧然師曰誰向汝道乃曰夫一切問答如針鋒相投無纖毫參差事無不通理無不備良由一切言語一切三昧橫竪深淺隱顯去來是諸佛實相門秪據如今一時驗又定慧信和尚問僧曰忠國師無情說法南方尊宿如何商量僧曰諸方皆云六根互用信曰教中道無眼耳鼻舌身意將甚麼互用僧擬議信劈脊便打若信者乃爾互用現前猶勝韶國師七步阿難汝豈不知今此會中阿那律陀此云無滅無目而見䟦難陀此云善喜龍無耳而聽殑伽此天堂河神女非鼻聞香憍梵鉢提此云牛相異舌知味舜若多神此云風性無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念通曰明不循根乃至六根互用於何騐之律陀獲半頭天眼故不藉目龍以角聽故不藉耳河神聞香原非以鼻鉢提牛舌而別眾味舜若空天而能覺觸諸脩滅盡定得證寂聲聞者如大迦葉久滅意根是知六根可以無非元六也六根可互用非元一也非一非六而湛圓之體人人具足不於是而益信乎普融知藏至五祖入室次祖舉倩女離魂話問之有契呈偈曰二女合為一媳婦機輪截斷難回互從來往返絕縱由行人莫問來時路又張子韶至徑山與馮給事諸公議格物慧曰公秪知有格物而不知有物格公茫然慧大笑公曰師能開諭乎慧曰不見小說載唐人有與安祿山謀叛者其人先為閬守有畫像在焉明皇幸蜀見之怒令侍臣以劍擊其像首明閬守居陝西首忽墮地公聞頓領深旨汾陽六相頌曰見是阿那律分明無一物大地及山河演出波羅蜜聞是䟦難陀聲通總莫過遠近一齊了更不念摩訶香是殑伽女慈悲心徧普淨穢盡能知即此我人母味是憍梵鉢甜苦尋常說入口辨辛酸恰似當天月觸是舜若多善惡總能和屠割無嗔喜祗箇是彌陀意是大迦葉毗盧俱一法幽室顯然分枝派千華葉汾陽見處敻異借此六根一一指出向上一竅總之不離伏歸元真發本明耀而已阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯銷冰應念化成無上知覺通曰隨拔一根脫黏內伏返窮流根至不生滅此功勳邊事機猶在我諸根圓拔內瑩發光生滅滅已寂滅現前此頓悟邊事機非在我故不悟則浮塵根身世間器界諸變化相皆歸生滅法如水凝而成冰一悟即轉生滅為不生滅性如湯銷冰而成水矣水者其本來也無上知覺本吾自有既成無上知覺又何六賊之足患哉龍潭信問天皇悟曰某甲自到來不蒙和尚指示心要皇曰自汝到來吾未甞不指示心要信曰何處指示皇曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不指示汝心要潭佇思間皇曰見則直下便見擬思即差信當下開悟乃復問如何保任皇曰任性逍遙隨緣放曠但盡凡心別無聖解又夾山有小師隨侍日久遣令行脚遊歷禪肆後聞夾山聚眾道聲振遠回歸省覲問曰和尚有如是奇特事何不早向某甲說山曰汝烝飯吾著火汝行益吾展鉢甚麼是辜負汝處小師從此悟入均可謂應念化成無上知覺也已阿難如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類彼人以手循體外繞彼雖不見頭足一辨知覺是同緣見因明暗成無見不明自發則諸暗相永不能昏根塵既銷云何覺明不成圓妙通曰前示湛圓不循於根今示湛圓不假於緣彼合眼之人以手循他人之體即能辨其頭足暗中知覺與明見無異世人尚不藉明緣而能有辨況聖人之真覺豈藉於緣乎緣見因明暗成無見此相沿世諦若以覺明之體因明而明因暗而昏今以合眼之人觀之不因明緣而了知暗相中頭足不為無見是見也明不能明暗不能昏不但非根之所能拘亦且非塵之所能隔矣根塵既銷豈直手可為眼眼亦可為耳一根返元六根清淨云何覺明不成圓妙覺明自六根而發者明理不踰即非圓妙唯不假根塵而自發者神通妙用應感無方是六根互用即為觀世音圓通三十二應張本雲巖問道吾大悲菩薩用許多手眼作甚麼吾云如人夜半背手摸枕子巖云我會也吾云汝作麼生會巖云徧身是手眼吾云道即太煞道只道得八成巖云師兄作麼生吾云通身是手眼天童頌云一竅虗通八面櫺櫳無象無私春入律不留不礙月行空清淨寶目功德臂徧身何似通身是現前手眼顯全機大用縱橫何忌諱雪竇頌云徧身是通身是拈來猶較十萬里展翅鵬騰六合雲摶風鼓蕩四溟水是何埃𡏖兮忽生那箇毫釐兮未止君不見網珠垂範影重重棒頭手眼從何起咄夫徧身與通身何至較十萬里徧身未離身見在通身則并其身而忘之此毫釐之差非具眼者莫辨雪竇併忘手眼天童不妨機用則玄之又玄矣阿難白佛言世尊如佛說言因地覺心欲求常住要與果位名目相應世尊如果位中菩提涅槃真如佛性菴摩羅此云無垢識空如來藏大圓鏡智是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞若此見聽離於明暗動靜通塞畢竟無體猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因欲獲如來七常住果世尊若離明暗見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺如來先說湛精圓常違越誠言終成戲論云何如來真實語者唯垂大慈開我蒙恡通曰阿難以因是實因果是實果故以離塵無體離念無心疑是斷滅尚未知對境之心原屬生滅生滅者可斷離境之心不屬生滅不生滅者未甞斷也湛精圓常歸無所得微細推求本無我心及我心所以此立因是謂正因以此證果是謂真果湛精圓常本自如是而何更疑其違越乎本一湛精圓常有七種名寶積經曰空如來藏離於不解脫智一切煩惱不空如來藏具過恒沙佛解脫智不可思議法空不空如來藏隨為色空普應一切而空如來藏為常住果大圓鏡智明見一切而無分別菴摩羅識分別一切而無染著以其了了靈知故名佛性了了靈知則究竟覺故名菩提究竟覺體本自寂滅故名涅槃寂滅則一切妄心所不能觸故名真如七果本一體爾初祖達磨只用八字該括無遺曰淨智妙圓體自空寂淨者白淨識也智者大圓鏡智也空者空如來藏也寂者涅槃也而真如菩提佛性總不外於妙圓而妙圓二字即分別非分別即生滅非生滅尤覺渾融僧問黃檗如何是道如何修行檗云道是何物汝欲修行曰諸方宗師相承參禪學道如何檗云接引鈍根人語未可依憑曰此既是接引鈍根人語未審接上根人復說何法檗云若是上根人何處更就他覓他自己尚不可得何況更別有法當情不見教中云法法何狀曰若如此則都不要求覓也檗云若與麼則省心力曰若如是則渾成斷絕不可是無也檗云阿誰教他無他是阿誰你擬覓他曰既不許覓何故又言莫斷他檗云若不覓即便休誰教你斷你見目前虗空作麼生斷他曰此法可得便同虗空否檗云虗空早晚向你道有同有異我暫如此說你便向這裏生解曰應是不與人生解耶檗云我不曾障你要且解屬於情情生則智隔曰向這裏不生情是否檗云若不生情阿誰道是千百載而下尚有如阿難之疑者得黃檗數語更與重宣甚深旨趣佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑即時如來敕羅睺羅擊鐘一聲問阿難言汝今聞不阿難大眾俱言我聞鐘歇無聲佛又問言汝今聞不阿難大眾俱言不聞時羅睺羅又擊一聲佛又問言汝今聞不阿難大眾又言俱聞佛問阿難汝云何聞云何不聞阿難大眾俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絕則名無聞如來又敕羅睺擊鐘問阿難言爾今聲不阿難大眾俱言有聲少選聲銷佛又問言爾今聲不阿難大眾答言無聲有頃羅睺更來撞鐘佛又問言爾今聲不阿難大眾俱言有聲佛問阿難汝云何聲云何無聲阿難大眾俱白佛言鐘聲若擊則名有聲擊久聲銷音響雙絕則名無聲佛語阿難及諸大眾汝今云何自語矯亂大眾阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲唯聞與聲報答無定如是云何不名矯亂阿難聲銷無響汝說無聞若實無聞聞性已滅同於枯木鐘聲更擊汝云何知知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無汝尚顛倒惑聲為聞何怪昏迷以常為斷終不應言離諸動靜閉塞開通說聞無性如重睡人眠熟床枕其家有人於彼睡時擣練舂米其人夢中聞舂擣聲別作他物或為擊鼓或為撞鐘即於夢時自怪其鐘為木石響於時忽寤遄知杵音自告家人我正夢時惑此舂音將為鼓響阿難是人夢中豈憶靜搖開閉通塞其形唯寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷滅以諸眾生從無始來循諸色聲逐念流轉曾不開悟性淨妙常不循所常逐諸生滅由是生生雜染流轉若棄生滅守於真常常光現前根塵識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺通曰如來說脫黏內伏即是湛精圓常阿難疑離塵無性恐同斷滅故佛即鐘聲以顯聞性聲銷無響但是無聲非是無聞聲有生滅聞無生滅若謂聞因聲生聞因聲滅當無聞時誰知無者故或無或有者可滅知有知無者未甞滅也非但醒時對境不滅即夢時離境亦不滅也非但夢時根存不滅即形銷根謝亦不滅也此與前觀河之見亦略相似第前所顯見者意在不生不滅而此所顯聞者意在耳根圓通也返聞聞自性即是開悟性淨妙常常光現前即是寂滅現前皮膚剝落盡只有一真實如是乃可謂法眼清明成無上覺保唐寺無住禪師杜公鴻漸問曰弟子聞金和尚說無憶無念莫妄三句法門是否師曰然公曰此三句是一是三師曰無憶名戒無念名定莫妄名慧一心不生具戒定慧非一非三也公又問師還以三句接人否師曰初心學人還令息念澄停識浪水清影現悟無念體寂滅現前無念亦不立也於時庭樹鵶鳴公問師聞否師曰聞鵶去已久又問師聞否師曰聞公曰鵶去無聲云何言聞師乃普告大眾曰佛世難值正法難聞各各諦聽聞無有聞非關聞性本來不生何曾有滅有聲之時是聲塵自生無聲之時是聲塵自滅而此聞性不隨聲生不隨聲滅悟此聞性則免聲塵之所縛當知聞無生滅聞無去來公與僚屬大眾稽首公又問云何不生云何不滅如何得解脫師曰見境心不起名不生不生即不滅既無生滅即不被前塵所縛當處解脫不生名無念無念即無滅無念即無縛無念即無脫舉要而言識心即離念見性即解脫離識心見性外更有法門證無上菩提者無有是處公曰何名識心見性師曰一切學人隨念流浪葢為不識真心真心者念生亦不順生念滅亦不依寂不來不去不定不亂不取不捨不沉不浮無為無相活潑潑平常自在此心體畢竟不可得無可知覺觸目皆如無非見性也公與大眾作禮稱讚踊躍而去何意保唐重衍楞嚴察其語脈如出一口唯有雲門見處又別上堂聞鐘聲乃曰世界與麼廣濶為甚麼鐘聲披七條於此得無疑去方名法眼清淨
