body:
  text: 大佛頂如來密因脩證了義諸菩薩萬行首楞嚴經卷第三復次阿難云何六入本如來藏妙真如性通曰六入亦云六處境所由入之處也此但以根為入六根何以為妙真如性非一根既返元六根成解脫之謂也葢指六根即是佛性故異見王問波羅提尊者曰何者是佛提曰見性是佛王曰師見性否提曰我見佛性王曰性在何處提曰性在作用王曰是何作用我今不見提曰今現作用王自不見王曰於我有否提曰王若作用無有不是王若不用體亦難見王曰若當用時幾處出現提曰若出現時當有其八王曰其八出現當為我說波羅提即說偈曰在胎為身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔徧現俱該法界收攝在一微塵識者知是佛性不識喚作精魂王聞偈已心即開悟明道先生讀中庸詩云鳶飛戾天魚躍于淵言其上下察也此是子思喫緊為人處識得便活潑潑地不識只是弄精魂其原葢出於此此等說話學者習聞何為異見王便爾悟去佛日才禪師上堂風雨蕭騷塞汝耳根落葉交加塞汝眼根香臭叢雜塞汝鼻根冷熱甘甜塞汝舌根衣錦溫冷塞汝身根顛倒妄想塞汝意根諸禪德直饒汝翻得轉也是平地骨堆參此處信非參不可阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相因於明暗二種妄塵發見居中吸此塵象名為見性此見離彼明暗二塵畢竟無體如是阿難當知是見非明暗來非於根出不於空生何以故若從明來暗即隨滅應非見暗若從暗來明即隨滅應無見明若從根生必無明暗如是見精本無自性若於空出前矚塵象歸當見根又空自觀何關汝入是故當知眼入虗妄本非因緣非自然性通曰直視之久曰瞪勞因瞪發故見狂華目根分別亦是菩提覺性中勞相故曰兼目與勞同是菩提瞪發勞相借色陰之目勞以喻眼入是妄也若目精不瞬勞相自無元一精明以何為妄此見離彼明暗二塵畢竟無體分明顯出真見無生不以覩明暗而有不以離明暗而無也真見是實此見是妄可自了然前說空華不於空生不從目出表色陰空此說見性不於空生不從根出表眼入妄妄無自性當體即真故曰即如來藏妙真如性也趙州云把定乾坤眼綿綿不漏絲毫我要你會你又作麼生天童拈云還端的也未直饒你這裏會得七穿八穴我也知你出趙州棬繢不得又僧問九峯虔禪師如何是乾坤眼峯曰乾坤在裏許僧曰乾坤眼何在峯曰正是乾坤眼僧曰還照燭也無峯曰不借三光勢僧曰既不借三光勢憑何照燭喚作乾坤眼峯曰若不如是髑髏前見鬼人無數合二則觀之若有憑藉正是滲漏處直饒會得也是目前見鬼惟於乾坤眼何在一句覰得透始把得定瞪發勞相從何而起阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相因於動靜二種妄塵發聞居中吸此塵象名聽聞性此聞離彼動靜二塵畢竟無體如是阿難當知是聞非動靜來非於根出不於空生何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜若從根生必無動靜如是聞體本無自性若於空出有聞成性即非虗空又空自聞何關汝入是故當知耳入虗妄本非因緣非自然性通曰自眼入至意入皆如空華故曰同是菩提瞪發勞相耳根勞則頭中作聲菩提覺性勞則耳中成聞其為虗妄所生猶之空華也此聞離彼動靜二塵畢竟無體塵至則有塵去則無此聞原自無根故曰虗妄聞能辨境故非境生聞靈空頑故非空出至於耳根聞體各有司存何得謂無自性為離前塵即無分別若有分別應可指陳今不可指故知無自性也騐之於境於根於空皆無定體可得即此幻聞亦非因緣非自然也此聞非因緣非自然即幻即真矣設使有因緣自然可得者此聞即生滅法何以曰妙真如性僧問玄沙承和尚有言聞性徧周沙界雪峯打鼓這裏為甚麼不聞沙曰誰知不聞又僧問曹山親何道伴即得常聞於未聞山曰同共一被葢曰此猶是和尚得聞如何常聞於未聞山曰不同於木石曰何者在先何者在後山曰不見道常聞於未聞故知常聞於未聞聞斯徧矣阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相因於通塞二種妄塵發聞居中吸此塵象名齅聞性此聞離彼通塞二塵畢竟無體當知是聞非通塞來非於根出不於空生何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸若從根生必無通塞如是聞機本無自性若從空出是聞自當迴齅汝鼻空自有聞何關汝入是故當知鼻入虗妄本非因緣非自然性通曰畜止也止縮其氣不出入也冷因畜有不畜本無因畜而知通塞虗寔因通塞而辨諸香臭氣是齅聞性渾然因妄有也如無通塞齅聞性當在何處耳曰聞體鼻曰聞機功德大小於斯可見體無不徧機發於觸故也雖然鼻根虗妄原無可指向上巴鼻尤難摸索僧問拯迷寺海宴禪師如何是古寺一爐香師曰歷代無人齅曰齅者如何師曰六根俱不到又巴陵鑒初到雲門門曰雪峯和尚道開却門達摩來也我問你作麼生鑒曰築著和尚鼻孔門曰地神惡發把須彌山一摑𨁝跳上梵天拶破帝釋鼻孔你為甚麼向日本國裏藏身鑒曰和尚莫瞞人好門曰築著老僧鼻孔又作麼生鑒無語門曰將知你秪是學語之流若參透雲門語脈正如夜半摸著鼻孔元來祗在面上阿難譬如有人以舌砥吻熟䑛令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相因甜苦淡二種妄塵發知居中吸此塵象名知味性此知味性離彼甜苦及淡二塵畢竟無體如是阿難當知如是甞苦淡知非甜苦來非因淡有又非根出不於空生何以故若甜苦來淡則知滅云何知淡若從淡出甜即知亡復云何知甜苦二相若從舌生必無甜淡及與苦塵斯知味根本無自性若於空出虗空自味非汝口知又空自知何關汝入是故當知舌入虗妄本非因緣非自然性通曰此知味根知甜知苦知淡甜苦淡之感靡常而知亦隨易此知非從甜苦淡來非從空出固易辨也何為不從舌生舌本無味故無自性可得但觸味而知生味去則知滅本皆虗妄泥之為有不辨其所從泥之為無又歷然其可即故謂之曰妙此非知味者不足與語此也杉山普請擇蕨次南泉拈起一莖曰這箇大好供養山曰非但這箇百味珍羞他亦不顧泉曰雖然如是箇箇須甞過始得玄覺云是相見語不是相見語天童別頌云問取南泉王老師人人只喫一莖菜可謂知味者阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因於勞觸兼身與勞同是菩提瞪發勞相因於離合二種妄塵發覺居中吸此塵象名知覺性此知覺體離彼離合違順二塵畢竟無體如是阿難當知是覺非離合來非違順有不於根出又非空生何以故若合時來離時已滅云何覺離違順二相亦復如是若從根出必無離合違順四相則汝身知元無自性必於空出空自知覺何關汝入是故當知身入虗妄本非因緣非自然性通曰合覺之觸宜合時有離時無也然離而彼顯如違順二觸離然後知此身觸之知與味觸者略異勢相涉則有勝負以熱涉冷使冷成熱以冷涉熱使熱成冷如投手足於冷熱水中故曰涉冷熱相涉二相斯成非勞觸不至於此觸與身安曰順觸與身逆曰違若無離合違順四相但有此身耳而知觸之性安在故曰元無自性即此身知不於塵生不於根出則非因緣不於空出則非自然非因緣非自然即謂之妙真如性以上見聞覺知葢指前五識而言所謂對境之知非分別之知也總如來藏性所現耳僧問洞山寒暑到來如何迴避山曰何不向無寒暑處去曰如何是無寒暑處山曰寒時寒殺闍黎熱時熱殺闍黎又曹山問僧恁麼熱向什麼處迴避僧云鑊湯爐炭裏迴避山曰鑊湯爐炭裏如何迴避僧云眾苦不能到是他家裏話如出一口雪竇頌云垂手還同萬仞崖正偏何必在安排琉璃古殿照明月忍俊韓獹空上階識得此意入鄽埀手與孤峯獨立一般歸源了性與差別智無異非深契曹洞宗未易語此阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪發勞相因於生滅二種妄塵集知居中吸撮內塵見聞逆流流不及地名覺知性此覺知性離彼寤寐生滅二塵畢竟無體如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者若從根出寤寐二相隨身開合離斯二體此覺知者同於空華畢竟無性若從空生自是空知何關汝入是故當知意入虗妄本非因緣非自然性通曰夢中現境因睡故有脫體是假既寤不了是假覽而憶想謂為真實名曰顛倒法相亦爾動心現境已是虗妄分別事識不了為境憶為實有同名顛倒憶之則生忘之則滅而生住異滅四相宛然遷流不住剎那剎那不相踰越是為意根意不緣時寤寐如一求寤寐之相且不可得而況有生住異滅之相乎唯其意與法緣吸習中歸已是勞相而菩提不覺運而為意同歸於勞也宗鏡曰眼等取外塵境剎那流入意地從外入內名為逆流斯則意有所緣即是寤則覽塵斯憶為生也流不及地者謂昏昧時根不緣塵則無外塵流及意地而意亦無所緣即是寐則失憶而忘為滅也以此分配似屬牽強且睡中有夢寤中有忘各有生滅之相何得以寤專屬生寐專屬滅哉愚謂耳目之見聞順達於外而意根之見聞逆流於內方其吸撮內塵之時目若有見耳若有聞或升而天或潛而淵流入見聞所不及之地此唯意根能之非耳目所及也然五根各有本位意根無形唯寄於寤寐生滅之相而已離寤寐生滅無以見意故不曰若從根生必無寤寐生滅但曰若從根出則寤寐二相止隨身開合而非隨意開合意既離斯二體此覺知者雖有生滅同於空華何所附麗以顯吾意意既離形形亦離意必無寤寐生滅之相又焉有性哉故謂從根生者非也開合二字形容寤寐二相最妙其寤也形開其寐也形交此寤寐生滅即意之所在故曰為寐曰受滅不必於知也即此知覺不從因緣生不從自然生即是無住之本體不謂之妙真如性而何初仰山問溈山如何是佛真住處溈曰以思無思之妙返思靈妙之無窮思盡還源性相常住事理不二真佛如如仰於言下頓悟後有僧思𨜶問仰山禪宗頓悟畢竟入門的意如何山曰此意極難若是祖宗門下上根上智一聞千悟得大總持其有根微智劣若不安禪靜慮到這裏總須茫然曰除此一路別更有入處否山曰有曰如何即是山曰汝是甚處人曰幽州人山曰汝還思彼否曰常思山曰能思者是心所思者是境彼處樓臺林苑人馬駢闐汝返思思底心還有許多般麼曰某甲到這裏總不見有山曰信位即是人位未是曰除却這箇別更有意也無山曰別有別無即不堪也曰到這裡作麼生即是山曰據汝所解秪得一玄得坐披衣向後自看天童頌云無外而容無礙而冲門牆岸岸關鎖重重酒常酣而臥客飯雖飽而頹農突出虗空兮風摶妙翅踏翻滄海兮雷送遊龍此頌百尺竿頭須當進步不可執著悟境自以為足只總不見有一語但能空其意根於真佛如如猶大遠在復次阿難云何十二處本如來藏妙真如性通曰初五陰中用比喻法破其執情五陰本空非喻不足以顯也次六入中指設假事顯其妄相六入本妄故以妄引妄可以類通今十二處乃至七大唯於現前見聞之境示其藏性所謂剎剎塵塵熾然無間者也三祖曰六塵不惡還同正覺良見乎此已金山善寧禪師上堂顧視大眾曰古人道在眼曰見在耳曰聞在鼻嗅香在舌談論在身覺觸在意攀緣雖然如是祗見錐頭利不見鑿頭方若是金山則不然有眼覰不見有耳聽不聞有鼻不知香有舌不談論有身不覺觸有意不攀緣一念相應六根解脫敢問諸禪德且道與前來是同是別莫有具眼底衲僧出來通箇消息若無復為諸人重重注破放開則私通車馬揑聚則毫末不存若是飽戰作家一任是非砭剝此段說話却與此段經文重重註破阿難汝且觀此祇陀樹林及諸泉池於意云何此等為是色生眼見眼生色相阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明空質空亦如是若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性通曰前六入破六根雖以塵對辨而正意在根今十二處雖根塵互破而正破在塵後十八界專破識也前云同是菩提瞪發勞相從根上說起此云觀此祇陀樹林及諸泉池從色上說起使色生眼見者必非空生眼見何為明見色又明見空使眼生色相者必不能生空相何為顯發色又顯發空由此言之眼不能生色也眼自寂滅何與於色色不能生眼也色自寂滅何與於眼只以空形色而色塵自破見與色空俱無處所色空而見亦空矣色見俱空誰為因緣誰為自然不謂之真如性乎昔仰山指雪師子云還有過得此色者麼雲門云當時便好與推倒雪竇云只解推倒不解扶起佛覺頌云一色無過指示人白銀世界裏頻呻超然推倒還扶起爭似東風煦日新天童頌云一倒一起雪庭師子慎於犯而懷仁勇於為而見義清光照眼似迷家明白轉身還墮位衲僧家了無寄同死同生何此何彼暖信破梅兮春到寒枝凜飈脫葉兮秋澄潦水萬松道既稱為色必與眼對過白之色唯無色者不與眼對雲門所以道當時便與推倒若向至白無白處認著正是墮在無色界中雪竇所以別指出一條活路向推倒處却教扶起佛眼云若向這裏扶持起來甚生次第即如諸尊宿於一色邊事尚須破盡何況目前種種阿難汝更聽此祇陀園中食辦擊鼓眾集撞鐘鐘鼓音聲前後相續於意云何此等為是聲來耳邊耳往聲處阿難若復此聲來於耳邊如我乞食室羅筏城在祇陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鐘聲同來食處若復汝耳往彼聲邊如我歸住祇陀林中在室羅城則無有我汝聞鼓聲其耳已往擊鼓之處鐘聲齊出應不俱聞何況其中象馬牛羊種種音響若無來往亦復無聞是故當知聽與音聲俱無處所即聽與聲二處虗妄本非因緣非自然性通曰如我乞食室羅筏城在祇陀林則無有我喻聲來耳邊則餘處無聲何為一千二百沙門俱聞如我歸住祇陀林中在室羅城則無有我喻耳往聲處則餘處無耳何為象馬牛羊種種音響悉知若無來往則墮頑空聞義不立是聲與聞按之無跡有何處所委之周徧觸處而通以為因緣則無所緣以為自然則無所自即此虗妄莫非真體故謂之曰妙真如性也玄沙因參次聞燕子聲乃曰深談實相善說法要便下座時有僧請益曰某甲不會沙曰去誰信汝又報慈陞座聞鳩子鳴乃問僧是甚麼聲曰鳩鵓聲慈曰欲得不招無間業莫謗如來正法輪便下座一切聲是佛聲固容易解玄沙曰鐘中無鼓響鼓中無鐘聲鐘不不交參句句無前後作麼生解此緣起無生旨也悟此則所云實相法要可覩已阿難汝又齅此罏中栴檀此香若復然於一銖室羅筏城四十里內同時聞氣於意云何此香為復生栴檀木生於汝鼻為生於空阿難若復此香生於汝鼻稱鼻所生當從鼻出鼻非栴檀云何鼻中有栴檀氣稱汝聞香當於鼻入鼻中出香說聞非義若生於空空性常恒香應常在何藉鑪中爇此枯木若生於木則此香質因爇成烟若鼻得聞合蒙烟氣其烟騰空未及遙遠四十里內云何已聞是故當知香鼻與聞俱無處所即齅與香二處虗妄本非因緣非自然性通曰此齅與香非鼻非空非木則香處無實矣然四十里內同時俱聞此香殊勝之力亦不可思議法華謂六銖之香價直娑婆世界是也棗栢論曰烏洛迦栴檀樹者烏洛迦蛇名栴檀者香樹也明此蛇最毒常患熱毒以身遶此香樹其毒氣便息以表若有眾生聞說心境俱空木無體相無有處所無一法可得之香信而悟入一切煩惱毒氣自然清淨香嚴閑神師偈曰有一語全規短擬思量帶伴侶踏不著省來處一生參學事無成殷勤抱得栴檀樹其原蓋出於此誌公道終日拈香擇火不知身是道場天童拈云弄精魂漢有什麼限玄沙云終日拈香擇火不知真箇道場天童拈云奇怪八十翁翁入場屋不是小兒戲且道利害在什麼處有智無智較三十里一等是無生作用却有毫釐之辨如此有智者別之阿難汝常二時眾中持鉢其間或遇酥酪醍醐名為上味於意云何此味為復生於空中生於舌中為生食中阿難若復此味生於汝舌在汝口中秪有一舌其舌爾時已成酥味遇黑石蜜應不推移若不變移不名知味若變移者舌非多體云何多味一舌之知若生於食食非有識云何自知又食自知即同他食何預於汝名味之知若生於空汝噉虗空當作何味必其虗空若作鹹味既鹹汝舌亦鹹汝面則此界人同於海魚既常受鹹了不知淡若不識淡亦不覺鹹必無所知云何名味是故當知味舌與嘗俱無處所即嘗與味二俱虗妄本非因緣非自然性通曰此辨味性不生於空不生於舌則易可知曷謂不生於食食非有識不自言我味美味惡而辨別美惡故屬舌根而舌無定體遇味輙遷足知味自味舌自舌兩俱寂然知舌與味俱寂者果信非因緣非自然而如來藏妙真如性也神鼎諲禪師嘗與眾僧至襄沔間一僧舉論宗乘頗敏捷會野飯山店中供辦而僧論說不已鼎曰三界唯心萬法唯識唯識唯心眼聲耳色是甚麼人語僧曰法眼語鼎曰其義如何僧曰唯心故根境不相到唯識故聲色樅然鼎曰舌味是根境否僧曰是鼎以筯筴菜置口中含糊而語曰何謂相入耶坐者駭然僧不能答鼎曰塗路之樂終未到家見解入微不名見道參須實參悟須實悟閻羅大王不怕多語僧拱而退玄沙嘗食茘枝問眾曰這箇茘枝得與麼紅得與麼赤你諸人且作麼生若道一色又是儱侗若道是眾色只成箇斷常你諸人且作麼生彥瑫曰也只和尚自分別沙曰這儱侗愚癡有什麼交涉冲機曰都來只是一色沙曰總與麼儱侗有什麼了時乃回顧問皎然汝作麼生道皎然曰不可不識茘枝沙曰只是茘枝又曰汝諸人如許多時在我這裏總與麼說話不辨緇素不識吉凶我比向汝道用處不換機因甚麼只管對話有什麼交涉古人於一飲一食務發明向上事往往如此豈徒在言對便捷須有實悟乃可與明眼人相見阿難汝常晨朝以手摩頭於意云何此摩所知誰為能觸能為在手為復在頭若在於手頭則無知云何成觸若在於頭手則無用云何名觸若各各有則汝阿難應有二身若頭與手一觸所生則手與頭當為一體若一體者觸則無成若二體者觸為誰在在能非所在所非能不應虗空與汝成觸是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性通曰此明觸性虗妄在能非所在所非能能所俱非即觸即真如性也華嚴經曰如是自性如幻如夢如影如像悉不成就以真如之性法爾隨緣雖即隨緣法爾歸性以隨緣時似有顯現如觀幻法不有而有如觀夢境不見而見如觀水中之影非出非入如觀鏡中之像不內不外以無性隨緣故理不成就以隨緣無性故事不成就理事不成則一切法俱不成也即如夢中拳人與拳於人非不有觸畢竟何者是能何者是所故一切法悉如是也保福見僧來以杖打露柱又打其僧頭僧作忍痛聲福曰那箇為甚麼不痛僧無對玄覺代云貪行柱杖又寶覺禪師嘗問轉運判官夏倚汝言情與無情共一體時有狗臥香桌下乃以壓尺擊香桌又擊狗曰狗有情即去香桌無情即住如何得成一體倚不能對寶覺曰纔入思惟便成剩法前聖所知轉相傳授皆此旨也阿難汝常意中所緣善惡無記三性生成法則此法為復即心所生為當離心別有方所阿難若即心者法則非塵非心所緣云何成處若離於心別有方所則法自性為知非知知則名心異汝非塵同他心量即汝即心云何汝心更二於汝若非知者此塵既非色聲香味離合冷煖及虗空相當於何在今於色空都無表示不應人間更有空外心非所緣處從誰立是故當知法則與心俱無處所則意與法二俱虗妄本非因緣非自然性通曰善惡無記之事正對根時其事皆實故謂之實境不對境時獨意識緣之乃實境之影子故謂之內塵內塵不出三性所緣色空等法故曰法則內外相熏自無始以來故曰生成若謂即心者心是能緣法是所緣其非即也固易可辨若謂離心者此法果何在乎以為有知即與心同既同於心則非塵矣非塵而與汝異者不可不謂之心即同於他人之心量矣非塵而不與汝異者云何汝心更二於汝而名之曰法塵哉故以有知為方所不可也以為無知則此法塵當何表示既非色空等相又非離色空外別有佇立之處色外有空空非有外使空有外則法塵有處心尚可緣空外無所心將安緣然心之所以緣法者謂色空無知由知而顯知有分別乃謂之法今既無知又無所在心雖有知誰與為緣故以無知為方所亦不可也非有知非無知處從誰立即心無法離心無法法固無自性也非虗妄而何法無處所意根自空故謂之妙真如性也青州法本禪師上堂揚聲止響不知聲是響根弄影逃形不知形為影本以法問法不知法本非法以心傳心不知心本無心心本無心知心如幻了法非法知法如夢心法不實莫謾追求夢幻空華何勞把捉到這裏三世諸佛一大藏教祖師言句天下老和尚露布葛藤盡使不著何故太平本是將軍致不許將軍見太平雜華偈曰眼耳鼻舌身心意諸情根以此常流轉而無能轉者法性本無生示現而有生是中無能現亦無所現物眼耳鼻舌身心意諸情根一切空無性妄心分別有如是而觀察一切皆無性此段大意實與此經相發復次阿難云何十八界本如來藏妙真如性通曰對塵曰根根內也當根曰塵塵外也於其中間各有分別者識也三者相依而立如交蘆然故有十八界名是三者有則俱有無則俱無原無自性既無自性故知本如來藏妙真如性也瑞鹿本先禪師上堂諸法所生唯心所現如是言語好箇入底門戶且問汝等諸人眼見一切色耳聞一切聲鼻嗅一切香舌了一切味身觸一切耎滑意分別一切諸法秖如眼耳鼻舌身意所對之物為復唯是你等心為復非是你等心若道唯是你等心何不與你等身都作一塊了休為甚麼所對之物却在你等眼耳鼻舌身意外你等若道眼耳鼻舌所對之物非是你等心又爭奈諸法所生唯心所現言語留在世間何人不舉著你等見這箇話還會麼若也不會大家用心商量教會去幸在其中莫令厭學無事且退僧問雲居六戶不明時如何居曰不涉緣僧云向上事如何居曰慎者不護投子頌曰春到石人視遠山鶯啼華木碧波閒須知雲外巖松瑞千古迎風任歲寒前二句頌不涉緣後二句頌向上事須明向上事方信十八界本真如性也阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界阿難若因眼生既無色空無可分別縱有汝識欲將何用汝見又非青黃赤白無所表示從何立界若因色生空無色時汝識應滅云何識知是虗空性若色變時汝亦識其色相遷變汝識不遷界從何立從變則變界相自無不變則恒既從色生應不識知虗空所在若兼二種眼色共生合則中離離則兩合體性雜亂云何成界是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性通曰此十八界但破六識故謂此識不從眼生為界識主分別使無色空分別安施亦不從色生為界色有變滅識無變遷若俱從色何為辨空亦不從眼色合生為界將謂合眼與色生乎以有知合無知必扞格不相入故曰中離將謂離眼與色生乎離根則合境離境則合根識將誰屬故曰雜亂三處俱非界於何有法眼指竹問僧還見麼僧曰見眼曰竹來眼裏眼到竹邊僧曰總不恁麼後法燈別云當時但擘眼向師歸宗柔別云和尚秪是不信某甲這二轉語却者衲僧氣息又僧問天童啟禪師如何是應用無虧的眼童云恰如瞎一般丹霞頌云盲聾瘖瘂逈天真眼似眉毛道始隣昨夜東君潛布令黃鶯啼處綠楊春於此信得及一任應用無虧阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界因聲所生以聲為界阿難若因耳生動靜二相既不現前根不成知必無所知知尚無成識何形貌若取耳聞無動靜故聞無所成云何耳形雜色觸塵名為識界則耳識界復從誰立若生於聲識因聲有則不關聞無聞則亡聲相所在識從聲生許聲因聞而有聲相聞應聞識不聞非界聞則同聲識已被聞誰知聞識若無知者終如草木不應聲聞雜成中界界無中位則內外相復從何成是故當知耳聲為緣生耳識界三處都無則耳與聲及聲界三本非因緣非自然性通曰小乘所解因緣生法以為實有不了即空故據彼平日所聞而分破之若因耳生耳有勝義根有浮塵根勝義根屬分別若無聲塵相觸知且無之況相形貌浮塵根但雜形色若無動靜二相聞且無之況有識界故謂識生於耳者妄也若因聲生聲自有識不藉於問既無能聞誰辨聲相如謂相因而生許聲因聞而有聲相則亦許聞因聲而聞聞識識已被聞與聲塵等誰為能知知此聞識若有知者則有二識若無知者即同草木故謂識生於聲者妄也若謂聲聞二者和合而生一半有知一半無知有知無知之間何以雜成中界中位既無識無所依則內而根外而塵從何成就故謂聲聞合生者妄也三處都無耳識不生故知耳識無生者即真如性也世尊嘗在尼俱律樹下坐次因二商人問世尊還見車過否曰不見又問還聞否曰不聞商人曰莫禪定否曰不禪定曰莫睡眠否曰不睡眠商人乃歎曰善哉善哉世尊覺而不見遂獻白氎兩段有僧嘗問荷澤會禪師見聞照聲色時唯復抗行耶唯有先后會曰抗行先后即且置汝畢竟將什麼作聲色僧曰如師所論則無聲色可得也於是再拜即日發去後隱於蒙山西天有聲明三藏至閩閩帥請玄沙辨驗沙以鐵火筯敲銅爐問是甚麼聲藏曰銅鐵聲沙曰大王莫受外國人謾藏無對天童拈云理契則神貧子獲衣中之寶情封則物力士失額上之珠三藏秪解瞻前玄沙不能顧後還知麼誣人之罪以罪加之此則公案諸老宿為出語者甚眾藏曰銅鐵聲分明逐聲塵去也法眼別云請大師為大王法燈別云聽和尚問雪竇別云莫謾外國人好至藏無對處法眼代云大師久受大王供養法燈代云却是和尚謾大王此語最有味天童所謂誣人之罪以罪加之者也據玄沙意喚甚麼作銅鐵聲代三藏意喚甚麼不是銅鐵聲二語極易謾人須一一覰透方不受人謾阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取齅知動搖之性若取肉形肉質乃身身知即觸名身非鼻名觸即塵鼻尚無名云何立界若取齅知又汝心中以何為知以肉為知則肉之知元觸非鼻以空為知空則自知肉應非覺如是則應虗空是汝汝身非知今日阿難應無所在以香為知知自屬香何預於汝若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及旃檀木二物不來汝自齅鼻為香為臭臭則非香香應非臭若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體若鼻是一香臭無二臭既為香香復成臭二性不有界從誰立若因香生識因香有如眼有見不能觀眼因香有故應不知香知即非生不知非識香非知有香界不成識不知香因界則非從香建立既無中間不成內外彼諸聞性畢竟虗妄是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性通曰鼻根也香境也界乎二者之間識也凡言界者專指識此識不於根生不於香生大意略同但文義稍為錯綜借境破根而識非空出自在其中即境破識而識非合生亦自可見始破浮塵根既非肉知已破勝義根又非空知知在於香無預於鼻矣氣生於鼻無藉於物矣若香臭二俱能聞者應有兩鼻是根不足據也鼻既是一氣云何二是境不足憑也故謂識從根生者非也若謂識從香生應不知香如見從眼出不自見眼若曰能知則香自有識何必曰生若曰不知即不名識界云何立故謂從香生者非也既香不自知其香是境與根離不可合也識從香生則不知香必不從香生乃能知香是根與境離本非因也故謂識從根境合生者非也香界不成則無中位既無中位安有內外鼻識虗妄元無處所了知聞性即空即無因緣自然可得華嚴法界品鬻香長者優鉢羅華善別知一切諸香亦知調和一切香法及香王所出之處又善別知治諸病香斷諸惡香生歡喜香增煩惱香滅煩惱香令於有為生樂著香令於有為生厭離香捨諸憍逸香發心念佛香證解脫法門香聖所受用香一切菩薩差別香一切菩薩地位香我唯知此調和香法如諸菩薩遠離一切諸惡習氣不染世欲求斷煩惱眾魔罥索超諸有趣以智慧香而自莊嚴於諸世間皆無染著具足成就無所著戒淨無著智行無著境於一切處悉無所著其心平等無著無依昔一尊者過荷池荷神呵之曰毋偷我香尊者乃問凡夫往來莫不聞香何我獨偷神曰凡夫散亂心故不名偷尊者清淨心著即不可鼻識之未易降伏也如是故操無著之心以遊於世即善別知一切諸香未為不可阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界因味所生以味為界阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自嘗舌為甜為苦若舌性苦誰來嘗舌舌不自嘗孰為知覺舌性非苦味自不生云何立界若因味生識自為味同於舌根應不自嘗云何識知是味非味又一切味非一物生味既多生識應多體識體若一體必味生鹹淡甘辛和合俱生諸變異相同為一味應無分別分別既無則不名識云何復名舌味識界不應虗空生汝心識舌味和合即於是中元無自性云何界生是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性通曰初因舌是破自生二因味是破他生三不應虗空是破無因生四舌味和合是破共生即於是中元無自性舌不自味味不自嘗而識安從生正顯無生之旨知舌識本無生舌根本自清淨即妙真如性也昔禪師食噉無擇其徒多效之一日命治具之化人所取化人餘胔而共啖之其徒悉嘔心散去師乃曰我多生清淨故無擇耳汝輩能與我共此者乃可取食由是一眾稟然率遵戒律曹山亦好酒僧問靈衣不挂時如何曰曹山孝滿曰孝滿後如何曰曹山好顛酒其徒稅清問曰某甲孤貧乞師賑濟山召稅闍黎稅應諾山曰清原白家酒三盞喫了猶道未沾脣玄覺云甚麼處是與他酒喫即此三則味性本空舌識亦本空達此者名為知味阿難又汝所明身觸為緣生於身識此識為復因身所生以身為界因觸所生以觸為界阿難若因身生必無合離二覺觀緣身何所識若因觸生必無汝身誰者非身知合離者阿難物不觸知身知有觸知身即觸知觸即身即觸非身即身非觸身觸二相元無處所合身即為身自體性離身即是虗空等相內外不成中云何立中不復立內外性空則汝識生從誰立界是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性通曰物不觸知非物不知觸之謂也物實知虗實不觸虗故凡物但能觸物不能觸知只此一知字分明顯出清淨法身非觸所及而身知有觸者乃色身分別之知以合離二覺為緣故知有觸觸不能離乎身身不能離乎觸言觸則非身言身則非觸二者果安定乎故合之但一身體而無觸位離之即等虗空而無觸用二俱無在內外不成身觸俱非識從何立既無中識根境悉空故知身識界是妄也南嶽思大禪師既得宿命通尋復障起四肢緩弱不能行步自念曰病從業生業從心起心源無起外境何狀病業與身都如雲影如是觀已顛倒想滅輕安如故若思者可謂深明身識之為妄也興陽剖禪師臥病大陽問是身如泡幻泡幻中成辦若無箇泡幻大事無由辦若要大事辦識取箇泡幻作麼生剖曰猶是這邊事陽曰那邊事作麼生剖曰匝地紅輪秀海底不栽華陽笑曰乃爾惺惺耶剖喝曰將謂我忘却竟爾趨寂若剖者可謂深明法身向上事也僧問大龍色身敗壞如何是堅固法身龍曰山華開似錦㵎水湛如藍雪竇頌云問曾不知答還不會月冷風高古巖寒檜堪笑路逢達道人不將語默對手把白玉鞭驪珠盡擊碎不擊碎增瑕纇國有憲章三千條罪據此頌堅固法身亦須擊碎況色身乎哉阿難又汝所明意法為緣生於意識此識為復因意所生以意為界因法所生以法為界阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用又汝識心與諸思量兼了別性為同為異同意即意云何所生異意不同應無所識若無所識云何意生若有所識云何識意唯同與異二性無成界云何立若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及諸觸法相狀分明以對五根非意所攝汝識決定依於法生今汝諦觀法法何狀若離色空動靜通塞合離生滅越此諸相終無所得生則色空諸法等生滅則色空諸法等滅所因既無因生有識作何形相相狀不有界云何生是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性通曰此意識界乃第六識了別性也既以了別為性離法無緣意即不生離緣無形識將安用是識緣法顯非生於意也若謂意能分別為生識根是七識思量為染淨依八識識心為根本依與前六識了別性同乎異乎楞伽云心能積集業意能廣積集了別性名識對現境說五論云集起名心思量名意了境名識一法異名耳既惟一法俱可謂之心俱可謂之意俱可謂之識而微有辨者就分數多者得名耳在八識意識俱泯但可曰心在七識非心非識但可曰意在六識心意俱與境對故曰分別事識其實一物也如海起波浪非異非不異六識逐塵生境界風即鼓動七識思量波浪終不離乎八識湛湛藏海也是六七八識非同非異姑無暇論且以意生識界言之若謂識同於意識即意也何得謂意為能生識謂所生謂之同不可也若諸識異於意逈然不同則一屬有情一屬無情應無所識謂之異不可也若無所識必非意生意能分別所生者必有識也若有所識當意生時無法可緣但有意耳云何自識其意若能識意則意反為境不得為根若不識意又同無識非意所生矣離法求識最難描摸故謂之同則不得名生謂之異則不得名識是同異二性俱無成就識無定所界云何立故謂從根生者妄也若謂緣法而顯即係因法而生必有可狀之法然後成生識之因今世間諸法不離色空等相以對五根是唯五根能攝之是五識之所因也意能離此五塵外別有法法相狀而為所因乎意所自緣內境雖不外藉五根終不出色空生滅影子等法即能緣出世間法有所謂非色非空不生不滅者然非色非空由色空顯不生不滅由生滅顯卒不能離色空生滅外別有所謂法塵為生識因將即五塵而為法乎是五根因非意因也將離五塵而求法乎則無法可得既無可得是無因也所因既無其何能生若謂無因能生有識其識必非分別色空等法果分別何法作何相狀乎相狀不有識實不生故謂因法生者妄也既非意生又非法生而意識有何處所無處斯為真處也已昔國清淨上座問玄沙曰祗如教中道不得以所知心測度如來無上知見又作麼生沙曰汝道究得徹底所知心還測度得及否從此信入後有人問弟子每當夜坐心念紛乘未明攝伏之方願垂示誨靜曰如或夜閑安坐心念紛飛却將紛飛之心以究紛飛之處究之無處則紛飛之念何存反究究心則能究之心安在又能照之智本空所緣之境亦寂寂而非寂者葢無能寂之人也照而非照者葢無所照之境也境智俱寂心慮安然外不尋枝內不住定二途俱泯一性怡然此乃還源之要道也藥山坐次僧問兀兀地思量箇甚麼山曰思量箇不思量底曰不思量底如何思量山曰非思量僧問蜀州西禪師如何是非思量處禪曰誰見虗空夜點頭丹霞頌云一點靈明六不收昭然何用更凝眸箇中消息人難委獨有虗空暗點頭故明得心識不到處而識元自晣阿難白佛言世尊如來常說和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬唯垂哀憫開示眾生中道了義無戲論法爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦如何復將世間戲論妄想因緣而自纏繞汝雖多聞如說藥人真藥現前不能分別如來說為真可憐愍汝今諦聽吾當為汝分別開示亦令當來脩大乘者通達實相阿難默然承佛聖旨通曰阿難欲世尊開示中道明知世間和合因緣則滯於有若因緣自然二俱排擯則溺於空不有不空斯為中道不知無上菩提中道亦無著處乃為第一義諦也此第一義諦即上陰入處界非因緣非自然性見諸相非相即是大乘實相阿難欲捐小乘而求無上菩提今示以妙真如性茫然罔措不知所屬如說藥人但口說耳真藥現前反不能識此真可憐愍者嗟乎藥豈易識哉文殊菩薩一日令善財採藥曰是藥者採將來善財徧觀大地無不是藥却來白云無不是藥者殊曰是藥者採將來善財遂於地上拈一莖草度與文殊文殊接得呈起示眾曰此藥亦能殺人亦能活人雲門示眾云藥病相治盡大地是藥那箇是自己雪竇頌曰盡大地是藥古今何大錯閉門不造車通途自寥廓錯錯鼻孔遼天亦穿却據頌意真藥現前也須吐却何況不能分別阿難如汝所言四大和合發明世間種種變化阿難若彼大性體非和合則不能與諸大雜合猶如虗空不和諸色若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息阿難如水成冰冰還成水通曰若言四大非和合則非真如隨緣之義同於頑空而已若言四大定和合則非真如不變之義同於變化而已如水成冰冰還成水四大元是如來藏性非水之外有冰也水何和而成冰冰何和而成水本只一物更無別物參和其間求和合之相了不可得故非和合非不和合也但迷則真如即四大如水之成冰悟則四大即真如如冰之成水夫水一而已矣僧問臨濟如何是四種無相境濟云你一念心疑被地礙你一念心愛被水溺你一念心嗔被火燒你一念心喜被風飄若能如是辨得不被境縛處處用境東湧西沒南涌北沒中涌邊沒邊涌中沒履水如地入地如水緣何如此為達四大如夢如幻故道流你祗今聽法者不是你四大能用你四大若乃如是見得便乃去住自由審如臨濟言無住非水也者又何冰之與有藥山因施主施裩提起示眾曰法身還具四大也無道得與他一腰裩道吾曰性地非空空非性地此是地大三大亦然山曰與汝一腰裩道吾見處何故與此經逈別試參看汝觀地性麤為大地細為微塵至鄰虗塵析彼極微色邊際相七分所成更析鄰虗即實空性阿難若此鄰虗析成虗空當知虗空出生色相汝今問言由和合故出生世間諸變化相汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗又鄰虗塵析入空者用幾色相合成虗空若色合時合色非空若空合時合空非色色猶可析空云何合汝元不知如來藏中性色真空性空真色清淨本然周徧法界隨眾生心應所知量循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義通曰法界頌云若人欲識真空理身內真如還徧外情與無情共一體處處皆同真法界此七大要旨也真空者一如之體也七大者循業之用也體用不二相依互舉不離妙性故一一皆曰性也唯一性爾空即性空色即性色故即空即色是謂妙有即色即空是謂真無真無妙有是謂妙真如性也唯不落有無故曰清淨然未嘗不有無故曰本然曰清淨則非因緣所染曰本然則非和合所成凡從因緣和合生者有形相有方所不能周徧法界唯不從因緣和合起者無形相無方所故能周徧法界徧法界是性則莫不是七大徧法界是七大即莫不是性如來之心唯此清淨唯此本然唯此周徧故不可知不可量眾生之心於清淨者有時而污染矣於本然者有時而不然矣於周徧者有時而不徧矣隨其能知之心稱其所知之量知積成業業積成果或善或惡變造十界依正之事眾生之心無涯眾生之業亦無涯向非周徧法界之性以為之體安能隨業發現愈出而愈無窮耶眾生業力各各不同然於清淨本然毫無加損故曰蠢動含靈皆有佛性世間無知不悟三界唯心萬法唯識乃於循業發現之事見以為有因生者惑為因緣性見以為無因生者惑為自然性不知清淨本然有無俱離因緣自然無處可著即謂因緣能生乎鄰虗何緣而生空空何緣而生色唯空與空為緣唯色與色為緣縱令鄰虗能析成空不知用幾虗空合成鄰虗即鄰虗不因空有則空非因鄰虗析而有也審矣即空有不能以相生而大地之生無自性也亦審矣故以因緣和合說者謬即謂自然而生乎空何無故而有空色何無故而有色不因鄰虗之析無以見空不因鄰虗之積無以成大地然則大地之生豈無因而忽有者故以自然說者亦謬彼其為是說也從識心計度生也非因緣而強曰因緣非自然而強曰自然但有言說俱為無根戲論耳豈知如來藏性不起於見不著於相不起於見故非計度所及不著於相故非言說所到心行處滅言語道斷乃可謂實相乃可謂第一義諦也秦䟦陀禪師問生法師講何經論生曰大般若經陀曰作麼生說色空義生曰眾微聚曰色眾微無自性曰空陀曰眾微未聚喚作甚麼生罔措陀又問別講何經論生曰大涅槃陀曰如何說涅槃義生曰涅而不生槃而不滅故曰涅槃陀曰這箇是如來涅槃那箇是法師涅槃生曰涅槃之義豈有二耶某甲秪如此未審禪師如何說涅槃陀拈起如意曰還見麼曰見陀曰見箇甚麼生曰見禪師手中如意陀將如意擲於地曰見麼曰見陀曰見箇甚麼生曰見禪師手中如意墮地陀斥曰觀公見解未出常流何得名喧宇宙拂衣而去其徒懷疑不已乃追陀扣問我師說色空涅槃不契未審禪師如何說色空義陀曰不道汝師說得不是汝師秪說得果上色空不會說得因中色空其徒曰如何是因中色空陀曰一微空故眾微空眾微空故一微空一微空中無眾微眾微空中無一微此亦非陀創為此語也一根清淨故眾根清淨眾根清淨故一根清淨一根清淨中無眾根眾根清淨中無一根以此發明不為難解却與性色真空性空真色指箇入路阿難火性無我寄於諸緣汝觀城中未食之家欲炊爨時手執陽燧日前求火阿難名和合者如我與汝一千二百五十比丘今為一眾眾雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻螺此云木爪癃迦葉波種乃至阿難瞿曇星名亦云日種種姓阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為於日來阿難若日來者自能燒汝手中之艾來處林木皆應受焚若鏡中出自能於鏡出然於艾鏡何不鎔紆汝手執尚無熱相云何融泮若生於艾何藉日鏡光明相接然後火生汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自有汝猶不知如來藏中性火真空性空真火清淨本然周徧法界隨眾生心應所知量阿難當知世人一處執鏡一處火生徧法界執滿世間起起徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義通曰龍勝云諸法實有不應以心識故知有相若以心識故知有是則非有如地堅相以身根身識故知有若無身根身識則無堅相問曰身根身識若知若不知而地常有堅相答曰若先自知知堅相若從他聞則知有堅相若先不知不聞則無堅相復次地若常是堅相不應捨其相如凝酥蜜樹膠融則捨其堅相墮濕相中金銀銅鐵等亦然如水為濕相寒則轉為堅相如是等種種悉皆捨相又曰若火實有熱性云何有人入火不燒及人身中火而不燒身雲中火水不能滅以火無有定熱性故神通力故火不能燒身業因緣故五藏不熱神龍力故水不能滅若熱性與火異火則非熱若熱性與火一云何言熱火性如是其餘亦然如是總性別性無故名為性空以如是之理推地水火之性喻如尋流而得源一切皆空世尊所示自其性而發相謂之循業發現應所知量龍勝所論自其相而窮性特顯發色心不二云爾陽燧亦名火方諸論衡云於五月丙午日午時銷爍五方石圓如鏡中央窪照物則影倒向日則火出世間但知艾鏡日三者因緣和合則火生不知鏡艾與日相遠非可和合故非因緣若謂忽然自有應不藉陽燧向日求火故非自然若謂三者各具火性艾應自焚鏡應自融日光所及應燒林木三者俱無火性足知火性是空然以三者業力故火隨業現足知性空即火起徧世間寧有方所故鑽木則得火擊石則得火循業發現不止陽燧一端總自清淨性中發起即性即火何藉因緣火即性火豈曰自然故知火大非因緣非自然而性之也者乃深於實相者也雪峯開火次因指火示眾曰三世諸佛在火焰裏轉大法輪雲門曰火𦦨為三世諸佛說法三世諸佛立地聽玄沙曰近日王令稍嚴峯曰作麼生沙曰不許攙奪行市峯乃吐舌曹山一日入僧堂向火有僧曰今日好寒山曰須知有不寒者僧曰誰是不寒者山筴火示之僧曰莫道無人山拋下火僧曰某甲到這裏却不會山曰日照寒潭明更明古人遇境即發明向上一路為於性火真空性空真火有實透脫處阿難水性不定流息無恒如室羅城迦毗羅此云黃赤色仙研迦羅此云輪仙及鉢頭摩此云赤蓮華訶薩多等諸大幻師求太陰精用和幻藥是諸師等於白月晝手執方諸承月中水此水為復從珠中出空中自有為從月來阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降若從珠出則此珠中常應流水何待中宵承白月晝若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行汝更諦觀月從天陟珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有汝尚不知如來藏中性水真空性空真水清淨本然周徧法界隨眾生心應所知量一處執珠一處水出徧法界執滿法界生生滿世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義通曰方諸亦名陰燧形如蛤熟拭令熱以向月則津然出水方石也諸珠也鍊石成之應於十一月壬子日子時造月望前曰白望後曰黑亭午曰晝亦月明如晝意也外道於定中或覩日月輪或見紅蓮華及黃赤色故各以其術得名楞伽云譬如日月形鉢頭摩深險如虗空火燼如是種種相外道道通禪此之謂也其幻術皆以藥為之今世傳神仙幻術多用陽起石及磁石等即此之類水之出方珠也非和合非自然固與陽燧無以異至謂空性無邊水當無際云何復有水陸空行不與性空真水相剌謬乎葢以相論則有形故水滿空而同溺以性論則無形故空現水而無盡此性水真空性空真水葢指清淨四大之性而言性本空故空空相涵空空不二孰見有凌奪之相哉後富樓那所疑第於性上疑其凌奪非疑其相也相不相容世尊已於此先言之矣又何更用疑藥山問僧甚處來曰湖南來山曰洞庭水滿也未曰未山曰許多時雨水為甚麼未滿僧無對道吾代云滿也雲巖曰湛湛地洞山云甚麼劫中曾增減來雲門曰祗在這裏又雪峯云飯籮邊坐餓死人無數海水邊坐渴殺人無數玄沙云飯羅裏坐餓死人無數海水沒頭渴殺人無數雲門云通身是飯通身是水天童拈云我即不然飯羅裏坐脹殺人無數海水沒頭漫殺人無數以前傷乎不吞以後傷乎不吐祗如雲門云通身是飯通身是水到這裏無你吞吐處古人舉唱性海波瀾重重無盡到雲門通身是水語方十成却纔與性水真空性空真水清淨本然周徧法界若合符契故知以意想測度性空性水者葢不啻幾多般矣阿難風性無體動靜不常汝常整衣入於大眾僧伽梨角此云大衣動及傍人則有微風拂彼人面此風為復出袈裟角此云壞色發於虗空生彼人面阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今說法會中垂衣汝看我衣風何所在不應衣中有藏風地若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗名名為虗空云何風出若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒拂汝審諦觀整衣在汝面屬彼人虗空寂然不叅流動風自誰方鼓動來此風空性隔非和非合不應風性無從自有汝宛不知如來藏中性風真空性空真風清淨本然周徧法界隨眾生心應所知量阿難如汝一人微動服衣有微風出徧法界拂滿國土生周徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義通曰整衣在汝而衣不飄去面屬彼人而風不倒拂虗空寂然而不隨風生滅是三者不興風流動之性相參誰為和合不應風性無根而出誰謂自然以風即性故性即風故特循業發現如衣動風生云爾性徧法界則風徧法界故均名曰大儒者言坤為地坎為水離為火巽為風總不外乎陰陽陰陽從何而生自太極動靜中來也一物各具一太極萬物統體一太極未嘗不即理即事即事即理然而悟心為太極者鮮矣既悟心為太極天下寧有心外之物哉麻谷使扇次僧問風性常住無處不周和尚為甚麼却搖扇谷曰你秪知風性常住且不知無處不周僧曰作麼生是無處不周谷却搖扇僧作禮谷曰無用處師僧著得一千箇有甚麼益又南泉問僧曰夜來好風僧曰夜來好風泉曰吹折門前一枝松僧曰吹折門前一枝松又問一僧曰夜來好風僧曰是甚麼風泉曰吹折門前一枝松僧曰是甚麼松泉曰一得一失據二僧答處俱有衲僧氣息南泉何謂一得一失若定當得出許親見南泉阿難空性無形因色顯發如室羅城去河遙處諸剎利種此云王族及婆羅門此云淨志毗舍商賈首陀農人兼頗羅墮此云智人旃陀羅等魁膾愚人新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少此空為當因土所出因鑿所有無因自生阿難若復此空無因自生未鑿土前何不無礙唯見大地逈無通達若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若無出入則應空土元無異因無異則同則土出時空何不出若因鑿出則鑿出空應非出土不因鑿出鑿自出土云何見空汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出若此虗空性圓周徧本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入汝全不知如來藏中性覺真空性空真覺清淨本然周徧法界隨眾生心應所知量阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義通曰空性無形豈有出入但因色顯發知有空耳有色非空無色即空色有去來空無起滅非但地能障空即水即火即風皆色也非但鑿地可以見空即去水滅火息風亦可以見空故當四大之生也空未嘗無當四大之滅也空非始有四大有去來而空元無出入空性周圓容易可解四大真空亦猶是也當未隨業之時清淨本然周徧法界本未嘗無及既發現之後隨感隨應充滿世間亦非始有相有生滅性無生滅有生滅者必不周徧唯周徧者自無生滅謂之如來藏者來無所從去無所至豈容生滅於其間哉若論頑空雖無出入亦有生滅如後舉空生大覺中如海一漚發十方虗空悉皆銷殞唯真空即真覺原無生滅前四大曰真色真火真水真風皆以真言即後所云清淨四大也皆以性言不取於相故曰性真圓融皆如來藏本無生滅明明自性真而言若諸相有形安能圓融無礙乎融之云者即色即空即空即色不見有五大之跡惟是一空圓之云者空不礙色色不礙空五大迭出無窮不離一真也前以四大融會真空此以真空銷歸真覺明所謂真空者即真覺非頑空比也黃龍祖心禪師上堂心同虗空界示等虗空法證得虗空時無是無非法便恁麼休去停橈把且向灣裏泊舡若據衲