謂相分也言見聞覺知而依於識為根身五大性所謂見分也見相二分均從第八識生起故八識湛然即謂妙覺即謂如來藏今以前五識為見大所謂性境屬現量以第六識為識大所謂分別事識屬比量非量二乘人不知有七八二識以此為主人公為作善惡業有殊勝力故前五識無分別至六識方能分別故曰識動見澄但舉此識不生於見不生於相不生於空非因緣生又非無因突然而出非自然生且此六識善惡無記三性皆具與前六根見大各有種子現行非和非合三者俱非了無所寄此識果何所從來乎夫生於見生於相生於空則有所從來既有從來則有方所便非周徧唯無所從不從有來不從無來則性非從所本無涯際本自周圓故此了明分別事識興前見相二分均名七大識歸湛然是六識與八識合故曰如來藏若六識合於塵者為同為有離於塵者為異為空非合非離無踪可覓乃得名湛然也此湛然之識何以曰性識曰真識哉從明起知不於情起從覺生明不於境生此識從真性真覺中流出識即性也識即覺也所謂轉第八識為大圓鏡智者此也此性識之明知即是覺明之真識猶云妙明明妙云爾故曰妙覺湛然徧周法界前六俱云清淨本然此獨云妙覺湛然以等妙之覺律之故當微別前六云圓滿十方似稱性義此獨云含吐十虗似發起義識性無源能為萬法之源凡前所云如來藏者皆歸於此也於空則曰汝心昏迷謂迷四大與空異也空性覺故於見則曰汝性沉淪謂逐塵流轉而不返也見覺而不動故於識則曰汝心麤浮謂識精內潛浮則但認浮根麤則不達識精故五陰分屬十八界而此獨詳於識者以如來藏中不生不滅與生滅和合而成阿賴耶識能究竟歸不生不滅者名第九識即識即性也不能究竟猶存生滅者雖湛然不波是識非性也見性者不迷於識故妙存乎心悟保壽上堂云三界唯心萬法惟識檻外雲生簷前雨滴㵎水湛如藍野華開似織此時若不究根源謾向當來問彌勒還會麼不勞久立丹霞頌云靈然不涉去來今三界都盧一點心檻外桃華春蝶舞門前楊柳曉鶯吟又唯心訣云巖樹庭柯各挺無邊之妙相猿吟鳥噪皆談不二之圓音悟此方信徧大地無不是藥者何止七大而已哉不然入理深談翻成毒藥豈必因緣自然乃為戱論僧問藥山己事未明乞和尚指示山良久曰吾今為汝道一句亦不難秪宜汝於言下便見去猶較些子若更入思量却成吾罪過不如且各合口免相累及故知識心卜度去道轉遠但有言說即非實義爾時阿難及諸大眾蒙佛如來微妙開示身心蕩然得無罣礙是諸大眾各各自知心徧十方見十方空如觀手中所持葉物一切世間諸所有物皆即菩提妙明元心心精徧圓含裹十方反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從了然自知獲本妙心常住不滅禮佛合掌得未曾有於如來前說偈讚佛通曰心精徧圓含裹十方心量廣大固自如此乃至見十方空如手中物及正報身與微塵等此方會妄歸真猶存二見較之身心一如身外無餘者尚隔數舍陸大夫問南泉曰肇法師也甚奇特解道天地與我同根萬物與我一體泉指庭前牡丹云大夫時人見此一株華如夢相似陸罔措雪竇頌云聞見覺知非一一山河不在鏡中觀霜天月落夜將半誰共澄潭照影寒天童頌云照徹離微造化根紛紛出沒見其門游神劫外問何有著眼身前知妙存虎嘯蕭蕭巖吹作龍吟冉冉洞雲昏南泉點破時人夢要識堂堂補處尊古德云是處是慈氏無門無善財即此一切世間諸所有物皆即菩提妙明元心於此識得自知常住不滅而信漚之即為海也不見有起滅相故曰起滅無從唐順宗問佛光滿曰佛從何方來滅向何方去既言常住世佛今在何處滿答曰佛從無為來滅向無為去法身等虗空常住無心處有念歸無念有住歸無住來為眾生來去為眾生去清淨真如海湛然體常住智者善思惟更勿生疑慮帝又問佛向王宮生滅向雙林滅住世四十九又言無法說山河與大海天地及日月時至皆歸盡誰言不生滅疑情猶若此智者善分別滿答曰佛體本無為迷情妄分別法身等虗空未曾有生滅有緣佛出世無緣佛入滅處處化眾生猶如水中月非常亦非斷非生亦非滅生亦未曾生滅亦未曾滅了見無心處自然無法說順宗大悅裴相國一日入開元寺見壁畫乃問寺主這畫是甚麼寺主曰畫高僧裴云形影在這裏高僧在甚麼處寺主無對裴云此間莫有禪師麼寺主云有一人遂請黃檗相見乃舉前話問檗檗召云裴休休應諾檗云在甚麼處裴於言下有省此可為常住不滅證據故綴錄之妙湛總持不動尊首楞嚴王世希有定林曰識精為水水不搖則名之為湛所謂圓湛者清淨本然周徧法界不分為六則湛圓矣所謂妙湛者以妙力總持不動則湛妙矣所謂覺湛明性者覺合識精如日合水而有明性也所謂湛精圓常者即圓湛識精也已滅生滅故名為常所謂此湛非是不流如急流水望如恬靜者經云識動見澄則識有動性名為想元自非妙湛總持則念念受熏習氣暴流成諸行矣經於諸行喻如流者以此然識比諸行猶名為湛所謂湛入合湛者如波瀾滅化為澄水名行陰盡內內湛明入無所入名識陰區宇則所謂湛入者識陰也湛入為識陰則湛為性識明知明知即智智之與識是識邊際故說五陰而曰湛入合湛歸識邊際性識不名湛入者周徧法界無出入故所謂內內湛明入無所入者湛出為行行如水流湛入為識識滅行陰則內內湛明入至想元更無所入矣所謂識精者即阿陀那識也所謂黏湛者黏此識精也此識精者如水清潔本無黏性妄起分別與色合故水土雜矣乃能成黏若識此識者如水清潔本無黏性能不合色脫黏內伏矣湛有圓湛有妙湛有覺湛有精湛有湛入有黏湛如前義錙銖之分較盡法之喻也馬鳴曰以依不覺心動為業覺則不動夫覺則不動妙湛總持之謂也動則為業遷流而為諸行矣所謂首楞嚴王者以首楞嚴定十地菩薩能得之故佛則為王也傅大士一日講經次帝至大眾皆起唯士端坐不動近臣報曰聖駕在此何不起士曰法地若動一切不安若大士者真得首楞嚴定矣僧問姜山方禪師如何是不動尊方曰單著布衫穿市過僧曰學人未曉方曰騎驢踏破洞庭湖僧曰透過三級浪專聽一聲雷方曰伸手不見掌僧曰還許學人進向也無方曰踏地告虗空僧曰雷門之下布鼓誰鳴方曰八華毬子上不用繡紅旗僧曰三十年後此話大行方便打姜山自是那邊人不妨隨流得妙其如這僧錯認定盤針難與共語銷我億劫顛倒想不歷僧祇獲法身通曰億劫尚有數可指阿僧祇三無數劫也無始以來迷真認妄皆顛倒見今會妄歸真獲本妙心常住不滅如前如來藏即法身之謂也僧問黃檗教中云銷我億劫顛倒想不歷僧祇獲法身如何檗云若以三無數劫脩行有所證得者盡恒沙劫不得若於一剎那中獲得法身直了見性者猶是三乘教之極談也何以故以見法身可獲故皆屬不了義教中收黃檗出詞吐氣真是大乘根器阿難既獲法身矣何以又曰希更審除微細惑以見有法身可獲故太原孚上座初在揚州光孝寺講涅槃經有禪者阻雪因往聽經至三因佛性三德法身廣談法身妙理禪者失笑孚講罷請禪者喫茶白曰某甲素志狹劣依文解義適蒙見笑且望見教禪者曰實笑座主不識法身孚曰如此解說何處不是曰請座主更說一遍孚曰法身之理猶如太虗竪窮三際橫亘十方彌綸八極包括二儀隨緣赴感靡不周徧禪者曰不道座主說不是祗是說得法身量邊事實未識法身在孚曰既然如是禪德當為我說曰座主還信否孚曰焉敢不信禪者曰若如是座主輟講旬日於室內端然靜慮收心攝念善惡諸緣一時放却孚一依所教從初夜至五更聞鼓角聲忽然契悟便去扣門禪者曰阿誰孚曰某甲禪者咄曰教汝傳持大教代佛說法夜來為甚麼醉酒臥街孚曰禪德自來講經將生身父母鼻孔扭揑從今以去更不敢如是禪者曰且去來日相見若孚者真不歷僧祇獲法身矣僧問利山和尚不歷僧祇獲法身請師直指山曰子承父業曰如何領會山曰貶剝不慈曰恁麼則大眾有賴去也山曰大眾且置作麼生是法身僧無對山曰汝問我與汝道僧問如何是法身山曰空華陽焰且道利山所說法身與阿難較多少願今得果成寶王還度如是恒沙眾通曰不歷僧祇獲法身信位即是人位未是故行圓果滿實證真智如淨瑠璃內含寶月乃得成寶王也至此普觀一切眾生皆有如來智慧德相我皆一一而度脫之眾生無盡我願無盡興慈運悲不容自已良以佛法僧三寶為眾生津梁故洞山初初參雲門門問近離甚處曰查渡門曰夏在甚處曰湖南報慈門曰幾時離彼曰八月二十五門曰放汝三頓棒至明日却上問訊昨日蒙和尚放三頓棒不知過在甚處門曰飯袋子江西湖南便恁麼去初於言下大悟遂曰他後向無人煙處不畜一粒米不種一莖菜接待十方往來盡興伊抽釘拔楔拈却炙脂帽子脫却鶻臭布衫教伊灑灑地作箇無事衲僧豈不快哉門曰你身如椰子大開得如許大口初便禮拜將此深心奉塵剎是則名為報佛恩通曰深心二字有味非淺近可測塵剎無涯智悲無量與佛同慈足稱報恩矣臨濟辭黃檗檗問什麼處去濟云不是河南便是河北檗便打濟約住與一掌檗大笑乃喚侍者將百丈先師禪板几案來濟云侍者將火來檗云雖然如是汝但將去已後坐却天下人舌頭去在後溈山問仰山臨濟莫辜負他黃檗也無仰山曰不然溈云子又作麼生仰曰知恩方解報恩溈云從上古人還有相似底也無仰曰有秪是年代深遠不欲舉似溈曰雖然如是吾且不知子但舉看仰曰秪如楞嚴會上阿難讚佛云將此深心奉塵剎是則名為報佛恩豈不是報恩之事溈云如是如是見與師齊減師半德見過於師方堪傳授又溈山問仰山臨濟之後如何仰曰吳越間有一人然遇大風則止溈曰可奈何仰曰將此深心奉塵剎是則名為報佛恩後風穴沼得首山念嗣法人以為仰山再來若仰山真有深心者詎可測哉詎可測哉伏請世尊為證明五濁惡世誓先入通曰五陰未空則五濁難破安能度一切苦厄唯其得果已證出世間法故不妨入廛垂手以覺覺他所謂將此深心奉塵剎必先施此五濁惡世也阿難業有是願而此土傅大士足以當之大士名翕年十六納劉氏女妙光生二子曰普建普成年二十四鬻其妻若子為水陸會間與里人稽亭浦漉魚獲已沉籠水中祝曰去者適止者留人謂之愚會天竺僧嵩頭陀語曰我與汝毗婆尸佛所發誓今兜率宮衣鉢現在何日當還因命臨水覩影見圓光寶葢大士笑謂之曰罏韛之所多鈍鐵良醫之門足病人度生為急何思彼樂乎嵩指松山頂曰此可棲矣大士躬耕而居之有人盜菽麥瓜果大士即與籠籃盛去天嘉二年感七佛相隨釋迦引前維摩接後唯釋尊數顧共語為我補處也直指人心見性成佛正法眼藏自迦葉阿難傳至達磨已二十八代此土雖有教典未聞最上宗風達摩未至大士已生毋乃先入之明證乎如一眾生未成佛終不於此取泥洹通曰過去無量諸佛度脫無量眾生豈能一一成佛何為遽取涅槃而去金剛經云我皆令入無餘涅槃而滅度之實無有眾生得滅度者到此境界不見有佛可成有眾生可度亦無有涅槃可入乃為正見僧問忠國師那箇是佛心師曰牆壁瓦礫是僧曰與經大相違也涅槃曰離牆壁無情之物故名佛性今云是佛心未審心之與性為別不別師曰迷即別悟即不別僧曰經云佛性是常心是無常今云不別何也師曰汝但依語而不依義譬如寒月水結為冰及至煖時冰釋為水眾生迷時結性成心眾生悟時釋心成性若執無情無佛性者總不應言三界唯心宛是汝自違經吾不違也僧曰教中但見有情作佛不見無情受記且賢劫千佛誰是無情佛耶師曰如皇太子未受位時唯一身耳受位之後國土盡屬於王寧有國土別受位乎今但有情受記作佛之時十方國土悉是遮那佛身那得更有無情受記耶僧曰一切眾生盡居佛身之上便利穢污佛身穿鑿踐踏佛身豈無罪耶師曰眾生全體是佛欲誰為罪僧曰經云佛身無罣礙今以有為窒礙之物而作佛身豈不乖於聖旨師曰大品經云不可離有為而說無為汝信色是空否僧曰佛之誠言焉敢不信師曰色既是空寧有罣礙僧曰眾生佛性既同只用一佛脩行眾生應時解脫今既不爾同義安在師曰汝不見華嚴六相義云同中有異異中有同成壞總別類例皆然眾生與佛雖同一性不妨各各自修自得未見他食我飽竊又以海漚譬之一漚既滅全體即是大海未見一漚滅時眾漚皆滅故不妨各各自修自得既悟全體是海則眾漚莫非是水何眾生而不佛乎若見眾生皆是佛者即取泥洹可也大雄大力大慈悲希更審除微細惑通曰雄雄之尊視十地而下皆其雌也超十力五力而上之故曰大力與樂曰慈救苦曰悲必使他心通方名自性現故希望世尊審除微細惑也夫既獲法身矣何得更有惑在雲門云直得觸目無滯達得名身句身一切法空山河大地是名身亦不可得喚作三昧性海俱備猶是無風帀帀之波直得亡知於覺覺即佛性矣喚作無事人更須知有向上一竅在天童拈云賓主之諧二俱有過各與二十棒秪如向上一竅又作麼生犀因玩月紋生角象被雷驚華入牙他日又云光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細檢點將來有甚麼氣息亦是病天童頌云森羅萬象許崢嶸透脫無方礙眼睛掃彼門庭誰有力隱人胸次自成情舡橫野渡橫秋碧棹入蘆華照雪明串錦老漁懷就市飄飄一葉浪頭行乾峯說法身有三種病二種光雲門如何缺一諸方道未到走作已到住著透脫無依是三今少前一種佛眼道騎驢覓驢是一騎驢了不肯下是二少後一種諸老宿商量法身三種病微細如是豈涉教意哉令我早登無上覺於十方界坐道場通曰無上覺者即向上一竅也於前獲法身及得果有差別乎無差別乎所可云者佛果有七曰菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智悟菩提見佛性即可謂獲法身見性之後審除細惑使生滅滅生俱寂以合乎涅槃真如白淨純凝以合乎菴摩羅識廓然圓照以合乎空如來藏大圓鏡智乃可謂得果然未可謂登無上覺也玩一早字即頓悟法門一了百當不藉勳級不論凡夫十地人人可登佛云吾有正法眼藏涅槃妙心密付迦葉有何踪跡影響可得此即所謂無上覺也一登此覺即至佛地便可於十方界坐蓮華寶座為眾說法龍女尚然況聲聞弟子乎藥山在馬祖三年祖問子近日見處作麼生山曰皮膚脫落盡唯有一真實祖曰子之所得可謂協於心體布於四肢既然如是將三條篾束取肚皮隨處住山去山曰某甲又是何人敢言住山祖曰不然未有當行而不住未有常住而不行欲益無所益欲為無所為宜作舟航無久住此又德山至溈山挾複子上法堂從西過東從東過西顧視方丈曰有麼有麼溈坐次殊不顧盼山曰無無便出雪竇著語云勘破了也至門首乃曰雖然如此也不得草草遂具威儀再入相見纔跨門提起坐具曰和尚溈擬取拂子山便喝拂袖而出雪竇著語云勘破了也山至晚問首座今日新到在否座曰當時背却法堂著草鞋去也溈曰此子已後向孤峯頂上盤結草菴呵佛罵祖去在雪竇著語云雪上加霜頌曰一勘破二勘破雪上加霜曾嶮墮飛騎將軍入虜庭再得完全能幾箇急走過不放過孤峯頂上草裏坐咄加此一咄是雪竇手眼非登無上覺者難以了此舜若多性可銷亡爍迦羅心無動轉通曰舜若多此云虗空天爍迦羅此云堅固舊說空性無體尚可銷亡我心堅固終無動轉似阿難發願如此既願得果成寶王矣何為復有是願既已登正覺坐道場矣又何諄諄於無動轉乎語本不錯要知指歸是當前云妙湛總持不動尊首楞嚴王世希有何以曰妙湛雖湛然不動而非住著虗空故謂之妙若住著虗空而以為不動者終非一切究竟堅固阿難意曰使我十方坐道場虗空法身亦不住著而正法眼藏究竟堅固亦如首楞嚴王妙湛不動云爾首尾相應理趣自長古德云長者長法身短者短法身天童拈云且道舜若多神喚什麼作法身良久云還會麼不可續鳧截鶴夷嶽盈壑去也此語政恐人向虗空裏釘橛去在疎山上堂病僧咸通年前會得法身邊事咸通年後會得法身向上事雲門出問如何是法身邊事山曰枯樁曰如何是法身向上事山曰非枯樁門曰還許某甲說道理也無山曰許曰枯樁豈不是明法身邊事山曰是曰非枯樁豈不是明法身向上事山曰是門曰秪如法身還該一切也無山曰法身周徧豈得不該門指淨瓶曰秪如淨瓶還該法身麼山曰闍黎莫向淨瓶邊覓門便禮拜依然指出非枯樁一條活路只此非枯樁正合舜若多性可銷亡之旨曹山初謁洞山洞問闍黎名甚麼曹曰本寂洞曰那箇聻曹曰不名本寂洞甚器之自此入室盤桓數載乃辭去洞遂密授寶鏡三昧復問曰子向甚麼處去曹曰不變異處去洞曰不變異處豈有去耶曹曰去亦不變異丹霞頌云家家門掩蟾蜍月處處鶯啼楊柳風若謂縱橫無變異猶如擲劍擬揮空曹山正偏兼帶可謂得爍迦羅眼若認定無變異處猶有劍存噫微矣
