body:
  text: 大佛頂如來密因脩證了義諸菩薩萬行首楞嚴經卷第二爾時阿難及諸大眾聞佛示誨身心泰然念無始來失却本心妄認緣塵分別影事今日開悟如失乳兒忽遇慈母合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性通曰前云見無所動見無舒卷已明白指出不生不滅性然此不生滅性見在生滅身中真發明性即不生不滅根本妄發明性即生滅根本其中虗實難辨故願如來顯示之也昔薜簡問六祖曰京城禪德皆云欲得會道必須坐禪習定若不因禪定而得解脫者未之有也未審師所說法如何祖曰道由心悟豈在坐也經云若言如來若坐若臥是行邪道何故無所從來亦無所去無生無滅是如來清淨禪諸法空寂是如來清淨坐究竟無證豈況坐耶簡曰明喻智慧暗喻煩惱儻不以智慧照破煩惱無始生死憑何出離祖曰煩惱即是菩提無二無別若以智慧照破煩惱者此二乘見解羊鹿等機上智大根悉不如是簡曰如何是大乘見解祖曰明與無明凡夫見二智者了達其性無二無二之性即是實性實性者處凡愚而不滅在賢聖而不增在煩惱而不亂居禪定而不寂不斷不常不來不去不在中間及其內外不生不滅性相如如常住不遷名之曰道簡曰師說不生不滅何異外道祖曰外道所說不生不滅者將滅止生以生顯滅滅猶不滅生說不生我說不生不滅者本自無生今亦不滅所以不同外道汝若欲知心要但一切善惡都莫思量自然得入清淨心體湛然常寂妙用恒沙簡蒙指授豁然大悟此即現前生滅顯出真不生滅性非佛佛道同固不能透露如此時波斯匿王起立白佛我昔未承諸佛誨敕見迦旃延外道名說諸法亦有亦無毗羅胝子外道名說刦滿自然得道咸言此身死後斷滅名為涅槃此似阿耆多語我雖值佛今猶狐疑云何發揮證知此心不生滅地今此大眾諸有漏者咸皆願聞佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅佛言大王汝未曾滅云何知滅通曰世尊垂語步步歸真如云汝未曾滅云何知滅若是上根利智當知知滅者原不滅也即證無生法忍有僧問雲居纔生為甚麼不知有膺曰不同生曰未生時如何膺曰不曾滅曰未生時在甚麼處膺曰有處不收曰甚麼人不受滅膺曰是滅不得者觀雲居如是酬對豈為廉纖須明那邊事方可觀此語世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞殞亡不息決知此身當從滅盡佛言如是大王汝今生齡已從衰老顏貌何如童子之時世尊我昔孩孺膚腠潤澤年至長成血氣充滿而今頹齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時佛言大王汝之形容應不頓朽王言世尊變化密移我誠不覺寒暑遷流漸至於此何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十於今六十又過於二觀五十時宛然強壯世尊我見密移雖此殂落其間流易且限十年若復令我微細思惟其變寧惟一紀二紀實為年變豈惟年變亦兼月化何直月化兼又日遷沉思諦觀剎那剎那念念之間不得停住故知我身終從變滅佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶通曰幻化色身終從變滅清淨法身原無生滅非色身外另有法身也法身如海色身如漚漚有生滅海水一如大悟之者幻化空身即法身故知身中有不滅也石頭有偈云問此菴壞不壞壞與不壞主元在不居南北與東西基址堅牢以為最又云住此菴休作解誰誇鋪席圖人買迴光返照便歸來廓達靈根非向背嗟乎人人具此不生滅性其如隨流逐浪不能迴光返照何波斯匿王合掌白佛我實不知佛言我今示汝不生滅性大王汝年幾時見恒河本王言我生三歲慈母攜我謁耆婆天此云長壽天神經過此流爾時即知是恒河水佛言大王如汝所說二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王言如三歲時宛然無異乃至於今年六十二亦無有異佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恒河與昔童時觀河之見有童耄不王言不也世尊佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅云何於中受汝生死而猶引彼末伽黎等外道名說自然而然都言此身死後全滅王聞是言信知身後捨生趣生與諸大眾踊躍歡喜得未曾有通曰外道有六師一富蘭那迦葉所說諸法皆不生不滅二末伽黎拘賒黎子說眾生雖有苦樂無有因緣自然而然三刪闍多毗羅胝子說眾生任運時熟得道八萬劫滿自然得道四阿耆多翅舍欽婆羅說眾生當受苦報後受涅槃樂也五迦樓鳩駄迦旃延說諸法亦有亦無六尼犍陀若提子所說皆由業定無可逃避皆斷見也雖說不生不滅乃對生滅而言因牛角有說兔角無既有對待終屬生滅若觀河之見宛然無異真性不變於是可窺直於現前生滅之中顯出不生滅性是知身中有不滅者存雖云捨生趣生其實滅而不滅豈外道斷見可並語哉僧問趙州承師有言世界壞時此性不壞如何是此性州曰四大五陰僧云此猶是壞底如何是此性州曰四大五陰法眼云是一箇是兩箇是壞不壞且作麼生會試斷看有僧問大隨劫火洞然大千俱壞未審這箇壞不壞隨云壞僧云恁麼則隨他去也隨云隨他去又僧問龍濟劫火洞然大千俱壞未審這箇壞不壞濟云不壞僧云為甚麼不壞濟云為同大千天童頌云壞不壞隨他去也大千界句裏了無鉤鎖機脚頭多被葛藤礙會不會分明底事丁寧㬠知心拈出勿商量輸我當行相買賣大隨說壞龍濟說不壞是一是二濟云為同大千隨云隨他去依然是趙州四大五陰宗旨世界壞時此性不壞正須在四大五陰中討箇安穩地始得阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手此云印手為正為倒阿難言世間眾生以此為倒而我不知誰正誰倒佛告阿難若世間人以此為倒即世間人將何為正阿難言如來豎臂兜羅綿手此云網相上指於空則名為正佛即豎臂告阿難言若此顛倒首尾相換諸世間人一倍瞻視則知汝身與諸如來清淨法身比類發明如來之身名正徧知汝等之身號性顛倒隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒通曰清淨法身即妙明真精妙心也見聞覺知即妙心中所現之物也歸根為正逐末為倒譬如漚發於海認海為正認漚為倒佛問阿難汝今見我垂手為正為倒但當於自見處猛省誰正誰倒不宜於如來手上分正分倒如須菩提巖中宴坐見如來法身不緣根識是名正徧知也以阿難眼對如來手更於手上分正分倒此乃六識用事背本逐末已離正位故號性顛倒也初阿難以垂手為倒語尚含糊及問將何為正則以豎臂為正然後知阿難之所謂正與倒者在手上辨不於見上辨也其瞻視已為顛倒矣垂手首尾相順本正也而世人以為倒豎臂首尾相換本倒也而世人以為正是於瞻視顛倒之中又倍加顛倒也故比類發明遺失清淨法身而認見聞覺知已為顛倒又執色身之內見聞覺知必不生滅云此為正非為倒也不更倍於顛倒乎僧問洞山尋常教學人行鳥道未審如何是鳥道山曰不逢一人曰如何行山曰直須足下無私去曰祗如行鳥道莫便是本來面目否山曰闍黎因甚顛倒曰甚麼處是學人顛倒山曰若不顛倒因甚麼却認奴作郎曰如何是本來面目山曰不行鳥道丹霞頌云古路翛然倚太虗行玄猶是涉崎嶇不登鳥道雖為妙點檢將來已觸途夫鳥道玄微庶幾轉功就位洞山門下猶以為顛倒況見聞歷歷尚存粗迹而可以此為不生滅足當無上菩提者乎于時阿難與諸大眾瞪瞢瞻佛目睛不瞬不知身心顛倒所在佛興慈悲哀愍阿難及諸大眾發海潮音時語也應此機授此法徧告同會諸善男子我常說言色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物云何汝等遺失本妙圓妙明心寶明妙性認悟中迷晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物通曰汝身即是相分汝心即是見分相分該根塵諸所緣法山河大地明暗色空等見分該八識及心所使五十一心所法善惡業行邪正因果等總是如來藏中流出故曰唯心所現此心本妙不假脩習何以見其本妙也語其體則為圓妙明心從妙起明故曰圓語其用則為寶明妙性即明而妙故曰寶妙而明明而妙毫無染污即所謂大圓鏡智也一切見分相分皆鏡中所現之影耳今遺本妙而認見聞猶遺本鏡而認幻影雖若有悟其實在迷故曰悟中迷認悟中迷至以為心性當一氣讀下迷性妙明而成無明由此無明變成頑空故曰晦昧為空所變頑空與能變無明二法和合變起四大為依報外色以四大色雜妄想心變起眾生正報內色根謂妄想相謂妄色想相為身見相二分俱備即八識也聚緣內搖即七識也趣外奔逸即六識也以此無明變起雜妄緣塵昏擾擾相認為自心豈不惑哉其妙明真心即清淨法身也豎窮三際橫亘十方豈拘拘於色身內者若此見聞雖不生滅然離目無見離耳無聞以此為心決定惑為色身之內不知此色身外洎山河大地皆妙明真心中物如影像重重皆鏡中物故認鏡者為悟中悟名正徧知認影者為悟中迷號性顛倒長沙岑云我若一向舉揚宗教法堂裏須草深一丈事不獲已向汝諸人道盡十方世界是沙門眼盡十方世界是沙門全身盡十方世界是自己光明盡十方世界在自己光明裏盡十方世界無一人不是自己我常向汝諸人道三世諸佛法界眾生是摩訶般若光光未發時汝等諸人向甚麼處委悉光未發時尚無佛無眾生消息何處得此山河國土來時有僧問如何是沙門眼沙曰長長出不得又曰成佛成祖出不得六道輪迴出不得僧曰未審出箇甚麼不得沙曰晝見日夜見星曰學人不會沙曰妙高山色青又青且道長沙此語指識精元明指寶明妙性試別白看譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡溟渤汝等即是迷中倍人如我垂手等無差別如來說為可憐愍者通曰知觀河之見必不生滅似屬於悟執觀河之見在色身內為悟中迷譬如棄海而認漚已是迷矣復執漚而盡海非迷之迷乎遺真性而認見聞已是迷矣復執見聞為不生滅性非迷之迷乎不悟而迷但一迷耳悟之而迷執情更深不尤倍於迷乎如我垂手汝見分別已是顛倒復乃首尾相換正倒錯會不尤倍於顛倒乎已在顛倒之中乃謂云何名為顛倒行事是顛倒中之顛倒也是迷中之迷也故曰迷中倍人二倍字相應徑山欽國師同忠國師在內庭坐次見帝駕來師起立帝曰師何以起師曰檀越何得向四威儀中見貧道帝悅又肅宗問忠國師在曹溪得何法師曰陛下還見空中一片雲麼帝曰見師曰釘釘著懸挂著帝又問如何是十身調御師乃立起曰會麼帝曰不會師曰與老僧過淨瓶來帝又曰如何是無諍三昧師曰檀越蹋略盧頂上行帝曰此意如何師曰莫認自己清淨法身帝又問師都不視之帝曰朕是大唐天子師何以殊不顧視師曰還見虗空麼帝曰見師曰他還眨眼視陛下否觀二師指示一以不得向四威儀中見貧道一以虗空還眨眼視陛下否何甞惑為色身之內此見與觀河之見天地懸殊當與須菩提見佛法身同名正徧知也大抵以念為知心則不徧馬鳴曰若心有動非真識知動相者念礙也離諸念礙若知乃徧阿難承佛悲救深誨垂泣叉手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地而我悟佛現說法音現以緣心允所瞻仰徒獲此心未敢認為本元心地願佛哀愍宣示圓音拔我疑根歸無上道佛告阿難汝等尚以緣心聽法此法亦緣非得法性如人以手指月示人彼人因指當應看月若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故豈惟亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故汝亦如是通曰阿難悟妙明心元所圓滿本非緣也常住心地本為主也然今瞻佛聽法尚屬緣心未知本元心地何由識認謂即此而是乎固不敢謂離此而有乎當何在佛將破其緣心之非而先示其所說之法亦緣也故謂此法亦緣非得法性法為見性而設見性則法無所用之金剛經云如筏喻者法尚應捨何況非法此復以指月喻見月則忘指可也古德引喻多與此合有曰彩雲影裏仙人現手把紅羅扇遮面急須著眼看仙人莫看仙人手中扇又曰一兔橫身當古路蒼鷹纔見便生擒後來獵犬無靈性只向枯樁舊處尋東坡文字有盲者問日何狀人以銅盤示之盲者敲之有聲他日聞鐘聲而以為日也其原蓋出於此有僧問法眼指即不問如何是月眼曰阿那箇是汝不問底指又僧問月即不問如何是指眼曰月僧曰學人問指和尚為甚麼對月眼曰為汝問指若明得法眼家風當下指月昭然不爾則當面錯過若以分別我說法音為汝心者此心自應離分別音有分別性譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主此亦如是若真汝心則無所去通曰現說法音是所緣者所緣者既不可執以為實分別法音是能緣者能緣者又豈可據以為真當其心與音遇分別歷然是分別亦暫耳猶之乎客及其心與音離分別都泯而分別之性不泯此性不以聽法而有不以不聽法而無故名主人於此見得方名見性若執聽法緣心以為自性是猶認客為主也大顛初參石頭頭問那箇是汝心顛曰見言語者是頭便喝出經旬日顛便問前者既不是除此外何者是心頭曰除却揚眉瞬目將心來顛曰無心可將來頭曰元來有心何言無心無心盡同謗顛於言下大悟異日侍立次頭曰汝是參禪僧是州縣白蹋僧顛曰是參禪僧頭曰何者是禪顛曰揚眉瞬目頭曰除却揚眉瞬目外將你本來面目呈看顛曰請和尚除却揚眉瞬目外鑒頭曰我除竟顛曰將呈了也頭曰汝既將呈我心如何顛曰不異和尚頭曰不關汝事顛曰本無物頭曰汝亦無物顛曰既無物即真物頭曰真物不可得汝心見量意旨如此大須護持石頭父子再四辨驗只要勘定真心原無所得是名真主云何離聲無分別性斯則豈惟聲分別心分別我容離諸色相無分別性如是乃至分別都無非色非空拘舍離等即末伽黎名昧為冥諦離諸法緣無分別性則汝心性各有所還云何為主通曰云何二字直貫下離諸法緣無分別性為一句分別聲分別色香味觸諸塵事業此皆前塵分別影事云何離諸前塵便無分別自性縱滅一切見聞覺知乃至分別都無內守幽閒非色非空此乃外道所執冥諦但能離境未能離法猶為法塵分別影事云何離諸法緣便無分別自性因前塵而有離前塵便無因法塵而有離法塵便無此分別性即各有還云何為主一動一靜皆屬於影影有還而鏡無還一去一來皆屬於客客有還而主無還不認鏡而認影不認主而認客則汝心性即同斷滅何者為常住真心乎大顛上堂夫學道人須識自家本心多見時輩秪認揚眉瞬目一語一默驀然印可以為心要此實未了吾今為汝分明說出各須聽受但除却一切妄運想念現量即是真心此心與塵境及守寂默時全無交涉即心是佛不待脩治何以故應機隨照泠泠自用窮其用處了不可得喚作妙用乃是本心大須護持不可容易大顛分明指出真主太煞洩漏即此可知與外道冥諦敻別外道二十五諦除冥諦是非色非空非心餘皆不出色心空也覺諦我心五知根五作業根心平等根及神我皆心也五塵五大皆色也五大中空大即空也最初一諦名為冥性計以為常第二十五諦名為神我亦計以為常思我聖境冥性即變二十三諦為我所用我所受用為境纏縛不得解脫我若不思冥諦不變即無纏縛我即解脫此其所宗也告子不得於言勿求於心不得於心勿求於氣渾然一冥諦脉路說者指為禪宗大非阿難言若我心性各有所還則如來說妙明元心云何無還惟垂哀愍為我宣說佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影汝應諦聽今當示汝無所還地阿難此大講堂洞開東方日輪升天則有明曜中夜黑月雲霧晦瞑則復昏暗戶牖之隙則復見通牆宇之間則復觀壅分別之處則復見緣頑虗之中徧是空性𡋯之象則紆昏塵澄霽斂氛又觀清淨阿難汝咸看此諸變化相吾今各還本所因處云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日暗還黑月通還戶牖壅還牆宇緣還分別頑虗還空𡋯還塵清明還霽則諸世間一切所有不出斯類汝見八種見精明性當欲誰還何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別諸可還者自然非汝不汝還者非汝而誰則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍通曰緣塵分別之見與見精明元有能所之辨見精明元與妙精明心有體用之分故妙精明心如真月見精明元如第二月緣塵分別如水中之月影矣明暗通塞八者太虗中止有此往來故曰不出斯類亦彷彿與八卦相符昏塵清淨乾坤之象也日明月暗坎離之象也通塞艮兌之象也分別屬動震之象也空性似風巽之象也其在人心通塞足該迷悟緣虗足該有無霽足該塵覺明暗足該聖凡盡乎其為境矣境有差別見無差別有差別者各還其所無差別者原自不動諸可還者境也物也非汝也不自汝而還於物者見也非物也實汝之真精也可還名客不還名主見精明元尚且如是況真心本妙明淨不落於見尤主中之主乎主中主者不生不滅根本也人人具足非自外來不自作主漂流為客亦猶不認真月而認水中月影以為自心其能免於生死淪溺乎哉僧問曹山古德道盡大地唯有此人未審是甚麼人山曰不可有第二月也曰如何是第二月山曰也要老兄定當曰作麼生是第一月山曰險只此一險字足見曹山不敢喪本受輪最親切處報慈文遂嘗究首楞嚴謁於法眼述己所業深符經旨眼曰楞嚴豈不是有八還義遂曰是曰明還甚麼曰明還日輪曰日還甚麼遂懵然無對自此服膺請益是可知主中主故非註疏所及端師子頌曰八還之教垂來久自古宗師各分剖直饒還得不還時也是蝦跳不出斗與前七微調同致亦同阿雖言我雖識此見性無還云何得知是我真性佛告阿難吾今問汝今汝未得無漏清淨承佛神力見於初禪得無障礙而阿那律此云如意見𨶒浮提樹名洲有此樹故名如觀掌中菴摩羅果此云難分別諸菩薩等見百千界十方如來窮盡微塵清淨國土無所不矚眾生洞視不過分寸阿難且吾與汝觀四天王所住宮殿中間徧覽水陸空行雖有昏明種種形象無非前塵分別留礙汝應於此分別自他今吾將汝擇於見中誰是我體誰為物象阿難極汝見源從日月宮是物非汝至七金山周徧諦觀雖種種光亦物非汝漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性通曰初阿難問妙明元心云何無還佛以真心無朕難可指陳故託見精方便開示見精切近於真如第二月然此見亦妄將亦須還唯有真月所喻真性誠不還爾下文云見見之時見非是見豈非此見亦可還乎阿難雖識見精無還已悟第二月義云何得知是我真性正欲根究第一月義此無還性當何方便使我自知自信乎佛仍以見精別白示之所見是物能見是汝物有差殊見無差殊無差殊者見精也清淨所矚雖係淨色根清淨四大所矚然亦由清淨本然性體發起不假造作則自妙而明謂之見性矣見精既為汝之真見見性不為汝之真性乎故曰此精妙明誠汝見性夫性一而已矣見精所及容有不齊則能盡性與不盡性之別也有佛眼者十方如來窮盡微塵清淨國土無所不矚是也有法眼者諸菩薩等見百千界是也有慧眼者須菩提見佛法身是也有天眼者阿那律見閻浮提如觀掌果是也有肉眼者眾生洞視不過分寸是也阿難未得無漏清淨承佛神力見於初禪肉眼而天者也五眼所見不同其能見者無二故曰無差殊也必至佛眼窮盡微塵然後滿其見性之量僧問雲門如何是祖師西來意門云日裏看山投子頌曰坦然曾問老師安爭似韶陽一句傳日裏看山仙掌露夜深猿呌月當軒且道此日裏看山指見精指見性與祖師西來意作何解會雲居智曰清淨之性本來湛然無有動搖不屬有無非可取捨體自翛然如是明見乃名見性性即佛佛即性故曰見性成佛曰性既清淨不屬有無因何有見曰見無所見曰既無所見何更有見曰見處亦無曰如是見時是誰之見曰無有能見者曰究竟其理如何曰妄計為有即有能所乃得名迷隨見生解便墮生死明見之人即不然終日見未嘗見求名處體相不可得能所俱絕名為見性曰此性徧一切處否曰無處不徧曰凡夫具否曰上言無處不徧豈凡夫而不具乎曰因何諸佛菩薩不被生死所拘而凡夫獨繫此苦何曾得徧曰凡夫於清淨性中計有能所即墮生死諸佛大士善知清淨性中不屬有無即能所不立曰若如是說即有能了不了人曰了尚不可得豈有能了人乎曰至理如何曰我以要言之汝即應念清淨性中無有凡聖亦無了不了人凡之與聖二俱是名若隨名生解即墮生死若知假名不實即無有當名者又曰此是極究竟處若曰我能了彼不能了即是大病見有淨穢凡聖亦是大病作無凡聖解又屬撥無因果見有清淨性可棲止亦大病作不棲止解亦大病然清淨性中且不壞方便應用及興慈運悲如是興運之處即全清淨之性可謂見性成佛矣雲居此語却於見猶離見最切故備錄之若見是物則汝亦可見吾之見若同見者名為見吾吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝通曰佛果舉阿難意世界燈籠露柱皆有名相見精明元喚作甚麼物願令我見佛意我見香臺時你作麼生阿難言我亦見香臺即是見佛見處佛言我見香臺則可知我若不見香臺時你作麼生阿難言我亦不見香臺即是見佛不見處佛言汝云不見自是汝知他人不見處你如何得知古人到這裏只可自知與人說不得只如世尊道吾不見時如羚羊掛角聲響蹤跡氣息都絕你向甚麼處摸索雪竇頌云全象全牛瞖不殊從來作者共名摸如今要見黃頭老剎剎塵塵在半途雪竇出教眼單頌見佛天童深得經意頌出真見頌云滄海瀝乾太虗充滿衲僧鼻孔長古佛舌頭短珠絲度九曲玉機纔一轉直下相逢誰識渠始信斯人不合伴此則機緣兩重公案極口發揮止道得一半又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立阿難若汝見時是汝非我見性周徧非汝而誰云何自疑汝之真性性汝不真取我求實合論曰此段經義生於云何得知是我真性一句故世尊開示不見之相者使了知真性不當更求分別馬鳴曰一切如來皆是法身無有彼此差別互相見故故曰若見不見自然非彼不見之相言非彼者非世尊不見之相但是阿難不見之相耳然則世尊不見之地亦非阿難不見但是世尊能見故曰若不見吾不見之地自然非物言非物者非是世尊之見但是阿難不見之相耳倘世尊亦見阿難之見阿難亦見世尊之見則清淨性見宛成有形之物故曰體性紛雜不成安立此不見之地即本根之地決不可見譬種樹者日取其根而視之樹其能有生乎傅大士偈曰有物先天地無形本寂寥能為萬象主不逐四時凋只此數語分明指出真性非見所及乃第一月義非徒謂見精明元不可見而已通曰此段經文轉折最妙無非發明此精妙明誠汝見性何言乎此見是汝非物也以此見性非是物故若見是物則吾之見汝亦可見然吾之見汝必不可得而見也若謂我見汝見同見之時即為見吾之見則吾見時既為可見吾不見時亦為可見而何為其不然也若謂見時以見見其不見時以不見見名為見吾不見之處既自不見云何見彼不見之相使彼不見之相為汝所見宛是見相又非不見之相矣是不見之地決不可得而見也不見之時既非可見則同見之時亦非可見見與不見俱無可指吾見非是物明矣吾見既非是物則汝見亦非是物明矣汝見既非是物則不屬於物矣云何非汝此即不可見以辨其非物也設使可見見亦物耳何能為萬象之主而安立世間矣乎故有無形而後能形形有無物而後能物物吾之見汝之見既非是物莫可端倪徧周法界無欠無餘有情無情皆由此建立乃所謂真性也性不汝真必見不屬汝乃可而見則屬汝非我云何自疑其非真而取我求實乎使我可與汝者決非真也僧問上藍超禪師如何是上藍本分事藍云不從千聖借豈向萬機求僧云不借不求時如何藍云不可拈放闍黎手裏得麼丹霞頌云一片靈明本妙圓箇中非正亦非偏寶峯瑞草無根蒂不待春功色自鮮悟此則知真性本無物無物則無雜無雜故物我同原渾然具足若向他人求覓得者皆非也阿難白佛言世尊若此見性必我非餘我與如來觀四天王勝藏寶殿居日月宮此見周圓徧娑婆國此云堪忍退歸精舍秪見伽藍此云眾園清心戶堂但瞻簷廡世尊此見如是其體本來周徧一界今在室中唯滿一室為復此見縮大為小為當牆宇夾令斷絕我今不知斯義所在願垂宏慈為我敷衍佛告阿難一切世間大小內外諸所事業各屬前塵不應說言見有舒縮譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不定者在方器中應無方空汝言不知斯義所在義性如是云何為在阿難若復欲令入無方圓但除器方空體無方不應說言更除虗空方相所在若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築牆宇能夾見斷穿為小竇寧無續跡是義不然一切眾生從無始來迷己為物失於本心為物所轉故於是中觀大觀小若能轉物則同如來身心圓明不動道場於一毛端徧能含受十方國土通曰阿難謂見性周徧必我非餘則我所見應同佛眼何為居日月宮徧娑婆界今在室中唯滿一室此見舒縮大小不同何得謂無差殊不知大小由塵非關見性譬之方圓因器不在虗空對器明空似有方圓之相但除其器而空即無方圓可指緣塵辨見似有舒縮之形俱離其塵而見即無舒縮可得見隨塵轉如辨空者不於太虗祗狃於一器之內故於是中觀大觀小是迷己為物者也若能轉物則一切色皆佛色一切見皆佛見一亘晴空物無障礙故曰身心圓明惟其圓也一即一切故於一毛端徧能含受十方國土又何佛眼之不同乎僧問黃檗既云性即見見即性秪如性自無障礙無劑限云何隔物即不見又於虗空中近即見遠即不見者如何檗云此是你妄生異見若言隔物不見無物言見便謂性有隔礙者全無交涉性且非見非不見法亦非見非不見若見性人何處不是我之本性所以六道四生山河大地總是我之性淨明體故云見色便見心色心不異故秪為取相作見聞覺知去却前物始擬得見者即墮二乘人中依通見解也虗空中近則見遠則不見此是外道中收分明道非內亦非外非近亦非遠近而不可見者萬物之性也近尚不可見更道遠而不可見有什麼意旨鏡清問僧門外是什麼聲僧云雨滴聲清云眾生顛倒迷己逐物僧云和尚作麼生清云洎不迷己僧云洎不迷己意旨如何清云出身猶可易脫體道應難雪竇頌云虗堂雨滴聲作者難酬對若謂曾入流依前還不會會不會南山北山轉滂霈此可謂徧界不曾藏也僧問谷隱聰禪師若能轉物即同如來萬象是物如何轉得聰曰吃了飯無些子意智若有意智即為物轉也又僧問韶國師如何是轉物即同如來韶曰汝喚甚麼作物曰恁麼則即同如來也韶曰莫作野干鳴擬同如來即千里萬里有僧問趙州十二時中如何用心州曰汝被十二時辰使老僧使得十二時是真能轉物者白雲端頌云若能轉物即如來春暖山華處處開自有一雙窮相手不曾容易舞三臺真如喆頌云若能轉物即如來處處門開見善財華柳巷中呈舞戲九衢乘醉臥樓臺於一毛端徧能含受十方國土佛眼則可眾生其能爾乎江州刺史李渤問歸宗曰教中所言須彌納芥子渤即不疑芥子納須彌莫是妄談否宗曰人傳使君讀萬卷書籍還是否曰然宗曰摩頂至踵如椰子大萬卷書向何處著李俛首而已即此推之眾生心量與如來奚以異阿難白佛言世尊若此見精必我妙性今此妙性現在我前見必我真我今身心復是何物而今身心分別有實彼見無別分辨我身若實我心令我今見見性實我而身非我何殊如來先所難言物能見我唯垂大慈開發未悟通曰前云認物為己此云迷己為物前就妄擇真即自身皆謂之物今以真融妄即萬物莫非己也就妄擇真言己與物異猶自可辨以真融妄言物與己同其實難解故阿難言若能轉物則同如來即此見精周徧法界所見山河皆我妙性矣今此妙性現在我前若現前之見既我真性我今貼體身心復是何物若謂身心非性而今身心則實能分別矣若謂現前皆性則彼見何為不能分辨我身也若謂彼見無形渾然與物同體實為我之本心有感而動令我現今能見則見性實我充滿現前而塊然一身非復為我矣何殊如來先所難言汝既見物物亦見汝此見亦乃在外而何謂為我真性耶據阿難見處似窺得寂滅現前之旨但我見未除光未透脫面前隱隱有物故未能融物我泯是非耳石頭因看肇論至會萬物為己者其唯聖人乎乃拊几歎曰聖人無己靡所不己法身無象誰云自他圓鑑靈照於其間萬象體玄而自現鏡智非一孰云去來至哉斯語也後僧問長沙如何轉得山河國土歸自己去沙曰如何轉得自己成山河國土去曰不會沙曰湖南城下好養民米賤柴多足四鄰僧無語沙示偈曰誰問山河轉山河轉向誰圓通無兩畔法性本無歸讀二尊宿語而疑阿難之疑者可渙然氷釋矣佛告阿難今汝所言見在汝前是義非實若實汝前汝實見者則此見精既有方所非無指示且今與汝坐祇陀林徧觀林渠及與殿堂上至日月前對恒河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著若必其見現在汝前汝應以手確實指陳何者是見阿難當知若空是見既已成見何者是空若物是見既已是見何者為物汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑阿難言我今於此重閣講堂遠洎恒河上觀日月舉手所指縱目所觀指皆是物無是見者世尊如佛所說況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性佛言如是如是佛復告阿難如汝所言無有見精離一切物別有自性則汝所指是物之中無是見者今復告汝汝與如來坐祇陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見阿難言我實徧見此祇陀林不知是中何者非見何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空我又思惟是萬象中微細發明無非見者佛言如是如是通曰阿難既知指皆是物無是見者則我身心外洎山河無見性可指何謂今此妙性現在我前既又知萬象中無非見者則我身心外洎山河無非見性何謂見性實我而身非我世尊姑就彼自為發揮前疑頓釋昔子昭首座問法眼和尚開堂承嗣何人眼云地藏昭云大辜負長慶先師眼云某甲不會長慶一轉語昭云何不問眼云萬象之中獨露身意作麼生昭乃豎起拂子眼云此是長慶處學得底首座分上作麼生昭無語眼云只如萬象之中獨露身是撥萬象不撥萬象昭云不撥眼云兩箇參隨左右皆云撥萬象眼云萬象之中獨露身聻後子方上座亦自長慶至眼亦舉前話方亦舉拂子眼曰恁麼又爭得方曰和尚尊意如何眼曰喚甚麼作萬象方曰古人不撥萬象眼曰萬象之中獨露身說甚麼撥不撥方忽悟法眼前話此等機緣原從地藏處得來如何不嗣地藏眼初與紹脩法進三人至地藏附爐次舉肇論至天地與我同根處藏曰山河大地與上座自己是同是別眼云別藏豎起兩指眼曰同藏又豎起兩指便起去雪霽三人辭去藏門送之問曰上座尋常說三界唯心萬法唯識乃指庭下片石曰且道此石在心內在心外眼曰在心內藏曰行脚人著甚麼來由安片石在心頭眼窘無以對即放包依席下求決擇近一月餘日呈見解說道理藏曰佛法不恁麼眼曰某甲詞窮理絕也藏曰若論佛法一切現成眼於言下大悟始信長慶處學底未在天童頌曰離念見佛破塵出經現成家法誰立門庭月逐舟行江練淨春隨草上燒痕青撥不撥聽叮嚀三徑就荒歸便得舊時松菊尚芳馨取此則公案與此段經文反覆詳味不知郭象註莊子莊子註郭象於是大眾非無學者聞佛此言茫然不知是義終始一時惶悚失其所守如來知其魂慮變慴心生憐愍安慰阿難及諸大眾諸善男子無上法王是真實語如所如說不誑不妄非末伽黎四種不死矯亂論議汝諦思惟無忝哀慕通曰茫然不知是義始終始則見不是物終則見無非物始則妙性現前終則無可指陳故茫然失其所守也是真實語云云即金剛般若五語佛真語者與二乘共也實語者與菩薩共也如語者不共無實無虗無虗故不誑語無實故不異語懸見未然曰不異此但以不妄總之婆娑論外道計天常住名為不死計不亂答得生彼天若實不知而輙答者恐成矯亂故有問時答言祕密言詞不應皆說或不定答佛訶云此真矯亂詳見第十卷世尊因外道問昨日說何法曰說定法外道曰今日說何法曰不定法外道曰昨日說定法今日何說不定法世尊曰昨日定今日不定且道世尊此語如所如說是矯亂語參是時文殊師利法王子愍諸四眾在大眾中即從座起頂禮佛足合掌恭敬而白佛言世尊此諸大眾不悟如來發明二種精見色空是非是義世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖非是疇昔善根輕鮮唯願如來大慈發明此諸物象與此見精元是何物於其中間無是非是佛告文殊及諸大眾十方如來及大菩薩於其自住三摩地中此云正定見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是通曰文殊七佛之師慣說如來禪要世尊發明此諸物象與此見精元是何物世尊前云不知色身外洎山河虗空大地咸是妙明真心中物已明明說破何容更說但於其中撥萬象則有非相不撥萬象則有是相是非二相最為微細惟真見無上菩提妙淨明體方有出身之路妙淨明體即菩薩自住三摩地也住此定中敻脫根塵故見與見緣俱不可得色空為見緣乃至想相為意緣屬六塵見聞覺知屬六識證菩提者不但所空能亦空故曰本無所有能所俱空此見及緣當體寂滅即是菩提妙淨明體不容擬議不容分別一切智智清淨無二無二分無斷無別故何得於中分別之曰此是見此非見乎若強生是非即同翳眼妄見空華於菩提真性有何干涉石霜初參道吾問如何是觸目菩提吾乃喚沙彌彌應諾吾云添淨瓶水著良久却問霜適來問甚麼霜擬舉吾便歸方丈霜乃有省丹霞頌云垂手還他作者機尋常語裏布鎗旗重詢擬進歸方丈一句分明更不疑要知不疑底道理須問石霜始得後來有僧問石霜咫尺之間為甚麼不覩師顏霜隔窗應曰我道徧界不曾藏僧又舉問雪峰徧界不曾藏意旨如何峯曰甚麼處不是石霜霜聞曰這老漢著甚死急峯聞曰老僧罪過只多此一是字引人入情解窟裏便遭石霜砭剝毫釐之間非具眼者莫辨文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相通曰我真文殊答第一義例立菩提妙淨明體也無是文殊答第二義例破色空是見也非無文殊答第三義例破色空非見也若謂色空是真見者斯乃從妄辨真對於無妄之真則成二義故曰若有是者則二文殊若謂色空非真見者其如妄境全體是真故曰然我今日非無文殊洛浦示疾告眾曰今有一事問汝等若道這箇是即頭上安頭若道不是即斬頭求活第一座曰青山常舉足日下不挑燈浦曰是甚麼時節作這箇語話時有彥上座對曰離此二途請和尚不問浦曰未在更道曰彥從道不盡浦曰我不管你盡不盡曰彥從無從者秪對和尚浦便休脩山主偈曰是柱不見柱非桂不見柱是非已去了是非裏薦取於此二則透脫則是非可泯昔豐干欲遊五臺問寒山拾得曰汝共我去遊五臺便是我同流若不共我去遊五臺不是我同流山曰你去五臺作甚麼曰禮文殊山曰你不是我同流干獨入五臺逢一老人便問莫是文殊麼曰豈可有二文殊干作禮未起忽然不見趙州代云文殊文殊又文殊三處過夏迦葉欲白槌擯出纔拈槌乃見百千萬億文殊迦葉盡其神力槌不能舉世尊遂問迦葉汝擬擯那箇文殊迦葉無對天童拈云金色頭陀有心無膽當時盡令而行莫道百千萬億文殊秪是這黃面瞿曇也須擯出若能如是不唯壁立真風亦令後人知我衲僧門下著你閑佛祖不得快哉快哉須知是見得即菩提妙淨明體亦無著處何得有是非二相來佛言此見妙明與諸空塵亦復如是本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月誰為是月又誰非月文殊但一月真中間自無是月非月通曰本是妙明無上菩提淨圓真心妄為色空及與聞見與前晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性生起略同皆妄想為之祟也妄想即是病根如揑目故本一妙明真心以妄想分別見謂有色空聞見此見與見緣豈能離真心而自為體既名之曰色空聞見去真心遠矣譬之本一真月以揑目分別見謂有第二月此第二月豈能離真月而自為體既名之曰第二月去真月遠矣故於色空聞見妄為卜度以為即真心乎不可以為非真心乎不可以妄辨真真隨妄轉譬之於第二月妄為卜度以為是月乎不可以為非月乎不可以揑辨月月隨揑轉是心本真也隨妄想變如月本真也隨揑目變但除妄想只一妙淨明體不見有色空不見有聞見是非從何而立但除揑目只一月真不見有第二月是非從何而起此即上文我真文殊於中實無是非二相故曰亦復如是昔雲巖掃地次道吾云太區區生巖云須知有不區區者吾曰恁麼則有第二月也巖提起掃云這箇是第幾月吾便休去玄沙別云正是第二月長慶云被他倒轉掃攔面𢷾又作麼生沙休去雲門云奴見婢殷勤天童頌云借來聊爾了門頭得用隨宜即便休象骨巖前弄蛇手兒時做處老知羞雪峯曾示眾云南山有一條鼈鼻蛇汝等諸人切須好看雲門以杖攛向面前作怕勢此豈不是奴見婢殷勤與雲巖提起掃何以異故曰老知羞也西園藏禪師一日自燒浴次僧問何以不使沙彌園撫掌三下僧舉似曹山山曰一等是拍手撫掌就中西園奇怪俱胝一指頭禪蓋為承當處不諦當僧却問西園撫掌豈不是奴兒婢子邊事山曰是曰向上更有事也無山曰有曰如何是向上事山叱曰這奴兒婢子看諸老宿恁般提唱政恐人認奴作郎落在第二月見解是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是真精妙覺明性故能令汝出指非指通曰若未見性性在見中同名見精種種妄想分別豈能出是非是若能見性性脫於見不名見聞覺知一切分別都無故能出指非指不能於中出是非是如第二月誰為是月又誰非月故能令汝出指非指但一月真中間自無是月非月物為所指即前云指皆是物是也見非所指即前云無是見者是也阿難雖能發明是塵非見是塵即見二種義猶為是非所縛不能出離良由不知是義所歸歸於見性也若見真精妙覺明性則此見及緣本無所有安所容其指乎此見及緣元是菩提妙淨明體安所容其非指乎於其中間無是非是方有出身之路出字最有味所以能出者必此之由也故曰由是指歸必見性乃可耳僧問韶山是非不到處還有句也無山曰有僧云是甚麼句山曰一片白雲不露醜天童拈云通身迴獲不觸尊嚴退位傍提要當宛轉還見韶山相為處麼盡力推爺向裏頭洞山偈曰青山白雲父白雲青山兒白雲終日倚青山總不知韶山云一片白雲不露醜本此有僧問九峯虔侍者如何是外紹峯云不借別人家裏事如何是內紹峯曰推爺向裏頭天童云盡力推爺向裏頭本此又投子頌云白雲不到中峯頂滿目煙霞景象殊一句曲寒千古調萬重青碧月來初要知妙覺明性出是非是如第一月須究竟曹洞宗旨方得其妙阿難白佛言世尊誠如法王所說覺緣徧十方界湛然常住性非生滅與先梵志此云外道娑毗迦羅所談冥諦及投灰等習定灰凝諸外道種說有真我徧滿十方有何差別世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常說自然我說因緣非彼境界我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣與彼自然云何開示不入羣邪獲真實心妙覺明性通曰外道所談冥諦體非生滅說有神我徧滿十方但以八識為宗止得杳杳冥冥趣味非有大圓鏡智之妙也既有神我即是生死根本豈得為正因乎佛言正因即第一義諦以不生不滅為本脩因非世俗因緣之謂也阿難方信忽疑曰似非因緣與彼自然而猶以覺性為自然者謂覺性遠離是非二相湛然常住名為自然向者執觀河之見為不生滅既未達本今者指離見之性以為自然尤未超脫故願世尊開示不入一切因緣自然虗妄顛倒之邪見也長沙岑令僧問會和尚未見南泉時如何會良久僧云見後如何會云不可別有也僧回舉似沙沙云百尺竿頭坐底人雖然得入不為真百尺竿頭須進步十方世界現全身僧云百尺竿頭如何進步沙云朗州山澧州水僧云不會沙云四海五湖王化裏天童頌云玉人夢破一聲雞轉盼生涯色色齊有信風雷催出蟄無言桃李自成蹊及時節力耕犂誰怕春疇沒脛泥只如會坐在潔淨地不能入泥入水撒手橫行便是與生滅對故雖得入而非真也外道所云冥諦大率似此長沙云十方世界是全身外道亦說有神我徧滿十方何處不同試參看佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然阿難若必自然自須甄明有自然體汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明通曰自然云者謂自體本然常住不變也即此妙明見性以見明為自然乎以見暗為自然乎以見空見塞為自然乎若自然見明應不見暗自然見空應不見塞若隨緣而變便非自然之體或謂見者其自然之體也明暗空塞隨感而見豈不自然設無明暗空塞見將安施所謂自然者渾成斷滅矣此但破見性不可以自然名非謂見性自明暗空塞而有也若論生起之自見性雖不因明暗空塞而有却自本覺妙明而出然則本覺妙明又以何為自真開口不得也石霜初在溈山作米頭一日篩米次溈曰施主物莫拋撒霜曰不拋撒溈於地上拾得一粒曰汝道不拋撒這箇是甚麼霜無對溈又曰莫輕這一粒百千粒盡從這一粒生霜曰百千粒從這一粒生未審這一粒從甚處生溈呵呵大笑歸方丈溈至晚上堂曰大眾米裏有蟲諸人好看夫求其生出之自不可得也何處更安立此自然之名乎故謂為自然者非也阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性通曰阿難甞聞世尊以因緣破自然今此見性既非自然必屬因緣却疑因緣之義無常生滅此有彼無體非常徧豈同覺性湛然常住行相相違云何合因緣性此疑甚微中觀論曰無物從緣起無物從緣滅起唯諸法起滅唯諸法滅譬如畫水成文未甞生滅庶幾合矣報恩明禪師甞舉雪峰墖銘問諸老宿夫從緣有者始終而成壞非從緣有者歷劫而長堅堅之與壞即且置雪峰今日在甚麼處法眼別云秪今是成是壞時老宿莫能對者此豈可以淺近窺乎佛言汝言因緣吾復問汝汝今因見見性現前此見為復因明有見因暗有見因空有見因塞有見阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞當知如是精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法汝今云何於中措心以諸世間戲論名相而得分別如以手掌撮摩虗空秪益自勞虗空云何隨汝執捉通曰假物為因循物為緣因親緣疎故分二門現前見性謂因明暗空塞而顯則可謂因明暗空塞而有則不可謂緣明暗空塞而用則可謂緣明暗空塞而起則不可故謂為因緣者非也何以故精覺妙明本無相故若謂為因緣為自然即屬因緣自然之相故始而曰非因非緣亦非自然遣相也猶有非相在故繼之曰非不因緣非不自然遣非相也猶有不非相在故終之曰無非與不非無是與非是是非俱不到之地不容擬議不容測度即精覺妙明實相也彼是非等相皆是妄情徧計分別妙明本體原無是事故曰離一切相徧計既離則圓成實體觸處現前故曰即一切法古德云但離妄緣即如如佛此之謂也昔疎山到溈山懶安處便問承師有言有句無句如藤倚樹忽然樹倒藤枯句歸何處溈山呵呵大笑疎山云某甲四千里賣布單來和尚何得相弄溈喚侍者取錢還這上座遂囑云向後有獨眼龍為子點破去在後到明招舉前話昭云溈山可謂頭正尾正只是不遇知音疎便問樹倒藤枯句歸何處昭云更使溈山笑轉新疎於言下有省乃云溈山元來笑裏有刀天童頌云藤枯樹倒問溈山大笑呵呵豈等閑笑裏有刀窺得破言思無路絕機關先後溈山到這裏只有呵呵大笑如一印印出疎山曰笑裏有刀却捉得虗空也石鞏問西堂汝還解捉得虗空麼堂曰捉得鞏曰作麼生捉堂以手撮虗空鞏曰汝不解捉堂却問師兄作麼生捉鞏把西堂鼻孔拽堂作忍痛聲曰大煞拽人鼻孔直欲脫去鞏曰直須恁麼捉虗空始得故以戲論名相而捉虗空者大難大難阿難白佛言世尊必妙覺性非因非緣世尊云何常與比丘宣說見性具四種緣所謂因空因明因心因眼是義云何佛言我說世間諸因緣相非第一義阿難吾復問汝諸世間人說我能見云何名見云何不見阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見阿難若無明時名不見者應不見暗若必見暗此但無明云何無見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見若復二相自相凌奪非汝見性於中暫無如是則知二俱名見云何不見通曰此世尊先破世間因緣之相後顯第一義諦也世間以見因緣日月燈光而有如無日月燈光夫豈無見見暗與見明等耳明暗自屬前塵見精原無生滅由此言之世間之見且非因非緣也況進此者乎九峯虔禪師受印於石霜僧問教中有言三光緣就始成其見三光未就還成見否虔曰緣有差殊見無虧損僧云既無虧損暗中為甚麼不見物虔曰雖不見物寧無見暗僧云離却三緣如何是真見處虔曰匝地日頭黑似漆石頭參同契曰當明中有暗勿以暗相遇當暗中有明勿以明相睹正同此旨此是何等明暗須具眼者別之是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞四義成就汝復應知見見之時見非是見見猶離見見不能及云何復說因緣自然及和合相通曰此世尊顯出第一義諦所謂妙菩提路也見與見緣具五種義明暗空色為四種見緣見精為一種見妄世尊於此分擇見精非前明暗空色之相以四義推之成就見精離塵而有即於此分擇真見照了見精非見精所及此第一月也故以見精為妄嗚呼見猶離見何處有影響氣息乃從而描摸之曰因緣曰自然曰和合豈不妄哉百丈問僧見否曰見丈曰見後如何曰見無二丈曰既云見無二不以見見於見若見更見為前見是為後見是如云見見之時見非是見見猶離見見不能及所以不行見法不行聞法不行覺法諸佛疾與授記又寶積經云法身不可以見聞覺知求非肉眼所見以無色故非天眼所見以無妄故非慧眼所見以離相故非法眼所見以離諸行故非佛眼所見以離諸識故若不作如是見是名佛見昔紹隆禪師初謁長蘆得其大略有傳圜悟語至者隆讀之歎曰想酢生液雖未洗腸沃胃要且使人慶快恨未領謦欬耳遂由寶峯依湛堂客黃龍叩死心次謁圜悟一日入室次悟問曰見見之時見非是見見猶離見見不能及舉拳曰還見麼隆曰見悟曰頭上安頭隆聞脫然契證悟叱曰見箇甚麼隆曰竹密不妨流水過悟肯之俾掌藏教有問悟曰隆藏主柔易若此何能為哉悟曰瞌睡虎耳德山涓禪師上堂見見之時見非是見見猶離見見不能及遂喝曰鯨吞海水盡露出珊瑚枝眾中忽有箇衲僧出來道長老休寱語却許伊具一隻眼古人於此章句往往因指見月一粒仙丹點化凡骨大不容易汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟無得疲怠妙菩提路通曰清淨實相人人具足何故聲聞不能通達以有執著故執著意識處處能緣唯不能緣於般若故世尊愍之令善思惟當於見而離見證妙菩提則非見之所及也夾山云目前無法意在目前不是目前法非耳目之所到妙契乎此天童拈云夾山老子解開布袋頭將差珍異寶撒向諸人面前也正當恁麼時作麼生路不拾遺君子稱美只如這般好話頭尚不許留於胸次間正是見猶離見實詣處阿難白佛言世尊如佛世尊為我等輩宣說因緣及與自然諸和合相與不和合心猶未開而今更聞見見非見重增迷悶伏願宏慈施大慧目開示我等覺心明淨作是語已悲淚頂禮承受聖旨爾時世尊憐愍阿難及諸大眾將欲敷演大陀羅尼此云總持諸三摩提此云正受妙脩行路告阿難言汝雖強記但益多聞於奢摩他微密觀照心猶未了汝今諦聽吾當為汝分別開示亦令將來諸有漏者獲菩提果通曰寂而常照故能照了見精是妄照而常寂故知見非是見此非平日三觀圓融未易了此石門蘊輝師在青林作園頭一日侍立次林曰子今日作甚麼來曰種菜來林曰徧界是佛身子向甚處種對曰金鋤不動土靈苗在處生林欣然來日入園喚蘊闍黎蘊應諾林曰剩栽無影樹留與後人看蘊曰若是無影樹豈受栽耶林曰不受栽且止你曾見他枝葉麼曰不曾見林曰既不曾見爭知不受栽曰秪為不曾見所以不受栽林曰如是如是若悟得見猶離見則一切因緣自然和合因見而立者從何而生哉智炬禪師初問先曹山曰古人提持那邊人學人如何體悉山曰退步就己萬不失一炬於言下頓忘玄解乃辭去徧參至三祖因看經次僧問禪僧心不挂元字脚何得多學炬曰文字性異法法體空迷則句句瘡疣悟則文文般若苟無取捨何害圓伊故多聞強記若智炬者可也阿難一切眾生輪迴世間由二顛倒分別見妄當處發生當業輪轉云何二見一者眾生別業妄見二者眾生同分妄見通曰將明見精是妄故以別業妄見及同分妄見分別開示知別業之為妄而同分之妄可以例知知同分之為妄而見精之妄可以例知知見精之為妄而見見者不妄可以例知悉此則見非是見可自洞然無疑矣見聞覺知同為虗妄顛倒而獨詳辨於見者何前云使汝流轉心目為咎故流逸奔色惟見難制阿難為摩登所惑匪摩登能惑阿難由阿難見妄為病耳況此見妄流思原屬生滅而真見無還湛然常住故以盲人之見見色則色無可好以見暗之見見明則見本非緣直達見見之源了知非見所及又何流轉之咎哉昔溈山問仰山大地眾生業識茫茫無本可據子作麼生知他有之與無仰曰慧寂有驗處時有一僧從面前過仰召曰闍黎僧回首仰曰和尚這箇便是業識茫茫無本可據溈曰此是師子一滴乳迸散六斛驢乳天童頌云一喚回首識我不依稀羅月又成鉤千金之子纔流落漠漠窮途有許愁即此一則謂之別業妄見可也又陳操尚書與僚屬登樓次見數僧行來有一官人曰來者總是行脚僧操曰不是曰焉知不是操曰待來勘過須臾僧至樓前操驀然喚上座僧皆舉首公謂諸官曰不信道官罔措天童拈曰陳尚書當面白拈瞞長蘆一點不得即此一則謂之同分妄見可也若其中有箇漢呼喚不回頭當令仰山吐舌陳操謝過云何名為別業妄見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊於意云何此夜燈明所現圓光為是燈色為當見色阿難此若燈色則非眚人何不同見而此圓影唯眚之觀若是見色見已成色則彼眚人見圓影者名為何等復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影是故當知色實在燈見病為影影見俱眚見眚非病終不應言是燈是見於是中有非燈非見如第二月非體非影何以故第二之觀揑所成故諸有智者不應說言此揑根元是形非形離見非見此亦如是目眚所成今欲名誰是燈是見何況分別非燈非見通曰將明見非是見故以目眚為喻目眚見病故妄見圓影彼無眚者即不見有圓影是眚為病而見眚者未甞病也以例見精是妄故妄見心境彼無妄者即不見有心境是見為妄而見見者未甞妄也若於妄見心境重起因緣自然是非之見譬猶於眚見圓影而窮其生出之根元也以為是燈是見謂圓影由燈見而有即因緣義以為非燈非見謂圓影離燈見而有即自然義既非因緣又非自然但目眚所成耳此眚見圓影與揑見二月同一見病若根究此月生處是形是見又謂之曰離形離見不足以言智乃於圓影名為是燈是見又從分別非燈非見其可以為智乎即此二者明知是妄推求因緣自然之義尚不可得何況本覺明心非眚非揑原無圓影二月之相何處安立因緣自然之戲論乎故以因緣自然和合而論見精者猶之乎眚也智者不應如此故名為別業妄見溈山甞見野火問道吾還見火麼吾曰見山曰從何處起吾曰除去行住坐臥請師別致一問來山休去佛鑑拈云炎炎野火人人皆見獨有道吾見得迥別又香林遠鉏草次有一僧曰看俗家失火遠曰那裏火僧曰不見那遠曰不見僧曰這瞎漢是時一眾皆言遠上座敗闕後明教寬聞舉歎曰須是我遠兄始得此見迥別不離正位與世間見精如病眚者不可同日而語矣又溈山問道吾甚麼處去來吾曰看病來山曰有幾人病吾云有病者不病者山云不病者莫是智頭陀麼吾云病與不病總不干他事速道速道山云道得也沒交涉天童於沒交涉處頌云妙藥何曾過口神醫莫能捉手若存也渠本非無至虗也渠本非有不滅而生不亡而壽全超威音之前獨步劫空之後成平也天蓋地擎運轉也烏飛兔走此則於真見中拔除病本即病與不病且沒交涉何況分別是眚非眚云何名為同分妄見阿難此閻浮提除大海水中間平陸有三千洲正中大洲東西括量大國凡有二千三百其餘小洲在諸海中其間或有三兩百國或一或二至於三十四十五十阿難若復此中有一小洲祗有兩國唯一國人同感惡緣則彼小洲當土眾生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦彗孛飛流負耳虹蜺種種惡相但此國見彼國眾生本所不見亦復不聞合論曰暈氣環日也適所謂適見於日月之災珮玦近日氣狀如之彗所謂掃星偏指曰彗芒氣四出曰孛飛星自下而升者流星自上而降者負氣背日如負者耳氣旁日如耳者虹蜺螮蝀也明者虹暗者蜺春秋傳曰魯哀公六年楚有雲如赤烏夾日以飛三日楚子使問諸周太史史曰其當王身乎杜預注曰日為人君妖氣守之故以為王身雲在楚上唯楚見之故禍不及他國又魯昭公二十六年冬十一月齊有彗星齊候使禳之晏子曰無益也祗取誣焉天道不慆不貳其命若之何禳且天道之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損杜預注曰出齊之分野也不書魯不見以是驗有一小洲秪有兩國唯一國人同感惡緣則彼小洲當土眾生覩諸一切不祥境界明矣通曰惡緣之感有定業有不定業定業決不可逃不定者未始不可移也如二十三祖鶴勒那尊者預知二十四祖師子尊者有難一日忽指東北問曰是何氣象師子曰我見氣如白虹貫乎天地復有黑氣五道橫亘其中祖曰其兆云何曰莫可知矣祖曰吾滅後五十年北天竺國當有難起嬰在汝身後師子尊者果為罽賓國王所殺王之右臂旋亦墮地七日而終太子光首歎曰我父何故自取其禍時有象白山仙人深明因果即為光首廣宣夙因解其疑網此所謂定業決不可逃者也宋景公時熒惑在心懼召子韋而問焉子韋曰熒惑天罰也心宋分野也禍當君身雖然可移於宰相公曰宰相所使治國也而移死焉不祥寡人請自當也子韋曰可移於民公曰民死將誰君乎寧獨死耳子韋曰可移於歲公曰歲饑民飢必死為人君欲殺其民以自活其誰以我為君乎是寡人之命固盡矣子無復言矣子韋還走北面再拜曰臣敢賀君天之處高而聽卑君有仁人之言三天必三賞君今夕星必徙舍君延壽二十一歲公曰子何以知之對曰君有三善故三賞星必三舍舍行七星星當一年三七二十一故曰延壽二十一年臣請伏於陛下以伺之星不徙臣請死之公曰可是夕也星三徙舍如子韋言此所謂不定之業猶可轉移者也要之定業不定業於自性何加損猶之乎幻也執幻而以為實者是為妄見而已矣阿難吾今為汝以此二事進退合明阿難如彼眾生別業妄見矚燈光中所現圓影雖似前境終彼見者目眚所成眚即見勞非色所造然見眚者終無見咎例汝今日以目觀見山河國土及諸眾生皆是無始見病所成見與見緣似現前境元我覺明見所緣眚覺見即眚本覺明心覺緣非眚覺所覺眚覺非眚中此實見見云何復名覺聞知見是故汝今見我及汝并諸世間十類眾生皆即見眚非見眚者彼見真精性非眚者故不名見通曰以圓影例前境以目眚例見病以見勞例覺明以見眚例本覺無不明了但文義委婉無非發明見者為眚而見見者非眚也見與見緣根境和合現有山河國土及諸眾生似現前境如圓影然圓影非色所造此亦非境所造元我覺明妄見所緣如目眚之所成耳此覺明妄見因明立所攀緣外境即是眚病若本覺明心不落方所能覺諸緣起相不逐諸緣遷流本非眚也是知元我覺明緣於前境是所覺也所覺者眚而本覺實能覺之本覺明心既能覺眚知眚是病自不墮於眚中言覺所覺眚者疊元我覺明見所緣眚以覺所覺之緣有故言覺非眚中者疊本覺明心覺緣非眚以浮塵未起不墮明了意地眚中故此非見聞覺知之境故曰此實見見云何復名覺聞知見若以覺聞知見為即性者是猶以眚目而當清淨眼也其可通乎三平偈曰只此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分雲門拈云即此見聞非見聞喚甚麼作見聞無餘聲色可呈君有甚麼口頭聲色箇中若了全無事有甚麼事體用何妨分不分語是體體是語復拈拄杖云拄杖是體燈籠是用是分不分不見道一切智智清淨後白雲端拈云雲門只解依樣畫娥眉圓通則不然即此見聞非見聞無餘聲色可呈君眼是眼耳是耳箇中若了全無事體用何妨分不分四五百條華柳巷二三千處管絃樓天童頌云正相逢沒交涉六戶不掩四衢絕蹤遍界是光明通身無向背機絲不挂梭頭事文彩縱橫意自殊三平別有一頌見聞知覺本非因當體虗玄絕妄真見相不生癡愛業洞然全是釋迦身又慧超上堂諸上座見聞覺知祗可一度祗如會了是見聞覺知不是見聞覺知要會麼與諸上座說破了也待汝悟始得合之足為此段註脚阿難如彼眾生同分妄見例彼妄見別業一人一病目人同彼一國彼見圓影眚妄所生此眾同分所現不祥同見業中瘴惡所起俱是無始見妄所生例閻浮提三千洲中兼四大海娑婆世界并洎十方諸有漏國及諸眾生同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住通曰以目眚顯妄易以瘴惡顯妄難故以別業例同分也又同分中瘴惡之妄易知諸有漏國虗妄病緣其實難信故以易而例難也所見山河國土并諸世間十類眾生雖屬虗妄同是覺明無漏妙心謂之曰妙即物而非物也即境而非境也但背覺合塵則為有漏有漏即為物轉與病眚者同若背塵合覺本自無漏無漏即能轉物與無眚者同同一覺明也無漏即為清淨本心本覺常住有漏即迷真逐妄流轉生死和合妄生和合妄死與前當處發生當業輪轉相應本以真妄和合而偏言妄者真如在迷故也諸和合者即在三界流轉不和合者即屬自然外道不生滅見此和合與不和合二緣即為生死根因總為顛倒見妄若妄見滅除祗一本覺如眚病滅除祗一清明眼豈不圓滿菩提不生滅性乎及至圓滿菩提而後信見猶離見見不能及也玄沙上堂云我今問汝諸人且承當箇甚麼事在何世界安身立命還辨得麼若辨不得恰似揑目生華見事便差知麼如今目前見有山河大地色空明暗種種諸物皆是狂勞華相喚作顛倒知見夫出家人識心達本源故號為沙門汝今既已剃髮披衣為沙門相即便有自利利他分如今看著盡黑漫漫地墨汁相似自救且不得爭解為得人仁者佛法因緣事大莫作等閒相似聚頭亂說雜話趁謴過時光陰難得可惜許大丈夫兒何不自省察看是甚麼事秪如從上宗乘是諸佛頂族汝既承當不得所以我方便勸汝但從迦葉門接續頓超去此一門超凡聖因果超毗盧妙莊嚴世界海超他釋迦方便門直下永劫不教有一物與汝作眼見何不自急急究取未必道我且待三生兩生久積淨業仁者宗乘是甚麼事不可由汝用工莊嚴便得去不可他心宿命便得去會麼秪如釋迦出頭來作許多變弄說十二教如瓶建水大作一場佛事向此門中用一點不得用一毛頭伎倆不得知麼如同夢事亦同寐語沙門不應出頭來不同夢事蓋為識得知麼識得即是大出脫大徹頭人所以超凡越聖出生離死離因離果超毗盧越釋迦不被凡聖因果所謾一切處無人識得汝知麼莫祗長戀生死愛網被善惡業拘將去無自由分饒汝鍊得身心同虗空去饒汝到精明湛不搖處不出識陰古人喚作如急流水流急不覺妄為恬靜恁麼脩行盡出他輪迴際不得依前被輪迴去所以道諸行無常直是三乘功果如是可畏若無道眼亦不究竟何似如今博地凡夫不用一毫工夫便頓超去解省心力麼還願樂麼勸汝如今立地待汝搆去更不教汝加工鍊行如今不恁麼更待何時還肯麼便下座玄沙因閱楞嚴發明心地出詞吐氣一一與楞嚴合於此信入當下圓滿菩提本覺常住又何妄見之為病乎阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者則汝今者妙淨見精為與明和為與暗和為與通和為與塞和若明和者且汝觀明當明現前何處雜見見相可辨雜何形像若非見者云何見明若即見者云何見見必見圓滿何處和明若明圓滿不合見和見必異明雜則失彼性明名字雜失明性和明非義彼暗與通及諸羣塞亦復如是復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合若明合者至於暗時明相已滅此見即不與諸暗合云何見暗若見暗時不與暗合與明合者應非見明既不見明云何明合了明非暗彼暗與通及諸羣塞亦復如是通曰本覺妙明非因緣非自然阿難先略有悟似非因緣與彼自然之說而又執世間三光緣就始成其見并疑證菩提心必由和合而起彼世間之見不但見明且能見暗非藉於緣明矣況菩提本覺常住遠離於見豈和合可得而名乎和者如水土和雜而不辨今者妙淨見精與前境明暗通塞云何雜和見有情也境無情也歷然可辨若二者雜和作何形像見必見明似相雜也然明不自見而唯見能見則非雜矣凡可雜者必有不圓滿之處今見分相分各各圓滿充塞法界何處更容參和其間耶就使可雜見彼相雜不得名見相被見雜不得名相是見必與相異非可和也合者如函蓋合附而不離今者妙淨見精與前境明暗通塞云何比合與明合者應不見暗不言與暗合者應非見明以見具四種緣但緣明故既不與暗合而能見暗應非與明合而能見明若與明合則不見明矣既不能見明則不得謂之明合矣云何又與明合了明非暗見暗見明俱無比合是見必與境異非可合也即此見精明暗通塞俱非是見故謂之淨然明暗通塞莫非是見故謂之妙曰妙淨者彼但淨色根不涉妄塵且非和合而生也況見見覺元尤為至淨尤為至妙豈由和合根塵而起者乎章敬上堂云至理忘言時人不悉強習他事以為功能不知自性原非塵境是箇微妙大解脫門所有鑒覺不染不礙如是光明未曾休廢曩劫至今固無變易猶如日輪遠近斯照雖及眾色不與一切和合靈妙獨明非假鍛鍊為不了故取於物象但如揑目妄起空華徒自疲勞枉經劫數若能返照無第二人舉措施為不虧實相又空室道人智通因看法界觀頓有省連作二偈見意一曰浩浩塵中體一如縱橫交互印毗盧全波是水波非水全水成波水自殊此即非和合義也次曰物我元無異森羅鏡像同明明超主伴了了徹真空一體含多法交參帝網中重重無盡處動靜悉圓通此又非不和合義也阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶佛言汝今又言覺非和合吾復問汝此妙見精非和合者為非明和為非暗和為非通和為非塞和若非明和則見與明必有邊畔汝且諦觀何處是明何處是見在見在明自何為畔阿難若明際中必無見者則不相及自不知其明相所在畔云何成彼暗與通及諸羣塞亦復如是又妙見精非和合者為非明合為非暗合為非通合為非塞合若非明合則見與明性相乖角如耳與明了不相觸見且不知明相所在云何甄明合非合理彼暗與通及諸羣塞亦復如是通曰阿難所疑非和合者謂真妄二法似不相入未能融真妄而一之也借曰非和則見之與明必有邊畔借曰非合則見之與明性相乖角今皆不然故知非不和合也前阿難云不能於萬物象前剖出精見離一切物別有自性大略相類既云非和合自見精之妙淨而言也淨故不容雜又云非不和合單自見精之妙而言也妙故無不在百門義海曰達無生者為塵是心緣心為塵因因緣和合幻相方生由從緣生必無自性何以故今塵不自緣起待於心心不自心必待於緣由相待故則無定屬緣生則名無生非去緣生說無生也紹先禪師上堂團不聚撥不散日曬不乾水浸不爛等閑挂在太虗中一任傍人冷眼看樹和尚向火次道吾問作麼樹曰和合吾曰恁麼即當頭脫去也樹曰隔闊來多少時耶吾便拂袖而去吾一日從外歸樹問從甚麼處去來吾曰親近來樹曰用簸這兩片皮作麼吾曰借樹曰他有從汝借無作麼生吾曰祗為有所以借觀諸尊宿如是舉倡此妙覺元與諸緣塵及心念慮果和合耶非和合耶須具眼始得阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得通曰此直顯頓門指出妙菩提路即浮塵幻化中而證真如真如性中求於去來迷悟生死了不可得諸陰入處界唯有幻妄之相幻無自性依真而立如華起空全體是空如泡生水全體是水故曰其性真為妙覺明體此體即法身果自含藏眾德曰如來藏本無去來曰常住本未甞味曰妙明本無生滅曰不動本自具足曰周圓惟常住故去來不可得惟妙明故迷悟不可得惟不動故生死不可得唯周圓故真常此之謂妙真如性其實本來無一物也僧問黃檗學人不會和尚如何指示檗云我無一物從來不曾將一物與人你無始以來祗為被人指示覓契覓會此可不是弟子與師俱陷王難你但知一念不受即是無受身一念不想即是無想身決定不遷流造作即是無行身莫思量卜度分別即是無識身你如今纔起一念即如十二因緣無明緣行亦因亦果乃至老死亦因亦果故善財童子一百一十處求善知識秪向十二因緣中求最後見彌勒彌勒却指見文殊文殊者即汝本地無明若心心別異向外求善知識者一念纔生即滅纔滅又生所以汝等比丘亦生亦老亦病亦死酬因答果已來即五聚之生滅五聚者五陰也一念不起即十八界空即身便是菩提華果即心便是靈智亦云靈臺若有所住著即身為死屍亦云守死屍鬼若黃檗此語非明幻妄稱相其性真為妙覺明體者乎皓月供奉問長沙曰了即業障本來空未了應須還宿債只如師子尊者二祖大師為甚麼得償債去沙曰大德不識本來空月曰如何是本來空曰業障是曰如何是業障曰本來空是沙以偈示之曰假有元非有假滅亦非無涅槃償債義一性更無殊若長沙此語非明生滅去來本如來藏常住妙明不動周圓妙真如性乎又夾山與定山同行言話次定山曰生死中無佛即無生死夾山曰生死中有佛即不迷生死互相不肯同見大梅夾山便舉問二人見處那箇較親梅曰一親一疎夾山復問那箇親梅曰且去明日來夾山明日再上問梅梅曰親者不問問者不親夾山住後自云當時失一隻眼即此一則非即明性真常中求於去來迷悟生死了無所得乎舊說自徵心辨見以來廣破人執當奢摩他空觀自此以下廣破法執當三摩提假觀於直指人心見性成佛尚隔一程未識阿難所問者妙奢摩他此所答者妙真如性妙之一字難以形容悟者自知阿難云何五陰本如來藏妙真如性通曰五陰亦云五蘊蘊謂積聚陰謂蓋覆積聚有為蓋覆真性故並稱云五陰區宇甚為難破此云本如來藏妙真如性豈謂推本緣起從如來藏中流出耶抑豈謂五陰皆空即顯如來妙真如性耶此係頓門即上所稱大陀羅尼諸三摩提妙脩行路正謂即此五陰即如來藏即妙真如性無二無別故銷除五陰不無次第若論理則頓悟須直下見得五陰皆自無生皆自寂靜求五陰之相了不可得又何五陰之非真如而真如之非五陰乎哉僧問溈山安曰離却五陰如何是本來身安曰地水火風受想行識僧云這箇是五陰安曰這箇異五陰又問此陰已謝彼陰未生時如何安曰此陰未謝那箇是大德曰不會安曰若會此陰便明彼陰若懶安者可謂深明五陰本如來藏妙真如性者也阿難譬如有人以清淨目觀晴明空唯一晴虗逈無所有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相色陰當知亦復如是阿難是諸狂華非從空來非從目出如是阿難若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅阿難當體不容阿難若目出者既從目出還從目入即此華性從目出故當合有見若有見者去既華空旋合見眼若無見者出既翳空旋當翳眼又見華時目應無翳云何晴空號清明眼是故當知色陰虗妄本非因緣非自然性通曰龍勝偈云諸法不自生亦不從他生不共不無因是故說無生夫諸法不自生待諸緣故不從他生諸緣無自性故不共生智及脩行體空無自性無合散故不無因要待覺悟修行方顯不自然成故知此妙覺明體離一切過本自無生也自五陰六入十二處十八界以逮七大無非廣明此意悟得無生即清淨目本自無華瞪以發勞背真合妄則見有華華本無體無所從來但除翳眼狂華自息若於狂華謂有所自即因緣性謂無所自即自然性今審其所從不於空出不於目出則非因緣明矣若果自然而有則見華時自應無翳若無翳而見華則見華者謂之清明眼見晴明空應是翳眼云何晴空號清明眼是華必由翳而生又非自然明矣夫狂華如是色陰亦然本皆虗妄本無自性即色即空故謂之本如來藏妙真如性也馬祖示眾云三界唯心森羅及萬象一法之所印凡所見色皆是見心心不自心因色故有汝但隨時言說即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此意乃可隨時著衣吃飯長養聖胎任運過時更有何事汝受吾教聽吾偈曰心地隨時說菩提亦只寧事理俱無礙當生即不生雲門示眾云真空不壞有真空不異色僧便問作麼生是真空問曰還聞鐘聲麼曰此是鐘聲門曰驢年夢見麼又高安仁禪師示眾云尋常不欲向聲前句後鼓弄人家男女何故且聲不是聲色不是色時有僧問如何是聲不是聲曰喚作色得麼云如何是色不是色曰喚作聲得麼僧作禮仁曰且道為汝說答汝語若人辨得有箇入處丹霞頌云色自色兮聲自聲新鶯啼處柳烟輕門門有路通京國三島斜橫海月明故知色陰本妙真如性者即達無生之旨阿難譬如有人手足宴安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相受陰當知亦復如是阿難是諸幻觸不從空來不從掌出如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸若從掌出應非待合又掌出故合則掌知離則觸入臂腕骨髓應亦覺知入時蹤跡必有覺心知出知入自有一物身中往來何待合知要名為觸是故當知受陰虗妄本非因緣非自然性通曰藏性本無諸受但觸情於境納境於心斯名曰受故以二手相摩妄生澀滑冷熱諸相為喻冷熱本無因觸故有故曰幻觸使此受性由因緣生或自然生則不謂之虗妄可也今非空非掌則非因緣矣待合方知則非自然矣非因緣非自然當體寂滅本自不生非如來藏妙真如性而何謂之曰妙即受而非受也世尊因長爪梵志索論義預約曰我義若墮我自斬首世尊曰汝義以何為宗志曰我以一切不受為宗世尊曰是見受否志拂袖而去行至路中乃省謂弟子曰我當回去斬首以謝世尊弟子曰人天眾前幸當得勝何以斬首志曰我寧於有智人前斬頭不於無知人前得勝乃歎曰我義兩處負墮是見若受負門處麤是見不受負門處細一切天人二乘皆不知我義墮處唯有世尊諸大菩薩知我義墮回至世尊前曰我義兩處負墮故當斬首以謝世尊世尊曰我法中無如是事汝當回心向道於是同五百徒眾一時投佛出家證阿羅漢夫受陰若是其微也豈易破哉阿難譬如有人談說酢梅口中水出思踏懸崖足心酸澀想陰當知亦復如是阿難如是酢說不從梅生非從口入如是阿難若梅生者梅合自談何待人說若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出想踏懸崖與說相類是故當知想陰虗妄本非因緣非自然性通曰想無實相由心成相故名曰想想梅水出想崖酸生梅不至口但有談說此水胡為乎來哉成於想也又如夢中談者非人聽者非耳聞說酢梅口亦涎流此又胡為乎來哉結於想也此想若因緣性者必不離梅與口而有今者談不自梅聞不自口耳不出水而口中水生其非因緣明矣此想若自然性者談梅應合足酸談崖應合水出今者各隨種子習氣非無故而有其非自然明矣非因緣非自然當其想時即是無想渾然一妙真如性也有一道士問萬松曰弟子三十餘年打疊妄心不下松曰我有四問舉似全真一問妄心有來多少時也二問元來有妄心否三問妄心作麼生斷四問妄心斷即是不斷即是其人拜謝而去黃山趙交孺親覲圓通善國師嘗作頌曰妄想元來本自真除時又起一重塵言思動靜承誰力子細看來無別人又佛在時有弟兄三人聞毗耶離國有婬女曰菴羅婆利又舍衛國有婬女曰須曼那又王舍城有婬女曰優鉢羅槃那皆有美色晝夜念之便夢與之從事覺已念之彼女不來我亦不往而婬事成辦因是而悟一切諸法皆如是耶於是頓證唯心噫若三人者可謂能明想陰之為虗妄者也頓證唯心不既見妙真如性乎阿難譬如暴流波浪相續前際後際不相踰越行陰當知亦復如是阿難如是流性不因空生不因水有亦非水性非離空水如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則此暴流性應非水有所有相今應現在若即水性則澄清時應非水體若離空水空非有外水外無流是故當知行陰虗妄本非因緣非自然性通曰陀那微細識習氣成暴流湛不搖處名第八識黏湛妄動念念遷謝新新不住名第七識是為行陰行陰故如暴流隨境轉徙然其流也非從境生非從心生非即心境非離心境蓋由七識內依於八識外依於六識原無自性可得既無自性即是虗妄也流非空出易知流非水有難辨能有是水所有是流如樹生果果不是樹今應現在確然可指而流水二相無可別白則非因水出明矣不即空水則非因緣不離空水則非自然非因緣非自然宛是虗妄明得虗妄當下本自無生故謂之妙真如性也楞伽經云相生執礙想生妄想流注生則逐妄流轉若到無功用地猶在流注相中須是出得第三流注生相方始快活自在僧問趙州初生孩子還具六識也無州云急水上打毬子僧復問投子急水上打毬子意指如何子云念念不停留雪竇頌云六識無功伸一問作家曾共辨來端茫茫急出打毬子落處不停誰解看此是雪竇活句且道落在甚麼處如覰得透方信行陰即如來藏妙真如性阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是阿難如是虗空非彼方來非此方入如是阿難若彼方來則本瓶中既貯空去於木瓶地應少虗空若此方入開孔倒瓶應見空出是故當知識陰虗妄本非因緣非自然性通曰宗鏡錄云若執有識隨身往來者此處識陰滅往彼處生時如將此方虗空遠餉他國若此陰實滅於本瓶地應少虗空若彼陰復生如開孔倒瓶應見空出故知虗空不動識無去來識陰為虗妄也溫陵曰性空真覺周徧法界一迷為識故知瓶中之空耳內外一空喻性識一體塞其兩孔喻妄分同異空無來往喻性無生滅瓶喻妄業空喻妄識業牽識走如瓶擎空行他國喻去六道妄隨流轉之狀也法句經曰精神居形內猶藏瓶中瓶破則飛去矣此頻伽瓶取其形似意亦相類用餉他國唯空能貯餉是以瓶為餉之用非謂以空為餉也特擎空而行耳陸亘大夫問南泉古人瓶中養一鵞漸長大出瓶不得如今不得毀瓶不得損鵞作麼生出得泉召大夫陸應諾泉曰出也陸從此開解即禮謝一日問南泉弟子從六合來彼中還更有身否泉曰分明記取舉似作家陸曰和尚不可思議到處世界成就泉曰適來總是大夫分上事又報恩明和尚問二禪客上座近離甚處云都城明曰上座離都城到此山則都城少上座此山剩上座剩則心外有法少則心法不周說得道理即住不會即去二人無對若天衣懷禪師見處自別天衣赴杉山請入院上堂云二十年樂慕此山今日且喜到來因緣際會山僧未到此山身先到此洎乎來到杉山却在山僧身內於此一一透徹方信識陰虗妄本無去來如漚生漚滅不離乎海漚即海也而識獨非妙真如性乎
