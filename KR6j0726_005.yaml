body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第五阿難白佛言世尊如來雖説第二義門今觀世間解結之人若不知其所結之元我信是人終不能解世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧唯願大慈哀愍淪溺今日身心云何是結從何名解亦令未來苦難衆生得免輪回不落三有作是語已普及大衆五體投地雨淚翹誠佇佛如來無上開示通曰前富樓那問一切衆生何因有妄自蔽妙明受此淪溺今阿難問今日身心云何是結從何名解皆欲窮極妄根細研俱生無明庶知所結之元而破除之也前答識迷無因妄無所依尚無所生欲何為滅今答相見無性同於交蘆觀交中性空有俱非前云狂性自歇歇即菩提今云知見無見斯即涅槃先後一轍但前屬見道分知妄即覺覺即菩提此屬修道分離見即無無即涅槃結謂迷之縛於根塵故淪生死解謂悟之脫於根塵故證妙常此從耳根返聞脫黏內伏攝伏攀緣入佛知見屬功勳邊事故云第二義有僧問石頭如何是解脫頭曰誰縛汝問如何是淨土頭曰誰垢汝問如何是涅槃頭曰誰將生死與汝若於此得箇安樂處即不向第二頭作活計矣爾時世尊憐愍阿難及諸會中諸有學者亦為未來一切衆生為出世因作將來眼以閻浮檀紫金光手摩阿難頂即時十方普佛世界六種震動微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祇陀林灌如來頂是諸大衆得未曾有於是阿難及諸大衆俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根唯汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪回安樂妙常同是六根更非他物通曰前阿難云我心何獨供養如來乃至遍應恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心心既無二六根亦無二胡為明於彼而暗於此乎均此六根也順之而出背覺合塵即入生死流逆之而入背塵合覺即至不生滅喻如翻手覆手從上如來當無異説蹣菴成禪師上堂云一念心清淨佛居魔王殿一念惡心生魔王居佛殿懷禪師曰但恁麼信去喚作腳踏實地而行終無別法亦無別道理老僧恁麼舉了秪恐你諸人見兔放鷹刻舟求劍何故功德天黑暗女有智主人二俱不受然大梅常禪師聞鼯鼠聲乃曰即此物非他物汝等諸人善自護持言訖示滅永明壽禪師讚曰師初得道即心是佛最後示徒物非他物窮萬法源徹千聖骨真化不移何妨出沒信得大梅與鼯鼠聲無別又何生死涅槃之異乎佛告阿難根塵同源縛脫無二識性虗妄猶如空華阿難由塵發知因根有相相見無性同於交蘆通曰根屬見分塵屬相分皆由一念無明黏湛發起故曰同源但自源頭觀之見相未形根塵何有自根合塵而逐流則謂之縛自根背塵而返源則謂之脫其縛也此六根非他物也其脫也此六根非他物也無二體故但自無二之體觀之縛不為垢脫不為淨於無二之體曾無加損是根塵本同源也孰見其異縛脫本無二也孰見其二所以分別其間者識也此識虗妄分別猶如揑目妄見空華本無根塵妄見根塵本無縛脫妄見縛脫知此識性有如揑目轉識歸源即睛明眼故速證安樂解脫寂靜妙常非徒於根上返猶係於識上轉也何以名識性虗妄猶如空華哉非謂離識性虗妄而別有所謂寂靜妙常也但信識性之為虗妄而妙常即在於識性矣但言空華之無自性而睛明即在於空華矣故由塵發識識不自生因根有相相不自有是根塵識三者相交而立同於交蘆本無自性以為交性是有未交之時何為無也以為交性是無既交之時何為有也既非空性又非有性故曰無性相分見分二俱無性當體即是無生故知生死結根之中自足寂靜妙常也是不可以信縛脫之無二哉石頭示衆曰吾之法門先佛傳受不論禪定精進唯達佛之知見即心即佛心佛衆生菩提煩惱名異體一汝等當知自己心靈體離常斷性非垢淨湛然圓滿凡聖齊同應用無方離心意識三界六道唯自心現水月鏡像豈有生滅汝能知之無所不備此最上第一義也所云菩提煩惱名異體一非根塵同源之謂乎體離斷常性非垢淨非縛脫無二之謂乎三界六道唯自心現水月鏡像豈有生滅非相見無性同於交蘆之謂乎交蘆空華亦無生滅故知識性虗妄即是安樂解脫也是故汝今知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物爾時世尊欲重宣此義而説偈言通曰知見立知即因明立所故知無明根本乃所結之元是生死結根者識也不但根也知見無見即見猶離見見不能及故知解脫知見乃無漏之果是寂靜妙常者轉識而成智也亦不但根也所以偈中頌出陀那微細識備顯根識無二非為孤起頌也瑞鹿安禪師於此嘗破讀知見立句知即無明本知見無句見斯即涅槃洞然開悟每習誦以為常門人謂宜以四字為句安曰此是吾悟處不可易也時謂之安楞嚴將示寂偈曰不是嶺頭攜得事豈從雞足付將來自古聖賢皆如此非吾今日無君裁付囑已自入棺右脅吉祥而臥經三日門人啓棺哀慟乃再起升堂説法訶責垂誡再啓吾棺者非吾弟子復入棺長往非得無漏真淨安能去來自由如此真性有為空緣生故如幻無為無起滅不實如空華通曰有為隨緣起滅是生死法無為起滅俱無是涅槃法真性中本無生死涅槃之相結從何起解從何名故以有為如幻無為如涅二俱虗妄此頌根塵同源縛脫無二於同源無二處見得有無皆為虗妄百丈云佛是無求人求之即乖理是無求理求之即失若著無求復同於有求若著無為復同於有為故經云不取於法不取非法不取非非法又云如來所得法此法無實亦無虗但能一生心如木石相似不被陰界諸入五欲八風之所飄溺即生死因斷去住自由不為一切有為因果所縛不被有漏所拘他時還以無自縛為因同事利益以無著心應一切物以無礙慧解一切縛亦云應病與藥此百丈直指真性不落有無并示解脫方便所謂發明成解脫者也言妄顯諸真妄真同二妄猶非真非真云何見所見通曰有為之法緣根塵而生固可謂之妄無為之法脫於根塵離起滅相何謂不實如空華乎哉言生滅之妄所以顯涅槃之真既有真與妄對真亦成妄故曰二妄何以故謂有真可得故若真性之中真與非真俱不可得遣妄之真固不可得遣真之真亦不可得即真而非真即性而無性云何更有能見之根所見之境乎見有者固是見幻見無者亦是揑目凡有見者即落方所故見有涅槃可成即謂之妄也謂之曰真原不容妄況非真非不真真且無之妄從何起僧問黃蘗妄能障自心未審而今以何遣妄檗云起妄遣妄亦成妄妄本無根只因分別而有你但於凡聖兩處情莫計念自然無妄更擬如何遣他都不得有纖毫依執名為我捨兩臂必當得佛僧曰既無依執當何相承檗云以心傳心僧曰若心相傳云何言心亦無檗云不得一法名為傳心若了此心即是無心無法僧曰若無心無法云何名傳檗曰汝聞道傳心將謂有可得也所以祖師云認得心性時可説不思議了了無所得得時不説知此事若教會何堪也知之一字尚自不容始可言真中間無實性是故若交蘆結解同所因聖凡無二路汝觀交中性空有二俱非迷晦即無明發明便解脫通曰中間指見所見中間也由塵發知知即識也屬能見因根有相相即塵也屬所見是塵識根三相藉而有本無實性如交蘆然相依而立原無自性試觀交中之性以為空則相依似有以為有則不依本無非有性非空性是謂無性本是無性結者此六根非有所損也解者此六根非有所益也何以解之即名聖而結之即名凡哉為不達無生之旨一念自迷內有能見外有所見為根塵所縛無自由分是晦昧即無明之本結之所由起也若真見無性之妙脫黏內伏發本明耀明不循根見不藉緣六根互用超越世間是發明即解脫之因解之所由名也結則俱生無明生死結根故為凡夫因此六根非他物也解則速證安樂寂靜妙常故謂聖人因此六根非他物也同此六根更無二路彼縛於有為者猶以交蘆為性有也而性實有嘗有也彼縛於無為者猶以交蘆為性空也而性實未嘗空也達非空有無凡聖等見乃可語真性矣僧問黃檗本既是佛那得更有四生六道種種形貌不同檗云諸佛體圓更無增減流入六道處處皆圓萬類之中箇箇是佛譬如一團水銀分散諸處顆顆皆圓若不分時秪是一塊此一即一切一切即一種種形貌喻如屋舍捨驢屋入人屋捨人身至天身乃至聲聞緣覺菩薩佛屋皆是汝取捨處所以有別本源之性何得有別至哉言也於此發明可使博地凡夫立躋聖位解結因次第六解一亦亡根選擇圓通入流成正覺通曰發明便解脫此是頓門何為有解結次第之説頓不廢漸所以為圓頓法門也若是大根大器一悟便至佛地更不假於修證其次莫若選擇耳根圓通一根返元六根解脫先銷六根次亡其一此觀世音入流亡所乃至寂滅現前而成正覺之次第也即如頓門大悟小悟不記其數何嘗無次第哉昔灌溪間禪師初參臨濟濟擒住良久溪曰領也濟托開曰且放你一頓溪住後乃示衆曰我見臨濟無言語直至如今飽不飢後到末山先自約曰相當則住不然則推倒禪床既入堂內山聞新到至令侍者問上座遊山來為佛法來溪曰為佛法來山乃升座溪上不禮拜山問今日離何處溪曰路口山曰何不蓋却溪無語末山代云爭得到這裏始禮拜起問如何是末山山曰不露頂溪曰如何是末山主山曰非男女等相溪曰何不變去山曰不是神不是鬼變箇甚麼溪於是伏膺作園頭三年臨濟放他一頓到此方吃後垂語云我在臨濟處得一杓我在末山處得一杓又云十方無壁落四面亦無門露裸裸赤灑灑沒可把天童拈云灌溪恁麼説話且道是臨濟處得底末山處得底雖然一箭雙雕奈有時走殺有時坐殺且作麼生得恰好去揑聚放開都在我拈來拋去更由誰於此透得盡始亡其一始可名真解脫也陀那微細識習氣成暴流真非真恐迷我常不開演通曰六根非能為凡為聖所以主之者識也六識既銷我見猶存是第七識境界六解一亡歸於如來藏海是第八識境界馬鳴曰依如來藏有生滅心轉不生滅與和合非一非異名阿賴耶識此識最為微細含藏種子為習氣莫知其所藏積生識浪成暴流莫知其所生故曰微細以依不生滅則謂之出纏如來藏似乎真矣以依生滅心則謂之在纏如來藏又似乎非真矣真與非真總是這箇識所以難辨將謂之真恐認賊作子將謂之非真恐認子作賊世尊所以不輕談也若能轉第八識為大圓鏡智非真非非真乃可語無上菩提真如佛性也後來性宗不明只緣相宗不徹以第七識中我見為佛性以第八識剎那中生滅相為真如故謂之顢頇佛性儱侗真如認定湛不搖處以為究竟故知其一未亡也僧問長沙岑第六第七及第八識畢竟無體云何得名轉第八識為大圓鏡智沙示偈曰七生依一滅一滅持七生一滅滅亦滅六七永無遷由此觀之不但六解一亡更有所謂七解一亡者微哉微哉自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立通曰真性有為空緣生故如幻真性本空何得幻生良由第八識內緣真如外生有為法故如幻耳深密經云阿賴耶識甚微細一切種子如暴流我於凡愚不開演恐彼分別執為我此自心取自心正自分別執為我也一執為我於非幻中生起幻法湛由是分結由是始此六根所以逐塵而輪轉也不執為我則非幻尚無幻從何立湛入合湛同源無二此六根所以清淨而併亡其一也六根屬幻一屬非幻一六俱亡故曰非幻尚不生幻法云何立此轉識成智在取不取之間耳楞伽云分別是識無分別是智生滅是識不生滅是智但無分別即是不生滅真性故不為識陰所覆僧問黃檗文殊執劍於瞿曇前者如何檗云五百菩薩得宿命智見過去生業障五百者即你五陰生是以見此宿命障故求佛求菩薩涅槃所以文殊將智解劍害此有見佛心故故言你善害僧云何者是劍檗云解心是劍僧云解心既是劍斷此有見佛心秪如能斷見心何能除得檗云還將你無分別智斷此有見分別心僧云如作有見有求佛心將無分別智劍斷爭奈有智劍在何檗云若無分別智害有見無見無分別智亦不可得僧云不可以智更斷智不可以劍更斷劍檗云劍自害劍劍劍相害即劍亦不可得智自害智智智相害即智亦不可得母子俱喪亦復如是此等妙論不但於取處不許出頭即不取處亦無蹤迹微乎其微矣須如是透徹乃可語轉第八識成大圓鏡智是名妙蓮華金剛王寶覺如幻三摩提彈指超無學此阿毗此無比法達磨速證寂常十方薄伽梵一路涅槃門通曰初阿難謂從無始際與諸無明俱滅俱生不能降伏摩登伽難殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便今十方如來異口同音汝欲識知俱生無明使汝輪轉生死結根唯汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂淨妙常亦汝六根更非他物如前氷水之喻水凝則成氷豈容他物參之而為氷氷釋則成水豈容他物參之而為水六為賊媒自劫家寶此六根也六解一亡速登正覺此六根也即妄即真即真即妄有妙悟存乎其間妙之一字難以言語形容必其轉識成智與性覺妙明本覺明妙有相當處方可語無上菩提也喻如蓮華出於淤泥而不染此在尋常蓮華皆然若優曇鉢華異世間相所謂瑞應妙蓮華也此唯發明最上一路入佛知見乃足當之金剛王寶覺即金剛心中初乾慧地也金剛能摧毀一切十地皆云金剛心亦以壞滅前地故即所謂慧劍也此覺一現不但無始無明頓息即佛見菩薩見亦無出頭處三摩提正受也而曰如幻者幻人作為本於無作即寂而照即照而寂忘情絶解不可思議即所謂如幻聞熏聞修金剛三昧也此妙奢摩他三摩禪那唯在一悟一悟便至佛地故彈指頃即超二乘無學之上無學猶落功勳猶執無見在此真性現前有無俱離一超直入更不假於勳級乃頓門也如太子處胎貴壓羣臣頻伽在鷇聲逾衆鳥豈尋常禪定觀行所可擬乎故曰此無比法而速證寂常者也薄伽梵具六義曰自在曰熾盛曰端嚴曰名稱曰吉祥曰尊貴衆德成就之故故不翻僧問乾峯十方薄伽梵一路涅槃門未審路頭在甚麼處峯以拄杖一畫云在這裏僧請益雲門門拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼會麼黃龍南云乾峯一期指路曲為初機雲門乃通其變故使後人不倦竹菴頌云乾峯不用指陳雲門休打骨董自然東海鯉魚築著帝釋鼻孔天童頌云入手還將死馬醫返魂香欲起君危一朝拶出通身汗方信儂家不惜眉此何等事詎可道理解説令人得入須是自家徹底開悟方得其妙於是阿難及諸大衆聞佛如來無上慈誨祗夜此云重頌伽陀此云諷頌雜糅精瑩妙理清徹心目開明歎未曾有阿難合掌頂禮白佛我今聞佛無遮大悲性淨妙常真實法句心猶未達六解一亡舒結倫次唯垂大慈再愍斯會及與將來施以法音洗滌沉垢即時如來於師子座整涅槃僧此云裏衣斂僧伽黎此云大衣攬七寶几引手於几取劫波羅此云時分夜摩天也天所奉華巾於大衆前綰成一結示阿難言此名何等阿難大衆俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大衆又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大衆亦復如是次第酬佛此名為結佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此巾秪有六結終不至七亦不停五云何如來秪許初時第二第三不名為結佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異於意云何初綰結成名為第一如是乃至第六結生吾今欲將第六結名成第一不不也世尊六結若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名佛言如是六結不同循顧本因一巾所造令其雜亂終不得成則汝六根亦復如是畢竟同中生畢竟異佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非鋒起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成佛言六解一亡亦復如是由汝無始心性狂亂知見妄發發妄不息勞見發塵如勞目睛則有狂華於湛精明無因亂起一切世間山河大地生死涅槃皆即狂勞顛倒華相通曰元依一精明分成六和合前已詳言之矣何為復有此喻前由明暗動靜等塵黏湛發起六根自外而內故但不循動靜明暗等相脫黏內伏發本明耀即得六根互用是返流全一所以制其外也今由心性狂亂勞見發塵自內而外故根結若除塵相自滅先得人空乃至得無生忍是解散結心所以融其內也於湛精明無因亂起迷本無因因明立所此知見妄發即結起之由以湛旋其虗妄生滅生滅既滅寂滅現前此六用不行即解散之義方其結也聽不出聲見不超色此結非彼彼結非此如勞目睛別有狂華及其解也既銷其六復亡其一一尚無名云何成六如清明眼本自無華故結之名生死而未嘗損也解之名涅槃而未嘗益也譬猶狂華無端起滅於太虗何增減哉故知生死之為顛倒則六解矣知涅槃之為空華則一亡矣返流全一一猶未亡至亡其一則結心解矣僧問風穴沼禪師一即六六即一一六俱亡時如何穴曰一箭射雙雕曰意旨如何穴曰身亡迹謝又張拙秀才初見石霜霜問何名拙曰姓張名拙霜曰覓巧尚不可得拙自何來拙於言下契悟遂呈偈曰光明寂照遍河沙凡聖含靈共一家一念不生全體現六根才動被雲遮斷除妄想重增病趣向真如亦是邪隨順世緣無罣礙涅槃生死等空華若拙者深得六解一亡之旨豈由次節而致者哉阿難言此勞同結云何解除如來以手將所結巾偏掣其左問阿難言如是解不不也世尊旋復以手偏牽右邊又問阿難如是解不不也世尊佛告阿難吾今以手左右各牽竟不能解汝設方便云何解成阿難白佛言世尊當於結心解即分散佛告阿難如是如是若欲除結當於結心涌曰舊説左右牽喻依空有二邊不能解結須依圓觀於根不生分別於境不生取著則解結矣夫待觀而後解者猶然左右牽也於結心何與不如衲僧家語更妙密壽聖云月半前用鉤月半後用錐僧便問正當月半時如何聖云泥牛踏破澄潭月天童拈云兩頭得用壽聖作家直下忘功是誰體得放行也互換尊賓把定也不留朕迹還有體得底麼玉女夜拋梭織錦於西舍又雲門示衆云十五日以前即不問十五日以後道將一句來自云日日是好日天童拈云屬虎人本命屬猴人相衝石門聰云十五日以前諸佛生十五日以後諸佛滅十五日以前諸佛生你不得離我這裏若離我這裏我以鈎鈎你十五日以後諸佛滅你不得住我這裏若住我這裏我以錐錐你且道正當十五日用鈎即是用錐即是遂有頌云正當十五日鈎錐一時息更擬問如何回頭日又出雲門即不然十五日以前諸佛本不曾生十五日以後諸佛本不曾滅十五日以前你若離我這裏我也不用鈎鈎你一任橫擔拄杖緊捎草鞋十五日以後你若住我這裏我也不用錐錐你一任拗折拄杖高挂鉢囊且道正當十五日合作麼生乃云十五日前後鈎錐徒爾為今朝十五日正好用鈎錐且作麼生用路逢死蛇莫打殺無底藍子盛將歸若於此數則得端的去結心一時頓釋阿難我説佛法從因緣生非取世間和合粗相如來發明世出世法知其本因隨所緣出如是乃至恆沙界外一滴之雨亦知頭數現前種種松直棘曲鵠白烏玄皆了元由通曰佛知世出世法皆由於心隨染緣則出九界隨淨緣則出佛界此因緣猶可解也至恆沙雨滴及現前種種何因何緣而知其元由耶佛有權實二智實智冥理權智鑑物故知種種元由者皆權智所鑑也如來法身圓滿周遍無有一物能出法身外者如來安得不知洞山聰上堂云教山僧道甚麼即得古即是今今即是古所以楞嚴經道松直棘曲鵠白烏玄還知得麼雖然如是未必是松一向直棘一向曲鵠便白烏便玄洞山道這裏也有曲底松也有直底棘也有玄底鵠也有白底烏久立珍重且道洞山是轉楞嚴為楞嚴轉畢竟作甚麼話會是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待阿難吾今問汝此劫波羅巾六結現前同時解縈得同除不不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則結解時云何同除佛言六根解除亦復如是此根初解先得人空空性圓明成法解脫解脫法已俱空不生是名菩薩從三摩地得無生忍通曰一根既返源六根成解脫詳如此喻迷則六根同結悟則六根互用有何次第但迷以積迷由精而粗悟以入悟由粗而精不無漸次云爾非謂一根拔而餘五以次拔也佛語圓融本無拘泥即如初名為結結處本同第二第三不得復名為結寧有結而又結者乎故結即是一也結既是一第一即是第六第六即是第一彼此異名未嘗不可然人之生也自胞胎以至具體六根不無先後及十八界成而根有圓通者有不圓通者故循圓通一日證道而有餘不循圓通百劫修道而不足此日劫相倍六根具有利鈍不同故根有易拔者有不易拔者孔子六十而耳順耳根化也七十而從心所欲不踰矩意根化也是有多少次第此結非一日所積而解亦非頃刻能除也初得人空以至得無生忍即入流亡所次第隱然以返聞為圓通第一待阿難自擇耳人空是破五陰假名即斷見惑也法空是破五陰實法即斷思惑也乃至破涅槃淨法即永斷根本無明也俱空不生即平等空所空既盡能空亦滅境智雙泯能所俱寂即妙湛總持首楞嚴定也故曰得無生忍僧問百丈如何是大乘頓悟法要丈曰汝等先歇諸緣休息萬事善與不善世出世間一切諸法莫記憶莫緣念放捨身心令其自在心如木石無所辨別心無所行心地若空慧日自現如雲開日出相似但歇一切攀緣貪嗔愛取垢淨情盡對五欲八風不動不被見聞覺知所縛不被諸境所惑自然具足神通妙用是解脫人對一切境心無淨亂不攝不散透過一切聲色無有滯礙名為道人善惡是非俱不運用亦不愛一切法亦不捨一切法名為大乘人不被一切善惡空有垢淨有為無為在出世間福德智慧之所拘繫名為佛慧是非好醜是理非理諸知見情盡不能繫縛處處自在名為初發心菩薩便登佛地夫百丈縱口所談默與經旨符契非大解脫人不能為此解脫語阿難及諸大衆蒙佛開示慧覺圓通得無疑惑一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙雖復悟知一六亡義然猶未達圓通本根世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母若復因此際會道成所得密言還同本悟則與未聞無有差別唯垂大悲惠我祕嚴成就如來最後開示作是語已五體投地退藏密機冀佛冥授爾時世尊普告衆中諸大菩薩及諸漏盡大阿羅漢汝等菩薩及阿羅漢生我法中得成無學吾今問汝最初法心悟十八界誰為圓通從何方便入三摩地通曰開示慧覺圓通即前六解一亡乃至得無生忍也由六解故身得無礙由一亡故心得無礙雖未至於六根清淨然一拔六銷六銷一亡固已皎然無惑特未知圓通本根所在何根最為圓通循何根而入即證圓通循圓通之根證圓通之果在阿難因此而道成在如來即為最後之開示故願世尊不惜祕嚴而冥授之也若論圓根前已顯示十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣今復普告菩薩及阿羅漢等最初發心悟十八界誰為圓通從何方便入三摩地較量圓根猶自可説至方便悟入此在各人自知自證豈言説所可及乎言説所不及而可以冥授乎據阿難之請冀佛以冥授不以言言我以冥授不以聞聞不以言言是謂密言不以聞聞是謂本悟故得佛之密言即同我之本悟雖若有聞同於未聞聞而不聞是謂真聞所以退藏密機而冀得之也向使佛可授阿難可得即非密矣非祕矣以是而證圓通非圓通矣悟由自悟豈人所可與乎盤山積禪師上堂向上一路千聖不傳學者勞形如猿捉影影可捉則祕嚴可授也荊南節度使成汭入雲居設供問曰世尊有密語迦葉不覆藏如何膺召尚書汭應諾膺曰會麼汭曰不會膺曰汝若不會世尊有密語汝若會迦葉不覆藏故知此事非自悟徹不可憍陳那家治火器五比丘即從座起頂禮佛足而白佛言我在鹿苑及於雞園觀見如來最初成道於佛音聲悟明四諦佛問比丘我初稱解如來印我名阿若多此云解妙音密圓我於音聲得阿羅漢佛問圓通如我所證音聲為上通曰憍陳那初悟客塵二字已得解名茲於佛音聲悟明四諦佛初於鹿苑三轉四諦法輪一示相轉二勸修轉三作證轉示相者示其相狀謂是苦是苦集是若滅是苦滅道也勸修者勸其令修謂苦應知乃至道應知也作證者引己證彼謂苦我已知不復更知乃至道我已修不復更修也悟明四諦僅解生滅法爾於客塵二字無異乃因是得阿羅漢豈謂音聲皆生滅而我非生滅者倫乎音聲皆客塵而我非客塵者倫乎然謂妙音密圓圓妙又在於音也豈以音聲即生滅而非生滅者乎音聲即客塵而非客塵者乎此其悟唯憍陳那自知之而不可以語人故謂之密彼其證在音聲故以音聲為圓通也香巖智間禪師在百丈時性識聰敏參禪不得洎丈遷化遂參溈山山問我聞汝在百丈先師處問一答十問十答百此是汝聰明靈利意解識想生死根本父母未生時試道一句看間被一問直得茫然歸寮將平日著過底文字從頭至尾要尋一句酬對竟不能得乃自嘆曰畫餅不可充飢屢乞溈山説破山曰我若説似汝汝以後罵我去我説底是我底終不干汝事間遂將平昔所看文字燒却曰此生不學佛法也且作箇長行粥飯僧免役心神乃泣辭溈山直過南陽覩忠國師遺迹遂憩止焉一日芟除草木偶拋瓦礫擊竹作聲忽然省悟遽歸沐浴遙禮溈山讚曰和尚大慈恩逾父母當時若為我説破何有今日之事乃有頌曰一擊忘所知更不假修持動容揚古路不墮悄然機處處無蹤迹聲色外威儀諸方達道者咸言上上機溈山聞得謂仰山曰此子徹也仰曰此是心機意識著述得成待某甲親自勘過仰後見間曰和尚讚嘆師弟發明大事你試説看間舉前頌仰曰此是夙習記持而成若有正悟別更説著間又成頌曰去年貧未是貧今年貧始是貧去年貧無卓錐之地今年貧錐也無仰曰如來禪許你會祖師禪未夢見在間復有頌曰我有一機瞬目視伊若也不會別喚沙彌仰乃報溈山曰且喜間師弟會祖師禪也玄覺云且道如來禪與祖師禪分不分長慶稜云一時坐却又葉縣省和尚因僧請益趙州柏樹子話省曰我不辭與汝説還信否僧云和尚重言爭敢不信省曰汝聞簷前雨滴聲麼其僧豁然不覺失聲云㖿省曰汝見箇甚麼道理僧即以頌對云簷頭雨滴分明歷歷打破乾坤當下心息若間與此僧所證亦以音聲為上優波尼沙陀即從座起頂禮佛足而白佛言我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道如來印我名尼沙陀此云塵性空塵色既盡妙色密圓我從色相得阿羅漢佛問圓通如我所證色因為上通曰優波尼沙陀貪著色塵故佛教以不淨觀使對治之色雖可好以從不淨大可厭也況身後白骨微塵諸不淨相一胮脹二膿爛三異赤四青瘀五啄噉六離散七骸骨八焚燒九一切世間不可保是名九想法九想成時色性畢竟歸空空無所空是為色空二無得慧解脫成無學道塵色既盡妙色密圓豈離塵色而別有所謂妙色者乎豈空其色相而能空者即為妙色乎豈色相有生滅而色性無生滅即為妙色乎抑豈心無貪著而一切色皆妙色乎此尼沙陀悟處應難以口吻宣述但謂之曰妙曰密曰圓而已昔七賢女遊尸陀林一女指尸曰尸在這裏人向甚麼處去一女曰作麼作麼諸姊諦觀各各契悟感帝釋散華曰唯願神姊有何所須我當終身供給女曰我家四事七珍悉皆具足唯要三般物一要無根樹子一株二要無陰陽地一片三要叫不應山谷一所帝釋曰一切所須我悉有之若三般物我實無得女曰汝若無此爭解濟人帝釋罔措遂同往白佛佛言憍尸迦我諸弟子大阿羅漢不解此義唯有諸大菩薩乃解此義此亦觀不淨相而得證者也又靈雲因見桃華悟道有頌云三十年來尋劍客幾回落葉又抽枝自從一見桃華後直至如今更不疑舉似溈山山云從緣入者永不退失汝善護持玄沙云諦當甚諦當敢保老兄未徹在雲云師兄徹也未覺範頌云靈雲一見不再見紅白枝枝不著華叵耐釣魚船上客却來平地摝魚蝦投子頌云山前桃發故園春華綻紅枝省此身證處謝君旁著力笑顏雖展意生嗔煙鎖緑楊鶯囀緩雨侵石筍倚空鄰金烏放出無消息木馬嘶聲過漢秦據靈雲見處亦以色因為上香嚴童子即從座起頂禮佛足而白佛言我聞如來教我諦觀諸有為相我時辭佛宴晦清齋見諸比丘燒沉水香香氣寂然來入鼻中我觀此氣非木非空非煙非火去無所著來無所從由是意銷發明無漏如來印我得香嚴號塵氣倐滅妙香密圓我從香嚴得阿羅漢佛問圓通如我所證香嚴為上通曰凡所有相皆是虗妄見諸相非相即見如來如來者即諸法如義來無所從去無所至故名如來此金剛般若之旨香嚴與聞此教恆自諦觀偶觸香氣遂爾發明此香寂然入我鼻中非煙非火非木非空非自相非他相非共相非無因相去無所著來無所從本自無生此見諸相非相即見如來義也故得無漏凡夫不能無漏者意根未銷也意根未銷故著有為一著有為即落生滅意銷即證無為無為即無生滅故塵氣倐生倐滅而妙香無生無滅香嚴悟處一切分疏不下曰密曰圓乃其所自證者耳昔黃山谷太史因圓通秀激發往依晦堂乞指徑捷處堂曰秪如仲尼道二三子以我為隱乎吾無隱乎爾太史居常如何理論公擬對堂曰不是不是公迷悶不已一日侍堂山行次時巖桂盛放堂曰聞木犀華香麼公曰聞堂曰吾無隱乎爾公釋然即拜之曰和尚得甚麼老婆心切堂笑曰秪要公到家耳又尼有悟道者偈曰終日尋春不見春芒鞋踏遍隴頭雲歸來笑拈梅華嗅春在枝頭已十分此尼與山谷所證亦以香嚴為上藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言我無始劫為世良醫口中嘗此娑婆世界草木金石名數凡有一萬八千如是悉知苦酢鹹淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能遍知承事如來了知味性非空非有非即身心非離身心分別味因從是開悟蒙佛如來印我昆季藥王藥上二菩薩名今於會中為法王子因味覺明位登菩薩佛問圓通如我所證味因為上通曰無始劫來為世良醫但能知味冷熱足以療病而已及事如來始知知味性空有俱非不即不離夫空有俱非不即不離如來藏中妙明圓心體本如是因味開悟覺明自性故登菩薩位彼所云覺者如來藏中性味真空性空真味清淨本然周遍法界即味即覺即覺即味此其悟有難以語人者大愚辭歸宗宗問甚麼處去曰諸方學五味禪去宗曰諸方有五味禪我這裏秪有一味曰如何是一味禪宗便打愚曰會也會也宗曰道道愚擬開口宗又打後僧到黃檗舉前話檗上堂曰馬大師出八十四人善知識問著箇箇屙漉漉地秪有歸宗較些子唯檗深明一味禪故與歸宗相見後即用此機接臨濟濟不契指往大愚既見大愚述三度被打因緣愚曰黃檗為你得徹困却來這裏問有過無過濟言下大悟曰元來黃檗佛法無多子愚搊住曰速道速道濟從肋下祝三祝愚托開曰汝師黃檗非干我事愚方欲展歸宗家風早被臨濟奪却故知濟見處先一頭地隆興法居禪師晚見黃龍深蒙印可上堂云此事如醫家驗病方且雜毒滿腹未易攻治必瞑眩之藥而後可瘳就令徇意投之適足滋其狂惑增其沉痼求其已病不亦左乎法堂前草深於心無愧即此數則融通不唯知味且能療人跋陀婆羅此云賢護并其同伴十六開士即從座起頂禮佛足而白佛言我等先於威音王佛聞法出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家令得無學彼佛名我跋陀婆羅妙觸宣明成佛子住佛問圓通如我所證觸因為上通曰雪竇舉古有十六開士於浴僧時隨例入室忽悟水因諸禪德作麼生會他道妙觸宣明成佛子住也須七穿八穴始得頌云了事納僧消一箇長連床上展腳臥夢中曾説悟圓通香水洗來驀面唾此現成公案後來諸老宿更與重重發明韶國師初參龍牙問天不蓋地不載此理如何牙曰道者合如是凡經十七次問牙秪如是答再請垂誨牙曰道者汝已後自會去後於通玄峯澡浴次忽省前話遂具威儀遙望龍牙禮拜曰當時若向我説今日決定罵也後參法眼有僧問法眼如何是曹溪一滴水眼曰是曹溪一滴水僧惘然而退師於坐側豁然開悟平生疑滯渙若氷釋至此方得七穿八穴嘗有偈曰通玄峯頂不是人間心外無法滿目青山法眼聞云即此一偈可起吾宗又石梯和尚因侍者請浴梯曰既不洗塵亦不洗體汝作麼生者曰和尚先去某甲將皂角來梯呵呵大笑幾被侍者驀面一唾僧問天蓋幽禪師有一院名無垢淨光禪院化造浴室有人問既是無垢淨光為甚麼却造浴室僧無語天蓋代云三秋明月夜不是騁團圓丹霞更為出語頌曰雖然答盡深深意爭奈投機句未親欲會本來無垢的更須入水見長人空室道人智通者龍圖范珣女嘗謁死心印可居金陵設浴堂揭榜於門曰一物也無洗箇甚麼纖塵若有起自何來道取一句子玄乃可大家入浴古靈秪解揩背開士何曾明心欲證離垢地時須是通身汗出盡道水能洗垢焉知水亦是塵直饒水垢頓除到此亦須洗却後為尼名惟久諸尊宿夢中説夢重重指出妙觸宣明可與十六開士同參摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利然燈續明以紫金光塗佛形像自爾以來世世生生身常圓滿紫金光聚此紫金光比丘尼等即我眷屬同時發心我觀世間六塵變壞唯以空寂修於滅盡身心乃能度百千劫猶如彈指我以空法成阿羅漢世尊説我頭陀此云抖擻為最妙法開明銷滅諸漏佛問圓通如我所證法因為上通曰前云諸滅盡定得寂聲聞唯大迦葉久滅意根圓明了知不因心念彼唯悟法空寂成阿羅漢六塵之生依空而生六塵之滅滅歸於空塵有生滅空性不壞抖擻法塵即是空法意不緣法得無生滅故能度百千劫猶如彈指至今持佛金襴袈裟於雞足山入定待彌勒下生授之亦其驗也紫金光比丘尼宿為貧女迦葉為鑄師女以金少許託鑄佛面願生生世世為無情夫婦感九十一劫生天身常圓滿紫金光聚今值佛出家果酬宿願永嘉玄覺禪師遍探三藏精天台止觀圓妙法門於四威儀中常冥禪觀後因左溪朗禪師激勵與東陽策禪師同詣曹溪初到振錫繞祖三匝卓然而立祖曰夫沙門者具三千威儀八萬細行大德自何方而來生大我慢覺曰生死事大無常迅速祖曰何不體取無生了無速乎覺曰體即無生了本無速祖曰如是於時大衆無不愕然覺方具威儀參禮須臾告歸祖曰返大速乎覺曰本自非動豈有速耶祖曰誰知非動覺曰仁者自生分別祖曰汝甚得無生之意覺曰無生豈有意耶祖曰無意誰當分別覺曰分別亦非意祖歎曰善哉善哉少留一宿時謂之一宿覺此非久滅意根得無生忍安能應答如響一至於是自憍陳那至此六聖曰妙音曰妙色曰妙香曰妙觸皆曰妙者不縛於塵者也此由六塵而證圓通者阿那律陀即從座起頂禮佛足而白佛言我初出家常樂睡眠如來訶我為畜生類我聞佛訶啼泣自責七日不眠失其雙目世尊示我樂見照明金剛三昧我不因眼觀見十方精真洞然如觀掌果如來印我成阿羅漢佛問圓通如我所證旋見循元斯為第一通曰阿那律陀白飯王子於佛為堂弟過去世以一飯施辟支佛感九十一劫受如意樂佛嘗訶之曰咄咄何為睡螺螄蚌蛤類一睡一千年不聞佛名字因此激發喪目乃得半頭天眼智論云那律天眼四大造色半頭清淨佛天眼四大造色遍頭清淨樂見照明金剛三昧即旋見循元法門明屬所照屬能明之所在照能照之照之所在見能見之照從何起見從何來至於見無所見照無所照即得金剛三昧覿體見元矣金剛能摧壞故見照俱亡三昧即正定乃寂照本體也樂此觀照即是旋見循元至得天眼則非思議所及德山初到龍潭至法堂曰久嚮龍潭及乎到來潭又不見龍又不現潭引身曰子親到龍潭據此初到機緣合受龍潭衣鉢一夕侍立次潭曰更深何不下去山珍重便出却回曰外面黑潭點紙燭度與山山擬接潭復吹滅山於此大悟便禮拜潭曰子見箇甚麼山曰從今向去更不疑天下老和尚舌頭也來日潭升座謂衆曰可中有箇漢牙如劒樹口似血盆一棒打不回頭他日向孤峯頂上立吾道去在山將疏鈔堆法堂前舉火炬曰窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑逐焚之禮辭而去若德山所得法眼於阿那律陀較多少臨濟將示滅説偈曰沿流不止問如何真照無邊説似他離相離名人不稟吹毛用了急須磨復謂衆曰吾滅後不得滅却吾正法眼藏三聖出曰爭敢滅却和尚正法眼藏濟曰已後有人問你向他道甚麼聖便喝濟曰誰知吾正法眼藏向這瞎驢邊滅却天童頌云信衣夜半付盧能攪攪黃梅七百僧臨濟一枝正法眼瞎驢滅却得人憎心心相印祖祖傳燈夷平海嶽變化鵾鵬只箇名言難比擬大都手段解翻騰到此分齊即正法眼藏也須滅却何況天眼周利槃特迦此云蛇奴即從座起頂禮佛足而白佛言我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前佛愍我愚教我安居調出入息我時觀息微細窮盡生住異滅諸行剎那其心豁然得大無礙乃至漏盡成阿羅漢住佛座下印成無學佛問圓通如我所證反息循空斯為第一通曰此即誦帚比丘也過去世為法師吝法感愚鈍報雖乏多聞終鮮散亂故能於調息得入息之粗細由心生滅心漸息故息漸微心息相依至窮盡生住異滅諸行剎那極微細相息即無息心即無心一殺那頃透入金剛乾慧地故得豁然無礙此悟境也非言思所及昔莫將尚書因官西蜀謁南堂靜禪師咨決心要堂使其向好處提撕適入廁俄聞穢氣急以手掩鼻遂有省即呈偈曰從來姿韻愛風流幾笑時人向外求萬別千差無覓處得來原在鼻尖頭南堂答曰一法才通法法周縱橫妙用更何求青蛇出匣魔軍伏碧眼胡僧笑點頭此亦反息循空忽然證入幾與誦帚比丘覿面憍梵鉢提即從座起頂禮佛足而白佛言我有口業於過去劫輕弄沙門世世生生有牛呞病如來示我一味清淨心地法門我得滅心入三摩地觀味之知非體非物應念得超世間諸漏內脫身心外遺世界遠離三有如鳥出籠離垢銷塵法眼清淨成阿羅漢如來親印登無學道佛問圓通如我所證還味旋知斯為第一通曰憍梵鉢提異舌知味以有牛呞病故牛旁生唯知草木而已今舌相如牛而能了別衆味緣於舌本觀味旋知味有多種知無兩般此知未旋心即未滅即為有漏旋知歸無知無所知故得無漏此知不於根生非體也不於境有非物也非體故內脫身心非物故外遺世界以是離於心垢銷於外塵得意生身常居天上受天人供佛為遮謗故賜之數珠令常念佛是謂一味清淨法門無始以來舌根所造諸業應時清淨因此得寂滅心入乎正定蓋味乎道矣仰山送果子上溈山溈接得問子甚麼處得來仰曰家園底溈曰堪喫也未仰曰未敢嘗先獻和尚溈曰是阿誰底仰曰是慧寂底溈曰既是子底因甚麼教我先嘗仰曰和尚嘗千嘗萬溈便喫曰猶帶酸澀在仰曰酸澀莫非自知溈不答又玄沙與韋監軍喫果子次韋問如何是日用而不知沙拈起果子曰喫韋喫果子了再問沙曰秪這是日用而不知仰山曰自知玄沙曰不知知而不知不知而知還味旋知應如是見如是知方名法眼清淨畢陵伽婆蹉此云餘習即從座起頂禮佛足而白佛言我初發心從佛入道數聞如來説諸世間不可樂事乞食城中心思法門不覺路中毒刺傷足舉身疼痛我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺我又思惟如是一身寧有雙覺攝念未久身心忽空三七日中諸漏虗盡成阿羅漢得親印記發明無學佛問圓通如我所證純覺遺身斯為第一運曰畢陵伽婆蹉呼河神為婢子有宿生尊貴習氣在不能遺身故於毒刺傷足舉身疼痛乃能省入雖有能覺覺於所痛覺乃清淨心離於能所非痛所及痛是所覺覺能覺之覺是能覺痛不能痛之一痛一不痛既覺痛又覺不痛豈一身而有雙覺耶覺唯一真覺痛是妄由是攝念外忘其身所覺既泯內忘其心能覺亦化身心忽空斯證無學止一清淨覺故曰純覺既證純覺能所俱離乃能遺身既能遺身則諸世間不可樂事當即解脫昔第四祖優婆鞠多有著身見者求度祖曰求度之法要信吾言不違吾教人曰既來投師固當聞命祖乃化一險崖山聳喬木令其上樹又於樹下化作大坑深廣千肘祖令放腳其人受教即放二腳令放一手便放一手令復放手其人答曰若復放手便墮坑死祖曰先約受教如何違我是時其人身愛即滅放手而墮不見樹坑即證道果玄沙初欲遍歷諸方參尋知識攜囊出嶺築著腳趾流血痛楚歎曰是身非有痛從何來便回雪峯峯問那箇是備頭陀沙曰終不敢誑於人又一日峯召曰備頭陀何不遍參去沙白達磨不來東土二祖不往西天峯然之雲門初參睦州州才見來便閉却門門乃扣門州曰誰門曰某甲州曰作甚麼門曰己事未明乞師指示州開門一見便閉却門如是連三日扣門至第三日州開門門乃拶入州復擒住曰道道門擬議州便推出曰秦時𨍏轢鑽遂掩門損門一足門遂徹悟州乃指見雪峯若玄沙雲門亦畢陵伽婆蹉再來者也依然傷足習氣不除須菩提即從座起頂禮佛足而白佛言我曠劫來心得無礙自憶受生如恆河沙初在母胎即知空寂如是乃至十方成空亦令衆生證得空性蒙如來發性覺真空空性圓明得阿羅漢頓入如來寶明空海同佛知見印成無學解脫性空我為無上佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一通曰須菩提自曠劫來識得空性但知偏空而已蒙佛發明性覺真空乃知空生大覺中如海一漚發故謂寶明空海偏空即不圓真空即圓偏空即未解脫真空即解脫非頓入真空者猶坐二乘見不能同佛知見也諸相入非者初以單空空其諸相非所非盡者次以重空空其空相始也旋相歸無既也旋法歸無人法雙空故能歸於寶明空海如宴坐巖中見如來法身佛亦云須菩提先見我法身此亦同佛知見之一驗也僧智常參六祖祖問曰汝從何來欲求何事對曰學人近往洪州白峯山禮大通和尚蒙示見性成佛之義未決狐疑遠來投禮伏望和尚指示祖曰彼有何言句汝試舉看曰智常到彼凡經三月未蒙示誨為法切故一夕獨入丈室請問如何是某甲本心本性大通乃曰汝見虗空否對曰見彼曰汝見虗空有相貌否對曰虗空無形有何相貌彼曰汝見本性猶如虗空了無一物可見是名正見無一物可知是名真知無有青黃長短但見本源清淨覺體圓明即名見性成佛亦名如來知見學人雖聞此説猶未決了乞和尚開示祖曰彼師所説猶存知見故令汝未了吾今示汝一偈偈曰不見一法存無見大似浮雲遮日面不知一法守空知猶如太虗生閃電此之知見瞥然興錯認何曾解方便汝當一念自知非自己靈光常顯現此即寶明空海也常聞偈已心意豁然乃述偈曰無端起知見著相求菩提情存一念悟寧越昔時迷自性覺源體隨照枉遷流不入祖師室茫然趨兩頭可謂一念知非非所非盡矣自阿那律陀至此五聖曰旋見曰反息曰還味曰旋法皆返流全一由六根而證圓通者也不以觀音返聞列於此者圓通極果鄰於佛位故當壓後舍利弗即從座起頂禮佛足而白佛言我曠劫來心見清淨如是受生如恆河沙世出世間種種變化一見則通獲無障礙我於中路逢迦葉波兄弟相逐宣説因緣悟心無際從佛出家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生佛問圓通如我所證心見發光光極知見斯為第一通曰舍利弗初在母腹其母慧辨過於舅舅曰是兒生智慧不可敵乃往南天竺學法無剪爪暇是為長爪比丘舍利弗生九歲即能論議屈其衆為國君所重嘗與目犍連友善約曰得甘露味幸相與共之目犍連道逢馬勝比丘問汝師説何法勝曰諸法從緣生諸法從緣滅我師大沙門常作如是説連即開明證初果速往報舍利弗亦於言下證初果二人同往謁佛佛遙見二子謂衆曰此吾二大弟子也一智慧第一一神通第一舍利弗心見最利從佛出家七日而遍達佛法經十五日成阿羅漢故稱智慧第一為佛長子心見不屬根識故能內瑩發光光極知見即見覺明圓得大無畏也見未徹者即有疑即有畏舍利弗九歲論議已得無畏至此遍達佛法方名大無畏也長慶稜禪師初參雪峯問從上諸聖傳受一路請師垂示峯良久稜設禮而退峯乃微笑如是往來雪峯玄沙二十年坐破七箇蒲團不明此事一日捲簾忽然大悟乃有頌曰也大差也大差捲起簾來見天下有人問我解何宗拈起拂子劈口打峯舉謂玄沙曰此子徹也沙曰不可此是意識著述更須勘過始得至晚衆僧上來問訊峯謂稜曰備頭陀未肯汝在汝實有正悟對衆舉來稜又有頌曰萬象之中獨露身唯人自肯乃方親昔日謬向途中覓今日看來火裏氷峯乃顧沙曰不可更是意識著述夫看來如火裏氷者一見則通獲無障礙稜禪師可謂具眼普賢菩薩即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名世尊我用心聞分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁護定慰令其成就佛問圓通我説本因心聞發明分別自在斯為第一通曰行彌法界曰普位鄰極聖曰賢普賢已證果位茲説本因從心聞發明分別自在盡虗空界無非心聞所及分別修普賢行者而擁護之中有一種自在三昧非有一毫作為其間良由所證法身已充滿法界念初動處即為行願之所德用無礙體即用用即體故曰自在觀音從耳根返聞故得寂滅現前普賢從耳識發明故得分別自在曰現前則未嘗不分別曰自在則未嘗不寂滅二聖所證實無優劣曇翼初入廬山依遠公後還會稽於秦望山誦法華經十二載感普賢菩薩化女子身披采服攜筠籠一白豕大蒜兩根至翼前曰妾入山采蕨日已斜豺狼縱橫歸無生理敢託一宿翼却之力女復哀鳴不已遂令居草床上夜半號呼腹痛告翼按摩翼辭以持戒不應手觸女號呼愈甚翼乃以布裹錫杖遙為按之翼日女以采服化祥雲豕變白象蒜化雙蓮凌空而上謂翼曰我普賢菩薩特來相試爾郡太守孟顗聞於朝敕建法華寺其事頗與觀音試吳道子略同分身示現摩頂安慰蓋莫可殫述東土如此恆沙界外可知僧問長沙善財為甚麼無量劫遊普賢身中世界不遍沙曰你從無量劫來還遊得遍否曰如何是普賢身沙曰含元殿裏更覓長安又僧辭大隨隨問什麼處去僧曰峩嵋禮普賢去隨竪起拂子云文殊普賢秪在這裏僧畫一圓相拋在背後隨云侍者將一貼茶與這僧天童拈云識法者懼欺敵者亡水中擇乳須是鵝王這僧既説禮普賢去却又拋在背後難免大隨檢點還識得在這裏麼更覓長安則不可孫陀羅難陀此云好愛歡喜即從座起頂禮佛足而白佛言我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏世尊教我及拘絺羅此云大膝觀鼻端白我初諦觀經三七日見鼻中氣出入如煙身心內明圓洞世界遍成虗淨猶如琉璃煙相漸銷鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢世尊記我當得菩提佛問圓通我以銷息息久發明明圓滅漏斯為第一通曰此難陀佛親弟也好愛其妻心常散動佛多方調伏之乃得證果前調息依根也由粗入細由細入無所以返乎根此觀白依識也氣初如煙既成白卒化為光明所以發乎識鼻中之氣何以如煙息由風火而起鼓煩惱濁故其狀如煙及淨觀發明身心洞徹煩濁漸消故鼻息成白心開漏盡無復煩惱內瑩發光所見世界猶如琉璃豈有鼻息不化為光明者乎此二種養生家以為祕傳儻於圓通有證安往而非佛種也昔百丈侍馬祖行次見一羣野鴨飛過祖曰是甚麼丈曰野鴨子祖曰甚處去也丈曰飛過去也祖遂把丈鼻搊負痛失聲祖曰又道飛過去也丈於言下有省歸侍者寮哀哀大哭同事問曰汝憶父母耶曰無曰被人罵耶曰無曰哭作甚麼曰我鼻孔被大師搊得痛不徹曰有甚因緣不契丈曰你問取和尚去同事問大師曰海侍者有何因緣不契在寮中哭告和尚為某甲説大師曰是伊會也汝自問取他同事歸寮曰和尚道汝會也教我自問汝丈乃呵呵大笑同事曰適來哭如今為甚却笑丈曰適來哭如今笑同事罔然次日馬祖升堂衆才集丈出卷却席祖便下座丈隨至方丈祖曰我適來未曾説話汝為甚便卷却席丈曰昨日被和尚搊得鼻孔痛祖曰汝昨日向甚處留心丈曰鼻孔今日又不痛也祖曰汝深明昨日事丈作禮而退雪竇頌云野鴨子知何許馬祖見來相共語話盡山雲海月情依前不會還飛去欲飛去却把住道道還有人道得麼須如百丈鼻孔痛不徹始得光明照十方界頓證圓通富樓那彌多羅尼子即從座起頂禮佛足而白佛言我曠劫來辨才無礙宣説苦空深達實相如是乃至恆沙如來祕密法門我於衆中微妙開示得無所畏世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我説法無上佛問圓通我以法音降伏魔怨銷滅諸漏斯為第一通曰此取舌根宣揚圓滿一千二百功德故不以嘗味顯舌識也了知苦無苦相空無空相名為深達實相即於苦空宣説實相是為祕密法門微妙開示洞徹法源故得無畏佛以身口意三輪應物無滯滿慈子僅以音聲輪成阿羅漢內則銷滅諸漏密證實相外則廣宣祕密降伏魔怨辨才無礙説法第一皆由舌識而得圓通者也亮座主參馬祖祖問曰見説座主大講得經論是否亮云不敢祖云將甚麼講亮云將心講祖曰心如工伎兒意如和伎者爭解講得經亮抗聲曰心既講不得虗空莫講得麼祖曰却是虗空講得亮不肯便出將下階祖召云座主亮回首豁然大悟便禮拜祖曰這鈍根阿師禮拜作麼亮歸寺告聽衆曰某甲所講經論謂無人及得今日被馬大師一問平日工夫氷銷瓦解徑入西山更無蹤迹不幾乎銷滅諸漏哉又蹣菴成禪師對衆曰諸仁者當知我今一喝能入五教良久高聲一喝問曰還聞麼衆曰聞成曰汝今聞此一喝為有是入小乘教復問曰汝今還聞否曰不聞成曰汝今不聞則此一喝是無是入大乘始教我初喝時汝既道有喝久聲銷汝復道無然道無則從前是有道有則即今是無此乃不有不無是入大乘終教我初有喝之時有非是有因無故有無喝之時無非是無因有故無此乃即有即無是入頓教我於一喝不作一喝用有無不立悟解兩忘道有之時纖毫不立道無之時橫遍虗空即此一喝即百千萬億喝百千萬億喝即此一喝是入圓教諸辨論甚多聞者屈服不幾乎降伏魔怨哉優婆離此云近執太子近侍即從座起頂禮佛足而白佛言我親隨佛踰城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏承佛教誡如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢我是如來衆中綱紀親印我心持戒修身衆推為上佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一通曰如來六年勤苦凡外道所不能行者佛悉行之故能制諸外道又解脫世間貪欲諸漏故魔不能嬈即以兵兵之悉化為蓮華而諸魔伏皆由身執戒行三千八萬無不圓滿所以魔外拱手而嘆服也行住坐臥律儀名二百五十對三聚成三千復以三千配身三口四七支成二萬一千復配四分煩惱成八萬四千佛制此律教戒沙門令其身心俱獲清淨濁邊過患如殺盜淫妄性元是罪不待制止犯即成業故曰性業餘因過始制制前犯即無罪故曰遮業二業悉除即得寂滅始以執身身得自在性業清淨之謂也次第執心心得通達遮業清淨之謂也執身而及於心者心為身識身識既滅故真智現前淨戒有智慧便得第一道此優婆離持戒第一為衆綱紀也至身心一切通利蓋進乎悟矣豈徒身之執乎哉婆修槃頭尊者此云遍行常一食不臥六時禮佛清淨無欲為衆所歸二十祖闍夜多尊者將欲度之先問彼衆曰此遍行頭陀能修梵行可得佛道乎衆曰我師精進何故不可祖曰汝師與道遠矣設使苦行歷於塵劫皆虗妄之本也衆曰尊者蘊何德行而議我師祖曰我不求道亦不顛倒我不禮佛亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲心無所希名之曰道時遍行聞已發無漏智歡喜讚嘆祖又語彼衆曰會吾語否吾所以然者為其求道心切夫絃急即斷故吾不贊令其住安樂地入諸佛智復告遍行曰吾適對衆抑挫仁者無得惱於衷乎遍行曰我憶念七劫前生常安樂國師於智者月淨記我非久當證斯陀含果時有大光明菩薩出世我以老故策杖禮謁師叱曰重子輕父一何鄙哉時我自謂無過請師示之師曰汝禮大光明菩薩以杖倚壁畫佛面以此過慢遂失二果我責躬悔過以來聞諸惡言如風如響況今獲飲無上甘露而反生熱惱耶唯願大慈以妙道垂誨祖曰汝久植衆德當繼吾宗遂付法偈曰言下合無生同於法界性若能如是解通達事理竟是為二十一祖夫不修梵行而冀得無上菩提者從古未之聞也大目犍連即從座起頂禮佛足而白佛言我初於路乞食逢遇優樓頻螺此云木瓜窿伽耶象頭山那提河名三迦葉波大龜氏宣説如來因緣深義我頓發心得大通達如來惠我袈裟著身鬚髮自落我遊十方得無罣礙神通發明推為無上成阿羅漢寧唯世尊十方如來嘆我神力圓明清淨自在無畏佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一通曰人不能圓明清淨者由意識流逸奔塵故其心為形用不為神用若識不流逸旋歸妙湛如澄濁流久得清瑩心光發宣神通自在即意識得無礙也六通唯漏盡是其內證餘五皆屬外用圓覺經曰如幻三摩提如苗漸增長故須久積乃能瑩潔僧寶志初唯習定定久忽獲神通鄧隱峯禪師冬居衡嶽夏止清涼元和中吳元濟阻兵違拒王命官軍與賊交鋒未決勝負峯曰吾當去解其患乃擲錫空中飛身而過兩軍將士仰觀事符預夢鬬心頓息峯既顯神異慮成惑衆遂入五臺於金剛窟前將示滅先問衆曰諸方遷化坐去臥去吾嘗見之還有立化者無衆曰有峯曰還有倒立者否衆曰未嘗見也峯乃倒立而化亭亭然其衣順體時衆舁就茶毗屹然不動遠近瞻覩驚嘆無已峯有妹為尼時亦在彼乃拊而咄曰老兄疇昔不循法律死熒惑於人於是以手推之僨然而踣神通固是果位明眼人不貴仰山升座有梵僧從空而至仰曰近離甚處曰西天仰曰幾時離彼曰今早仰曰何太遲生曰遊山玩水仰曰神通遊戲則不無闍黎佛法還須老僧始得曰特來東土禮文殊却遇小釋迦遂出梵書貝多葉與仰乘空而去仰山示衆曰我今分明向汝説聖邊事且莫將心湊泊但向自己性海如實而修不要三明六通何以故此是聖末邊事如今且要識心達本但得其本不愁其末他時後日自具去在若未得本縱饒將情學他亦不得汝豈不見溈山和尚云凡聖情盡體露真常事理不二即如如佛此圓明清淨正脈路也自舍利弗至此曰心見曰心聞曰心光不因根不因境脫去根塵了無惑習此由六識而證圓通者也烏芻瑟摩火頭金剛於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲有佛出世名曰空王説多淫人成猛火聚教我遍觀百骸四肢諸冷暖氣神光內凝化多淫心成智慧火從是諸佛皆呼召我名為火頭我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔怨佛問圓通我以諦觀身心暖觸無礙流通諸漏既銷生大寶𦦨登無上覺斯為第一通曰前七大中性火真空性空真火清淨本然周遍法界火光三昧原具有不可思議力故而火頭金剛乃以神光內凝化多淫心成智慧火正於真火初動處返本還源歸於清淨故成智慧多淫人暖氣迫發生為欲火死為業火業力增熾故成猛火聚彌勒菩薩曰男女展轉二二交會不淨流出欲界諸天雖行淫欲無此不淨然於根門有風氣出熱惱便息四天王衆天二二交會熱惱便息如四天王衆天三十三天亦爾時分天唯互相攝熱惱便息知足天唯相執手熱惱便息化樂天相顧而笑熱惱便息他化自在天以目相視熱惱便息豈非其欲漸減其處漸高者乎摩登伽淫心銷歇即證三果火頭金剛諸漏既銷登無上覺又何怪焉溈山侍立百丈次丈問誰溈曰某甲丈曰汝撥爐中有火否溈撥之曰無火丈躬起深撥得少火舉以示之曰汝道無這箇聻溈由是發悟禮謝陳其所解丈曰此乃暫時岐路耳經云欲識佛性義當觀時節因緣時節既至如迷忽悟如忘忽憶方省己物不從他得故祖師曰悟了同未悟無心亦無法祗是無虗妄凡聖等心本來心法原自備足汝今既爾善自護持次日同百丈入山作務丈曰將得火來麼溈曰將得來丈曰在甚處溈乃拈一枝柴吹兩吹度與丈丈曰如蟲禦木妙喜曰百丈若無後語幾被典座熱慢此亦由火大而登無上覺者也豈必諦觀身中諸冷熱氣乃證圓通持地菩薩即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土如是勤苦經無量佛出現於世或有衆生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直毗舍浮佛此云遍一切自在現在世時世多飢荒我為負人無問遠近唯取一錢或有車牛被於泥溺我有神力為其推輪拔其苦惱時國大王延佛設齋我於爾時平地待佛毗舍如來摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸我於法性悟無生忍成阿羅漢回心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證明而為上首佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一通曰諸法平等無有高下心地若平不生分別即不見彼我高下等相則一切皆平持地菩薩從此悟入如來藏妙真如性性色真空性空真色微塵自性不相觸摩本自平等本自無生也即此微塵內而身塵由微塵所積外而界塵亦由微塵所積是微塵原無自性由虗妄發生當虗妄處即當處無生即是妙真如性吾此身塵是妙真如性則此界塵亦妙真如性性本無二塵何差別既無差別乃至刀兵亦無所觸悟此法性觸本不生觸即無觸故無生忍入佛知見也入佛知見乃謂之智即塵非塵故塵自銷不離塵而證智智斯圓矣智圓斯能證明妙法蓮華而成無上道矣溈山一日指田問仰山這畝田那頭高這頭低仰曰却是這頭高那頭低溈曰你若不信向中間立看兩頭仰曰不必立中間亦莫住兩頭溈曰若如是著水看水能平物仰曰水亦無定但高處高平低處低平溈便休若溈仰父子二邊不立中道不安可謂善平心地故一切皆平也有打地和尚者自江西馬大師領旨常晦其明凡學者致問唯以棒打地示之時謂之打地和尚一日被僧藏却捧然後致問但張其口而已僧問門人秪如和尚每日有人問便打地意旨如何門人即於竈內取柴一片擲在釜中非徹盡塵銷智圓得無生忍不能解此旨月光童子即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同見水身中與世界外浮幢王剎諸香水海等無差別我於是時初成此觀但見其水未得無身當為比丘室中安禪我有弟子窺窗觀室唯見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧盼而去我出定後頓覺心痛如舍利弗遭違害鬼我自思惟今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失爾時童子捷來我前説如上事我則告言汝更見水可即開門入此水中除去瓦礫童子奉教復入定時還復見水瓦礫宛然開門除出我後出定身質如初逢無量佛如是至於山海自在通王如來方得亡身與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一通曰太陰水精也水性圓明故號月光最初修習水觀觀於水性無奪者內之精血外之剎海水相雖異而性不相奪惟不相奪初成此觀但見其水此即十遍處定也入定則有出定則無十遍處者青黃赤白地水火風空識如作青想則一切處皆青此定果也隨心所變火光定亦然雖得此定根本無明尚在故不知病緣未得亡身有我見在即是根本無明但見其水一切皆為水故投之瓦礫亦化為水舍利弗於恆沙岸入定違害鬼擊之出定頭痛佛曰汝無定力身當碎壞矣違害夜叉鬼王之名乃身子過去之怨也浮幢王剎準華嚴經華藏海中有大蓮華其蓮華中有諸香水一一香水海為諸佛剎世界之種華藏世界在香水中故曰浮幢王剎華藏十二重纍高如幢最為高大故稱王月光初證法身方得亡變易之身與諸香水海性合真空如來藏中性水真空性空真水清淨本然周遍法界一味流通并忘其不相凌奪之相矣此依水大而證圓通逢無量佛乃克有成詎可易言乎哉洞山辭雲巖臨行問百年後忽有人問還邈得師真否如何秪對巖良久曰秪這是山沉吟巖曰價闍黎承當箇事大須審細山猶涉疑後因過水覩影大悟有偈曰切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如洞山至是方得亡身性合真空無二無別也船子和尚與同參道吾相別次謂道吾曰他後有靈利座主指一箇來道吾到京口遇夾山上堂僧問如何是法身山曰法身無相問如何是法眼山曰法眼無瑕道吾不覺失笑山乃下座請問道吾某甲適來秪對僧語必有不是致令上座失笑望上座不吝慈悲吾曰和尚一等出世未有師在華亭參船子和尚去曰訪得獲否吾曰此人上無瓦片遮頭下無卓錐之地山遂易服直造華亭船子才見便問大德住甚麼寺曰寺即不住住即不似曰不似又不似箇甚麼曰不是目前法曰甚處學得來曰非耳目之所到曰一句合頭語萬劫繫驢橛勘破了也船子又問垂絲千尺意在深潭離鈎三寸子何不道山擬開口便以篙打落水中才上船又曰道道擬開口又打夾山忽然大悟乃點頭三下船子曰竿頭絲線從君弄不犯清波意自殊這些子便是師承山遂問拋綸擲釣師意如何曰絲懸淥水浮定有無之意山曰語帶玄而無路舌頭談而不談船子曰釣盡江波金鱗始遇山乃掩耳船子曰如是如是果然是箇靈利座主遂囑曰汝向去藏身處須沒蹤迹沒蹤迹處莫藏身吾二十年在藥山只明斯事汝今既得他後不得住城隍聚落但向深山裏钁頭邊覓取一箇半箇接續無令斷絶夾山乃辭行頻頻回顧船子遂喚闍黎闍黎夾山回首船子竪起橈云汝將謂別有乃覆船入水而逝後華亭有性空菴主書寄雪竇持禪師曰吾將水葬矣後持至見其尚存以偈嘲之曰咄哉老性空剛要餧魚鱉去不索性去秪管向人説空笑曰待兄來證明耳遍告四衆衆集為説法要仍説偈曰坐脫立亡不若水葬一省柴燒二省開壙撒手便行不妨快暢誰是知音船子和尚高風誰繼百千年一曲漁歌少人唱遂盤坐盆中順流而下衆皆隨至海濱望欲斷目師取塞戽水而回衆擁觀水無所入復乘流而往唱曰船子當年返故鄉沒蹤迹處妙難量真風偏寄知音者鐵笛橫吹作散場其笛聲嗚咽頃於蒼茫間見以笛擲空而沒斯誠一味流通得無生忍者僧問雲門佛法如水中月是否門曰清波無透路曰和尚從何得入門曰再問復何來曰正與麼時如何門曰重疊關山路更須往見船子始得琉璃光法王子即從座起頂禮佛足而白佛言我憶往昔經恆沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及衆生身皆是妄緣風力所轉我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我時覺了此羣動性來無所從去無所至十方微塵顛倒衆生同一虗妄如是乃至三千大千一世界內所有衆生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙逢佛未幾得無生忍爾時心開乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一妙心斯為第一通曰東方有琉璃光如來行願與彌陀無二此法王子當如觀音勢至等何為觀察風力無依入三摩地風性動因動有聲故無量聲開示菩薩觀此世界衆生如一器中貯百蚊蚋啾啾亂鳴皆是妄緣風力所轉風之動也最微其力最大充塞法界無處不周如身動止與心動念此其近而可見者如界變遷與世流轉此其遠而不可見者可見不可見均此動也即此動性來無所從去無所至周遍世間無有方所唯其無所本無生滅唯無生滅本自不動於此觀察得無生忍即悟菩提入三摩地也此即動中有不動性在非必離動而別有所謂不動也東方屬震震動也東方有不動佛國即動而靜此即本覺妙明之旨也性覺妙明本自非動本覺明妙即動而無動錯綜言之總一妙真如性十方如來共此一妙心也若離動以求靜則非妙矣本覺堅明風金相摩故光如琉璃洞徹無礙傳一妙心不但自證圓通且令世界衆生凡有此動性者無不證圓通也高沙彌初參藥山山問甚處來曰南嶽來曰何處去曰江陵受戒去曰受戒圖甚麼曰圖免生死曰有一人不受戒亦無生死可免汝還知否高於言下大悟曰恁麼則佛戒何用山曰這沙彌猶挂唇齒在高禮拜而退道吾來侍立山曰適來有箇跛腳沙彌却有些子氣息吾曰未可全信更須勘過始得至晚山上堂召曰早來沙彌在甚麼處高出衆立山問我聞長安甚閙你還知否高曰我國宴然山欣然曰子從看經得從請益得高云不從看經得亦不從請益得山云大有人不看經不請益為甚麼不得高云不道不得自是他不肯承當山回顧道吾雲巖曰不信道投子頌曰興亡雲去與雲來渠無國土絶塵埃須彌頂上無根草不受春風華自開若沙彌見處乃見東方不動佛國不為妄緣風力所轉麻谷持錫到章敬繞禪床三匝振錫一下卓然而立敬云是是又到南泉繞禪床三匝振錫一下卓然而立泉云不是不是谷云章敬道是和尚為甚麼道不是泉云章敬即是是汝不是此是風力所轉終成敗壞天童頌云是汝不是好看捲䙡似抑似揚難兄難弟縱也彼既臨時奪也我何特地金錫一振太孤標禪床三匝間遊戲叢林擾擾是非生想像體髏前見鬼雪竇頌云此錯彼錯切忌拈却四海浪平百川潮落古策風高十二門門門有路空蕭索非蕭索作者好求無病藥若知無病藥則叢林是非不生自不為風力所轉虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛所得無邊身爾時手執四大寶珠照明十方微塵佛剎化成虗空又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙身能善入微塵國土廣行佛事得大隨順此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一通曰虗空藏菩薩已同如來於定光佛所證得三身四智矣三身唯重法身故言得無邊身四智唯重大圓鏡智故曰又於自心現大圓鏡無邊法身虗空無際何以能與四大不相妨礙良由諦觀四大無依色質皆空清淨四大猶如寶珠以觀照力照明十方化成虗空即四大為虗空即虗空為法身也何礙之有本一大圓鏡智何以放十種寶光良由修行十種波羅蜜微妙圓滿總於鏡內自在發現流灌十方盡虗空際唯一鏡所攝是鏡即身也身即鏡也三身即是四智四智即是三身身智互融心境俱化故曰諸幢王剎來入境內涉入我身光影交涉不可分別唯身是智故同虗空不相妨礙唯智是身故能善入國土廣行佛事而説三乘之法得大隨順而循四悉之機視妄想生滅即是虗空虗空與妄想生滅無二視國土即是佛性佛性與國土無別理不礙事事不礙理於同發明得無生忍證得虗空無邊身妙力圓明身剎互入但證理事無礙法界云爾若鏡鏡相涉重重帝網一即一切一切即一乃事事無礙法界非如來不證此虗空藏菩薩尚在弟子列也為滯在虗空無邊處猶有身可得故黃檗云佛真法身猶如虗空此喻法身即虗空虗空即法身常人謂法身遍虗空處虗空中含容法身不知法身即虗空虗空即法身也若定言有虗空虗空不是法身若定言有法身法身不是虗空但莫作虗空解虗空即法身莫作法身解法身即虗空虗空與法身無異相佛與衆生無異相生死與涅槃無異相離一切相即是佛若檗此語真見虗空藏菩薩無邊身也曹山問德上座佛真法身猶若虗空應物現形如水中月作麼生説箇應底道理德云如驢覷井山云道即太煞道只道得八成德云和尚又如何山曰如井覷驢天童頌云驢覷井井覷驢智容無外靜涵有餘肘後誰分印家中不畜書機絲不挂梭頭事文彩縱橫意自殊明此可知善入國土如井覷驢本自不生故合虗空彌勒菩薩即從座起頂禮佛足而白佛言我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊族姓爾時世尊教我修習唯心識定入三摩地歷劫以來以此三昧事恆沙佛求世名心歇滅無有至然燈佛出現於世我乃得成無上妙圓識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現世尊我了如是唯心識故識性流出無量如來今得授記次補佛處佛問圓通我以諦觀十方唯識識心圓明入圓成實遠離依他及遍計執得無生忍斯為第一通曰我以諦觀十方唯識唯識二字有深意味唯遮境有識揀心空又識言總顯唯言但遮總顯者謂一切有情各有八識六位心所及所變見相二分並分位差別及彼空理所顯真如如是之法皆不離識故總顯識名也但遮者謂愚夫執離識心外實有色等諸法故言唯字但遮愚夫見也識心圓明入圓成實由初修習唯心識定至成無上妙圓識心三昧已轉識而成智矣故曰入圓成實未轉識時初為境縛是粗惑名遍計執繼為法縛是細惑名依他執心重世名好遊族姓是遍計執樣子也求世名心歇滅無有是依他執樣子也至了如是唯心識故識性流出無量如來乃圓成實樣子也解深密經曰翳眼人如遍計現青黃如依他淨眼如圓成寶杖論曰如人見動物為蛇久而視之乃繩也則疑蛇之心不斷而自息離遍計執如之然繩尚在又細視之曰非繩也蓋麻耳則執繩之心又不斷而自息離依他執如之麻與繩本一有結即名繩無結即名麻以喻性與識本一有縛即名識無縛即名性至了唯識識外無性識即是性乃第八識如來藏妙真如性也既離依他及遍計執則銷鎔生滅種子而依不生不滅真性矣故得無生忍一切國土淨穢有無皆是我心變化所現我不分別即當處寂滅是於相分證無生忍也識性流出無量如來理即法身智即報身行即化身智即文殊行即普賢悲即觀世音皆從一心流出我無分別即當處寂滅是於見分證無生忍也法眼頌曰三界唯心眼聲耳色色不到耳聲何觸眼眼色耳聲萬法成辦萬法匪緣豈觀如幻山河大地誰堅誰變法眼識心圓明故能為此圓語盤山垂語云三界無法何處求心四大本空佛依何住璿璣不動寂止無覿面相呈更無餘事雪竇頌曰三界無法何處求心白雲為蓋流水作琴一曲兩曲無人會雨過夜塘秋水深又僧問石霜萬戶俱閉即不問萬戶俱開時如何霜云堂中事作麼生僧無對經半年方道得云無人接得渠霜云道則太煞道只道得八成僧云和尚又如何霜云無人識得渠投子頌曰古殿岩開月鎖松霜凝雪露韻無窮星前人臥千峯室佛祖無因識得渠彌勒菩薩修習唯心識定入三摩地今盤山道何處求心石霜道無人識得渠此二轉語待當來下生次補佛處重重開演大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸我淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一通曰觀經云以智慧光普照一切今離三途得無上力名大勢至同倫者有五十二菩薩亦足驗往生淨土者易於成就夫念佛者不得一彈指頃念世五欲是為繫念淨念相繼如子憶母現前當來必定見佛口念心憶耳目無他威儀肅肅都攝六根一心不亂如是三摩地中見佛必矣去佛不遠慧光熏灼不假修為自得開悟如染香人不期香而自香此彌陀願力妙難思也大勢至既以念佛心得無生忍復攝念佛人歸于淨土自覺覺他真菩薩行六根俱屬見分此所重見佛故以見大攝之見大何序於識大之後必轉第八識證後得智而後能轉前五識也既轉識成智生佛淨土已為極果而觀音返聞何乃更居其後夫所貴生淨土證圓通者非徒自了為度衆生故也必如三十二應在在處處皆為淨土皆證圓通然後滿其分量爾永明壽禪師總角誦法華經五行俱下六旬而畢後參韶國師發明心要往天台智者巖九旬習定有鳥斥晏巢於衣裓嘗作二𨷺一曰一生禪定二曰誦經萬善莊嚴淨土乃冥心精禱至七度俱得誦經萬善於是專修淨業誦經三載禪觀中見觀音以甘露灌其口遂獲辨才忠懿王請住靈隱二年遷永明日課一百八事未嘗暫廢學者參問指心為宗以悟為則日暮往別峯行道念佛忠懿王嘆曰自古求西方者未有如此之專切也乃為立西方香嚴殿以成其志弟子千七百人嘗與衆受菩薩戒施鬼神食晝放生命皆悉回向莊嚴淨土為書百卷名曰宗鏡又述萬善同歸指歸淨土既滅度起塔山中有僧來自臨川曰我病中入冥得放還見殿室有僧像閻羅王自來頂禮我問此像何人主吏曰杭州壽禪師也聞已於西方上品受生王敬其人故於此禮耳楊傑字次公乃大年弟也荊王夫人亦於夢中見其坐蓮華上脫灑自如初次公覩日出如盤湧有悟嘗作偈曰男大須婚女大須嫁討甚間工夫更説無生話要與龐翁翻案後辭世偈曰無一可戀無一可捨太虗空中之乎者也將錯就錯西方極樂是永明壽與次公俱生淨土章灼如此念佛三昧如子憶母洞山有云向道莫去歸來背父僧問曹山子歸就父為什麼父全不顧山曰理合如斯僧曰父子之恩何在山曰始成父子之恩僧云如何是父子之恩山曰刀斧斫不開天童拈云翡翠簾垂絲綸未降紫羅帳合視聽難通犯動毛頭月升夜戶密移一步鶴出銀籠還知麼脫身一色無遺影不坐同風落大功又僧問護國如何是本來父母國云頭不白者僧曰將何奉獻國云殷勤無米飯堂上不問親丹霞頌云出門遍界無知已入戶盈眸不見親虗室夜寒何所有碧天明月頗為鄰此二則深明自性彌陀唯心淨土須如是見得乃名真見昔有尼禮拜雲巖巖曰汝爺在否尼云在巖云年多少尼云六十五巖曰汝有箇爺非年六十五汝還知否尼云莫是恁麼來者巖曰恁麼來者猶是兒孫洞山云直得不恁麼來者亦是兒孫噫嘻本來父母可易見乎哉故能見本來父母即見自性彌陀而禪土雙融俱屬不可思議境界矣附録楞嚴經第六卷云從聞思修入三摩地初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅現前此觀世音菩薩入道之門也理極精深非言詮所及偶與乾法師談之有味因述於此所云從聞思修入三摩地者謂從返聞而思從返聞而修即從返聞而入至於不生不滅正定之地此三摩地本無動搖湛然常寂但以聲塵感之聞根黏湛而出遂至聞聲逐聲流而忘返去三摩地遠矣唯從聞思修而入是聞性即理也思即智也修即行也理智行三德圓融一齊俱到故一返聞而思在其中矣一返聞而修在其中矣思修聖慧從返聞生步步歸真地地增進如下文詳明即入三摩地之次第也初於聞中返流而入不入於聲塵而入於聖流即與自性相依外亡其所矣凡聲塵之感必有其所今雖亡所猶未能寂當聲動時見有動相而欲亡之當聲靜時見有靜相而欲趣之二相歷然故未能寂唯從亡所而入至於寂然之地則動者自動吾不知其動也動相何自而生靜者自靜吾不知其靜也靜相何自而生蓋亡所之極不但動相不可得即靜相亦不可得矣是動靜二相聞根所緣固是所聞之境二相不生了然明白亦是能聞之根亡所聞易亡能聞難如是漸增進進不已既亡其所復亡其能則能聞與所聞而俱盡是所聞者聲塵也自亡所而漸至於所聞盡更無可聞者則聲塵泯矣能聞者聞根也自入流而漸至於能聞盡更無能聞者則聞根泯矣根塵俱泯歸於盡地有盡相可得即是著空若住於空雖得所覺空未得能覺空也今外盡其塵內盡其根如是盡聞亦不住著則不但所覺空而能覺亦空矣是所覺空者即人無我也能覺空者即法無我也證人無我易證法無我難必以大乘真空空之而後能覺可空也有空以空乎覺而空不得圓有覺以覺乎空而覺不得圓唯以空空覺併忘乎其為空以覺覺空併忘乎其為覺可謂之圓矣猶未極也極之空即是覺求空相不可得覺即是空求覺相不可得是覺而無覺空而無空故為圓之極也唯覺極圓無覺相可得則所空滅唯空極圓無空相可得則能空亦滅是所空滅者法空也能空滅者空空也俱空不生然後可謂之生滅既滅也有聲在則聲生聲滅有聞在則聞生聞滅有覺在則覺生覺滅有空在則空生空滅皆未離乎生滅也今人空法空而又空空凡屬生滅者皆已滅盡則不生不滅一真如性乃得現前夫一真如性所以不現前者皆為生滅法之所覆今纖毫蕩盡真體呈露本自寂然本無可滅非有以滅之而後滅也故謂之寂滅是寂滅之性隨處顯現不必離聲而聲自寂滅也不必離聞而聞自寂滅也不必離覺而覺自寂滅也不必離空而空自寂滅也寂滅現前安往而不空哉此三摩地即首楞嚴大定故返聞法門為此經之綱領也既得寂滅現前發起慈悲妙用抑豈有別法以度人哉世有不得人空者則説人空法以度之世有不得法空者則説法空法以度之世有不得空空者則説空空法以度之要歸於寂滅現前而止此佛佛一心不獨觀世音為然也永嘉證道歌云心是根法是塵兩種猶如鏡上垢盡時光始現心法雙忘性即真大意類此
