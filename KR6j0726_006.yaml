body:
  text: 大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第六爾時觀世音菩薩即從座起頂禮佛足而白佛言世尊憶念我昔無數恆河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心彼佛教我從聞思修入三摩地通曰選擇圓通耳根為最一門深入六根清淨唯觀世音所證極為圓妙音不曰聞而曰觀者以觀智照之不以耳識聞也六根互用此足徵已從聞思修入三摩地聞於耳思於心修於行能生無漏聖慧故能入乎正定即下文入流亡所次第也百丈普請钁地次忽有一僧聞鼓鳴舉起钁頭大笑便歸丈曰俊哉此是觀音入理之門丈歸院乃喚其僧問適來見甚麼道理便恁麼僧曰適來肚飢聞鼓聲歸吃飯丈乃笑然則此僧入理之門抑豈假思修而得乎初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅現前忽然超越世出世間十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方一切六道衆生與諸衆生同一悲仰通曰入流亡所至聞所聞盡即此根初解先得人空也盡聞不住覺所覺空即空性圓明成法解脫也空覺極圓空所空滅即解脫法已俱空不生也生滅既滅寂滅現前即從三摩地得無生忍也法華偈曰真觀清淨觀廣大智慧觀悲觀及慈觀常願常瞻仰真觀二相不生是也清淨觀盡聞覺空是也廣大智慧觀則空覺極圓以至寂滅現前是也同一慈力謂之慈觀同一悲仰謂之悲觀空覺極圓覺觀出思惟也空所空滅身心不能及也生滅既滅生滅二圓離也寂滅現前是則常真實也以經證經意味自足蘇子由論楞嚴金剛二經符契觀世音以聞思修為圓通第一其言曰初於聞中入流亡所乃至寂滅現前若能如是於一彈指間遍歷三空即與諸佛無異矣既又讀金剛説四果人須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹乃嘆曰須陀洹所證則觀世音所謂初於聞中入流亡所者耶入流非有法也唯不入六塵安然常住斯入流矣至於斯陀含名一往來而實無往來阿那含名為不來而實無不來蓋往則入塵來則返本斯陀含雖能來矣而未能無往阿那含非徒不往而亦不來至阿羅漢則往來意盡無法可得然則所謂四果者其實一法也但歷三空有淺深之異耳二經之言本若符契而世或不喻故明言之子由固見善知識來發二經之旨雖似新奇要自胸中流出至謂一彈指間遍歷三空即與諸佛無異非徹底頓悟不能為此語世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土通曰如幻者幻人作為本於無作以喻熏修應機即為無為忘情絶解不可思議聞熏聞修謂熏修皆不離聞也因依聞性熏修心精遺聞結惑淨盡三昧現前即金剛乾慧地也謂之金剛以摧壞如幻之法故金剛常住不壞是則常真實也豈離如幻而別有所謂真實哉僧問曹山於相何真山曰即相即真曰當何顯示山豎起拂子又曰幻本何真山曰幻本元真曰當幻何顯山曰即幻即顯曰恁麼則始終不離於幻也山曰覓幻相不可得皓月供奉問長沙教中説幻意是有耶沙曰大德是何言與曰恁麼則幻意是無耶沙曰大德是何言與曰恁麼則幻意是不有不無耶沙曰大德是何言與曰如某三明盡不契於幻意和尚如何明教中幻意沙曰大德信一切法不思議否曰佛之誠言那敢不信沙曰大德言信二信之中是何信曰如某所明二信之中是名緣信沙曰依何教門得生緣信曰華嚴云菩薩摩訶薩以無障無礙智慧信一切世間境界是如來境界又云諸佛世尊悉知世法及諸佛法性無差別決定無二又云佛法世間法若見其真實一切無差別沙曰大德所舉緣信教門頗有來處聽老僧與大德明教中幻意若人見幻本來真是則名為見佛人圓通法法無生滅無滅無生是佛身如是見得同佛慈力慈即如幻三十二應應亦如幻處處寂滅現前是名金剛三昧世尊若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為説法令其解脫通曰初祖達磨即觀音大士化身也本國時有二師一名佛大先二名佛大勝多本與祖同學佛陀跋陀小乘禪觀佛大先既遇般若多羅尊者捨小趣大與祖並化時號二甘露門而佛大勝多更分徒為六宗一有相二無相三定慧四戒行五無得六寂靜祖喟然嘆曰彼之一師已陷牛迹況復支離繁盛而分六宗我若不除永纏邪見言已微現神力至有相宗所問曰一切諸法何名實相彼衆中有一尊長薩婆羅答曰如諸相中不互諸相是名實相祖曰一切諸相而不互者若名實相當何定耶彼曰於諸相中實無有定若定諸相何名為實祖曰諸相不定便名實相汝今不定當何得之彼曰我言不定不説諸相當説諸相其義亦然祖曰汝言不定當為實相定不定故即非實相彼曰定既不定即非實相知我非故不定不變祖曰汝今不變何名實相已變已往其義亦然彼曰不變當在在不在故故變實相以定其義祖曰實相不變變即非實於有無中何名實相薩婆羅心知聖師懸解潛達即以手指虗空曰此是世間有相亦能空故當我此身得似此否祖曰若解實相即見非相若了非相其色亦然當於色中不失色體於非相中不礙有故若能是解此名實相彼衆聞已心意朗然欽禮信受祖瞥然匿迹至無相宗所問曰汝言無相當何證之彼衆中有波羅提答曰我明無相心不現故祖曰汝心不現當何明之彼曰我明無相心不取捨當於明時亦無當者祖曰於諸有無心不取捨又無當者諸明無故彼曰入佛三昧尚無所得何況無相而欲知之祖曰相既不知誰云有無尚無所得何名三昧彼曰我説不證證無所證非三昧故我説三昧祖曰非三昧者何當名之汝既不證非證何證波羅提聞祖辨析即悟本心禮謝於祖懺悔往謬祖記曰汝當得果不久證之此國有魔非久降之言已忽然不見至定慧宗所問曰汝學定慧為一為二彼衆中有婆蘭陀者答曰我此定慧非一非二祖曰既非一二何名定慧彼曰在定非定處慧非慧一即非一二亦非二祖曰當一不一當二不二既非定慧約何定慧彼曰不一不二定慧能知非定非慧亦復然矣祖曰慧非定故然何知哉不一不二誰定誰慧婆蘭陀聞之疑心氷釋至第四戒行宗所問曰何者名戒云何名行為一為二彼衆中有一賢者答曰一二二一皆彼所生依教無染此名戒行祖曰汝言依教即是有染一二俱破何言依教此二違背不及於行內外非明何名為戒彼曰我有內外彼已知竟既得通達便是戒行若説違背俱是俱非言及清淨即戒即行祖曰俱是俱非何言清淨既得通故何談內外賢者聞之即自慚服至無得宗所問曰汝云無得無得何得既無所得亦無得得彼衆中有寶靜者答曰我説無得非無得得當説得得無得是得祖曰得既不得得亦非得既云得得得得何得彼曰見得非得非得是得若見不得名為得得祖曰得既非得得得無得既無所得當何得得寶靜聞之頓除疑網至寂靜宗所問曰何名寂靜於此法中誰靜誰寂彼衆中有尊者答曰此心不動是名為寂於法無染名之為靜祖曰本心不寂要假寂靜本來寂故何用寂靜彼曰諸法本空以空空故於彼空空故名寂靜祖曰空空已空諸法亦爾寂靜無相何寂何靜彼尊者聞師指誨豁然開悟既而六衆咸誓歸依由是化被南天聲馳五印據彼六宗亦知退修無漏者祖現神力令其解脫此觀世音第一應也夙願固如是若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為説法令其解脫若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為説法令其解脫通曰辟支佛有二種出無佛世觀物變易自覺無生則名獨覺出有佛世稟佛之教觀緣悟道則名緣覺寂靜妙明非本覺妙明因寂靜求而得之斷十二緣自無明滅至苦惱滅緣斷而勝性現因滅得證俱得勝妙現圓但彼自乘理智獨覺其妙獨覺其圓未能回心向大故未解脫牛頭融禪師幽棲石室有百鳥銜華之異四祖遙觀氣象知彼有人乃躬自尋訪問寺僧此間有道人否出曰家兒那箇不是道人祖曰阿那箇是道人僧無對別僧云此去山中十里許有一懶融見人不起亦不合掌莫是道人麼祖遂入山見融端坐自若祖問曰在此作甚麼融曰觀心祖曰觀是何人心是何物融無對便起作禮曰大德高棲何所祖曰貧道不決所止或東或西融曰還識道信禪師否祖曰何以問他融曰嚮德滋久冀一禮謁祖曰道信貧道是也融曰因何降此祖曰將來相訪莫更有宴息之處否融指後面別有小菴遂引祖至菴所繞菴唯見虎狼之類祖乃舉兩手作怖勢融曰猶有這箇在祖曰這箇是甚麼融無語少選祖却於融宴坐石上書一佛字融覩之竦然祖曰猶有這箇在融未曉乃稽首請説真要祖以頓教法門授之語具諸菩薩萬行中又西域崛多三藏於六祖言下契悟後遊五臺見一僧結菴靜坐藏問曰孤坐奚為曰觀靜藏曰觀者何人靜者何物其僧作禮問曰此理如何藏曰汝何不自觀自靜彼僧茫然藏曰汝出誰門耶曰秀禪師藏曰我西域異道最下種者不墮此見兀然空坐於道何益其僧却問藏所師者何人藏曰我師六祖汝何不速往曹溪決其真要僧即往參六祖祖垂誨與藏符合僧即悟入向使融與此僧不遇四祖六祖證獨覺緣覺已爾安望有解脫之期乎若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為説法令其解脫通曰四諦法者知苦斷集證滅修道乃至入滅盡定耽寂滅樂無意度生則謂之聲聞謂依聲教而修道者也溈山坐次仰山入來溈山曰寂子速道莫入陰界仰曰慧寂信亦不立溈曰子信了不立不信不立仰曰祗是慧寂更信阿誰溈曰若恁麼即是定性聲聞仰曰慧寂佛亦不立雲居膺令侍者送袴與一住菴道者道者曰自有娘生袴竟不受膺再令侍者問娘未生時著箇甚麼道者無語後遷化有舍利持似於膺膺曰直饒得八斛四斗不如當時下得一轉語好此道者認定箇娘生袴真是定性聲聞仰山却能下一轉語曰慧寂佛亦不立真見娘未生時面目若諸衆生欲心明悟不犯欲塵欲身清淨我於彼前現梵王身而為説法令其解脫通曰梵王色天主名尸棄此云頂髻居初禪之頂獨覺聲聞居四空天其下即梵天梵天之下即六欲天不犯欲塵不但人間粗敝聲色之欲即他化自在之樂亦所不好方欲進於四禪捨念清淨故欲得無喜無樂清淨之身也南陽忠國師問司空山本淨禪師汝已後見奇特言語如何淨曰無一念心愛師曰是汝屋裏事又僧問忠國師如何是解脫師曰諸法不相到當處解脫曰恁麼即斷去也師曰向汝道諸法不相到斷甚麼自現佛身説法至此凡五解脫皆指歸向上一路帝釋而下但令其成就而已佛法世間法若見其真實一切無差別若諸衆生欲為天主統領諸天我於彼前現帝釋身而為説法令其成就通曰帝釋有多名一曰釋提桓因一曰憍尸迦居須彌山頂四面各八天合之三十二天皆為統領須菩提尊者一日説法次帝釋雨華者問此華從天得耶從地得耶從人得耶釋曰弗也者曰從何得耶釋乃舉手者曰如是如是昔世尊以摩尼珠示五方天王各説青黃赤白舉手示之都無所見世尊曰吾以真珠示汝便總不知五方天王從此悟入帝釋今乃舉手向尊者用得親切帝釋亦乃會禪若諸衆生欲身自在遊行十方我於彼前現自在天身而為説法令其成就通曰自在天即他化自在天假他所作以成己樂是欲界頂天或曰別有魔王居處亦自在天攝優波毱多尊者隨方行化得度者甚衆由是魔宮震動波旬愁怖遂竭其魔力以害正法尊者即入三昧觀其所由波旬得便密持瓔珞縻之於頸尊者出定乃取人狗蛇三尸化為華鬘諭波旬曰汝與我瓔珞甚是珍妙吾有華鬘以相酬奉波旬大喜引頸受之即變為三種臭尸蟲蛆壞爛波旬厭惡盡己神力不能移動乃升六欲天告諸天主及請梵王求其解免彼各告言十力弟子所作神變我輩凡陋何能去之波旬曰然則奈何梵王曰汝可歸心尊者即能除斷乃為説偈令其回向曰若因地倒還因地起離地求起終無其理波旬受教已即下天宮禮尊者足哀露懺悔尊者告曰汝自今去於如來法更不作嬈害否波旬曰我誓回向佛道永斷不善尊者曰若然者汝可口自唱言皈依三寶魔王合掌三倡華鬘悉除乃歡喜踊躍作禮尊者而説偈曰稽首三昧尊十力聖弟子我今願回向勿令有劣弱觀梵王所説偈大是回向妙理不謂之菩薩化身可乎若諸衆生欲身自在飛行虗空我於彼前現大自在天身而為説法令其成就通曰大自在天即摩醯首羅天三目八臂騎白牛執白拂居色頂故飛行虗空涅槃經曰何等名為祕密之藏猶如字三點若並則不成伊從亦不成如摩醯首羅面上三目乃得成伊三點若別亦不得成我亦如是解脫之法亦非涅槃如來之身亦非涅槃摩訶般若亦非涅槃三法各異亦非涅槃我今安住如是三法為衆生故名入涅槃如世伊字巖頭上堂云吾嘗究涅槃經七八年覩三兩段義似衲僧説話又曰休休時有一僧出禮拜請師舉頭曰吾教意如字三點第一向東方下一點點開諸菩薩眼第二向西方下一點點諸菩薩命脈第三向上方下一點點諸菩薩頂此是第一段義又曰吾教意如摩醯首羅劈開面門豎亞一隻眼此是第二段義又曰吾教意如塗毒鼓擊一聲遠近聞者皆喪此是第三段義時小嚴上座問如何是塗毒鼓頭以兩手按膝亞身曰韓信臨朝底嚴無語浮山遠上堂諸佛出世建立化門不離三身智眼亦如摩醯首羅三目何故一隻水泄不通緇素難辨一隻大地全開十方通暢一隻高低一顧萬類齊瞻雖然若是本分衲僧陌路相逢別具通天正眼始得所以道三世諸佛不知有狸奴白牯却知有且道狸奴白牯知有箇甚麼事要會麼深秋簾幕千家雨落日樓臺一笛風摩醯首羅面門三目如伊三點宗門借為玄唱莫道無語其聲如雷若諸衆生愛統鬼神救護國土我於彼前現天大將軍身而為説法令其成就通曰天大將軍統領鬼神為帝釋之上將天台智者初於玉泉卓錫關大將軍見夢曰吾及子平王此山久矣智者為説三皈依戒關誓為伽藍至今救護國土靈爽最著傳山普至黃龍請益阿難問迦葉世尊付金襴外示何法迦葉呼阿難難應諾葉曰倒却門前剎竿著意旨如何南公曰上人出蜀曾到玉泉否曰曾到又問曾挂搭否曰一夕便發南公曰智者道場關將軍打供與結緣幾時何妨普默然良久理前問南公俯首普趨出大驚曰西川義虎不消此老一唾又翠巖真上堂先德道此事如𪹼龜文𪹼即成兆不𪹼成鈍𪹼與不𪹼直下便揑上藍即不然無固無必虗空走馬旱地行船南山起雲北山下雨遂拈拄杖曰拄子變作天大將軍巡歷四天下有守節不守節有戒行無戒行一時奏與天帝釋乃喝曰丈夫自有衝天志莫向如來行處行卓一卓此二尊宿皆以天大將軍而説法即為天大將軍而説法若諸衆生愛統世界保護衆生我於彼前現四天王身而為説法令其成就通曰四天王居須彌山半日月繞其宮前而過臣於帝釋保護四天下者也陸大夫問南泉曰天王居何地位泉曰若是天王即非地位陸曰弟子聞説天王居初地泉曰應以天王身得度者即現天王身而為説法且道南泉説教説宗若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身而為説法令其成就通曰準普門品有執金剛神無國太子然驅使鬼神執金剛者即國太子類也那吒太子毗沙門天王子每於中夜隨侍宣律師或乘其足而不令撲或談五臺勝槩非二乘所知詳載律師傳僧問韶國師那吒太子析肉還母析骨還父然後現本身運大神力於蓮華上為父母説法未審如何是太子身師曰大家見上座問僧曰恁麼則大千同一真性也師曰依稀似曲才堪聽又被風吹別調中即此味之太子身菩薩身都揀辨不出若諸衆生樂為人王我於彼前現人王身而為説法令其成就通曰自金輪以至粟散皆人王也法華但言小王蓋指人中之王耳唐文宗好嗜蛤蜊沿海官吏先時遞進人亦勞止一日御饌中有擘不張者帝以其異即焚香禱之乃開見菩薩形儀梵相具足帝遂貯以金粟檀香盒覆以美錦賜興善寺令衆僧瞻禮因問羣臣斯何祥也或奏太一山惟政禪師深明佛法乞詔問之帝即詔師至問其事政曰臣聞佛無虗應此乃啓陛下之信心耳故契經云應以此身得度者即現此身而為説法帝曰菩薩身已現且未聞説法政曰陛下覩此為常耶非常耶帝曰希奇之事朕深信焉政曰陛下已聞説法竟皇情悅豫詔天下寺院各立觀音像以答殊休是蛤蜊以不説説政以説説均之為化身也已若諸衆生愛主族姓世間推讓我於彼前現長者身而為説法令其成就通曰長者具十德謂姓貴位高大富威猛智深年耆行淨禮備上嘆下歸當如國家元老之類李長者名通玄太原東北人或云唐宗室也以開元七年隱於方山土龕造華嚴合論凡四十軸伏虎負經神龍化泉晝則天女給侍夜則齒光代濁示寂之日飛走悲鳴白氣貫天報齡九十六張無盡以為文殊普賢之幻有也安知非觀音之幻有也耶若諸衆生愛談名言清淨自居我於彼前現居士身而為説法令其成就通曰博聞強識不求住宦居財大富秉志廉貞故名居士龐蘊字道玄衡陽人也少悟塵勞志求真諦初謁石頭問不與萬法為侶者是甚麼人頭以手掩其口豁然有省一日頭問曰子見老僧以來日用事作麼生士曰若問日用事即無開口處乃呈偈曰日用事無別唯吾自偶偕頭頭非取捨處處勿張乖朱紫誰為號丘山絶點埃神通并妙用運水及搬柴頭然之曰子以緇耶素耶士曰願從所慕遂不剃染後參馬祖問曰不與萬法為侶者是甚麼人祖曰待汝一口吸盡西江水即向汝道士於言下頓領玄旨乃留參承二載有偈曰有男不婚有女不嫁大家團欒頭共説無生話自爾機鋒迅捷諸方嚮之東土居士當以龐翁為最夫婦子女俱登無上覺即維摩金粟後身廣演不二法門亦無以遠過若諸衆生愛治國土剖斷邑我於彼前現宰官身而為説法令其成就通曰如來以四事接引衆生必與之同事言易入機易投而宰官者各負才枝各持議論非同類莫可與語故世現宰官身者踵相屬也趙清獻公忭年四十餘擯出聲色係心宗教會佛慧居衢之南禪公日親之慧不容措一詞後典青州政事之餘多宴坐忽大雷震驚即契悟作偈曰默坐公堂虗隱几心源不動湛如水一聲霹𮦷頂門開喚起從前自家底慧聞笑曰趙悅道撞彩耳富鄭公弼初於宗門未有所趨公勉之書曰伏惟執事富貴如是之極道德如是之盛福壽康寧如是之備退逸間休如是之高其所未甚留意者如來一大事因緣而已能專誠求所證悟則他日為門下賀也鄭公因公警勵不捨晝夜方進此道聞顒禪師主投子往質所疑會顒升座見其顧視如象王回旋微有得因執弟子禮命侍者請為入室顒見即曰相公已入來當弼猶在外公聞汗流浹背即大悟尋以偈寄圓照本曰一見顒公悟入深夤緣傳得老師心東南謾説江山遠日對靈光與妙音此以宰官為宰官説法而得證者足為世模楷矣若諸衆生愛諸數術攝衛自居我於彼前現婆羅門身而為説法令其成就通曰婆羅門此云淨行多崇奉外道如事水火之類即是數術攝心衛生以自居者也或曰數術乃和合占相推步盈虗之術鳩摩羅什故婆羅門種推占禍福多奇中其數術莫可枚舉侍郎李浩幼閲首楞嚴經如遊舊國後造明果投誠入室應菴揕甚胸曰侍郎死後向甚麼處去公駭然汗下菴喝出公退參不旬日竟躋堂奧以偈寄同參嚴康朝曰門有孫臏鋪家存甘贄妻夜眠還早起誰悟復誰迷菴見稱善有鬻胭脂者亦久參應菴頗自負公贈之偈曰不塗紅粉自風流往往禪徒到此休透過古今圈匱後却來這裡喫拳頭觀李公所與遊其以婆羅門得證者固往往有之寧獨一甘贄以淨行著也若有男子好學出家持諸戒律我於彼前現比丘身而為説法令其成就通曰僧伽大師西域人也嘗臥賀跋氏家身忽長其床榻各三尺許人莫不驚怪次現十一面觀音形其家倍加信重遂捨宅而造寺焉中宗遣使迎入內道場尊為國師嘗獨處一室而頂上有一穴恆以絮窒之夜則去絮香從頂穴中出及曉香還頂中又以絮窒之既坐化送至臨淮起塔供養中宗問萬回曰僧伽大師何人耶回曰是觀音化身也法華經普門品云應以比丘比丘尼等身得度者即皆現之而為説法此即是也初師至長安萬回禮謁甚恭師拍其背曰小子何故久留可以行矣師化不數月回亦卒漸源在道吾為侍者一日侍吾往檀越家弔慰源拊棺曰生耶死耶吾曰生也不道死也不道源曰為甚麼不道吾曰不道不道歸至中路源曰和尚今日須與某甲道若不道打和尚去也吾曰打即任打道即不道源便打吾歸院曰汝宜離此去恐知事得知不便源乃禮辭隱於村院經三年後忽聞童子念觀音經至應以比丘身得度者即現比丘身忽然大省遂焚香遙禮曰信知先師遺言終不虗發自是我不會却怨先師乃造石霜設齋懺悔即此一比丘句便足解脫觀音妙智力固不可思議哉若有女人好學出家持諸禁戒我於彼前現比丘尼身而為説法令其成就通曰比丘戒律凡二百五十比丘尼禁戒凡五百視比丘加詳女性鮮高明故必以禁為戒也劉鐵磨到溈山山云老牸牛汝來也磨云來日臺山大會齋和尚還去麼溈山故身臥磨便出去僧問風穴溈山道老牸牛汝來也意旨如何穴云白雲深處金龍躍僧云只如劉鐵磨道來日臺山大會齋和尚還去麼意旨如何穴曰碧波心裏玉兔驚僧云溈山便作臥勢意旨如何穴曰老倒疏慵無事日間眠高臥對青山雪竇頌云曾騎鐵馬入重城敕下傳聞六國清猶握金鞭問歸路夜深誰共御街行天童頌云百戰功成老太平優柔誰肯苦爭衡玉鞭金馬間終日明月清風富一生他比丘尼機緣語句甚夥皆發明向上事不能殫述聊録此以式若有男子樂持五戒我於彼前現優婆塞身而為説法令其成就通曰五戒者即戒殺盜淫妄語飲酒也優婆塞此云近事男取其清淨能事比丘也仙州山吳十三道人每以己事扣諸禪德及開善歸乃結茅於其左遂往給侍紹興三月八日夜適然啓悟以偈呈善曰元來無縫罅觸著便光輝既是千金寶何須彈兒善答偈曰啐地折時真慶快死生凡聖盡平沉仙州山下呵呵笑不負相期夙昔心即此優婆塞亦能解脫若有女子五戒自居我於彼前現優婆夷身而為説法令其成就通曰優婆夷此云近事女取其清淨能事比丘尼也俞道婆金陵人市油餈為業隨衆參問琅琊起起以臨濟無位真人語示之一日聞丐者唱蓮華樂云不因柳毅傳書信何緣得到洞底湖忽大悟以餈盤投地夫旁睨曰汝顛耶婆掌云非汝境界往見起起望之知其造詣問那箇是無位真人婆曰有一無位真人六臂三頭努力嗔一劈華山分兩路萬年流水不知春由是名著嘗頌馬祖不安因緣曰日面月面虗空閃電雖然坐斷天下衲僧舌頭分明祗道得一半何意優婆夷説法乃爾毋乃千百億化身耶若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為説法令其成就通曰內政立身以修家國蘋蘩藻芷以供祭祀即此莫非佛事志公曰京都鄴都浩浩還是菩提大道又曰大道祗在目前要且目前難睹欲識大道真體不離聲色言語道之近也若是豈以女人而不備哉閩帥夫人崔氏奉道自稱練師遣使送衣服至長慶曰練師令就大師請回信慶曰傳語練師領取回信須臾使却來師前唱喏便回明日慶入府練師曰昨日謝大師回信慶曰却請昨日回信看練師展兩手帥問慶曰練師適來呈信還愜大師意否慶云猶較些子帥曰未審大師意旨如何慶良久帥曰不可思議大師佛法深遠此段公案大似維摩不二法門秦國夫人計氏法真自寡處屏去紛華常蔬食習有為法因大慧遣謙侍者致問其子魏公公留謙以祖道誘之真一日問謙曰徑山和尚尋常如何為人謙曰和尚秪教人看狗子無佛性及竹篦子話只是不得下語不得思量不得向舉起處會不得向開口處承當狗子還有佛性也無無秪恁麼教人看真遂諦信於是夜坐力究前話忽爾洞然無滯謙辭歸真親書入道槩略作數偈呈慧其末曰逐日看經文如逢舊識人莫言頻有礙一舉一回新他命婦大家得證者不少孰非大士默為之加被令其有所成乎若有衆生不壞男根我於彼前現童男身而為説法令其成就通曰韋陀尊者十世童真善財童子自南詢返度八九十歲亦以童子名以其男根未壞故也佛日本空初遊天台曰如有人奪得我機者即吾師矣尋謁雲居問曰二龍爭珠誰是得者居曰卸却業身來與子相見空曰業身已卸居曰珠在甚麼處空無對遂投誠入室年始十三後四年參夾山才入門見維那那曰此間不著後生空曰某甲不求桂塔暫來禮謁和尚維那白夾山山許相見空未升階山便問甚麼處來空曰雲居來山曰即今在甚麼處空曰在夾山頂𩕳上山曰老僧行年在坎五鬼臨身空礙上階山曰三道寶階從何而上空曰三道寶階曲為今時向上一路請師真指山便揖空乃上階禮拜山問闍黎與甚麼人同行曰木上座山曰何不來相看老僧曰和尚看他有分山曰在甚處曰在堂中山便同下到堂中空遂取拄杖擲在山面前山曰莫是天台得否曰非五嶽之所生山曰莫是須彌得否曰月宮亦不逢山曰恁麼則從人得也空曰自己尚是冤家從人得堪作甚麼山曰冷灰裏有一粒豆瀑乃喚維那明窗下安排著空曰未審明窗還解語也無山曰待明窗解語即向汝道夾山來日上堂問昨日新到在甚麼處空出應諾山曰子未到雲居以前在甚麼處曰天台國清山曰吾聞天台有潺潺之瀑淥淥之波謝子遠來此意如何曰久居巖谷不拄松蘿山曰此猶是春意秋意作麼生空良久山曰看君秪是撑船漢終歸不是弄潮人來日普請維那令空送茶空曰某甲為佛法來不為送茶來那曰奉和尚處分空曰和尚尊命即得乃將茶去作務處搖茶甌作聲山回顧空曰釅茶三五碗意在钁頭邊山曰瓶有傾茶勢籃中幾個甌空曰瓶有傾茶勢籃中無一甌便行茶衆皆舉目空曰大衆鶴望請師一言山曰路逢死蛇莫打殺無底籃子盛將歸空曰手執夜明符幾個知天曉山曰大衆有人也歸去來歸去來遂罷普請歸院衆皆嘆仰夫童子得悟者有矣如佛日與夾山敲唱更奇若有處女愛樂處身不求侵暴我於彼前現童女身而為説法令其成就通曰造物之為淫禁者數矣以從不淨不淨非可樂也為人侵暴侵慕非可樂也為樂幾何而憔悴亦復不少矧復造生死業果無休息時哉龐居士女靈照貞節越俗標格於人常鬻竹漉籬以供朝夕士坐次問照曰古人道明明百草頭明明祖師意如何會照曰老老大大作這箇語話士曰你作麼生照曰明明百草頭明明祖師意士乃笑一日士因下橋喫撲照見亦去爺邊臥士曰你作甚麼照曰見爺倒地某甲相扶丹霞訪居士見照洗菜次霞曰居士在否照放下菜籃斂手而立霞又問居士在否照提籃便行霞遂回須臾居士歸照舉前話士曰丹霞在麼照曰去也士曰赤土塗牛嬭士將入滅謂照曰視日早晚及午以報照遽報日已中矣而有蝕也士出戶視之照即登父座合掌坐亡士笑曰我女鋒捷矣士更延七日而化世傳靈照為古佛化身其亡也即於某世界證如來果與龍女無異是皆不可思議云若有諸天樂出天倫我現天身而為説法令其成就通曰自帝釋而上諸天主皆初地菩薩化身所以化導諸天者也故不言出諸天正樂鮮精進心必生人間空其五濁方能證果故樂人修人亦不言出惟天龍八部必脫其倫而後有所成就若分身應化不在此例時維摩詰室有一天女見諸天人聞所説法便現其身即以天華散諸菩薩大弟子上華至諸菩薩即皆墮落至大弟子便著不墮一切弟子神力去華不能令去時天問舍利弗何故去華答曰此華不如法是以去之天曰勿謂此華不如法所以者何是華無所分別仁者自生分別想爾若於佛法出家有所分別為不如法若無所分別是則如法觀諸菩薩華不著者已斷一切分別想故譬如人畏時非人得其便如是弟子畏生死故色聲香味觸得其便也已離畏者一切五欲無能為也結習未盡華著身耳結習盡者華不著也舍利弗言天止此室其已久如答曰我止此室如耆年解脫舍利弗言止此久耶天曰耆年解脫亦何如久舍利弗默然不答天曰如何耆舊大智而默答曰解脫者無所言説故吾於是不知所云天曰言説文字皆解脫相所以者何解脫者不內不外不在兩間文字亦不內不外不在兩間是故舍利弗無離文字説解脫也所以有何一切諸法是解脫相舍利弗言不復以離淫怒癡為解脫乎天曰佛為增上慢人説離淫怒癡為解脫耳若無增上慢者佛説淫怒癡性即是解脫舍利弗言善哉善哉天女汝何所得以何為證辨乃如是天曰我無得無證故辨如是所以者何有得有證者則於佛法為增上慢舍利弗問天汝於三乘為何志求天曰以聲聞法化衆生故我為聲聞以因緣法化衆生故我為辟支佛以大悲法化衆生故我為大乘舍利弗如人入瞻蔔林唯嗅瞻蔔不嗅餘香如是若入此室但聞佛功德之香不樂聞聲聞辟支佛功德香也爾時維摩詰語舍利弗是天女已曾供養九十二億諸佛已能遊戲菩薩神通所願具足得無生忍住不退轉以本願故隨意能現教化衆生是即觀音也耶非觀音也耶若有諸龍樂出龍倫我現龍身而為説法令其成就通曰龍神物也最知尊敬三寶故龍宮海藏佛法充積其聞法而得解脫者亦易如法華經文殊菩薩所化龍女時舍利弗語龍女言汝謂不久得無上道是事難信所以者何女身垢穢非是法器云何能得無上菩提佛道懸曠經無量劫勤苦積行具修諸度然後乃成又女人身猶有五障一者不得作梵天王二者帝釋三者魔王四者轉輪聖王五者佛身云何女身速得成佛爾時龍女有一寶珠價值三千大千世界持以上佛佛即受之龍女謂智積菩薩尊者舍利弗言我獻寶珠世尊納受是事疾否答言甚疾女言以汝神力觀我成佛復速於此當時衆會皆見龍女忽然之間變成男子具菩薩行即往南方無垢世界坐寶蓮華成等正覺三十二相八十種好普為十方一切衆生演説妙法爾時娑婆世界菩薩聲聞天龍八部人與非人皆遙見彼龍女成佛是文殊所為説法成就者安知觀音之所成就不爾爾耶若有藥叉樂度本倫我於彼前現藥叉身而為説法令其成就通曰藥叉此云輕捷又云伺察以守護天門城池故釋清虗誦金剛般若三業偕齊嘗於山林持誦有七鹿馴擾之祥時於少林坐夏山頂一佛室人無敢到者云鬼神宅焉嘗有律師恃其戒行夜往念律見一巨人以矛刺之狼狽下山逡巡氣絶又持火頭金剛呪僧時所宗重衆謂曰君呪力無雙能宿彼否曰斯焉足懼於是賫香火入坐持呪俄而神出以手掔足投之澗下七日不語精神昏倒虗聞之曰下趣鬼物敢爾即往彼如常誦經夜聞空中似有聲甚厲即念十一面觀音呪又聞堂中似有兩牛鬬佛像皆振呪既亡效還持本經一契帖然相似影響皆絶自是居者無患豈亦聞四句偈而速得解脫耶僧問道吾真如何是真如體曰夜叉屈膝眼睛黑問如何是真如用曰金剛杵打鐵山摧即所引金剛夜叉亦足發明向上事安往而非真如哉若乾闕婆樂脫其倫我於彼前現乾闥婆身而為説法令其成就通曰乾闥婆此云尋香帝釋樂神也世尊因乾闥婆王獻樂其時山川大地盡作琴聲迦葉起作舞王問迦葉豈不是阿羅漢諸漏已盡何更有餘習佛曰實無餘習莫謗法也王又撫琴三遍迦葉亦三度作舞王曰迦葉作舞莫不是佛曰實不曾作舞王曰世尊何得妄語佛曰不妄語汝撫琴山河大地木石盡作琴聲豈不是王曰是佛曰迦葉亦復如是所以實不曾作舞王乃信受古德頌曰輕輕撥動一條絃聲振三千與大千賴有飲光知此意肯將羅袖惹春煙玄沙問僧乾闥婆城汝作麼生會曰如夢如幻法眼別敲物示之此二則公案盛行乾闥婆尚在説法若阿修羅樂脫其倫我於彼前現阿修羅身而為説法令其成就通曰阿修羅此云非天又云無酒嗔不飲酒故又云無端正以女美而男醜故臨濟云你道佛有六通是不可思議一切諸天神仙阿修羅大力鬼亦有神通應是佛否道流莫錯秪如阿修羅與天帝釋戰戰敗領八萬四千眷屬入藕絲孔中藏莫是聖否如山僧所舉皆是業通依通夫如佛六通者入色界不被色惑入聲界不被聲惑入香界不被香惑入味界不被味惑入觸界不被獨惑入法界不被法惑所以達六種色聲香味觸法皆是空相不能繫縛此無依道人雖是五陰漏質便是地行神通使阿修羅聞此法將回向六通而不自恃其依通矣何不可解脫之有補云若迦樓那樂脫其倫我於彼前現迦樓那身而為説法令其成就通曰準法華經譯者辟支佛雖含獨覺緣覺二意其為辟支則一也此經於獨覺緣覺分為二遂闕迦樓那一種於普門品不符今僭補出迦樓那此云金翅鳥翅作金色張之直三百三十六萬里觀海之龍命將盡者以翅擘海取而食之初舍利弗創給孤獨園時與牢度差鬬勝差現獰龍欲傷弗弗現妙翅鳥攫裂食之後僧問興陽剖云娑竭出海乾坤盡覿面相呈事若何剖云妙翅鳥王當宇宙箇中誰是出頭人僧云忽遇出頭時又作麼生剖云似鶻捉鳩君不覺御樓前驗始知真僧云恁麼則叉手當胸退身三步剖云須彌座下烏龜子莫待重教點額天童頌云絲綸降號令分寰中天子塞外將軍不待雷驚出蟄那知風遏行雲機底聯綿兮自有金針玉線印前恢廓兮元無鳥篆蟲文此以金翅鳥發明向上事即無與敵者故金翅鳥當為説法第一若緊那羅樂脫其倫我於彼前現緊那羅身而為説法令其成就通曰緊那羅此云疑人以其人身而角見者疑之天帝法樂之神也乾闥婆奏世間之樂緊那羅奏出世間之樂倚身奏四諦十二因緣六波羅蜜之法非俗樂可比今少林寺伽藍曾現神力兩足跨太少二室山執杖而擊賊賊驚潰不敢入寺寺僧以此故多習拳棒每調征討但誦緊那羅王菩薩名號恃此以無恐往往克敵或云即觀音菩薩化身也風穴在南院作園頭一日南院到園問曰南方一棒作麼生商量穴曰作奇特商量良久穴却問和尚此間作麼生商量南院拈棒云棒下無生忍臨機不見師穴於是豁然大悟臨濟棒法少有傳者而緊那羅棒法至今商量未已有以異乎無以異乎若摩呼羅伽樂脫其倫我於彼前現摩呼羅伽身而為説法令其成就通曰摩呼羅伽此云大蟒而腹行者亦云守護伽藍地龍也十三祖迦毗摩羅尊者山行數里逢一大蟒祖直前不顧盤繞祖身祖因與授三皈依蠎聽訖而去祖至石窟一老人素服而出合掌問訊祖曰汝何所止答曰我昔常為比丘多樂寂靜有初學數來請益而我煩於應答起嗔恨想命終墮為蟒身住是窟中今已千載適遇尊者獲聞戒法故為謝耳祖問曰此山更有何人居止曰此去十里有大樹蔭覆五百大龍其樹王名龍樹常為龍衆説法我亦聽受耳祖遂詣彼龍樹出迎曰深山孤寂龍蟒所居大德至尊何枉神足祖曰吾非至尊來訪賢者龍樹默念曰此師得決定性明道眼否是大聖繼真乘否祖曰汝雖心語我已意知但辦出家何慮吾之不聖龍樹聞已悔謝祖即與度脫及五百龍衆俱授具戒傳法偈曰非隱非顯法説是真實際悟此隱顯法非愚亦非智唯其非愚非智故龍蟒亦可度脫也若諸衆生樂人修人我現人身而為説法令其成就通曰如前人王宰官長者居士四衆等孰非人乎而又有樂修人類者蓋指士農工商無意三乘者而言彼其佛性具足蓋終日説法而不自知也盤山積禪師因於市肆行見一客買豬肉語屠家曰精底割一斤來屠家放下刀叉手曰長史那箇不是精底師於此有省又一日出門見人舁喪歌郎振鈴云紅輪決定沉西去未委魂靈往那方幕下孝子哭曰哀哀師忽身心踴躍歸舉似馬祖祖印可之寶壽和尚在先寶壽為供養主壽問父母未生前還我本來面目來師立至夜深下語不契翌日辭去壽曰汝何往師曰昨日蒙和尚設問某甲不契往南方參知識去壽曰南方禁夏不禁冬我此間禁冬不禁夏汝且作街坊過夏若是佛法闤闠之中浩浩紅塵常説正法師不敢違一日街頭見兩人交爭揮一拳曰你得恁麼無面目師當下大悟走見寶壽未及出語壽便曰汝會也不用説師便禮拜即此二則但現人身即能説法豈必大士所現而後有所成就哉若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為説法令其成就通曰天龍曰出天能厭樂龍能怖苦自有出身之路最易度者也乾闥婆等曰脫業報所縛最難解脫非人藥叉曰度已沉幽苦如沒大海必須筏度均名度脫其中難易不等如此無形有想者神鬼精靈是也有形無想者土木金石是也瑜珈𦦨口焦面鬼王即觀音大士所化嵩嶽破竈墮和尚言行叵測山塢有廟甚靈殿中唯安一竈遠近祭祀不輟師一日領侍僧入廟以杖敲竈三下曰咄此竈只是泥瓦和成聖從何來靈從何起恁麼烹宰物命又打三下竈乃傾破墮落須臾有一人青衣峩冠設拜師前師曰是甚麼人曰我本此廟竈神久受業報今日蒙師説無生法得脫此處生在天中特來致謝師曰是汝本有之性非吾強言神再禮而沒少選侍僧問曰某等久侍和尚不蒙示誨竈神得甚麼徑旨便得生天師曰我只向伊道是泥瓦和成別也無道理為伊待僧無言師曰會麼僧曰不會師曰本有之性為甚麼不會侍僧等乃禮拜師曰墮也墮也破也破也後義豐禪師舉似安國師安嘆曰此子會盡物我一如可謂如朗月處空無不見者難伊搆語脈豐問曰未審甚麼人搆得他語脈安曰不知者時號為破竈墮不知何許人毋亦觀音之所現耶是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就合論曰所云無作妙力自在成就者雜華所稱普賢對現色身法華所稱一切色身三昧也蓋其冥熏法界慈善根力不動真際應迹十方者也以聖行慈悲應空機則執持糞器狀若所畏以天行慈悲應中機則如駛馬見鞭影行大直道無所畏留故以梵行慈悲應假機則踞師子床寶几承足商估賈人乃遍他國出入息利無所不有是三種機空假中自言令諸衆生見如是事此法華色身三昧也如來神用十方隨根對現以大慈悲願力不捨衆生故能一念遍周而無作者如十一地所利衆生等同法界隨根隨時對現色身不為而用不作而應以普光明智不屬方所同衆生心任物現形無往來故此雜華對現色身也此隨緣示現皆即如幻故以如幻三昧聞熏聞修自在成就臨濟云山僧所説只是道流現今目前孤明歷歷地聽法者此人處處不滯通徹十方三界自在入一切差別境不能回換一剎那間透入法界逢佛説佛逢祖説祖逢羅漢説羅漢逢餓鬼説餓鬼向一切處遊履國土教化衆生未嘗離一念隨處清淨光透十方萬法一如道流大丈夫兒今日方知本來無事只為你信不及念念馳求捨頭覓頭自不能歇此臨濟説法得觀音正法眼若信得本來無事則三十二應無作妙力即得現前世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切衆生同悲仰故令諸衆生於我身心獲十四種無畏功德通曰慈必言力力足泛應故名大慈悲必言仰答其仰望故名大悲衆生所畏畏生死也吾以不生不滅無作妙力而濟度之俾登彼岸其功德可勝道哉維摩經文殊師利又問生死有畏菩薩當何所依維摩詰言菩薩於生死畏中當依如來功德之力文殊師利又問菩薩欲依如來功德之力當於何住答曰菩薩欲依如來功德之力當住度脫一切衆生又休舍優婆夷自説得菩薩安隱幢以衆生未離生死菩薩不自取安隱故若能入生死教化衆生達生死及衆生而能教化者總涅槃行無出無沒方名離憂安隱幢故聞熏聞修以此自度亦以此度人更為安隱一者由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫通曰衆生悲苦迫切之心即菩薩之心衆生稱呼名號之音即觀音之音也若觀其音未離聲塵似有苦惱若觀觀者衆苦所不到當即解脫此返聞第一機也僧問襄州歷村和尚如何是觀其音聲而得解脫村將火筯敲柴曰汝還聞麼曰聞村曰誰不解脫斯誠善説楞嚴微妙甚深旨趣者乎二者知見旋復令諸衆生設入大火火不能燒通曰知見屬火知見歸湛湛性圓滿故火不能及僧靈潤嘗與法侶登山遊覽野火四合衆皆奔散潤獨安步顧陟謂法侶曰心外無火火實自心謂火可逃寧能免火及火至潤而潛然息滅三者觀聽旋復令諸衆生大水所漂水不能溺通曰聞聽屬水醫家亦以耳屬腎聽復則水歸其根故水不能溺求那跋陀羅者此云功德賢中天竺人以元禧十二年至建業為南譙王義宣所敬王有逆謀諫之至流涕不聽梁山之敗墮江水中一心誦觀世音菩薩手捉竹杖顧見童子牽其衣曰汝小兒乃能爾耶及岸欲脫衲衣賞之而童子忽失所在僧問保福如何是入火不燒入水不溺福曰若是水火即被燒溺此真得旋復之妙故其言直截如是四者斷滅妄想心無殺害令諸衆生入諸鬼國鬼不能害通曰魑魅魍魎莫能逢之自古所稱鬼方蓋亦夥矣唯海中羅剎鬼國為害最著航海者為黑風所飄至其處即有美男女飲食相慰勞使人樂而忘返後船至則取前船人盡啖之月朔望則有馬王往度彼衆附馬而渡者或頭或尾但一心不彼樂即達本國稍繫念即墮海中真西山跋妙法蓮華經曰余少時讀普門品雖未深解其意然以意測之曰此佛氏之寓言也昔唐李文公問藥山禪師曰如何是惡風吹船飄落鬼國師曰李翱小子問此何為文公勃然怒形於色師笑曰發此嗔怒心便是黑風吹船飄入鬼國也吁藥山可謂善啓發人矣以是推之則知利欲熾然即是火坑貪愛沉溺便是苦海一念清淨烈焰成池一念警覺船到彼岸災患纏縛隨寓而安我無畏怖如械自脫惡人侵凌待以橫逆我無忿嫉如獸自奔讀是經者作如是觀則知普陀大士真實為人非浪語者按傳燈録作于頔客作漢問此何為屬紫玉禪師語傳者不盡同要在會其意耳五者熏聞成聞六根銷復同於聲聽能令衆生臨當彼害刀段段壞使其兵戈猶如割水亦如吹光性無搖動通曰聞性圓通非有形狀熏修於聞成圓於聞則六根銷復化而為聞外物所觸同於聲聽縱有兵戈亦如割水吹光爾聞性不動即無恐怖既無恐怖則不壞者在我而刀段段壞矣罽賓國王秉劍至師子尊者所問曰師得蘊空否祖曰已得蘊空王曰離生死否祖曰已離生死王曰既離生死可施我頭祖曰身非我有何吝於頭王即揮劍斷尊者首白乳涌高數尺王之右臂旋即墮地七日而終肇法師臨刑偈曰四大原非有五蘊悉皆空將頭臨白刃猶似斬春風斯可謂純覺遺身性無搖動者按十六國春秋肇師以晉義熙十年卒於長安吉祥滅度無臨刑事世傳高王觀音經誦者枷杻盡脫大有靈感或以為偽經云六者聞熏精明明遍法界則諸幽暗性不能全能令衆生藥叉伺察羅剎噉人鬼鳩槃茶鬼厭魅及毗舍遮噉精氣鬼富單那等熱病鬼雖近其旁目不能視通曰鬼神以幽暗成性第於幽暗得其便而不能於光明顯其迹也故曰不能全況彼幽暗有限而我光明無邊精光閃爍爍彼幽暗能奪其目故不能視悟本住洞山二十年土地神不識神白主事如何得識和尚一面主事云和尚齋堂上食次汝與覆却飯檻和尚失聲忽能見之次日神覆飯檻師失聲曰可惜常住物神方識師一面又鹽官會下有主事僧忽見一鬼使來追僧曰某甲身充主事未暇修行乞容七日得否使曰待為白王若許七日後來不然須臾便至言訖不見至七日後復來竟覓其僧不得後有舉問一僧若被覓著時如何抵擬他去洞山代云被他覓得也此與南泉至莊土地神預報知莊主供設甚備侍者問既是大善知識為甚却被鬼神覷見泉云土地前更添一分供養著可與同參七者音性圓銷觀聽返入離諸塵妄能令衆生禁繫枷鎖所不能著通曰有音有塵未入聞性即為塵縛今音性圓銷動靜二相了然不生觀聽返入至不生滅則離諸塵妄即名真解脫也若荷擔大法須另具一隻眼雲門到雪峰莊見一僧乃問上座今日上山去那僧曰是門曰寄一則因緣問堂頭和尚祗是不得道是別人語僧曰得門曰上座到山中見和尚上堂衆才集便出握腕立地曰這老漢項上鐵枷何不脫却其僧一依門語雪峰見這僧與麼道便下座欄胸把住曰速道速道僧無對峰拓開曰不是汝語僧曰是某甲語峰曰侍者將繩棒來僧曰不是某語是莊上一浙中上座教某甲來道峰曰大衆去莊上迎取五百人善知識來又雲門到鵝湖聞上堂曰莫道未了底人長時浮逼逼地設使了得底明明知有去處尚乃浮逼逼地門乃下問首座適來和尚意作麼生座曰浮逼逼地門曰首座久在此住頭白齒黃作這箇語話曰上座又作麼生門曰要道即得見即便見若不見莫亂道曰秪如浮逼逼地又作麼生門曰頭上著枷腳下著杻曰與麼則無佛法也門曰此是文殊普賢大人境界二則可以互觀八者滅音圓聞遍生慈力能令衆生經過險路賊不能劫通曰感應一機也彼此一心也內無應者外不能為故心無殺害則鬼不能侵遍生慈力則賊不能劫良由滅音則無對待圓聞則同一體故不成敵而被劫也投子山大同禪師遭巢寇暴亂有狂徒持刃向師曰住此何為師乃隨宜説法渠魁聞而拜伏脫衣服施之而去三角山法遇菴主因荒亂魁帥入山問和尚有甚財寶遇曰僧家之寶非君所宜魁曰是何寶遇振聲一喝魁不悟以刃加之一領一不領豈非定業耶巖頭嘗謂衆曰老漢去時大吼一聲了去中原盜起衆皆避地頭端居晏如也一日賊大至責以無供饋遂剚刃焉頭神色自若大呌一聲而終聲聞數十里此定業故不可逃然三角與巖頭之寶又豈賊之所能劫乎九者熏聞離塵色所不劫能令一切多淫衆生遠離貪欲通曰熏修於聞則欲愛乾枯良由水歸於根火不能炎故也音塵既銷餘塵俱脫根境不相到故色不能惑古德云久種善根深居塵塵不侵非干塵不侵自是我無心鳩摩羅什忽聞肩上二小兒啼什曰此欲障也言於秦王賜宮女四人一交而産二子欲障遂息其徒因是不守戒律什乃撮針而吞之曰能如我吞針者乃可行欲於是一衆悚然奉教十者純音無塵根境圓融無對所對能令一切忿恨衆生離諸瞋恚通曰瞋視貪更密尤為難拔故離塵即可斷貪瞋必無塵而後可斷也外無所對易內無能對難非根境圓融純乎其純難以語此雖然亦有以瞋恚作佛事者如慈明在汾陽二載未許入室每見必詬罵或毀詆諸方及有所訓皆流俗鄙事一夕訴曰自至法席已再夏不蒙指示但增世俗塵勞念歲月飄忽己事不明失出家之利語未卒陽熟視曰是惡知識敢裨販我怒舉杖逐之明擬伸救陽掩明口乃大悟曰是知臨濟道出常情服役七載辭去後住慈明黃龍南哀懇開示明曰公學雲門禪必善其旨如云放洞山三頓棒是有喫棒分無喫棒分南曰有喫棒分明色莊曰從朝至暮鵲噪鴉鳴皆應喫棒明復問趙州道臺山婆子我為汝勘破了也且那裏是他勘破婆子處南汗下不能答次曰又詣明詬罵不已南曰罵豈慈悲法施耶明曰你作罵會那南於言下大悟因呈頌曰傑出叢林是趙州老婆勘破沒來由而今四海清如鏡行人莫與路為仇明頷之若此等嗔恚雖不離可也十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦此云無善心永離癡暗通曰聞性非見性也何以言明明即覺也覺所覺空故明遍法界空覺極圓故法界身心猶如琉璃朗徹無礙且六根互用觀即是聞故曰銷塵旋明也內業有十而壞滅法身唯淫怒癡為甚天台釋三毒通界內外界內謂思惑界外謂無明二乘以欣涅槃為貪厭生死為嗔迷中道為癡菩薩以廣求佛法為貪呵斥二乘為瞋未了佛性為癡皆是三毒而癡為根本甚矣癡業之難除也百丈云濁法者貪嗔愛取等多名也清法者菩提涅槃解脫等多名也只如今鑑覺但於清濁兩流凡聖等法都不得有纖毫愛取既不愛取依住不愛取將為是是初善是住調伏心是聲聞人是戀筏不捨人是二乘道是禪那果既不愛取亦不依住不愛取是中善是半字教猶是無色界免墮二乘道免墮魔民道猶是禪那病是菩薩縛既不依住不愛取亦不作不依住知解是後善是滿字教免墮無色界免墮禪那病免墮菩薩乘免墮魔王位為智障地障行障故見自己佛性如夜見色如云佛地斷二愚一微細所知愚二極微細所知愚故云有大智人破塵出經卷若透得三句過不被三段管教家舉喻如鹿三跳出綱喚作纏外人無物拘繫得渠是屬然燈後佛是最上乘是上上智是佛道上立此人是佛有佛性是導師是使得無所礙風是無礙慧於後能使得因果福智自由是作車運載因果處於生不被生之所留處於死不被死之所礙處於五陰如門開相似去住自由若能與麼不論階梯勝劣乃至蟻子之身但能與麼盡是妙淨國土不可思議此猶是解縛語彼自無瘡勿傷之也佛瘡菩薩等瘡但説有無等法盡是傷也噫百丈慈悲極力發明微細性障須一一透過方名永離癡暗十二者融形復聞不動道場涉人世間不壞世界能遍十方供養微塵諸佛如來各各佛邊為法王子能令法界無子衆生欲求男者誕生福德智慧之男通曰此真如性涉入世間隨為色空遍十方界乃不空如來藏也大士本彌陀法王子而各各佛邊承事不倦是真能子者故求男者輒應之二十三祖鶴勒尊者月氏國人也父曰千勝母曰金光以無子故禱於七佛金幢即夢須彌山頂一神童持金環云我來也覺而有孕年七歲遊行聚落覩民間淫祀乃入廟叱之曰汝妄興禍福幻惑於人歲費牲牢傷害斯甚言訖廟貌忽然而壞由是鄉黨謂之聖子年二十二出家三十遇摩拏羅尊者付法紹祖位十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來祕密法門受領無失能令法界無子衆生欲求女者誕生端正福德柔順衆人愛敬有相之女通曰一根返元六根互用是謂圓通唯圓而明照無二故立大圓鏡智唯通而含十方界故立空如來藏承順如來受領無失皆有女之道故求女得女月上女相好端嚴衆人愛敬求配者踵至女現神異志求出家舍利弗因入城見女出城心口思惟此姊見佛不知得忍不得忍否我當問之才近便問大姊往甚麼處去女曰如舍利弗與麼去弗曰我方入城汝方出城何言如我恁麼去女曰諸佛弟子當依何住曰弗諸佛弟子依大涅槃而住女曰諸佛弟子既依大涅槃而住而我亦如舍利弗與麼去又文殊問菴提遮女曰生以何為義女曰生以不生生為生義殊曰如何是生以不生生為生義女曰若能明知地水火風四緣未嘗自得有所和合而能隨其所宜是為生義殊曰死以何為義女曰死以不死死為死義殊曰如何是死以不死死為死義女曰若能明知地水火風四緣未嘗自得有所離散而能隨其所宜是為死義菴提遮女問文殊曰明知生是不生之理為甚麼却被生死之所流轉殊曰其力未充此二女者出有佛世不但福德柔順且能發明向上事豈亦夙生受領祕密法門而示現者耶十四者此三千大千世界百億日月現住世間諸法王子有六十二恆河沙數修法垂範教化衆生隨順衆生方便智慧各各不同由我所得圓通本根發妙耳門然後身心微妙含容周遍法界能令衆生持我名號與彼共持六十二恆河沙諸法王子二人福德正等無異世尊我一名號與彼衆多名號無異由我修習得真圓通是名十四施無畏力福備衆生通曰最初觀其音聲即得解脫接上上根但照見五蘊皆空即度一切苦厄以觀觀者非微妙觀行不能也末示但持名號福備衆生接中下根福備云者指免水火以至得男女無求不遂故三十二應言解脫者即證悟餘成就但備其福而已此方衆生耳根利故受道者多所以觀音化勝餘根鈍故受道者少所以諸聖化劣圓與不圓日劫相倍已自密簡耳根為此方教體矣華林善覺禪師常持錫杖夜出林麓間七步一振錫一稱觀音名號夾山問遠聞和尚念觀音是否師曰然山曰騎却頭時如何師曰出頭即從汝騎不出頭騎甚麼山無對觀察使裴休訪之問曰還有侍者否師曰有一兩箇秪是不可見客裴曰在甚麼處師乃喚大空小空時二虎自菴從而出裴覩之驚悸師語二虎曰有客且去二虎哮吼而去裴問曰師作何行業感得如斯師乃良久曰會麼裴曰不會師曰山僧常念觀音故能知華林良久及不出頭處即善觀觀者不然且念觀音世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德一者由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寶覺故我能現衆多妙容能説無邊祕密神呪其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅首金剛堅固二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂各有妙印二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目或慈或威或定或慧救護衆生得大自在通曰同佛慈力故有三十二應同衆生悲仰故施十四無畏已是無作妙力不可思議而又有四不思議無作妙德者由修證無上道故其道無上其神妙愈不可測前説法及稱名號猶可窺測至此其形其呪能令衆生得大自在真大不思議境界也總自妙妙聞心流出初亡根塵心固妙矣此對粗之妙非絶待之妙繼而智境雙亡能所俱寂故曰妙妙始而返聞遺境至此心精遺聞聞且遺之六根俱化是以見聞覺知不能分隔而成一圓融清淨寶覺即所謂寂滅現前也唯圓融清淨故應化無方首為六用之總臂表提接之悲目表照了之智首臂目俱言八萬四千者對八萬四千塵勞而顯對治法門也六祖云我此法門從一般若生八萬四千智慧何以故為世人有八萬四千塵勞若無塵勞智慧常現不離自性陸亘大夫問南泉大悲菩薩用許多手眼作甚麼泉曰秪如國家又用大夫作甚麼麻谷問臨濟大悲千手眼那箇是正眼濟搊住曰大悲千手眼作麼是正眼速道速道谷拽濟下禪床却坐濟問訊曰不審谷擬議濟便喝拽谷下禪床却坐谷便出去又麻谷問十二面觀音那箇是正面濟下禪床擒住曰十二面觀音甚處去也速道速道谷轉身擬坐濟便打谷接住棒相捉歸方丈此二尊宿各顯神通大不可思議若見他與奪之機許具觀音手眼二者由我聞思脫出六塵如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸衆生是故十方微塵國土皆名我為施無畏者通曰聞思圓通如聲度垣以能超越六塵不為所礙故能現形誦呪顯不思議之用唯聞性不可思議故呪力亦不可思議前以一圓融清淨寶覺救護衆生得大自在蓋用全力而引之登道岸者也故手臂眼慈威定慧具備令其解脫此但現一一形誦一一呪能令衆生無畏僅無畏生死苦耳未至大自在也昔有人為採生者所獲用以飼鬼鎖於廟中柱上夜半有巨蟒至將噉之其人生平但熟一大悲呪持誦不已蟒不能近若有物隔之者蟒竟去天明啓鑰視之無恙衆訝問其故語以誦大悲呪獲免由是淫祀遂廢呪力能施無畏大都如此張僧繇寫寶志像才下筆輒不自定志遂以指𠢐面門分披出十二面觀音妙相殊麗或慈或威僧繇竟不能寫僧問文殊禪師僧繇為甚麼邈志公真不得殊云非但僧繇志公亦邈不得僧云志公為甚麼邈不得殊云綵繪不將來僧云和尚還邈得也無殊云我亦邈不得僧云和尚為甚麼邈不得殊云渠不苟我顏色教我如何邈丹霞頌云身光熾盛相巍巍妙手如何綵繪伊休問僧繇吳道子志公他自不能知即志公亦不能知可想見不思議境界矣三者由我修習本妙圓通清淨本根所遊世界皆令衆生捨身珍寶求我哀愍通曰本妙圓通清淨本根即耳根也遠離塵垢本無煩惱故曰清淨而世界衆生苦於煩惱不能解脫故哀懇求度菩薩所修六度布施為先故教令布施去貪去吝以為修因即此一布施不見與者不見受者及不見所施物是名布施波羅蜜非清淨圓通不能臻斯妙也故觀世音菩薩所受無盡意菩薩珍寶瓔珞還以奉佛其始也不肯受之可以觀戒奉佛無倦可觀精進不自受用可以觀忍施受無情可以觀定唯求福備衆生可觀智慧故舉一布施而六度在其中矣豈但以一布施教哉僧問百丈如今沙門盡言我依佛教學一經一論一禪一律一知一解合受檀越四事供養為消得否丈云但約如今照用一聲一色一香一味於一切有無諸法一一境上都無纖塵取染亦不依住無取染亦無不依住知解這箇人日食萬兩黃金亦能消得秪如今照一切有無等法於六根門頭刮削併當貪愛有纖毫治不去乃至乞施主一粒米一縷線箇箇披毛戴角牽犂負重一一須償他始得為不依佛佛是無著人無求人無依人如今波波貪覓佛盡皆背也信斯言也必修習清淨本根乃可受人布施四者我得佛心證於究竟能以珍寶種種供養十方如來傍及法界六道衆生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃通曰證於究竟其慧足也故能與人以出世之樂供養如來其福足也故能與人以世間之福皆從不思議中成就若見有求者有得者其所施亦隘矣得福不如得果得果不如得極果故以得大涅槃為極百丈云秪如今有人以福智四事供養四百萬億阿僧祇世界六趣衆生隨其所欲滿八十年已後作是念然此衆生皆以衰老我當以佛法而訓導之令得須陀洹果乃至阿羅漢道如是施主但施衆生一切樂具功德尚自無量何況令得須陀洹果乃至阿羅漢道功德無量無邊猶不如第五十人聞經隨喜功德報恩經云摩耶夫人生五百太子盡得辟支佛果而皆滅度各各起塔供養一一禮拜嘆言不如生於一子得無上菩提省我心力秪如今於百千萬衆生有一人得者償直三千大千世界嗟乎觀世音已得佛心而能令衆生皆得佛心其悲願真不可思議矣佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩地成就菩提斯為第一世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號由我觀聽十方圓明故觀音名遍十方界通曰書云明四目達四聽言以四方之耳目為耳目也又云天視自我民視天聽自我民聽言天之視聽不可見見之於民也觀音既以十方之觀聽為觀聽故十方之觀聽即觀音也其名安得不遍十方乎保福問僧甚處來曰觀音福曰還見觀音麼曰見福曰左邊見右邊見曰見時不歷左右法眼別云如和尚見孚上座登徑山法會一日於大佛殿前有僧問上座曾到五臺否曰曾到曰還見文殊麼曰見曰甚麼處見曰徑山佛殿前見雪峰聞其語而奇之臨濟云有一般學人向五臺山裏求文殊早錯了也五臺無文殊你欲識文殊麼秪你目前用處始終不異處處不疑此箇是活文殊你一念心無差別光處處總是真普賢你一念心自然解縛隨處解脫此是觀音三昧法互為主伴出則一時出一即三三即一如是解得始好看教噫臨濟此語説宗説教總無差別爾時世尊於師子座從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢林木池沼皆演法音交光相羅如寶絲網是諸大衆得未曾有一切普獲金剛三昧即時天雨百寶蓮華青黃赤白間錯紛糅十方虗空成七寶色此娑婆界大地山河俱時不現唯見十方微塵國土合成一界梵唄詠歌自然敷奏通曰諸菩薩阿羅漢所證圓通俱已入不思議界故佛從不思議中現起瑞應寶光依正二報皆顯圓通正報五體放光佛佛不異顯二十五圓通頭頭是道人各具體而佛得其全也依報交光相羅如寶絲網乃至十方虗空成七寶色顯十八界七大皆如來藏真如妙性交涉互融同一寶明空海也此娑婆界合成一界塵消聞復之象也林木池沼皆演法音純音無塵之象也寶覺圓明周遍法界隱隱以返聞為第一機矣洞山到溈山問曰頃聞忠國師有無情説法某甲未究其微溈曰我這裏亦有只是難得其人曰便請和尚道溈曰父母所生口終不為子説曰還有與師同時慕道者否溈曰此去石室相連有雲巖道人若能撥草瞻風必為子之所重既到雲巖問無情説法甚麼人得聞巖云無情得聞曰和尚還聞否巖曰我若聞子則不聞吾説法也曰某甲為甚麼不聞巖豎起拂子云還聞麼曰不聞巖曰我説法汝尚不聞何況無情説法曰無情説法該何典教巖云豈不見彌陀經云水鳥樹林悉皆念佛念法無情草木互奏笙歌洞山於此有省乃述頌曰也大奇也大奇無情説法不思議若將耳聽終難會眼處聞聲方得知雲居佑禪師上堂一切聲是佛聲擊禪床曰梵音清遠令人樂聞又曰一切色是佛色乃拈起拂子曰今佛放光明照發實相義已到之者頂戴奉行未到之者應如是知應如是信擊禪床下座此諸尊宿親到圓通會上來故能重重演説如是於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各説最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別我今欲令阿難開悟二十五行誰當其根兼我滅後此界衆生入菩薩乘求無上道何方便門得易成就文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神説偈對佛通曰彼等修行實無優劣前後差別均已悟入無上菩提為佛所印黃檗云自如來付法迦葉以來以心印心心心不異印著空即印不成文印著物即印不成法故以心印心心心不異能印所印俱難契會故得者少然心即無心得即無得夫惟無心無得故無前後差別此二十五無學實無優劣乃以心印心心心不異故也覺海性澄圓圓澄覺元妙元明照生所所立照性亡通曰覺元妙本自妙而常明者也以分別前境故曰元明已落明了意地則是似量似量立則圓明現量沒前世尊云無始菩提涅槃元清淨體能生諸緣緣所遺者此重頌出普明和尚示衆云祖師心法洞貫十方今古恆然法爾如是如是之法不假修而自就不假得而自圓一切現成名不動地用而非有不用非無妙體湛然恆常不變體合妙用應備無為映現重重無邊色相心無自性觸事全彰不動道場遍十方界如斯境界略暫回光背塵合覺不為影事此之事意如王大路行之即是假使不行亦在其路如斯所論猶是化門之説若以舉唱宗乘只有一時散去好若散去便無事庶幾覺海澄圓體段不然又坐在無為窟裏迷妄有虗空依空立世界想澄成國土知覺乃衆生空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有通曰覺曰大覺所以別於知覺之覺也大覺如海莫可涯量性本空不可以空名性本覺不可以覺名有相當情無相即隱真性既隱空覺遂分瞥起空見便生相分而三界國土皆依空而立矣但認覺明便生見分而衆生有漏皆逐妄而出矣相非離見而為相由想澄而結者也見非離相而為見即流轉三界而合塵者也是相是見生於大覺之中如海一漚爾若能返窮流根至不生滅則漚滅復歸於海依然一大覺妙明覓空尚不可得而況空中安立有情無情諸三界微塵國土乎僧問百丈空生大覺中如海一漚發如何丈曰空喻於漚海喻於性自己靈覺之性過於虗空故云空生大覺中如海一漚發木平道禪師問洛浦一漚未發時如何辨其水脈浦云移舟諳水勢舉棹別波瀾平不契既參蟠龍還問前話龍云移舟不辨水舉棹即迷源乃悟入丹霞頌云金烏玉兔兩交輝照破威音未兆時若謂青霄別有路木人依舊皺雙眉大抵蟠龍見處藏身處沒蹤迹洛浦見處沒蹤迹處莫藏身會得只是一路非有異也後僧問如何是木平曰不勞斤斧僧云為甚麼不勞斤斧曰木平果能照破威音未兆前一段大事歸元性無二方便有多門聖性無不通順逆皆方便初心入三昧遲速不同論通曰前云十方如來於十八界一一修行皆得圓滿無上菩提即此聖性無不通順逆皆方便也又云若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓通日劫相倍即此初心入三昧遲速不同倫也黃檗云歸元性無二者無明實性即諸佛性方便有多門者聲聞人見無明生見無明滅緣覺人但見無明滅不見無明生念念證寂滅諸佛見衆生終日生而無生終日滅而無滅無生無滅即大乘果所以道果滿菩提圓華開世界起枯木成禪師上堂歸元性無二方便有多門但了歸元性何愁方便門諸人要會歸元性麼露柱將來作木杓旁人不肯任從伊要會方便門麼木杓將來作露柱撑天拄地也相宜且道不落方便門一句作麼生道三十年後莫教錯舉此二尊宿各隨見地發揮要於歸元之旨無二色想結成塵精了不能徹如何不明徹於是獲圓通通曰從十想觀入者結成內塵故真精明了不得透徹為法縛故石頭問新到從甚處來曰江西頭曰見馬大師否曰見頭乃指一橛柴曰馬師何似這箇僧無對却回舉似馬祖祖曰汝見橛柴大小曰沒量大祖曰汝甚有力僧曰何也祖曰汝從南嶽負一橛柴來豈不是有力若此僧是箇漢放下便是音聲雜語言但伊名句味一非含一切云何獲圓通通曰悟聲塵與耳根入者不同聲是佛語根乃自心認塵則著他名句返聞則了己性源名句滯於一端性源無不該遍故聞聲悟道亦在所簡雲居膺上堂汝等諸人直饒學得佛邊事早是錯用心不見古人講得天華落石點頭亦不于自己事自餘是甚麼間擬將有限身心向無限中用如將方木逗圓孔多少誵訛若無恁麼事饒你攢華簇錦亦無用處未離情識在一切事須向這裏及盡若有一毫去不盡即破塵纍豈況更多差之毫釐過犯山嶽不見古人道學處不玄盡是流俗閨閣中物捨不得俱為滲漏直須向這裏及取及去及來併盡一切事始得無過如人頭頭上明物物上通秪喚作了事人終不喚作尊貴將知尊貴一路自別不見道從門入者非寶棒上不成龍知麼此可為有味乎名句者炯戒香以合中知離則元無有不恆其所覺云何獲圓通味性非本然要以味時有其覺不恆一云何獲圓通通曰香味離合靡常體非周遍執著香味為入門者終與圓體不似故俱在所簡僧問雲居膺香積飯甚麼人得喫膺曰須知得喫底人入口也須抉出又僧問首山念如何是正修行路山曰貧兒不雜食僧曰撒手歸家去也山曰香臭不曾聞佛印上堂我有這一著人人口裏嚼嚼得破者速須吐却嚼不破者翻成毒藥乃召諸禪德作甚麼滋味請道看良久曰醫王不是無方義千里蘇香象不回佛印却與二尊宿重下注腳若聞此香若知此味即恆其所覺矣觸以所觸明無所不明觸合離性非定云何獲圓通通曰觸必有所已非圓義況合則有觸離則非觸而觸以離知其性非定自性靡定其何能通水潦和尚初參馬祖問如何是西來的的意祖曰禮拜著潦才禮拜祖便與一踏潦大悟起來撫掌呵呵大笑云也大奇也大奇百千三昧無量妙義只向一毛頭上便識得根源去後告衆曰自從一喫馬師踏直至如今笑不休雖然昔日所觸猶在何似臨濟擺脫臨濟云我二十年在黃檗先師處三度問佛法大意三度蒙他賜杖如篙枝拂著相似如今更思得一頓誰人為我行得時有僧出衆云某甲行得濟拈棒與之僧擬接濟便打劍去遠矣爾乃刻舟法稱為內塵憑塵必有所能所非遍涉云何獲圓通通曰法塵非相潛意根故既落能所便有定方故不能遍涉雖是空法能遍十方而不能遍非空者故不能圓通非謂能不涉所所不涉能而兩立也臨濟云世出世諸法皆無自性亦無生性但有空名名字亦空你秪麼認他間名為實大錯了也設有皆是依變之境有箇菩提依涅槃依解脫依三身依境智依菩薩依佛依你向依變國土中覓甚麼物乃至三乘十二分教皆是拭不淨故紙佛是幻化身祖是老比丘你還是娘生已否你若求佛即被佛魔攝你若求祖即被祖縛你若有求皆苦不如無事信乎憑塵必有所不能獲圓通也以上揀六塵入者非初心所宜見性雖洞然明前不明後四維虧一半云何獲圓通通曰眼見明前不明後固矣心見非眼謂之見性何以亦虧一半但落見分便失圓常故眼根在所簡也南泉參忠國師師問甚麼處來曰江西來曰還將得馬師真來否曰只這是師曰背後底聻泉便休去長慶稜曰大似不知保福展云幾不到和尚此間雲居錫云此二尊宿盡扶背後只如南泉休去為扶面前扶背後玄沙嘗指亡僧面前觸目菩提萬里神光頂後相因有偈曰萬里神光頂後相沒頂之時何處望事已成意已休此箇來蹤觸處周智者撩著便提取莫待須臾失却頭此二則互相發均之不貴乎見鼻息出入通現前無交氣支離匪涉入云何獲圓通通曰宇宙間一大呼吸也春夏呼秋冬吸白月呼黑月吸子前呼午後吸人以呼吸通乎天地猶魚之在水也調出入息至於現前無交氣養生家以為合乎自然不知杳冥恍惚特氣機耳其精其物特識神耳支離漫患於自性有何交涉有道流問大珠曰世間還有法過於自然否珠曰有曰何法過得珠曰能知自然者曰元氣是道否珠曰元氣自元氣道自道曰若如是者則應有二也珠曰知無兩人又問云何為邪云何為正珠曰心逐物為邪物從心為正由此觀之調息之説為心逐物支離甚矣況得圓通舌非入無端因味生覺了味亡了無有云何獲圓通通曰舌非根安能知味非根而知味者是謂無端非語倒也既有此根所以味入之而生覺了味亡則覺亡矣是根以其味為有無安得為圓夾山在溈山作典座溈問曰今日喫甚麼菜夾云二年同一春溈云好好修事者夾云龍宿鳳巢投子頌云相逢借問衆生糜莫比菴園香飯施紫氣夜隨丹鳳轉金龍曉纏月中技又棲賢湜上堂良久曰幸好一盤飯不可糝椒薑雖然如此試唼噉看便下座此二則亦同一春唼噉得著許異舌知味身與所觸同各非圓覺觀涯量不冥會云何獲圓通通曰妙觸宣明但身顯知純覺遺身亦非圓覺必如圓覺觀身心超越不可涯量方能冥會萬法不籍身知今有身有觸則知有涯量非圓通也黃山谷太史謁死心新禪師隨衆入室新張目問曰新長老死學士死燒作兩堆灰向甚麼處相見谷無語新約出曰晦堂處參得底使未著在後左官黔南道力愈勝於無思念中頓明死心所問報以書曰往年蒙苦苦提撕長如醉夢依稀在光影中蓋疑情不盡命根不斷故望崖而退耳邇謫官在黔南道中晝臥覺來忽爾尋思被天下老和尚謾了多少唯有死心道人不肯乃是第一相為也不勝萬幸故冥會若山谷自己尚不可得更説甚麼相見非斷命根者不足語此知根雜亂思湛了終無見想念不可脫云何獲圓通通曰意知根既屬知矣知則亂思雜起如海起波浪於湛了性終無所見即使知歸無知思歸無思亦屬想念未易解脫故不可獲圓通僧問韶國師如何是不證一法師曰待言語在曰如何是證諸法曰醉作麼乃曰秪如山僧恁麼對他諸上座作麼生體會莫是真實相為麼莫是正恁麼時無一法可證麼莫是識伊來處麼莫是全體顯露麼莫錯會好如此見解喚作依草附木與佛法天地懸隔假饒答話揀辨如懸河秪成得箇顛倒知見若秪貴答話揀辨有甚麼難但恐無益於人翻成賺誤如上座從前所學揀辨問答持説道理極多為甚麼疑心不息聞古聖方便特地不會秪為多虗少實上座不如從腳跟下一時覷破看是甚麼道理有多少法門與上座作疑求解始知從前所學底事秪是生死根源陰界裏活計所以古人道見聞不脫如水裏月無事珍重見聞尚不可脫況想念乎已上五根人者非初心所宜識見雜三和詰本稱非相自體先無定云何獲圓通通曰境屬相分識屬見分今識見之見根與境合識生其中三者和合而成詰其根本此見原無自體無相可得和合則有不和合則無故曰非定安有自無定體而可證圓通者乎神會年十三自玉泉來參六祖祖曰知識遠來艱辛還將得本來否若有本則合識主試説看會曰以無住為本見即是主祖曰這沙彌爭合取次語會乃問曰和尚坐禪還見不見祖以拄杖打三下云吾打汝是痛不痛對曰亦痛亦不痛祖曰吾亦見亦不見會問如何是亦見亦不見祖曰吾之所見常見自心過𠍴不見他人是非好惡是以亦見亦不見汝言亦痛亦不痛如何汝若不痛同於木石若痛則同凡夫即起恚恨汝向前見不見是二邊痛不痛是生滅汝自性且不見敢爾弄人神會禮拜悔謝祖曰汝若心迷不見問善知識覓路汝若心悟即自見性依法修行汝自迷不見却來問吾見不見吾見自知豈待汝迷汝若自見亦不待吾迷何不自知自見乃問吾見與不見神會再禮百餘拜求謝過𠍴給侍左右一日祖告衆曰吾有一物無頭無尾無名無字無背無面諸人還識否神會出曰是諸佛之本源神會之佛性祖曰向汝道無名無字汝便喚作本源佛性汝向去有把茆蓋頭也只成箇知解宗徒若當時如二祖拜了依位而立更有何過心聞洞十方生於大因力初心不能入云何獲圓通通曰不用耳聞不用識聞故曰心聞是已證果位與觀世音觀聽十方圓明無異此亦當曰我亦從中證非唯一普賢心聞洞徹十方沙界外事無所不知由於因地發心行願極大遍虗空界靡不周到有此大因故證此大果此非大根大器不能承當不如返聞聞熏聞修漸次可入此謂初心未易湊泊難獲圓通與諸説稍別洞山稟禪師日唯宴坐一日呼侍者下至法堂謂曳木者無損階砌侍者出視無有還白寂無人迹稟又使求之侍者臨簷俯視乃羣蟻曳蜻蜓翼緣階而上此蓋靜極而靈知者也故聞蟻聲若雷況普賢心聞尤大於此者乎鼻想本權機祗令攝心住住成心所住云何獲圓通通曰甚矣心之難攝也始而散亂唯恐不住既而寂靜又成所住住與不住皆非無住本體故不得圓通石鞏一日廚中作務次馬祖見而問曰作甚麼鞏曰牧牛祖曰作麼生牧鞏曰一回入草去把鼻拽將來祖曰子真牧牛南泉垂語云王老師牧一頭水牯牛擬向溪東去不免官家苗稼擬向溪西去不免官象苗稼爭如隨分納些些總不見得天童拈云南泉牧牛可謂奇特直得一切處關防不得為甚麼如此是他隨分納些些雲門云且道牛內納牛外納直饒你説得納處分明我更問你覓牛在大溈詰云雲門止解索牛不解穿他鼻孔拈起拄杖云三世諸佛天下老和尚鼻孔被山僧拄杖一時穿却且道山僧鼻孔在甚麼處良久云誣人之罪以全罪科之若於此等權機穿透定然索著鼻孔定獲無上圓通説法弄音文開悟先成者名句非無漏云何獲圓通通曰舌根但能辨味舌識方能弄音説世出世間之法以開悟人然開悟但施於先成者有如時雨之化非言説所能與也良以名身句身不離文字非是無漏之法如手指月指非是月其可得圓通乎先德云言前薦得屈我宗風句後承當沉埋佛祖故開悟在先而以言證成則可若待言而悟去之遠矣法眼上堂大衆久立乃謂之曰秪恁麼便散去還有佛法道理也無試説看若無又來這裏作麼若有大市裏人叢處亦有何須到這裏諸人各曾看還源觀百門義海華嚴論涅槃經諸多策子阿那箇教中有這箇時節若有試舉看若是恁麼經裏有恁麼語是此時節麼有甚麼交涉所以道微言滯於心首常為緣慮之場實際居於目前翻成名相之境又作麼生得翻去若也翻去又作麼生得正去還會麼秪恁麼念策子有甚麼用處信哉名句非無漏不可得圓通持犯但束身非身無所束元非遍一切云何獲圓通通曰法身無量不假修為應身有涯容易造業必假戒律以約束之是約束但施於應身然不能通於法身之理故非遍一切不遍即不可獲圓通黃檗慧禪師少出家業經論因增授菩薩戒而嘆曰大土攝律儀與吾本授聲聞戒俱止持作犯也然於篇聚增減支本通別制意且殊俱微細難防復於攝善中未嘗行於少分況饒益有情乎且世間泡幻身命何可留戀哉由是置講課欲以身捐於水中飼鱗甲之類念已將行偶二禪者接之款論謂南方頗多知識何滯於一隅從此回志乃造疏山問曰剎那便去時如何山曰畐塞虗空汝作麼生去對曰畐塞虗空不如不去山便休下堂參第一座座曰適來祗對甚奇特曰此乃率爾敢望慈悲開示愚昧座曰一剎那間還有擬議否乃於言下頓悟又元菴慈禪師幼依成都正法出家具戒後遊講肆聽講圓覺經至四大各離今者妄身當在何處畢竟無體實同幻化因而有省作頌曰一顆明珠在我這裏撥著動著放光動地此二尊宿不離幻身而證法身何不遍之有神通本宿因何關法分別念緣非離物云何獲圓通通曰小乘神通皆是作意緣物則有離物則無非能離物而顯有念緣故此係宿因神力成就非關妙法分別而得顯現既已著於神通即不可以語於圓通矣黃檗初遊天台逢一僧如舊識乃同行屬澗水暴漲檗倚杖而止其僧率檗同過檗云請兄先過僧即浮笠於水上便過檗云我却共箇稍子作隊悔不一棒打殺其僧乃於水中遙禮贊歎曰真大乘法器吾所不及此小乘神通也故為檗所斥麻谷南泉二三人往謁徑山路逢一婆乃問路向甚處去曰驀直去谷曰前頭水深過得否曰不濕腳谷又問上岸稻得與麼好下岸稻得與麼怯曰總被螃蟹喫却也谷曰禾好香曰沒氣息谷又問婆住甚處曰祗在這裏三人至店婆煎茶一瓶攜盞三隻至謂曰和尚有神通者即喫茶三人相顧間婆曰看老朽自逞神通去也於是拈盞傾茶便行此等神通非同小可故麻谷南泉不能測其涯量以上從六識入者非初心所宜若以地性觀堅凝非通達有為非聖性云何獲圓通通曰地既堅凝原非通達性而持地乃有為法又非無為果故於圓通非宜先德云若人識得心大地無寸土恁麼見得更有何礙保福因僧侍立次福曰汝得恁麼粗心僧曰甚麼處是某甲粗心處福拈一塊土度與僧曰拋向門外著僧拋了却來曰甚麼處是某甲粗心處福曰我見築著磕著所以道汝粗心若此僧翻然省悟即得通達聖性即獲圓通矣若以水性觀想念非真實如如非覺觀云何獲圓通通曰水觀亦十想法爾想念所成豈同真實蓋真實之理如如不動非假造作故非覺觀所及僧問雪峯古澗寒泉時如何峯曰瞪目不見底曰飲者如何峰曰不從口入僧舉似趙州州曰不可從鼻孔裏入僧却問古澗寒泉時如何州曰苦曰飲者如何州曰死峯聞得乃曰趙州古佛遙望作禮自此不答話天童拈云扶樹宗乘須還大匠雪峯辦一千五百人善知識身心趙州用一百二十歲老作家手段不妨奇怪如今衆中隨言定旨亂作貶剝深屈古人然則相席打令似有知音鏤骨銘心罕逢明鑑這僧見處滯在湛不搖處趙州鉗鎚即是雪峯針線何謂不同哉若以火性觀厭有非真離非初心方便云何獲圓通通曰火頭聞説欲火而生厭離是厭有也既有欣厭非真解脫且初心入道制欲不若窮理理日明則欲日消如欲窮理試觀火是何物趙州因僧侍次遂指火問曰這箇是火你不得喚作火老僧道了也僧無對州復策起火曰會麼曰不會州曰此去舒州有投子和尚汝往禮拜問之必為汝説因緣相契不用更來不相契却來其僧到投子子問近離甚處曰趙州子曰趙州有何言句僧舉前話子曰汝會麼曰不會乞師指示子乃下禪床行三步却坐問曰會麼曰不會子曰你歸舉似趙州其僧却回舉似趙州州曰還會麼曰不會州曰投子與麼不較多也夫二老宿所為方便若此尚且不悟況其餘乎若以風性觀動寂非無對對非無上覺云何獲圓通通曰此羣動性來無所從去無所至原無所對觀察風力無依悟菩提心即無上覺何至有動寂二相祗為初機於其動中識不動性分動不動二相宛然即是對待既屬對待即生滅法去無上菩提遠矣十七祖僧迦難提度持鑑童子更名伽耶舍多一日聞風吹殿鈴聲祖問曰鈴鳴耶風鳴耶舍多曰非風鈴鳴我心鳴耳祖曰心復誰乎舍多曰俱寂靜故祖曰善哉善哉繼吾道者非子而誰後六祖因二僧論風幡義一曰風動一曰幡動議論不已祖進曰不是風動不是幡動仁者心動與舍多語如出一口雪峯舉六祖道不是風動不是幡動仁者心動乃曰大小祖師龍頭蛇尾好與二十棒時大原孚上座侍立不覺咬齒峯曰我適來恁麼道也好喫二十拄杖韶國師上堂古聖方便猶如河沙祖師道非風幡動仁者心動斯乃無上心印法門我輩是祖師門下客合作麼生會祖師意莫道風幡不動汝心妄動莫道不撥風幡就風幡通取莫道風幡動處是甚麼有云附物明心不須認物有云色即是空有云非風幡動應須妙會如是解會與祖師意旨有何交涉即不許如是會諸上座便合知悉若於這裏徹底悟去何法門而不明百千諸佛方便一時洞了更有甚麼疑情所以古人道一了千明一迷萬惑上座豈是今日會得一則明日又不會也莫是有一分向上事難會有一分下劣凡夫不會如此見解設經塵劫秪自勞神乏思無有是處韶國師與麼道較雪峯多少也好喫二十棒若以空性觀昏鈍先非覺無覺異菩提云何獲圓通通曰偏空則昏鈍非覺真空則即覺即空初機擬空容易錯路故須審辨玄沙上堂今時人不悟箇中道理妄自涉事涉塵處處染著頭頭繫絆縱悟則塵境紛紜名相不實便擬凝心斂念攝事歸空閉目藏精才有念起旋旋破除細想才生即便遏捺如此見解即是落空亡底外道魂不散底死人冥冥漠漠無覺無知塞耳偷鈴徒自欺誑這裏分明則不然也不是偎門傍戶句句現前不得商量不涉文墨本絶塵境本無位次權名箇出家兒畢竟無蹤迹真如凡聖地獄人天秪是療狂子之方虗空尚無改變大道豈有升沉悟則縱橫不離本際若到這裏凡聖也無立處若向句中作意則沒溺殺人若向外馳求又落魔界如如向上沒可安排恰似焰爐不藏蚊蚋此理本來平坦何用剗除動靜揚眉是真解脫道不強為意度建立乖真若到這裏纖毫不受指意則差便是千聖出頭來也安一字不得珍重若明得玄沙語即達真空之旨無上菩提亦強名爾豈不圓通現前若以識性觀觀識非常住存心乃虗妄云何獲圓通通曰如來藏妙真如性即第八識本非虗妄未見性者不能轉識但為識轉即用觀照觀亦是識念念生滅故非常住縱能存心湛然不動由觀力所持亦屬虗妄豈妙湛總持本自無心不待存而自無不存者乎十六祖羅睺羅多至僧伽難提所值彼入定祖與衆伺之經三七日方從定起祖問曰汝身定耶心定耶提曰身心俱定祖曰身心俱定何有出入提曰雖有出入不失定相如金在井金體常寂祖曰若金在井若金出井金無動靜何物出入提曰言金動靜何物出入言金出入金非動靜祖曰若金在井出者何金若金出井在者何物提曰金若出井在者非金金若在井出者非物祖曰此義不然提曰彼義非著祖曰此義當墮提曰彼義不成祖曰彼義不成我義成矣提曰我義雖成法非我故祖曰我義已成我無我故提曰我無我故復成何義祖曰我無我故故成汝義提曰仁者師誰得是無我祖曰我師伽那提婆證是無我提以偈贊曰稽首提婆師而出於仁者仁者無我故我欲師仁者祖以偈答曰我已無我故汝須見我我汝若師我故知我非我我難提心意豁然即求度脫祖曰汝心自在非我所繫付正法眼偈曰於法實無證不取亦不離法非有無相內外云何起此可知轉識成智在毫釐間不覩真實終歸虗妄諸行是無常念性元生滅因果今殊感云何獲圓通通曰據念佛法門念即是佛行即是佛唯心是佛唯心作佛果因一契原非殊感今文殊指歸向上一路故以行屬無常念屬生滅以是求佛常住果必不可得齊巳禪師因蓮社會道友請上堂云漸漸雞皮鶴髮父少而子老看看行步龍鍾疑殺木上座直饒金玉滿堂照顧白拈賊豈免衰殘老病正好著精采任汝千般快樂渠儂得自由無常終是到來歸堂喫茶去唯有徑路修行依舊打之繞但念阿彌陀佛念得不濟事復曰噁這條活路已被善導和尚直截指出了也是你諸人朝夕在徑路中往來因甚麼當面蹉過阿彌陀佛這裏薦得便可除迷倒障拔猶豫箭截疑惑網斷癡愛河伐心稠林洗心垢濁正心諂曲絶心生死然後轉入那邊擡起腳向佛祖踐履不到處進一步開却口向佛祖言詮不到處説一句喚回善導和尚別求徑路修行其或準前捨父逃去流落他鄉撞東磕西苦哉阿彌陀佛又黃龍新上堂清珠下於濁水濁水不得不清念佛投於亂心亂心不得不佛佛既不亂濁水自清濁水既清功歸何所良久曰幾度黑風翻大海未曾聞道釣舟傾夫都攝六根修念佛法門尚且以途路功勳一概砭剝於此見返聞直透性源且遠諸過真為修證圓通最上之機也我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入通曰聖人設教隨方不同或有以佛光明而作佛事或有以佛菩提樹而作佛事乃至或以園林臺觀或以虗空或以寂無説示如香積佛國無文字説但以虗空令諸天人得入律行此方教體唯在音聞不雜塵垢最為清淨唯其清淨故於三摩提容易契入此娑婆界以聞為當機也僧問玄沙學人乍入叢林乞師指箇入路沙曰還聞偃溪水聲麼曰聞沙曰從這裏入可謂直截指示矣離苦得解脫良哉觀世音於恆沙劫中入微塵佛國得大自在力無畏施衆生妙音觀世音梵音海潮音救世悉安寧出世獲常住通曰良哉觀世音已離苦矣故能救世悉安寧已得解脫矣故能令人出世獲常住於恆妙劫入微塵國則三十二應靡不周也施十四無畏得大自在力則四不思議妙難測也妙妙聞心如聲度垣總化為一妙音矣妙在清淨則謂之梵音妙在響應則謂之潮音妙在尋聲則謂之觀世音非比世間音乃自性之妙音也僧問歸宗如何是玄旨宗曰無人能會曰向者如何宗曰有向即乖曰不向者如何宗曰誰求玄旨又曰去無汝用心處曰豈無方便門令學人得入宗曰觀音妙智力能救世間苦曰如何是觀音妙智力宗敲鼎蓋三下曰子還聞否曰聞宗曰我何不聞僧無語宗以棒趁下他日上堂吾今欲説禪諸子總近前宗曰汝聽觀音行善應諸方所問如何是觀音行宗乃彈指曰諸人還聞否曰聞宗曰一隊漢向這裏覓甚麼以棒趁出大笑歸方丈歸宗見諸人一段妙音安然常住不惜重重指出大煞慈悲我今啓如來如觀音所説譬如人靜居十方俱擊鼓十處一時聞是則圓真實通曰觀音圓照三昧無作無為故如人靜居十方擊鼓十處俱聞非四維虧一半者比此於境顯其圓也黃檗惟勝禪師偶以扇勒窗櫺有聲忽憶教中道十方俱擊鼓十處一時聞因大悟後瑞州太守委黃龍遴選黃檗主人龍集衆垂語云鐘樓上念讚床腳下種菜若人道得乃往住持勝出答曰猛虎當路坐龍大悅遂令往如勝者可謂親證其圓真實也目非觀障外口鼻亦復然身以合方知心念紛無緒隔垣聽音響遐邇俱可聞五根所不齊是則通真實通曰五根無不合塵者然必合而後知便自溷濁唯聲塵隔垣可聞不失清淨之體故非涯量不冥會者可齊此以根顯其通也張無垢留蘇氏館一夕入廁以柏樹子話究之聞蛙鳴釋然契入有偈曰春天月夜一聲蛙撞破乾坤共一家正恁麼時誰會得嶺頭腳痛有玄沙若無垢者可謂親證其通真實也音聲性動靜聞中為有無無聲號無聞非實無聞性聲無既無滅聲有亦非生生滅二圓離是則常真實縱令在夢想不為不思無覺觀出思惟身心不能及通曰聲有動靜故聞有聞無聞性常住不因聲有而生不因聲無可滅也於何驗之即在夢想亦能以舂杵音作鐘鼓響在夢如覺不假思惟此與不恆其所覺者異故於識可以見其常也他五根在夢亦能覩境歷歷然未必皆對前境而知別有思惟所結故他五根思惟則有不思則無覺時對境則有夢時對境則無滯在身心為根塵所縛唯耳識性不以覺時思惟而有不以夢時不思而無其性已超於思不思之表故返聞覺觀非思不思與尋常觀照用思惟者不同既出思惟境界於根而離根矣身所不及也於識而離識矣心所不及也此之謂生滅既滅寂滅現前不謂之真常佛性乎張無垢語大慧曰某每於夢中必誦語孟何如慧舉圓覺曰由寂靜故十方世界諸如來心於中顯現如鏡中像無垢曰非老師莫聞此論也無垢夢中似習氣未除大慧指出大圓鏡智不妨習氣出沒可謂透極真常一路今此娑婆國聲論得宣明衆生迷本聞循聲故流轉阿難縱強記不免落邪思豈非隨所淪旋流獲無妄阿難汝諦聽我承佛威力宣説金剛王如幻不思議佛母真三昧汝聞微塵佛一切祕密門欲漏不先除畜聞成過誤將聞持佛佛何不自聞聞通曰論此方之機心性不明依聲論而得宣明則因言悟道者其常也然衆生不達本源循聲流轉即謂之迷然逐物為邪歸根為正若能逆流窮源至不生滅即是返聞可證真常不隨淪溺此乃微塵佛一路涅槃門也聞熏聞修金剛三昧謂之如幻者無作為故無作無為達於本聞諸佛皆由此出若有作有為欲漏不除雖廣持祕密翻成過誤不但染心留情謂之欲漏但瞥起見佛之念即謂之邪故返聞聞自性乃對治多聞第一機也宋孝宗問天竺僧云既是飛來峯何不飛去答曰一動不如一靜又問觀音手中數珠念甚答曰念觀世音菩薩又問自念自號作甚答曰求人不如求己僧問志超禪師如何是佛超曰汝是甚麼人曰莫便是也無超曰是即沒交涉此二則語皆於自聞聞之旨合聞非自然生因聲有名字旋聞與聲脫能脫欲誰名一根既返源六根成解脫見聞如幻翳三界若空華聞復翳根除塵消覺圓淨淨極光通達寂照含虗空通曰此下發明自聞聞入路先須審定此聞從因緣生乎從自然生乎聞本非生故非因緣自然而生特因聲顯故立聞名若旋返聞機至不生滅既無能聞自無所聞與聲脫然不相干涉此能脫其聲者不可復名聞矣將誰名哉他能與一切安名一切不能與他安名但可喻之如源而已故返源歸本聞尚無名孰為繫縛即此一根當體解脫而六根一時清淨矣六根本自清淨忽起見聞而為之能如瞪目生幻翳耳忽見三界而為之所如翳目見空華耳幻翳空華原自非有逐流忘返不覺是妄今聞復本聞而翳根先除則六塵銷落而本覺圓淨如睛明眼華何從生謂之圓淨者不撥萬象而根塵俱淨清淨之極洞見十方如淨琉璃內含寶月其光有不通達乎是內瑩發光寂而含照即所謂元明之照也照不生所則靜含虗空如片雲之在太清而覺海澄圓得其元妙矣欲大解脫者返聞其可已乎黃檗云是法平等無有高下是名菩提即此本源清淨心與衆生諸佛世界山河有相無相遍十方界一切平等無彼我相此本源清淨心常自圓明遍照世人不悟只認見聞覺知為心為見聞覺知所覆所以不覩精明本體但直下無心本體自現如大日輪升於虗空遍照十方更無障礙故學道人唯認見聞覺知施為動作空却見聞覺知即心路絶無入路但於見聞覺知處認本心然本心不屬見聞覺知亦不離見聞覺知但莫於見聞覺知上起見解莫於見聞覺知上動念亦莫離見聞覺知覓心亦莫捨見聞覺知取法不即不離不住不著縱橫自在無非道場如黃檗語却於翳病刮磨殆盡是亦返源之一助却來觀世間猶如夢中事摩登伽在夢誰能留汝形如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性通曰既能淨極光通達寂照含虗空虗空尚在包含況虗空中所有之物故翳病若除不但三界空華本來無也而三界中若根若塵皆如夢如幻耳夢中摩登伽豈能留醒者之形心縱精明不能取夢中所有此根境本自解脫之一徵也列子載幻師巧作幻人內具五臟外具五根驅而優俳儼然人也既散而幻人招王之寵姬王怒幻師丞解幻人皆木具王怒始釋然王怒不加於幻人幻人無心故也幻本無性奚容喜戚於其間哉此又根境本自解脫之一徵也五祖演禪師示衆云山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了子細看時元來青布幔裏有人山僧忍俊不禁乃問長史高姓他道老和尚看便休問甚麼姓山僧被他一句直得無言可對無理可伸還有人為山僧道得麼昨日那裏落節今日這裏拔本若會得拔本消息可以語息機歸寂然矣六根亦如是元依一精明分成六和合一處成休復六用皆不成塵垢應念銷成圓明淨妙餘塵尚諸學明極即如來黃檗曰同是一精明分為六和合一精明者一心也六和合者六根也此六根各與塵合眼與色合耳與聲合鼻與香合舌與味合身與觸合意與法合中間生六識為十八界若了十八界無所有束六合為一精明一精明者即心也學道人皆知此但不免作一精明六和合解遂被法縛不契本心如來現世欲説一乘真法則衆生不信興謗沒於苦海若都不説則墮慳貪不為衆生溥捨妙道遂設方便説有三乘乘有大小得有淺深皆非本法故曰唯有一乘道餘二則非真然終未能顯一心法故召迦葉同分座別付一心離言説法此一枝令別行若能契悟者便至佛地矣黃檗此語更不論餘塵尚諸學真大乘器合論曰初行菩薩見中品用以深信真如故得少分見知如來身無來無去無有斷絶唯心影現不離真如然此菩薩猶未能離微細分別以未入法身位故淨心菩薩見微細用如是轉勝乃至菩薩究竟地中見之方盡微細用名受用身以有業識見受用身若離業識則無可見一切如來皆是法身法身無有彼此差別色相互相見故夫以盡微細用名受用身者以有業識細相謂之菩薩地中故曰餘塵尚諸學若離業識則無可見謂之如來法身故曰明極即如來大衆及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非唯觀世音通曰聞機外逸則迷本逐末故名到返聞所以旋其機也返聞自性則背塵合覺故名正既聞自性即覷見本來面目即此聞性便成無上菩提圓通真常不假外得乃三世諸佛證無上菩提之頓門也僧問長沙如何是文殊沙曰牆壁瓦礫是曰如何是觀音沙曰音聲言語是曰如何是普賢沙曰衆生心是曰如何是佛沙曰衆生色身是曰恆沙諸佛體皆同何故有種種名字沙曰從眼根返源名文殊從耳根返源名觀音從心返源名普賢文殊是佛妙觀察智觀音是佛無緣大慈普賢是佛無為妙行三聖是佛之妙用佛是三聖之真體用則有恆沙假名體則總名一薄伽梵故知各入圓明者總與諸佛無別而耳根最圓須以觀世音為法誠如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最自餘諸方便皆是佛威神即事捨塵勞非是長修學淺深同説法頂禮如來藏無漏不思議願加被未來於此門無惑方便易成就堪以教阿難及末劫沉淪但以此根修圓通超餘者真實心如是通曰此文殊酬佛所問選擇圓通無如觀音返聞法門堪教阿難以治畜聞之過堪救末劫以拔流轉之苦非餘方便偶觸一機發明已事深者入微非初心所及淺者滯迹於圓通相左非是始終長修之學唯此耳根入者淺深皆宜可長修學最易成就最為方便故願世尊默加被之而文殊真實為人之心亦良慰已中塔球禪師上堂我此間粥飯因緣為兄弟舉唱終不是常欲得省要却是山河大地與汝發明其道既常亦能究竟若從文殊門入者一切無為土木瓦礫助汝發機若從觀音門入者一切音響蝦蟆蚯蚓助汝發機若從普賢門入者不動步而到此三門方便示汝如將一隻折箭攪大海水令彼魚龍知水為命會麼若無智眼而審諦之任汝百般巧妙不為究竟又僧問道溥禪師初心後學近入叢林方便門中乞師指示溥敲門枋僧曰向上還有事也無溥曰有曰如何是向上事溥再敲門枋夫普賢曰心聞洞十方文殊曰我亦從中證三聖互相敲唱令人從耳根入蓋以應此方之機也若諸尊宿發明向上始終接引何嘗不遵圓通軌轍哉抑何速證者之鮮也證入寂滅現前固自不易然大智度論云耳根無覺知故不應聞耳識一念故不能分別不應聞意識亦不能聞何以故先五識識五塵然後意識識意識不能識現在五塵唯識過去未來五塵若意識能識現在五塵者盲聾人亦應識聲色妙哉論乎正合此寂滅之旨唯聲無覺無根故動靜二相了然不生唯根無覺故盡聞不住唯識無色無對無處故覺所覺空所空能空生滅既滅一念速證其與漸增漸化者原非兩途故返聞入流至不生滅所當遵也於是阿難及諸大衆身心了然得大開示觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路普會大衆天龍八部有學二乘及諸一切新發心菩薩其數凡有十恆河沙皆得本心遠塵離垢獲法眼淨性比丘尼聞説偈已成阿羅漢無量衆生皆發無等等阿耨多羅三藐三菩提心阿難嚴整衣服於大衆中合掌頂禮心迹圓明悲欣交集欲益未來諸衆生故稽首白佛大悲世尊我今已悟成佛法門是中修行得無疑惑常聞如來説如是言自未得度先度人者菩薩發心自覺已圓能覺他者如來應世我雖未度願度末劫一切衆生世尊此諸衆生去佛漸遠邪師説法如恆河沙欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈通曰無等等無上正等正覺所謂最上乘也無物與等而能與物為等故曰無等等以離煩惱故曰佛菩提以離生滅故曰大涅槃無量衆生皆知於此發心明知煩惱非家而覺性為家也明知生滅非家而涅槃為家也返聞法門自入流亡所以至寂滅現前是中修行獲妙圓通道路歷然如指諸掌阿難雖未自度究盡二死至登彼岸然欲度未來衆生皆入正定不為魔攪緣魔事甚多防範不易如性比丘尼非得如來神呪何得淫心頓息成阿羅漢最後五十種陰魔蓋酬此問更令明了其家所歸道路云爾首山念禪師示衆云老僧擬欲歸鄉什麼人隨得去時有僧問未審和尚什麼時去念云待有伴即向汝道僧云無伴底事作麼生念云盡日不逢人明明不知處僧云忽遇一人又作麼生念云迷子不歸家失却來時路僧云請師指箇歸鄉路念云枯木藏龍不存依倚僧云和尚什麼時節却回念云一去不知音六國無消息僧云正當歸鄉底事又作麼生念云獨唱胡家曲無人和得齊僧云忽遇知音在時如何念云山上石人齊拍掌溪邊野老笑呵呵僧云歸鄉回來底事又作麼生念云八國奉朝衣四相無遷改僧云未審居何位次念云文殊不坐金臺殿自有逍遙竹拂枝看念法華絲來線去敲唱自在依然仰山氣味爾時世尊於大衆中稱讚阿難善哉善哉如汝所問安立道場救護衆生末劫沉溺汝今諦聽當為汝説阿難大衆唯然奉教佛告阿難汝常聞我毗奈耶中此云律藏宣説修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學通曰前云二決定義一者審因地心二者選擇圓根返窮流根至不生滅直趨無上菩提更不論戒定慧等學此十方如來一門超出妙奢摩他路所以接上上根也中云根塵不偶未嘗無戒如澄濁水未嘗無定內瑩發光未嘗無慧但不以戒定慧自縛故為第一義諦今復先詳於戒而申明律中四禁所以接中下根也為防魔故不得不嚴於戒小乘稟法為戒粗治其末大乘攝心為戒細絶其本法戒則無身犯而已心戒則無思犯也戒珠圓明即能轉識成智可以空五陰破五濁矣又何魔事之足患哉六祖示衆云我此法門以定慧為本大衆勿迷言定慧別定慧一體不是二定是慧體慧是定用即慧之時定在慧即定之時慧在定若識此義即是定慧等學諸學道人莫言先定發慧先慧發定各別作此見者法有二相口説善語心中不善空有定慧定慧不等若心口俱善內外一種定慧即等自悟修行不在於靜若諍先後即同迷人不斷勝負却增我法不離四相善知識定慧猶如燈光有燈即光無燈即暗燈是光之體光是燈之用名雖有二體本同一此六祖雖明定慧一體中云心口俱善內外一種定慧即等而戒亦在其中矣他日語志誠曰吾所説法不離自性離體説法名為相説自性常迷須知一切萬法皆從自性起用是真戒定慧法聽吾偈曰心地無非自性戒心地無癡自性慧心地無亂自性定不增不減自金剛身去身來本三昧誠聞偈有省乃呈一偈五蘊幻身幻何究竟回趣真如法還不淨祖然之是最上乘所説戒定慧總是屋裏話與他門外語不啻霄壤阿難云何攝心我名為戒若諸世界六道衆生其心不淫則不隨其生死相續汝修三昧本出塵勞淫心不除魔不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女彼等諸魔亦有徒衆各各自謂成無上道我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸衆生落愛見坑失菩提路汝教世人修三摩地先斷淫心是名如來先佛世尊第一決定清淨明誨是故阿難若不斷淫修禪定者如蒸砂石欲其成飯經百千劫祗名熱砂何以故此非飯本砂石成故汝以淫身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三塗必不能出如來涅槃何路修證必使淫機身心俱斷斷性亦無於佛菩提斯可希冀如我此説名為佛説不如此説即波旬説通曰六道衆生生死相續汝愛我心我憐汝色生生世世常在纏縛唯淫為根本始於見明色發明見想成異見成憎同想成愛一念愛根發動最先故以禁淫為始不禁淫而修禪定縱得妙悟秪益淫機故其究不成佛果而成魔屬魔亦有神通變現亦能説無上道但淫業不除魔福既盡終輪轉三塗苦耳淫發有機而心為之本故曰心淫心若不動機自不發故攝心持律先斷心淫名曰斷性有斷性在未離對治對待宛然淫機尚伏必斷性亦無方為真斷也唯淫為煩惱根斷之而菩提可冀唯淫為生死本斷之而涅槃可證斷之云者如手足斷無復用之淫斷則以不生不滅為因地心故得正定不然蒸砂而成飯其可得乎哉法華經云不應於女人身取能生欲想相而為説法亦不樂見若入他家不與小女處女寡女等共語亦復不近五種不男之人以為親厚不獨入他家若有因緣須獨入時但一心念佛若為女人説法不露齒笑不現胸臆乃至為法猶不親厚況復餘事不樂畜年少弟子沙彌小兒亦不樂與同師常好坐禪在於間處修攝其心此先佛世尊準繩如是昔二祖嘗混迹淫房酒肆間人或嘲之祖曰我自調心何關汝事不是大出脫人安能入泥入水百丈惟政禪師上堂巖頭和尚用三文錢索得箇妻祗解撈蝦摝蜆要且不解生男育女直至如今門風斷絶要識奯公妻麼百丈今日不惜唇吻與你諸人注破蓬鬢荊叉世所希布裙猶是嫁時衣怪哉將謂是奯公妻元來與我奯公面目相似有僧問欽山如何是和尚家風欽曰錦繡銀香囊風吹滿路香巖頭聞得令僧去云傳誠十八姊好好事潘郎巖頭大似説風流禪而惟政借巖頭指蹤風流更甚總是臘月蓮華耳奯音豁阿難又諸世界六道衆生其心不殺則不隨其生死相續汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎彼諸鬼神亦有徒衆各各自謂成無上道我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路阿難我令比丘食五淨肉此肉皆我神力化生本無命根汝婆羅門地多蒸濕加以砂石草菜不生我以大悲神力所加因大慈悲假名為肉汝得其味奈何如來滅度之後食衆生肉名為釋子汝等當知是食肉人從得心開似三摩地皆大羅剎報終必沉生死苦海非佛弟子如是之人相殺相吞相食未已云何是人得出三界汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大叫求人不聞此等名為欲隱彌露清淨比丘及諸菩薩於歧路行不踏生草況以手拔云何大悲取諸衆生血肉充食若諸比丘不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界何以故服其身分皆為彼緣如人食其地中百穀足不離地必使身心於諸衆生若身身分身心二塗不服不食我説是人真解脫者如我此説名為佛説不如此説即波旬説通曰佛成道十二年前未制戒律許比丘食五淨肉後因六羣比丘故殺而食從此制律永斷諸經以不見不聞不疑及鳥殘自死為五種肉今云五淨肉神力化生當如臺山木肉之類本無命根故曰淨人之不能去殺者為服為食故也若服衆生絲綿裘毳及食衆生血肉皆為彼緣未能真脫欲出三界得乎如劫初之人體有金光足若御雲因食地肥啖香稻故其體堅重足不離地終為地緣故修禪習定本以避罪反乃行殺何異塞耳避人正宜屏息反乃高呌欲免輪回無有是處縱得禪定亦鬼神邪定爾鬼神邪定與善定相似故曰似三摩地其究必落神道也若身血肉類也身分裘毳類也身不服食皆心為之禁制故以攝心為戒若大解脫者不遵此律當另具一隻眼蜆子和尚不知何許人自印心於洞山混俗閩川冬夏唯披一衲逐日沿江岸採掇蝦蜆以充其腹暮即宿白馬廟紙錢中華嚴靜禪師欲決真假先潛入紙錢中深夜蜆子歸嚴把住曰如何是祖師西來意遽答曰神前酒臺盤嚴曰不虗與我同根生後不知所終此所謂異類中行者也南泉因東西兩堂爭貓兒泉遇之白衆曰道得即救取貓兒道不得即斬却也衆無對泉便斬之趙州自外歸泉舉前話示之州乃脫草履安頭上而出泉曰子若在即救得貓兒也又雪峯普請畬田次見一蛇以杖挑起召衆曰看看以刀芟為兩段玄沙以杖拋於背後更不顧視衆愕然峯曰俊哉雪峯神用宛似南泉玄沙不顧頗類趙州泉曰子若在恰救得貓兒峯曰俊哉兩家父子節拍成就如一印印出雪竇天童頌處亦是依樣畫葫蘆也雪竇頌云兩堂俱是杜禪和撥動煙塵不奈何賴得南泉能舉令一刀兩段任偏頗公案圓來問趙州長安城裏任間遊草鞋頭戴無人會歸到家山即便休天童頌云兩堂雲水盡紛拏王老師能驗正邪利刀斬斷俱亡像千古令人愛作家此道未喪知音可嘉鑿山透海兮唯尊大禹鍊石補天兮獨賢女媧趙州老有生涯草鞋頭載較些些異中來也還明鑑只箇真金不混沙此二三老作家以殺生為佛事乃大人境界故非尋常可測阿難又復世界六道衆生其心不偷則不隨其生死相續汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著彼等羣邪亦有徒衆各各自謂成無上道我滅度後末法之中多此妖邪熾盛世間潛匿姦欺稱善知識各自謂己得上人法詃惑無識恐令失心所過之處其家耗散我教比丘循方乞食令其捨貪成菩提道諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量衆生墮無間獄若我滅後其有比丘發心決定修三摩提能於如來形像之前身然一燈燒一指節及於身上爇一香炷我説是人無始宿債一時酬畢長揖世間永脫諸漏雖未即明無上覺路是人於法已決定心若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復若諸比丘衣鉢之餘分寸不畜乞食餘分施餓衆生於大集會合掌禮衆有人捶詈同於稱讚必使身心二俱捐捨身肉骨血與衆生共不將如來不了義説回為己解以誤初學佛印是人得真三昧如我所説名為佛説不如此説即波旬説通曰貪而不已必至於偷偷盜他物以資己身害止於身而已故然燈焚指即可酬畢若裨販如來不了義説回為己解以誤初學是謂盜法者也其害無量良由中心竊竊自喜欲擅其長未能自捨故也捨身易捨心難必使身心俱捨偷心悉除乃可語得真三昧者昔黑氏梵志此云淨裔運神力以左右手擎合歡梧桐華兩株來供養佛佛召仙人梵志應諾佛曰放下著梵志遂放下左手一株華佛又召仙人放下著梵志又放下右手一株華佛又召仙人放下著梵志曰世尊我今兩手皆空更教放下箇甚麼佛曰吾非教汝放捨其華汝當放捨外六塵內六根中六識一時捨却無可捨處是汝免生死處梵志即於言下悟無生忍黃龍惟清禪師印心於晦堂每謂人曰今之學者未脫生死病在甚處病在偷心未死耳然非其罪為師者之罪也如漢高帝紿韓信而殺之信雖死其心果死乎古之學者言下脫生死效在甚麼處在偷心已死然非學者自能爾實為師者鉗鎚妙密也如梁武帝御大殿見候景不動聲氣而景之心已枯竭無餘矣諸方所説非不美麗要之如趙昌畫華華雖逼真而非真華也是可為裨販如來者戒阿難如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩地不得清淨成愛見魔失如來種所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養是一顛迦無善心者銷滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沉三苦海不成三昧我滅度後敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉或作沙門此云勤息白衣居士人王宰官童男童女如是乃至淫女寡婦姦偷屠販與其同事稱讚佛乘令其身心入三摩地終不自言我真菩薩真阿羅漢泄佛密因輕言未學唯除命終陰有遺付云何是人惑亂衆生成大妄語汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨是故阿難若不斷其大妄語者如刻人糞為旃擅形欲求香氣無有是處我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲求佛菩提如噬臍人欲誰成就若諸比丘心如直絃一切真實入三摩地永無魔事我印是人成就菩薩無上知覺如我所説名為佛説不如此説即波旬説通曰身意口具十業身業淫殺盜是也意業貪嗔癡是也口業惡口兩舌綺語妄語是也身心無殺盜淫行惡口兩舌綺語可信其無唯大妄語容或有之何以故內無殺盜淫心外無殺盜淫事三行已圓內外清淨世不多有以最上乘律之未為奇特因彼癡根難除於三摩地中有愛見在便乃妄語謂已得證十地地前信住行向及辟支四聖果意在貪其供養即愛魔謂已齊聖即見魔前愛見坑心著於境失菩提路不耘苗者也此愛見魔心縛於法失如來種助苗長者也不耘苗者回心向道即獲菩提助苗長者僭帝稱王自取誅滅故其害尤甚謬指邪解以當極則令諸衆生不復知有向上事故為銷滅佛種大妄語其可無戒哉若果位中人應身顯化亦不敢輕泄密因自言所得如法華志言和尚將化謂人曰我從無量劫來成就逝多國土分身揚化今南歸矣言畢右脅而逝集仙王質問法華言如何是祖師西來意師曰青山影裏潑藍起寶塔高吟撼曉風又曰請法華燒香師曰未從齋戒覓不向佛邊求或問師凡耶聖耶遂舉手曰我不在此住觀其果位人語句自別何以妄為僧問藥山如何是道中至寶山曰莫諂曲曰不諂曲時如何山曰傾國不換淨名云直心為道場無虗假故心如直絃一切真實豈但永無魔事而無上知覺亦此成就矣此大妄語戒在三行已圓之後攝之則成無上知覺不攝則沉三苦海緣身心清淨其力最大一念不戒而身心之清淨不為善用而為惡用其惡有異乎人者矣故其戒更當密也前云攝心為戒因戒生定因定發慧是則名為三無漏學今獨詳四禁而不及定慧何也即戒之時而定慧自在本自一體本無漸次故也如云汝教世人修三摩地何嘗不以定慧為本至云佛印是人得真三昧則因戒生定之明徵也又云我印是人成就菩薩無上知覺則因定發慧之明徵也故即戒而定慧自在不必別求所謂定慧也此三無漏唯阿羅漢能證之證此道者能殺賊能無生能應供而怖魔不足言矣波旬魔王名此云惡者
